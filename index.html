async function saveNewCapsule() {
  syncCapForm();
  const f = _capForm;
  if (!f.name.trim()) { toast("Give it a name"); return; }
  const payload = { name: f.name.trim(), kind: f.kind, notes: f.notes || null };
  if (isTripKind(f.kind)) { payload.start_date = f.start_date || null; payload.end_date = f.end_date || null; }
  try {
    const rows = await rest("/capsules?select=*", {
      method: "POST", headers: { "Content-Type": "application/json", Prefer: "return=representation" }, body: JSON.stringify(payload),
    });
    const c = rows[0];
    capsules.unshift(c);
    buildCapsuleIndexes();
    // fold in any items queued from a closet bulk "add to capsule"
    if (_pendingAddIds && _pendingAddIds.length) {
      await addItemsToCapsule(c.id, _pendingAddIds);
      _pendingAddIds = null;
    }
    _capForm = null;
    capsuleId = c.id;
    capsuleView = "detail";
    renderCapsules();
    toast("Capsule created");
  } catch (e) { toast(e.message); }
}
const isTripKind = (k) => k !== "capsule";

function syncCapForm() {
  if (!_capForm) return;
  const name = $("#capName"); if (name) _capForm.name = name.value;
  const notes = $("#capNotes"); if (notes) _capForm.notes = notes.value;
  const s = $("#capStart"); if (s) _capForm.start_date = s.value;
  const e = $("#capEnd"); if (e) _capForm.end_date = e.value;
}

// ---- detail ----
function openCapsule(id) {
  capsuleId = id;
  capsuleView = "detail";
  _capUnpackedOnly = false;
  renderCapsules();
}

function capItemTileHtml(i, trip, packedSet) {
  const isPacked = trip && packedSet.has(i.id);
  const tick = trip ? `<div class="pack-tick" data-pack="${esc(i.id)}"><svg viewBox="0 0 24 24"><path d="M5 12l5 5L19 7"/></svg></div>` : "";
  return `<button class="gtile${isPacked ? " packed" : ""}" data-cap-item="${esc(i.id)}">
    ${tick}${thumbHtml(i.image_path, "gphoto")}<div class="gname">${esc(i.name || "Untitled")}</div></button>`;
}

// category- or formality-grouped grid with per-group counts (and packed counts for trips)
function capGroupsHtml(list, trip, packedSet) {
  if (!list.length) return `<div class="placeholder" style="padding:40px 32px"><b>No items yet</b><div>Add pieces to start planning.</div></div>`;
  const groups = _capSort === "formality" ? groupByFormality(list) : groupByCategory(list);
  return groups.map(g => {
    let cnt;
    if (trip) {
      const packed = g.items.filter(i => packedSet.has(i.id)).length;
      cnt = `<span class="g-cnt${packed === g.items.length ? " done" : ""}" data-grp-cnt>${packed}/${g.items.length} packed</span>`;
    } else {
      cnt = `<span class="g-cnt">${g.items.length} item${g.items.length === 1 ? "" : "s"}</span>`;
    }
    return `<div class="cap-grp" data-grp="${esc(g.key)}">
      <div class="cap-grp-hdr"><span class="g-name">${esc(g.key)}</span>${cnt}</div>
      <div class="grid" style="--grid-cols:${gridCols}">${g.items.map(i => capItemTileHtml(i, trip, packedSet)).join("")}</div>
    </div>`;
  }).join("");
}

function renderCapsuleDetail() {
  const c = capsuleById.get(capsuleId);
  const list = capsuleItems(capsuleId);
  const trip = isTrip(c);
  const dates = capDateLabel(c);
  const sub = [capModeLabel(c)];
  if (dates) sub.push(dates);

  // formality coverage across the 6 levels
  const covered = new Set();
  for (const i of list) {
    covered.add(Math.max(1, Math.min(6, Math.round(itemFormality(i)))));
  }
  const covChips = OCCASION_LADDER.map((lbl, idx) =>
    `<span class="cap-cov-chip${covered.has(idx + 1) ? " on" : ""}">${esc(lbl)}</span>`).join("");

  // rough outfit-combination estimate
  const byCat = (cat) => list.filter(i => i.category === cat).length;
  const combos = (byCat("Tops") * byCat("Bottoms") + byCat("Dresses")) * Math.max(1, byCat("Shoes"));

  let packHtml = "";
  if (trip && list.length) {
    const links = capsuleLinkMap.get(capsuleId) || [];
    const packed = links.filter(l => l.packed).length;
    const pct = Math.round((packed / list.length) * 100);
    packHtml = `<div class="cap-pack">
      <div class="cap-pack-bar"><div class="cap-pack-fill" style="width:${pct}%"></div></div>
      <div class="cap-pack-lbl">${packed} of ${list.length} packed · tap the circle on a piece to check it off</div>
    </div>`;
  }

  let wxHtml = "";
  if (trip && c.start_date && c.end_date) {
    const locs = c.locations || [];
    const locRows = locs.map((l, i) => {
      const range = (l.from || l.to) ? `${l.from ? fmtDate(l.from) : "start"} – ${l.to ? fmtDate(l.to) : "end"}` : "Whole trip";
      return `<div class="loc-row">
        <span class="loc-pin">📍</span>
        <div class="loc-info">
          <div class="loc-name">${esc(l.name)}</div>
          <div class="loc-range">${esc(range)}</div>
        </div>
        <button class="loc-del" data-loc-del="${i}" aria-label="Remove location">×</button>
      </div>`;
    }).join("");
    const wxContent = locs.length
      ? `<div id="wxStrip"><div class="wx-loading muted">Loading weather…</div></div>`
      : `<div id="wxStrip"></div>`;
    wxHtml = `<div class="wx-section">
      <div class="wx-sec-hdr">
        <div class="wx-sec-title">Locations</div>
        <button class="wx-add-btn" data-loc-add>＋ Add</button>
      </div>
      ${locRows || `<div class="wx-no-locs">No locations yet — add one to see weather.</div>`}
      ${wxContent}
    </div>`;
  }

  const packedSet = new Set((capsuleLinkMap.get(capsuleId) || []).filter(l => l.packed).map(l => l.item_id));
  let gridList = list;
  if (trip && _capUnpackedOnly) gridList = list.filter(i => !packedSet.has(i.id));
  let grid;
  if (trip && _capUnpackedOnly && !gridList.length && list.length) {
    grid = `<div class="placeholder" style="padding:40px 32px"><b>All packed 🎉</b><div>Every item is checked off.</div></div>`;
  } else {
    grid = capGroupsHtml(gridList, trip, packedSet);
  }
  const orgBar = list.length > 1 ? `<div class="cap-orgbar">
    <div class="cap-seg">
      <button data-capsort="category" class="${_capSort === "category" ? "on" : ""}">By category</button>
      <button data-capsort="formality" class="${_capSort === "formality" ? "on" : ""}">By formality</button>
    </div>
    ${trip ? `<button class="cap-chip${_capUnpackedOnly ? " on" : ""}" data-cap-unpacked>Unpacked only</button>` : ""}
  </div>` : "";

  return capToolbar(c.name, true) + `
    <div class="cap-hdr">
      <div class="ch-name">${esc(c.name)}</div>
      <div class="ch-sub">${esc(sub.join(" · "))}</div>
    </div>
    <div class="cap-insight">
      <div class="kpi-row">
        <div class="kpi-cell"><div class="kpi-val">${list.length}</div><div class="kpi-lbl">item${list.length === 1 ? "" : "s"}</div></div>
        <div class="kpi-cell"><div class="kpi-val">${list.length ? money(capValue(capsuleId)) : "—"}</div><div class="kpi-lbl">total value</div></div>
      </div>
      ${combos > 1 ? `<div class="cap-cov-lbl" style="margin-top:12px">≈ ${combos} outfit${combos === 1 ? "" : "s"} possible from these pieces</div>` : ""}
      <div class="cap-cov">
        <div class="cap-cov-lbl">Formality covered</div>
        <div class="cap-cov-chips">${covChips}</div>
      </div>
    </div>
    ${packHtml}
    ${wxHtml}
    <button class="cap-plan" data-cap-plan>
      <svg viewBox="0 0 24 24"><path d="M12 3l-1.5 3L4 9v11h16V9l-6.5-3z"/><path d="M12 6v14"/></svg>
      Plan outfits from this
    </button>
    <textarea class="inp" id="capDetNotes" rows="2" style="margin:16px 14px 0;width:calc(100% - 28px)" placeholder="Notes…">${esc(c.notes || "")}</textarea>
    <div class="cap-secrow"><div class="t">Items</div><button class="a" data-cap-add>＋ Add items</button></div>
    ${orgBar}
    ${grid}
    <div class="cap-footer">
      <div class="cap-actions">
        <button class="cap-act2" data-cap-rename>Rename</button>
        <button class="cap-act2" data-cap-dup>Duplicate</button>
        <button class="cap-act2" data-cap-share>Share list</button>
      </div>
      <button class="cap-del" data-cap-del>Delete capsule</button>
    </div>`;
}

// ---- build a plain-text checklist of a capsule (grouped by category) ----
function capsuleListText(id) {
  const c = capsuleById.get(id);
  if (!c) return "";
  const trip = isTrip(c);
  const packedSet = new Set((capsuleLinkMap.get(id) || []).filter(l => l.packed).map(l => l.item_id));
  const lines = [c.name];
  const dates = capDateLabel(c);
  if (dates) lines.push(dates);
  lines.push("");
  const groups = groupByCategory(capsuleItems(id));
  if (!groups.length) lines.push("(no items yet)");
  for (const g of groups) {
    lines.push(`${g.key.toUpperCase()} (${g.items.length})`);
    for (const i of g.items) {
      const box = trip ? (packedSet.has(i.id) ? "[x] " : "[ ] ") : "• ";
      lines.push(`${box}${i.name || "Untitled"}`);
    }
    lines.push("");
  }
  return lines.join("\n").trim();
}

async function shareCapsuleList(id) {
  const c = capsuleById.get(id);
  if (!c) return;
  const text = capsuleListText(id);
  try {
    if (navigator.share) { await navigator.share({ title: c.name, text }); return; }
  } catch (e) { if (e && e.name === "AbortError") return; }  // user dismissed the share sheet
  try {
    await navigator.clipboard.writeText(text);
    toast("List copied to clipboard");
  } catch (_) {
    // last-resort fallback for browsers without the async clipboard API
    const ta = document.createElement("textarea");
    ta.value = text; document.body.appendChild(ta); ta.select();
    try { document.execCommand("copy"); toast("List copied to clipboard"); }
    catch { toast("Couldn't copy the list"); }
    ta.remove();
  }
}

// ---- rename a capsule (reuses #logSheet) ----
function renameCapsule(id) {
  const c = capsuleById.get(id);
  if (!c) return;
  $("#logInner").innerHTML = `
    <div class="sheet-hdr">
      <button class="lnk" id="renCancel">Cancel</button>
      <h2>Rename</h2>
      <button class="lnk" id="renSave" style="font-weight:700">Save</button>
    </div>
    <div style="padding:18px 18px 30px">
      <input class="inp" id="renName" value="${esc(c.name)}" placeholder="Capsule name" style="width:100%;font-size:16px">
    </div>`;
  $("#logSheet").hidden = false;
  $("#renCancel").onclick = () => { $("#logSheet").hidden = true; };
  $("#renSave").onclick = async () => {
    const name = $("#renName").value.trim();
    if (!name) { toast("Give it a name"); return; }
    $("#logSheet").hidden = true;
    const prev = c.name;
    c.name = name;  // optimistic
    try {
      await rest(`/capsules?id=eq.${id}`, {
        method: "PATCH", headers: { "Content-Type": "application/json", Prefer: "return=minimal" },
        body: JSON.stringify({ name }),
      });
      renderCapsules();
      toast("Renamed");
    } catch (e) { c.name = prev; toast(e.message); }
  };
}

// ---- duplicate a capsule (shell + its items; packing resets) ----
async function duplicateCapsule(id) {
  const c = capsuleById.get(id);
  if (!c) return;
  const itemIds = (capsuleLinkMap.get(id) || []).map(l => l.item_id);
  try {
    const payload = { name: `${c.name} (copy)`, kind: c.kind, notes: c.notes || null };
    if (c.start_date) payload.start_date = c.start_date;
    if (c.end_date)   payload.end_date   = c.end_date;
    if (c.locations)  payload.locations  = c.locations;  // column exists since r9
    const rows = await rest("/capsules?select=*", {
      method: "POST", headers: { "Content-Type": "application/json", Prefer: "return=representation" },
      body: JSON.stringify(payload),
    });
    const nc = Array.isArray(rows) ? rows[0] : rows;
    if (!nc || !nc.id) throw new Error("Could not duplicate");
    capsules.unshift(nc);
    buildCapsuleIndexes();
    if (itemIds.length) await addItemsToCapsule(nc.id, itemIds);
    capsuleId = nc.id;
    capsuleView = "detail";
    renderCapsules();
    toast("Capsule duplicated");
  } catch (e) { toast(e.message); }
}

function planFromCapsule(id) {
  activeCapsuleId = id;
  closetCat = null; closetSub = null; searchResults = null;
  switchTab("closet");
  const c = capsuleById.get(id);
  toast(c ? `Planning from ${c.name}` : "Capsule active");
}

async function deleteCapsule(id) {
  const c = capsuleById.get(id);
  if (!confirm(`Delete "${c ? c.name : "this capsule"}"? Your items are not affected.`)) return;
  try {
    await rest(`/capsules?id=eq.${id}`, { method: "DELETE" });
    capsules = capsules.filter(x => x.id !== id);
    capsuleLinks = capsuleLinks.filter(l => l.capsule_id !== id);
    if (activeCapsuleId === id) activeCapsuleId = null;
    buildCapsuleIndexes();
    capsuleView = "list"; capsuleId = null;
    renderCapsules();
    toast("Capsule deleted");
  } catch (e) { toast(e.message); }
}

function saveCapsuleNotes(id, value) {
  clearTimeout(_capNotesTimer);
  _capNotesTimer = setTimeout(async () => {
    try {
      await rest(`/capsules?id=eq.${id}`, { method: "PATCH", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ notes: value || null }) });
      const c = capsuleById.get(id); if (c) c.notes = value;
    } catch (e) { /* silent */ }
  }, 900);
}

// ---- packing tick ----
async function togglePack(itemId) {
  const links = capsuleLinkMap.get(capsuleId) || [];
  const link = links.find(l => l.item_id === itemId);
  if (!link) return;
  const next = !link.packed;
  link.packed = next; // optimistic
  // surgical tile update + progress refresh
  const tile = $(`[data-cap-item="${itemId}"]`);
  if (tile) tile.classList.toggle("packed", next);
  refreshPackProgress();
  if (_capUnpackedOnly && next && tile) {
    tile.remove();
    $$(".cap-grp").forEach(g => { if (!g.querySelector(".gtile")) g.remove(); });
    if (!$(".cap-grp")) renderCapsules();
  }
  refreshPackGroupCounts();
  try {
    await rest(`/capsule_items?capsule_id=eq.${capsuleId}&item_id=eq.${itemId}`,
      { method: "PATCH", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ packed: next }) });
  } catch (e) { link.packed = !next; toast(e.message); renderCapsules(); }
}
function refreshPackProgress() {
  const fill = $(".cap-pack-fill"), lbl = $(".cap-pack-lbl");
  if (!fill) return;
  const links = capsuleLinkMap.get(capsuleId) || [];
  const total = capsuleItems(capsuleId).length;
  const packed = links.filter(l => l.packed && itemById.has(l.item_id)).length;
  fill.style.width = (total ? Math.round((packed / total) * 100) : 0) + "%";
  if (lbl) lbl.textContent = `${packed} of ${total} packed · tap the circle on a piece to check it off`;
}
// recompute each category/formality group's "N/M packed" header from the DOM tiles
function refreshPackGroupCounts() {
  $$(".cap-grp").forEach(grp => {
    const cnt = grp.querySelector("[data-grp-cnt]");
    if (!cnt) return;
    const total = grp.querySelectorAll(".gtile").length;
    const packed = grp.querySelectorAll(".gtile.packed").length;
    cnt.textContent = `${packed}/${total} packed`;
    cnt.classList.toggle("done", packed === total);
  });
}

// ---- add-items picker (membership editor) ----
function openCapsulePicker(id) {
  capsuleId = id;
  _capPick = new Set((capsuleLinkMap.get(id) || []).map(l => l.item_id));
  _capPickFilter = "";

    (i.category || "").toLowerCase().includes(q) ||
    (i.subcategory || "").toLowerCase().includes(q));
  return pool;
}
function pickerPool() {
  let pool = pickerPoolBase();
  if (_capPickCat) pool = pool.filter(i => (i.category || "Other") === _capPickCat);
  return pool;
}

// horizontal category jump-chips with counts (built from the keyword-filtered pool)
function pickerCatBar() {
  const base = pickerPoolBase();
  const counts = new Map();
  for (const i of base) { const c = i.category || "Other"; counts.set(c, (counts.get(c) || 0) + 1); }
  const cats = [...counts.keys()].sort((a, b) => { const r = catRank(a) - catRank(b); return r !== 0 ? r : a.localeCompare(b); });

  return `<div class="cap-catbar">${chip("__all__", "All", base.length, !_capPickCat)}${cats.map(c => chip(c, c, counts.get(c), _capPickCat === c)).join("")}</div>`;

/* ===================================================================
   BUILD A LOOK — free-form canvas (Stylebook-style)
   builder = { outfitId, name, pieces:[{item_id,x,y,s}], selIdx,
               picking, pickCat, pickQ }.  x/y = piece CENTER as a fraction
   (0..1) of the canvas; s = piece width as a fraction of canvas width;
   array order = z-order (later = on top).
   =================================================================== */
let builder = null;
const clamp01 = (v) => Math.max(0, Math.min(1, v));

// staggered default spot for the k-th piece dropped on the canvas
function defaultPlacement(k) {
  const cols = [0.34, 0.5, 0.66];
  return { x: cols[k % 3], y: clamp01(0.3 + Math.floor(k / 3) * 0.2 + (k % 3) * 0.05), s: 0.4 };
}

function openBuilder(outfitId = null, seedItemId = null) {
  let pieces = [], name = "";
  if (outfitId) {
    const o = outfitById.get(outfitId);
    if (o) {
      name = o.name || "";
      const lay = Array.isArray(o.layout) ? o.layout : [];
      const ids = (outfitItemMap.get(outfitId) || []).filter(id => itemById.has(id));
      if (lay.length) {
        pieces = lay.filter(p => itemById.has(p.item_id)).map(p => ({
          item_id: p.item_id, x: clamp01(p.x), y: clamp01(p.y),
          s: Math.max(0.12, Math.min(0.92, p.s || 0.4)),
        }));
        const have = new Set(pieces.map(p => p.item_id));
        ids.filter(id => !have.has(id)).forEach(id => pieces.push({ item_id: id, ...defaultPlacement(pieces.length) }));
      } else {
        pieces = ids.map((id, k) => ({ item_id: id, ...defaultPlacement(k) }));
      }
    }
  } else if (seedItemId && itemById.has(seedItemId)) {
    pieces = [{ item_id: seedItemId, ...defaultPlacement(0) }];
  }
  builder = { outfitId, name, pieces, selIdx: pieces.length ? pieces.length - 1 : -1, picking: false, pickCat: null, pickQ: "" };
  $("#app").classList.add("builder-mode");
  switchTab("builder");
}

function renderBuilder() {
  if (!builder) return;
  if (builder.picking) renderBuilderPicker();
  else renderBuilderCanvas();
}

function renderBuilderCanvas() {

      style="left:${pc.x * 100}%;top:${pc.y * 100}%;width:${pc.s * 100}%;z-index:${i + 1}">
      <div class="bp-handle" data-bresize="1"><svg viewBox="0 0 24 24"><path d="M8 3H3v5M16 21h5v-5M21 3l-7 7M3 21l7-7"/></svg></div>

  const empty = p.length ? "" : `<div class="bld-empty">

      </div>

    </div>`;

  if (nameInp) nameInp.oninput = () => { builder.name = nameInp.value; };

// pointer-driven move + corner-handle resize (touch + mouse)
function wireBuilderCanvas() {
  const canvas = $("#bCanvas");
  if (!canvas) return;
  let drag = null;
  canvas.addEventListener("pointerdown", (e) => {
    const pieceEl = e.target.closest(".bpiece");
    if (!pieceEl) return;
    const idx = +pieceEl.dataset.bidx;
    selectPiece(idx);
    const resizing = !!e.target.closest("[data-bresize]");
    const rect = canvas.getBoundingClientRect();
    const pc = builder.pieces[idx];
    drag = { idx, el: pieceEl, mode: resizing ? "resize" : "move", rect,
      sx: e.clientX, sy: e.clientY, ox: pc.x, oy: pc.y, os: pc.s };
    pieceEl.setPointerCapture(e.pointerId);
    pieceEl.style.cursor = "grabbing";
    e.preventDefault();
  });
  canvas.addEventListener("pointermove", (e) => {
    if (!drag) return;
    const pc = builder.pieces[drag.idx];
    if (drag.mode === "move") {
      pc.x = clamp01(drag.ox + (e.clientX - drag.sx) / drag.rect.width);
      pc.y = clamp01(drag.oy + (e.clientY - drag.sy) / drag.rect.height);
      drag.el.style.left = pc.x * 100 + "%";
      drag.el.style.top = pc.y * 100 + "%";
    } else {
      const d = (e.clientX - drag.sx) / drag.rect.width;
      pc.s = Math.max(0.12, Math.min(0.92, drag.os + d * 2));
      drag.el.style.width = pc.s * 100 + "%";
    }
    e.preventDefault();
  });
  const end = () => { if (drag) { drag.el.style.cursor = "grab"; drag = null; } };
  canvas.addEventListener("pointerup", end);
  canvas.addEventListener("pointercancel", end);
}

function selectPiece(idx) {
  builder.selIdx = idx;
  $$("#bCanvas .bpiece").forEach(el => el.classList.toggle("sel", +el.dataset.bidx === idx));
}

function layerPiece(dir) {
  const i = builder.selIdx, p = builder.pieces;
  if (i < 0) return;
  if (dir === "front" && i < p.length - 1) { [p[i], p[i + 1]] = [p[i + 1], p[i]]; builder.selIdx = i + 1; }
  else if (dir === "back" && i > 0) { [p[i], p[i - 1]] = [p[i - 1], p[i]]; builder.selIdx = i - 1; }
  renderBuilderCanvas();
}

function deleteBuilderPiece() {
  const i = builder.selIdx;
  if (i < 0) return;
  builder.pieces.splice(i, 1);
  builder.selIdx = builder.pieces.length ? Math.min(i, builder.pieces.length - 1) : -1;
  renderBuilderCanvas();
}

async function saveBuilder() {
  if (!builder) return;
  const p = builder.pieces;
  if (!p.length) { toast("Add at least one piece"); return; }
  const layout = p.map(pc => ({ item_id: pc.item_id, x: +pc.x.toFixed(4), y: +pc.y.toFixed(4), s: +pc.s.toFixed(4) }));
  const itemIds = p.map(pc => pc.item_id);
  const name = builder.name.trim() || null;
  const wasNew = !builder.outfitId;
  try {
    let id = builder.outfitId;
    if (!id) {
      const rows = await rest("/outfits?select=*", {
        method: "POST", headers: { "Content-Type": "application/json", Prefer: "return=representation" },
        body: JSON.stringify({ name, layout }),
      });
      const o = Array.isArray(rows) ? rows[0] : rows;
      if (!o || !o.id) throw new Error("Could not create look");
      id = o.id; o.layout = layout;
      outfits.push(o);
      const links = itemIds.map(item_id => ({ outfit_id: id, item_id }));
      await rest("/outfit_items", {
        method: "POST", headers: { "Content-Type": "application/json", Prefer: "return=minimal" },
        body: JSON.stringify(links),
      });
      outfitLinks = outfitLinks.concat(links);
    } else {
      await rest(`/outfits?id=eq.${id}`, {
        method: "PATCH", headers: { "Content-Type": "application/json", Prefer: "return=minimal" },
        body: JSON.stringify({ name, layout }),
      });
      const o = outfitById.get(id); if (o) { o.name = name; o.layout = layout; }
      const current = new Set(outfitItemMap.get(id) || []);
      const toAdd = itemIds.filter(x => !current.has(x));
      const toRemove = [...current].filter(x => !itemIds.includes(x));
      if (toAdd.length) {
        const links = toAdd.map(item_id => ({ outfit_id: id, item_id }));
        await rest("/outfit_items", {
          method: "POST", headers: { "Content-Type": "application/json", Prefer: "return=minimal" },
          body: JSON.stringify(links),
        });
        outfitLinks = outfitLinks.concat(links);
      }
      if (toRemove.length) {
        const inList = `(${toRemove.map(x => `"${x}"`).join(",")})`;
        await rest(`/outfit_items?outfit_id=eq.${id}&item_id=in.${inList}`, { method: "DELETE" });
        outfitLinks = outfitLinks.filter(l => !(l.outfit_id === id && toRemove.includes(l.item_id)));
      }
    }
    buildOutfitIndexes();  // resets _bucket caches so formality re-derives
    builder = null;
    $("#app").classList.remove("builder-mode");
    looksLens = "All"; looksFolder = null;
    switchTab("looks");
    openLook(id);
    toast(wasNew ? "Look created" : "Look saved");
  } catch (e) { toast(e.message); }
}

   =================================================================== */
const _wxCache = {};  // capsuleId → {days, ts}
const WX_TTL = 600000; // 10 min
let _locSheet = null;  // {cid, step:"search"|"range", searchQ, results, loc, from, to}

function wmoEmoji(code) {
  if (code == null) return "—";
  if (code === 0) return "☀️";
  if (code <= 2) return "🌤️";
  if (code === 3) return "☁️";
  if (code <= 48) return "🌫️";
  if (code <= 55) return "🌦️";
  if (code <= 65) return "🌧️";
  if (code <= 77) return "❄️";
  if (code <= 82) return "🌧️";
  if (code <= 86) return "🌨️";
  if (code <= 99) return "⛈️";
  return "🌡️";
}

async function geocodeLocation(q) {
  const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=6&language=en&format=json`);
  const data = await res.json();
  return (data.results || []).map(r => ({
    name: r.name, admin1: r.admin1 || "", country: r.country || "",
    lat: r.latitude, lon: r.longitude
  }));
}

// Fetch weather for a lat/lon + date range.
// 3 zones: past (archive), recent+near-future (forecast), far-future (3-yr historical avg).
async function fetchWeatherRange(lat, lon, startStr, endStr) {
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const todayStr = today.toISOString().slice(0, 10);
  const fc92 = new Date(today); fc92.setDate(fc92.getDate() - 92);
  const fc92Str = fc92.toISOString().slice(0, 10);
  const fcCutoff = new Date(today); fcCutoff.setDate(fcCutoff.getDate() + 15);
  const fcCutoffStr = fcCutoff.toISOString().slice(0, 10);
  const result = {};

  // Zone A: within forecast API window (today-92 to today+15)
  const zAS = startStr > fc92Str ? startStr : fc92Str;
  const zAE = endStr < fcCutoffStr ? endStr : fcCutoffStr;
  if (zAS <= zAE) {
    try {
      const d = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
        `&daily=temperature_2m_max,temperature_2m_min,weather_code&timezone=auto` +
        `&temperature_unit=fahrenheit&start_date=${zAS}&end_date=${zAE}`).then(r => r.json());
      if (d.daily) d.daily.time.forEach((date, i) => {
        result[date] = { maxT: Math.round(d.daily.temperature_2m_max[i]), minT: Math.round(d.daily.temperature_2m_min[i]), code: d.daily.weather_code[i], hist: false };
      });
    } catch (e) {}
  }

  // Zone B: older than 92 days — ERA5 archive (real historical data)
  if (startStr < fc92Str) {
    const zBE = endStr < fc92Str ? endStr : new Date(fc92.getTime() - 86400000).toISOString().slice(0, 10);
    try {
      const d = await fetch(`https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}` +
        `&daily=temperature_2m_max,temperature_2m_min,weather_code` +
        `&start_date=${startStr}&end_date=${zBE}&temperature_unit=fahrenheit`).then(r => r.json());
      if (d.daily) d.daily.time.forEach((date, i) => {
        if (!result[date]) result[date] = { maxT: Math.round(d.daily.temperature_2m_max[i]), minT: Math.round(d.daily.temperature_2m_min[i]), code: d.daily.weather_code[i], hist: false };
      });
    } catch (e) {}
  }

  // Zone C: future beyond forecast window — average same calendar dates from 3 prior years
  if (endStr > fcCutoffStr) {
    const histDates = [];
    { let d = new Date(startStr + "T00:00:00"), e = new Date(endStr + "T00:00:00");
      while (d <= e) { const s = d.toISOString().slice(0, 10); if (s > fcCutoffStr && !result[s]) histDates.push(s); d.setDate(d.getDate() + 1); } }
    if (histDates.length) {
      const tripSY = parseInt(histDates[0].slice(0, 4));
      const tripEY = parseInt(histDates[histDates.length - 1].slice(0, 4));
      const totals = {};
      for (let yOff = 1; yOff <= 3; yOff++) {
        const aS = histDates[0].replace(/^\d{4}/, String(tripSY - yOff));
        const aE = histDates[histDates.length - 1].replace(/^\d{4}/, String(tripEY - yOff));
        if (aE >= todayStr) continue;
        try {
          const d = await fetch(`https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}` +
            `&daily=temperature_2m_max,temperature_2m_min,weather_code` +
            `&start_date=${aS}&end_date=${aE}&temperature_unit=fahrenheit`).then(r => r.json());
          if (!d.daily) continue;
          d.daily.time.forEach((archDate, i) => {
            const mapped = archDate.replace(/^\d{4}/, String(parseInt(archDate.slice(0, 4)) + yOff));
            if (!histDates.includes(mapped)) return;
            if (!totals[mapped]) totals[mapped] = { mx: 0, mn: 0, codes: [], n: 0 };
            totals[mapped].mx += Math.round(d.daily.temperature_2m_max[i]);
            totals[mapped].mn += Math.round(d.daily.temperature_2m_min[i]);
            totals[mapped].codes.push(d.daily.weather_code[i]);
            totals[mapped].n++;
          });
        } catch (e) {}
      }
      for (const [date, t] of Object.entries(totals)) {
        if (t.n > 0) result[date] = { maxT: Math.round(t.mx / t.n), minT: Math.round(t.mn / t.n), code: t.codes[Math.floor(t.codes.length / 2)], hist: true };
      }
    }
  }
  return result;
}

// Build ordered per-day array across all locations for a trip capsule.
async function buildTripWeather(capsule) {
  if (!capsule.start_date || !capsule.end_date) return [];
  const locs = capsule.locations || [];
  if (!locs.length) return [];

  const dates = [];
  { let d = new Date(capsule.start_date + "T00:00:00"), e = new Date(capsule.end_date + "T00:00:00");
    while (d <= e) { dates.push(d.toISOString().slice(0, 10)); d.setDate(d.getDate() + 1); } }
  if (!dates.length) return [];

  function locForDate(ds) {
    const specific = locs.filter(l => l.from && l.to && ds >= l.from && ds <= l.to);
    if (specific.length) return specific[specific.length - 1];
    const partial = locs.find(l => (l.from && !l.to && ds >= l.from) || (!l.from && l.to && ds <= l.to));
    if (partial) return partial;
    return locs.find(l => !l.from && !l.to) || locs[0];
  }

  // Group consecutive dates sharing the same location
  const groups = [];
  let curKey = null, curLoc = null, curDates = [];
  for (const ds of dates) {
    const loc = locForDate(ds);
    const key = loc ? `${loc.lat},${loc.lon}` : null;
    if (key !== curKey) {
      if (curDates.length && curLoc) groups.push({ loc: curLoc, dates: curDates });
      curKey = key; curLoc = loc; curDates = [ds];
    } else { curDates.push(ds); }
  }
  if (curDates.length && curLoc) groups.push({ loc: curLoc, dates: curDates });

  // Fetch weather per group in parallel
  const fetched = await Promise.all(groups.map(async g => {
    const wx = await fetchWeatherRange(g.loc.lat, g.loc.lon, g.dates[0], g.dates[g.dates.length - 1]);
    return { g, wx };
  }));

  const days = [];
  for (const { g, wx } of fetched) {
    g.dates.forEach((ds, i) => {
      const w = wx[ds];
      days.push({ date: ds, maxT: w ? w.maxT : null, minT: w ? w.minT : null, code: w ? w.code : null, hist: w ? w.hist : false, locName: g.loc.name, firstOfLoc: i === 0 });
    });
  }
  return days;
}

function weatherStripHtml(days) {
  const multiLoc = new Set(days.map(d => d.locName)).size > 1;
  let html = '<div class="wx-days">';
  let prevLoc = null;
  for (const day of days) {
    if (multiLoc && day.locName !== prevLoc && prevLoc !== null) {
      const city = day.locName.split(",")[0];
      html += `<div class="wx-loc-card"><div class="wx-loc-arrow">→</div><div class="wx-loc-lbl">${esc(city)}</div></div>`;
    }
    prevLoc = day.locName;
    const dateObj = new Date(day.date + "T00:00:00");
    const dow = dateObj.toLocaleDateString(undefined, { weekday: "short" });
    const md = dateObj.toLocaleDateString(undefined, { month: "numeric", day: "numeric" });
    const temps = day.maxT != null ? `${day.maxT}° / ${day.minT}°` : "—";
    html += `<div class="wx-day${day.hist ? " hist" : ""}">
      <div class="wx-date">${esc(dow)}</div>
      <div class="wx-date">${esc(md)}</div>
      <div class="wx-icon">${wmoEmoji(day.code)}</div>
      <div class="wx-temps">${esc(temps)}</div>
      ${day.hist ? `<div class="wx-hist-lbl">avg</div>` : ""}
    </div>`;
  }
  html += '</div>';
  return html;
}

async function loadTripWeather(capsule) {
  const cached = _wxCache[capsule.id];
  if (cached && Date.now() - cached.ts < WX_TTL) { _patchWeatherStrip(cached.days); return; }
  try {
    const days = await buildTripWeather(capsule);
    _wxCache[capsule.id] = { days, ts: Date.now() };
    _patchWeatherStrip(days);
  } catch (e) { const el = $("#wxStrip"); if (el) el.innerHTML = ""; }
}
function _patchWeatherStrip(days) {
  const el = $("#wxStrip");
  if (!el) return;
  el.innerHTML = days.length ? `<div class="wx-strip">${weatherStripHtml(days)}</div>` : "";
}

// ---- location add sheet ----
function openLocationSheet(cid) {
  const c = capsuleById.get(cid);
  _locSheet = { cid, step: "search", searchQ: "", results: [], loc: null,
    from: (c && c.start_date) || "", to: (c && c.end_date) || "" };
  _renderLocSheet();
  $("#logSheet").hidden = false;
}
function closeLocationSheet() { _locSheet = null; $("#logSheet").hidden = true; }

function _renderLocSheet() {
  const s = _locSheet;
  if (!s) return;
  if (s.step === "search") {
    const rows = s.results.map((r, i) => {
      const sub = [r.admin1, r.country].filter(Boolean).join(", ");
      return `<div class="loc-result" data-loc-idx="${i}">
        <span class="loc-result-pin">📍</span>
        <div><div class="loc-result-name">${esc(r.name)}</div>${sub ? `<div class="loc-result-sub">${esc(sub)}</div>` : ""}</div>
      </div>`;
    }).join("");
    $("#logInner").innerHTML = `
      <div class="sheet-hdr">
        <button class="lnk" id="locCancel">Cancel</button>
        <h2>Add location</h2>
        <span style="width:54px"></span>
      </div>
      <div class="loc-search-wrap">
        <input class="inp" id="locSearchInp" placeholder="Search city…" value="${esc(s.searchQ)}" autocomplete="off">
      </div>
      ${rows || (s.searchQ ? `<div style="padding:12px 0;color:var(--muted);font-size:14px">No results found</div>` : "")}`;
    const inp = $("#locSearchInp");
    if (inp) {
      inp.focus();
      let timer;
      inp.oninput = () => {
        _locSheet.searchQ = inp.value;
        clearTimeout(timer);
        if (!inp.value.trim()) { _locSheet.results = []; _renderLocSheet(); return; }
        timer = setTimeout(async () => {
          try { _locSheet.results = await geocodeLocation(inp.value.trim()); } catch (e) { _locSheet.results = []; }
          if (_locSheet && _locSheet.step === "search") _renderLocSheet();
        }, 380);
      };
    }
    $("#locCancel").onclick = closeLocationSheet;
    $("#logInner").querySelectorAll("[data-loc-idx]").forEach(el => {
      el.onclick = () => {
        const r = _locSheet.results[+el.dataset.locIdx];
        const city = r.name + ([r.admin1, r.country].filter(Boolean).length ? `, ${[r.admin1, r.country].filter(Boolean)[0]}` : "");
        _locSheet.loc = { name: city, lat: r.lat, lon: r.lon };
        _locSheet.step = "range";
        _renderLocSheet();
      };
    });
  } else {
    const s = _locSheet;
    const c = capsuleById.get(s.cid);
    const hasOthers = (c && (c.locations || []).length > 0);
    $("#logInner").innerHTML = `
      <div class="sheet-hdr">
        <button class="lnk" id="locBack">← Back</button>
        <h2>${esc(s.loc.name.split(",")[0])}</h2>
        <span style="width:54px"></span>
      </div>
      <div style="padding:14px 0 8px">
        <div style="font-size:15px;font-weight:600;margin-bottom:16px">📍 ${esc(s.loc.name)}</div>
        <label class="fld">From</label>
        <input class="inp" type="date" id="locFrom" value="${esc(s.from)}" ${c && c.start_date ? `min="${esc(c.start_date)}"` : ""} ${c && c.end_date ? `max="${esc(c.end_date)}"` : ""}>
        <label class="fld" style="margin-top:12px">To</label>
        <input class="inp" type="date" id="locTo" value="${esc(s.to)}" ${c && c.start_date ? `min="${esc(c.start_date)}"` : ""} ${c && c.end_date ? `max="${esc(c.end_date)}"` : ""}>
        <div style="font-size:12px;color:var(--muted);margin-top:8px">Leave as-is if this location covers the whole trip.</div>
        <button class="btn" id="locSave" style="margin-top:16px">Save location</button>
      </div>`;
    const fromEl = $("#locFrom"), toEl = $("#locTo");
    if (fromEl) fromEl.onchange = () => { _locSheet.from = fromEl.value; };
    if (toEl) toEl.onchange = () => { _locSheet.to = toEl.value; };
    $("#locBack").onclick = () => { _locSheet.step = "search"; _renderLocSheet(); };
    $("#locSave").onclick = _saveLocation;
  }
}

async function _saveLocation() {
  const s = _locSheet;
  if (!s || !s.loc) return;
  const c = capsuleById.get(s.cid);
  if (!c) return;
  const locs = [...(c.locations || [])];
  // Store null when dates match trip start/end (means "whole trip"); store specific value when different
  const from = (s.from && s.from !== (c.start_date || "")) ? s.from : null;
  const to   = (s.to   && s.to   !== (c.end_date   || "")) ? s.to   : null;
  locs.push({ name: s.loc.name, lat: s.loc.lat, lon: s.loc.lon, from, to });
  closeLocationSheet();
  try {
    await rest(`/capsules?id=eq.${s.cid}`, { method: "PATCH", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ locations: locs }) });
    c.locations = locs;
    delete _wxCache[s.cid]; // invalidate cache
    renderCapsules();
    toast("Location added");
  } catch (e) { toast(e.message); }
}

async function removeLocation(cid, idx) {
  const c = capsuleById.get(cid);
  if (!c) return;
  const locs = [...(c.locations || [])];
  locs.splice(idx, 1);
  try {
    await rest(`/capsules?id=eq.${cid}`, { method: "PATCH", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ locations: locs }) });
    c.locations = locs;
    delete _wxCache[cid];
    renderCapsules();
  } catch (e) { toast(e.message); }
}

const TAB_TITLES = {
  home: "Wardrobe", closet: "Closet", looks: "Looks", calendar: "Calendar",

  builder: "Build a Look", settings: "Settings",

function switchTab(name) {
  $$(".screen").forEach(s => s.classList.toggle("active", s.id === `tab-${name}`));
  $$("#tabbar button").forEach(b => b.classList.toggle("on", b.dataset.tab === name));
  $("#title").textContent = TAB_TITLES[name] || "Wardrobe";
  $("#headerAdd").hidden = name !== "home";
  if (name !== "closet") {
    $("#gridBar").hidden = true;
    $("#app").classList.remove("has-gridbar");
    exitSelectMode();
    $("#gridPickerPop").hidden = true;
    $("#itemBar").hidden = true;
    $("#app").classList.remove("detail-photo");
    detailId = null; detailView = null; _fromStats = false; _fromCapsule = null;
  }

  if (name !== "builder") { $("#app").classList.remove("builder-mode"); builder = null; }

  if (name === "home") renderHome();
  else if (name === "closet")   renderCloset();
  else if (name === "search")   renderSearch();
  else if (name === "add")      renderAdd();
  else if (name === "builder")  renderBuilder();
  else if (name === "looks")    renderLooks();
  else if (name === "calendar") renderCalendar();
  else if (name === "capsules") { capsuleView = "list"; capsuleId = null; renderCapsules(); }
  else if (name === "stats")    { statsView = "main"; statsDateRange = "all"; renderStats(); }
  else if (name === "settings") renderSettings();

  window.scrollTo(0, 0);
}

  $("#gridPickerPop").addEventListener("click", (e) => {
    const b = e.target.closest("[data-cols]");
    if (b) setGridCols(+b.dataset.cols);
  });
  // close grid picker on outside tap
  document.addEventListener("click", (e) => {
    if (!e.target.closest("#gbGrid") && !e.target.closest("#gridPickerPop")) {
      $("#gridPickerPop").hidden = true;
    }
  }, true);
  // bulk edit sheet
  $("#bulkBg").addEventListener("click", closeBulkEdit);
  // move sheet (also covers add-cat sheet which reuses the same container)
  $("#moveBg").addEventListener("click", () => {
    if (_capSheetMode) { closeCapsuleSheet(); }
    else if (_addCatMode) { _addCatMode = false; moveCatOpen = null; $("#moveSheet").hidden = true; }
    else closeMoveSheet();
  });

  // item action bar (photo view)
  $("#ibEdit").addEventListener("click", () => { if (detailId) openItemDetails(detailId); });
  $("#ibMove").addEventListener("click", () => { if (detailId) openItemMoveSheet(detailId); });
  $("#ibLog").addEventListener("click", () => { if (detailId) openLogWear(detailId); });
  $("#ibDelete").addEventListener("click", () => { if (detailId) deleteItem(detailId); });

  // field edit sheet
  $("#fieldBg").addEventListener("click", closeFieldSheet);

  // log wear / location sheet
  $("#logBg").addEventListener("click", () => { if (_locSheet) _locSheet = null; $("#logSheet").hidden = true; });

  // add item: field rows + category picker
  document.getElementById("tab-add").addEventListener("click", (e) => {
    const addField = e.target.closest("[data-add-field]");
    if (addField) { openAddFieldEdit(addField.dataset.addField); return; }
  });

  // header ＋ (home only) -> add item
  $("#headerAdd").addEventListener("click", () => switchTab("add"));

  // header gear -> settings
  $("#headerGear").addEventListener("click", () => switchTab("settings"));
}

/* ===================================================================
   AUTH / BOOT
   =================================================================== */
function showLogin() {
  $("#login").classList.add("active");
  $("#app").hidden = true;
}
function showApp() {
  $("#login").classList.remove("active");
  $("#app").hidden = false;
}
function handleSignedOut() {
  saveSession(null);
  items = []; wears = []; outfits = []; outfitLinks = []; dataReady = false; _urlCache.clear();
  itemById = new Map(); outfitById = new Map(); outfitItemMap = new Map(); outfitWearMap = new Map();
  showLogin();
}

async function bootApp() {
  showApp();
  switchTab("home");      // land on home immediately, even before data arrives
  try {
    await loadData();
    prewarmUrlCache();    // fire-and-forget: batch-sign all photo URLs into cache
    renderHome();         // re-render so tile subtitles (counts) fill in
  } catch (e) {
    $("#homeBody").innerHTML = `<div class="placeholder"><b>Couldn't load data</b>
      <div class="err">${esc(e.message)}</div>
      <button class="btn" style="max-width:180px" onclick="retryLoad()">Retry</button></div>`;
  }
}
async function retryLoad() {
  $("#homeBody").innerHTML = `<div class="spin"></div>`;
  try { await loadData(); prewarmUrlCache(); renderHome(); } catch (e) { toast(e.message); }
}
window.retryLoad = retryLoad;

/* ===================================================================
   INIT
   =================================================================== */
(function init() {
  $$(".appver").forEach(el => el.textContent = APP_VERSION);
  const savedCols = parseInt(store.getItem("wardrobe.gridCols") || "0");
  if (savedCols >= 2 && savedCols <= 5) gridCols = savedCols;
  wireEvents();
  loadSession();
  if (session?.access_token) bootApp();
  else showLogin();
})();
</script>
</body>
</html>
