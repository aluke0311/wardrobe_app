<!DOCTYPE html>
<!-- Wardrobe app self-test harness (2026-07-18). NOT shipped — lives in
     migration/ like all tooling. Run it with the local preview server:
         http://localhost:4173/migration/selftest.html
     It loads the real app in an iframe (login screen is fine — these are
     pure-helper tests over mock state) and asserts the derivation logic that
     the app's correctness hangs on. Add a test here whenever a session's
     ad-hoc console verification proves something worth keeping true. -->
<html>
<head>
<meta charset="utf-8">
<title>Wardrobe self-test</title>
<style>
  body { font: 14px/1.5 -apple-system, sans-serif; margin: 24px; max-width: 720px; }
  h1 { font-size: 18px; }
  .pass { color: #2f9e5e; }
  .fail { color: #c0392b; font-weight: 700; }
  #summary { font-size: 16px; font-weight: 700; margin: 12px 0; }
  li { margin: 2px 0; }
  iframe { display: none; }
</style>
</head>
<body>
<h1>Wardrobe self-test</h1>
<div id="summary">Loading app…</div>
<ul id="results"></ul>
<iframe id="app" src="/index.html?selftest=1"></iframe>
<script>
const results = [];
function t(name, fn) {
  try {
    const r = fn();
    if (r === true) results.push({ name, ok: true });
    else results.push({ name, ok: false, msg: JSON.stringify(r) });
  } catch (e) {
    results.push({ name, ok: false, msg: e.message });
  }
}
function eq(a, b) { return JSON.stringify(a) === JSON.stringify(b) ? true : `${JSON.stringify(a)} ≠ ${JSON.stringify(b)}`; }

document.getElementById("app").addEventListener("load", () => setTimeout(run, 300));

function run() {
  const frame = document.getElementById("app");
  // The app's globals are top-level const/let — lexical bindings, NOT
  // contentWindow properties. Inject a classic script (shares the page's
  // global lexical scope) exposing an eval bridge, wrapped in a Proxy so
  // tests can read/write app globals naturally as W.name.
  const doc = frame.contentDocument;
  const bridge = doc.createElement("script");
  bridge.textContent = `window.__app = new Proxy({}, {
    get(_, k) { if (k === "__isBridge") return true; try { return eval(k); } catch { return undefined; } },
    set(_, k, v) { window.__tmpv = v; try { eval(k + " = window.__tmpv"); } catch (e) { console.error(e); } return true; },
  });`;
  doc.body.appendChild(bridge);
  const W = frame.contentWindow.__app;
  if (!W || typeof W.todayStr !== "function") {
    document.getElementById("summary").textContent = "FAIL: app script did not parse (todayStr missing)";
    return;
  }
  const today = W.todayStr();
  const D = (n) => W.shiftDate(today, n);

  // ---- version lockstep (phantom update-toast guard) ----
  t("APP_VERSION matches <meta app-version>", () =>
    eq(W.APP_VERSION, W.document.querySelector('meta[name="app-version"]').content));

  // ---- dates ----
  t("shiftDate crosses month boundaries", () =>
    eq([W.shiftDate("2026-07-01", -3), W.shiftDate("2026-07-31", 2)], ["2026-06-28", "2026-08-02"]));

  // ---- trip phases ----
  const trip = { start_date: "2026-07-16", end_date: "2026-07-20" };
  t("tripPhase: trip / pack / null / unpack / null", () =>
    eq([W.tripPhase(trip, "2026-07-18"), W.tripPhase(trip, "2026-07-14"), W.tripPhase(trip, "2026-07-12"),
        W.tripPhase(trip, "2026-07-22"), W.tripPhase(trip, "2026-07-28")],
       ["trip", "pack", null, "unpack", null]));
  t("tripPhase: undated capsule has no phases", () => eq(W.tripPhase({ start_date: null, end_date: null }), null));
  t("tripDayNum is 1-based", () => eq(W.tripDayNum(trip, "2026-07-18"), 3));

  // ---- sort keys ----
  t("gridSortKey maps legacy 'color' → 'category'", () => {
    const gsk = W._gridSortKeys;  // real object — mutate directly, not via the proxy
    gsk.closet = "color";
    const a = W.gridSortKey("closet");
    gsk.closet = "colorfam";
    const b = W.gridSortKey("closet");
    delete gsk.closet;
    return eq([a, b, W.gridSortKey("closet")], ["category", "colorfam", "category"]);
  });
  const mockSort = [
    { name: "b-tee", category: "Tops", subcategory: "Tee shirts", color_family: "Blue" },
    { name: "g-jean", category: "Bottoms", subcategory: "Jeans", color_family: "Green" },
    { name: "b-jean", category: "Bottoms", subcategory: "Jeans", color_family: "Blue" },
  ];
  t("colorfam = true color sort (spectrum, then category)", () =>
    eq(W.sortItems(mockSort, "colorfam").map(i => i.name), ["g-jean", "b-tee", "b-jean"]));
  t("category = composite (cat > sub > color)", () =>
    eq(W.sortItems(mockSort, "category").map(i => i.name), ["b-tee", "g-jean", "b-jean"]));

  // ---- filters ----
  t("clearFilterState empties every Set + q in place", () => {
    // Sets must come from the IFRAME's realm — instanceof is realm-specific.
    const S = W.Set;
    const st = { q: "hi", brand: new S(["X"]), color: new S(["Blue"]) };
    W.clearFilterState(st);
    return eq([st.q, st.brand.size, st.color.size], ["", 0, 0]);
  });

  // ---- laundry derivation ----
  function laundrySetup() {
    W.items = [{ id: "i1", name: "Tee", category: "Tops", subcategory: "Tee shirts", status: "Available",
                 last_washed: D(-10), laundry_state: null }];
    W.itemById = new Map(W.items.map(i => [i.id, i]));
    W.wears = [];
  }
  t("null last_washed = clean (opt-in tracking)", () => {
    laundrySetup();
    W.items[0].last_washed = null;
    W.wears = [{ item_id: "i1", worn_on: D(-1) }, { item_id: "i1", worn_on: D(-2) }];
    return eq(W.isDirty(W.items[0]), false);
  });
  t("wears since wash ≥ tolerance ⇒ dirty (tee tolerance 1)", () => {
    laundrySetup();
    W.wears = [{ item_id: "i1", worn_on: D(-2) }];
    return eq(W.isDirty(W.items[0]), true);
  });
  t("'hamper' override forces dirty with zero wears", () => {
    laundrySetup();
    W.items[0].laundry_state = "hamper";
    return eq(W.isDirty(W.items[0]), true);
  });
  t("'extra:<n>' grants one more wear, expires on a newer wear-day", () => {
    laundrySetup();
    W.wears = [{ item_id: "i1", worn_on: D(-3) }];
    W.items[0].laundry_state = "extra:1";      // set when 1 wear-day existed
    const clean = W.isDirty(W.items[0]);
    W.wears.push({ item_id: "i1", worn_on: D(-1) });  // newer wear lands
    const dirty = W.isDirty(W.items[0]);
    return eq([clean, dirty], [false, true]);
  });
  t("shoes/outerwear never dirty (Infinity tolerance)", () => {
    W.items = [{ id: "s1", category: "Shoes", subcategory: "Sneakers", status: "Available", last_washed: D(-300), laundry_state: null }];
    W.itemById = new Map([["s1", W.items[0]]]);
    W.wears = Array.from({ length: 40 }, (_, k) => ({ item_id: "s1", worn_on: D(-k - 1) }));
    return eq(W.isDirty(W.items[0]), false);
  });
  // Laundry Control round (2026-07-22): D3 — per-item tolerance override tag.
  t("wearTolerance: tol:<n> tag beats subcat/category defaults", () => {
    const withTag = { category: "Bottoms", subcategory: "Jeans", tags: ["tol:2"] };
    const withoutTag = { category: "Bottoms", subcategory: "Jeans", tags: [] };
    return eq([W.wearTolerance(withTag), W.wearTolerance(withoutTag)], [2, 5]);
  });
  t("tolTagValue: absent/invalid tag = null (falls back to derived)", () => {
    return eq([W.tolTagValue({ tags: [] }), W.tolTagValue({ tags: ["tol:0"] }), W.tolTagValue({ tags: ["tol:3"] })],
              [null, null, 3]);
  });
  // A — planRewearFlags must reset its running count on a REAL wash stamp
  // (items.last_washed), not just the planned-laundry-day sentinel.
  t("planRewearFlags: real last_washed resets the trip rewear count", () => {
    const item = { id: "p1", name: "Shorts", category: "Bottoms", subcategory: "Shorts", tags: [] };
    W.items = [item];
    W.itemById = new Map([["p1", item]]);
    W.outfits = [{ id: "o1", name: "L" }];
    W.outfitById = new Map([["o1", W.outfits[0]]]);
    W.outfitItemMap = new Map([["o1", ["p1"]]]);
    const dates = [D(0), D(1), D(2)];
    const c = { id: "c1", plan: { [dates[0]]: ["o1"], [dates[1]]: ["o1"], [dates[2]]: ["o1"] } };
    item.last_washed = null;
    const noWashFlagged = !!W.planRewearFlags(c, dates).get(dates[2]);
    item.last_washed = dates[1];  // washed partway through the trip
    const washedFlagged = !!W.planRewearFlags(c, dates).get(dates[2]);
    return eq([noWashFlagged, washedFlagged], [true, false]);
  });

  // ---- formality ----
  t("matchesFormality reads the explicit level set", () => {
    // (formalityOk itself is a closure-local inside suggestOutfits — the
    // canonical global predicate is matchesFormality.)
    const it = { formality: [3, 5], name: "x", category: "Tops", subcategory: "Blouses" };
    return eq([W.matchesFormality(it, 3), W.matchesFormality(it, 5), W.matchesFormality(it, 4)],
              [true, true, false]);
  });
  t("deriveWearFormality: shared level wins", () => {
    W.items = [
      { id: "a", formality: [3, 4], category: "Tops", name: "x" },
      { id: "b", formality: [4, 5], category: "Bottoms", name: "y" },
    ];
    W.itemById = new Map(W.items.map(i => [i.id, i]));
    return eq(W.deriveWearFormality(["a", "b"]), 4);
  });

  // ---- looks ----
  t("itemSetKey is order-independent and dedups", () =>
    eq(W.itemSetKey(["b", "a", "b"]), W.itemSetKey(["a", "b"])));
  t("outfitFullyInCapsule requires every piece", () => {
    W.itemById = new Map([["a", { id: "a" }], ["b", { id: "b" }]]);
    W.outfitItemMap = new Map([["o1", ["a", "b"]], ["o2", ["a"]]]);
    W.capsuleLinkMap = new Map([["c1", [{ item_id: "a" }]]]);
    return eq([W.outfitFullyInCapsule({ id: "o1" }, "c1"), W.outfitFullyInCapsule({ id: "o2" }, "c1")], [false, true]);
  });

  // ---- contexts ----
  t("ctxArr handles null / string / array", () =>
    eq([W.ctxArr(null), W.ctxArr({ context: "Work" }), W.ctxArr({ context: ["a", "b"] })],
       [[], ["Work"], ["a", "b"]]));

  // ---- trip mode helpers ----
  function tripSetup() {
    const c = { id: "c1", name: "Trip", start_date: D(-2), end_date: D(4), plan: {} };
    W.capsules = [c];
    W.capsuleById = new Map([["c1", c]]);
    W.items = [{ id: "a", name: "A" }, { id: "b", name: "B" }];
    W.itemById = new Map(W.items.map(i => [i.id, i]));
    W.capsuleLinks = [{ capsule_id: "c1", item_id: "a" }];
    W.capsuleLinkMap = new Map([["c1", W.capsuleLinks]]);
    return c;
  }
  t("tripWearContext stamps Travel only inside trip dates + mode", () => {
    tripSetup();
    W.tripModeId = "c1";
    const inRange = W.tripWearContext(today);
    const outRange = W.tripWearContext(D(30));
    W.tripModeId = null;
    const off = W.tripWearContext(today);
    return eq([inRange, outRange, off], [["Travel"], null, null]);
  });
  t("tripMissingPieces: member → null, non-member → offer", () => {
    tripSetup();
    W.tripModeId = "c1";
    const m1 = W.tripMissingPieces(["a"]);
    const m2 = W.tripMissingPieces(["a", "b"]);
    W.tripModeId = null;
    return eq([m1, m2 && m2.missing], [null, ["b"]]);
  });

  // ---- trip recap ----
  t("tripRecapData: worn/dead split, most-worn, repeated look", () => {
    const c = { id: "c1", name: "T", start_date: D(-8), end_date: D(-2) };
    W.capsuleById = new Map([["c1", c]]);
    W.items = [{ id: "a", name: "A" }, { id: "b", name: "B" }, { id: "c", name: "C" }];
    W.itemById = new Map(W.items.map(i => [i.id, i]));
    W.capsuleLinkMap = new Map([["c1", ["a", "b", "c"].map(id => ({ capsule_id: "c1", item_id: id }))]]);
    W.outfits = [{ id: "o1", name: "L" }];
    W.outfitById = new Map([["o1", W.outfits[0]]]);
    W.wears = [
      { item_id: "a", worn_on: D(-7), outfit_id: "o1" },
      { item_id: "a", worn_on: D(-5), outfit_id: "o1" },
      { item_id: "b", worn_on: D(-5) },
      { item_id: "a", worn_on: D(30) },   // outside range — ignored
    ];
    const r = W.tripRecapData(c);
    return eq([r.worn.map(i => i.id), r.dead.map(i => i.id), r.mostWorn.id, r.mostN, r.topLook.id, r.topLookN, r.days],
              [["a", "b"], ["c"], "a", 2, "o1", 2, 7]);
  });

  // ---- exclusions ----
  t("isExcluded normalizes pair order", () => {
    W.exclusions = [{ item_a: "a", item_b: "b" }];
    W.buildExcludeSet();
    return eq([W.isExcluded("a", "b"), W.isExcluded("b", "a"), W.isExcluded("a", "c")], [true, true, false]);
  });

  // ---- suggester correctness (2026-07-19 fix pack) ----
  t("targetLevel is a HARD filter — no casual fallback at Dressed Up", () => {
    const mk = (id, cat, sub) => ({ id, name: id, category: cat, subcategory: sub, color_family: "Blue",
      status: "Available", image_path: "x", formality: [3], tags: [], season: [] });
    W.items = [mk("t", "Tops", "Blouses"), mk("b", "Bottoms", "Jeans"), mk("s", "Shoes", "Flats")];
    W.itemById = new Map(W.items.map(i => [i.id, i]));
    W.wears = []; W.outfits = []; W.outfitLinks = []; W.exclusions = [];
    W.buildOutfitIndexes(); W.buildExcludeSet(); W.buildSuggestIndexes();
    const none = W.suggestOutfits(6, null, null, null, null, null, false).length;
    const some = W.suggestOutfits(3, null, null, null, null, null, false).length;
    return eq([none, some > 0], [0, true]);
  });
  t("layerPieceOf: with two flagged tops, the LAST (ow-slot) one is the layer", () => {
    const top = (id, tags) => ({ id, category: "Tops", subcategory: "Blouses", tags: tags || [] });
    const got = W.layerPieceOf([top("base", ["layer"]), { id: "b", category: "Bottoms" }, top("lay", ["layer"])]);
    return eq(got && got.id, "lay");
  });

  // ---- suggester session state (2026-07-19 round) ----
  t("_suggPool excludes banned pieces", () => {
    W.items = [{ id: "a", status: "Available" }, { id: "b", status: "Available" }];
    W.itemById = new Map(W.items.map(i => [i.id, i]));
    W._sugg.capsuleId = null;
    W._sugg.banned = new (W.Set)(["b"]);
    const ids = W._suggPool().map(i => i.id);
    W._sugg.banned = new (W.Set)();
    return eq(ids, ["a"]);
  });
  t("variety salt is stable within a session and bounded", () => {
    W._suggSessionSalt = new (W.Map)();
    const v1 = W._saltFor("x"), v2 = W._saltFor("x");
    return eq([v1 === v2, v1 >= 0 && v1 <= 0.35], [true, true]);
  });

  // ---- catch-up strip ----
  t("missedDays: last 3 days minus logged minus skipped", () => {
    W.wears = [{ item_id: "i", worn_on: D(-2) }];
    W.store.setItem(W.SKIP_DAYS_KEY, JSON.stringify([D(-3)]));
    const miss = W.missedDays();
    W.store.removeItem(W.SKIP_DAYS_KEY);
    return eq(miss, [D(-1)]);
  });

  // ---- closet-vs-life gap ----
  t("buildGapStats: shares, delta, noise floor", () => {
    W.items = [
      { id: "c1", status: "Available", formality: [3], category: "Tops", subcategory: "Blouses" },
      { id: "c2", status: "Available", formality: [5], category: "Tops", subcategory: "Blouses" },
      { id: "c3", status: "Available", formality: [5], category: "Tops", subcategory: "Blouses" },
      { id: "c4", status: "Available", formality: [5], category: "Tops", subcategory: "Blouses" },
    ];
    W.itemById = new Map(W.items.map(i => [i.id, i]));
    W.wears = [
      ...Array.from({ length: 6 }, (_, k) => ({ item_id: "c1", worn_on: D(-k - 1), context: ["Campus"], formality_for: 3 })),
      { item_id: "c2", worn_on: D(-1), context: ["Work"], formality_for: 5 },  // under noise floor
    ];
    const g = W.buildGapStats();
    return eq([g.rows.length, g.rows[0].ctx, g.rows[0].closetN,
               Math.round(g.rows[0].wearShare * 100), Math.round(g.rows[0].closetShare * 100)],
              [1, "Campus", 1, 86, 25]);
  });

  // ---- year in review ----
  t("longestStreak counts consecutive days", () => {
    const s = new (W.Set)(["2026-03-01", "2026-03-02", "2026-03-03", "2026-03-07", "2026-03-08"]);
    return eq(W.longestStreak(s), 3);
  });
  t("buildWrappedStats: year scoping, gift-free CPW, dead weight", () => {
    const Y = +today.slice(0, 4);
    W.items = [
      { id: "h", name: "h", status: "Available", price: "40", acquisition: "New" },
      { id: "g", name: "g", status: "Available", price: "40", acquisition: "Gift" },
      { id: "z", name: "z", status: "Available", price: "10", acquisition: "New", purchase_date: `${Y - 1}-01-01` },
    ];
    W.itemById = new Map(W.items.map(i => [i.id, i]));
    W.outfits = []; W.outfitById = new Map();
    W.wears = [
      { item_id: "h", worn_on: `${Y}-02-01` }, { item_id: "h", worn_on: `${Y}-02-02` }, { item_id: "h", worn_on: `${Y}-02-03` },
      { item_id: "g", worn_on: `${Y}-03-01` }, { item_id: "g", worn_on: `${Y}-03-02` }, { item_id: "g", worn_on: `${Y}-03-03` },
      { item_id: "h", worn_on: `${Y - 1}-06-01` },  // out of year
    ];
    const s = W.buildWrappedStats(Y);
    return eq([s.daysLogged, s.topItems[0].item.id, s.cpw.length, s.cpw[0] && s.cpw[0].item.id,
               s.dead.map(i => i.id), s.streak],
              [6, "h", 1, "h", ["z"], 3]);
  });

  // ---- Round A: gear + day plans (2026-07-20) ----
  t("suggestSlot: workout subcats map to real slots, bras/swim to none", () => {
    return eq([
      W.suggestSlot({ category: "Workout", subcategory: "Workout tops" }),
      W.suggestSlot({ category: "Workout", subcategory: "Active shorts" }),
      W.suggestSlot({ category: "Workout", subcategory: "Sports bras" }),
      W.suggestSlot({ category: "Workout", subcategory: "Swimwear" }),
      W.suggestSlot({ category: "Tops", subcategory: "Cardigans" }),
    ], ["Tops", "Bottoms", null, null, "Outerwear"]);
  });
  t("gear helpers: tags + gear-only formality", () => {
    const run = { tags: ["gear:workout"], formality: [1] };
    const dual = { tags: ["gear:workout"], formality: [1, 2] };
    const rain = { tags: ["gear:rain"], formality: [2] };
    return eq([W.isWorkoutGear(run), W.isRainGear(run), W.isRainGear(rain),
               W.isGearOnly(run), W.isGearOnly(dual)],
              [true, false, true, true, false]);
  });
  t("engine: workout mode pools gear only; normal mode excludes Workout cat + dry-day rain gear", () => {
    const mk = (id, cat, sub, tags, fml) => ({ id, name: id, category: cat, subcategory: sub, tags, formality: fml, status: "Available", image_path: "x.jpg", color_family: "Black" });
    const pool = [
      mk("rt", "Workout", "Workout tops", ["gear:workout"], [1]),
      mk("rs", "Workout", "Active shorts", ["gear:workout"], [1]),
      mk("sn", "Shoes", "Sneakers", ["gear:workout"], [1]),
      mk("tee", "Tops", "Tee shirts", [], [2, 3]),
      mk("jean", "Bottoms", "Jeans", [], [2, 3]),
      mk("flat", "Shoes", "Flats", [], [2, 3]),
      mk("rj", "Outerwear", "Jackets", ["gear:rain"], [2, 3]),
    ];
    W.itemById = new Map(pool.map(i => [i.id, i]));
    W._excludeSet = new (W.Set)();
    const act = W.suggestOutfits(null, null, pool, null, null, null, false, "workout");
    const actIds = new (W.Set)(act.flatMap(c => c.pieces.map(p => p.id)));
    const dry = W.suggestOutfits(null, null, pool, null, { maxT: 70, minT: 50, code: 0 }, null, false, null);
    const dryIds = new (W.Set)(dry.flatMap(c => c.pieces.map(p => p.id)));
    const wet = W.suggestOutfits(null, null, pool, null, { maxT: 60, minT: 45, code: 61 }, null, false, null);
    const wetIds = new (W.Set)(wet.flatMap(c => c.pieces.map(p => p.id)));
    return eq([act.length > 0, actIds.has("tee"), actIds.has("rt"), dryIds.has("rj"), dryIds.has("rt"), wetIds.has("rj")],
              [true, false, true, false, false, true]);
  });
  t("pruneDayPlan: rolling window, empty days dropped", () => {
    const all = {
      [W.shiftDate(today, -10)]: [{ contexts: ["Work"], outfit: null }],
      [W.shiftDate(today, -3)]: [{ contexts: ["Work"], outfit: null }],
      [W.shiftDate(today, 2)]: [],
      [W.shiftDate(today, 5)]: [{ contexts: [], outfit: "o1" }],
      [W.shiftDate(today, 40)]: [{ contexts: ["Work"], outfit: null }],
    };
    const out = W.pruneDayPlan(JSON.parse(JSON.stringify(all)), today);
    return eq(Object.keys(out).sort(), [W.shiftDate(today, -3), W.shiftDate(today, 5)].sort());
  });
  t("entrySuggestLevel: dressier context wins; entryActivity keys on Workout", () => {
    W.wears = [];  // force seed fallback in contextFormalityLevel
    return eq([W.entrySuggestLevel(["Errands", "Work"]), W.entrySuggestLevel([]),
               W.entryActivity(["Workout", "Errands"]), W.entryActivity(["Work"])],
              [5, null, "workout", null]);
  });

  // ---- Round B: formulas (2026-07-21) ----
  t("formulaKeyFor: canonical shape, needs a real base, ignores bras/swim", () => {
    const top = { category: "Tops", subcategory: "Sweaters" };
    const bot = { category: "Bottoms", subcategory: "Jeans" };
    const shoe = { category: "Shoes", subcategory: "Boots" };
    const bra = { category: "Workout", subcategory: "Sports bras" };
    const dress = { category: "Dresses", subcategory: "Short" };
    return eq([
      W.formulaKeyFor([top, bot, shoe]),
      W.formulaKeyFor([shoe, bot, top]),            // order-independent
      W.formulaKeyFor([top, shoe]),                 // no bottom, no dress
      W.formulaKeyFor([dress, shoe, bra]),          // bra ignored, dress is a base
    ], [
      "Bottoms:Jeans + Shoes:Boots + Tops:Sweaters",
      "Bottoms:Jeans + Shoes:Boots + Tops:Sweaters",
      null,
      "Dresses:Short + Shoes:Boots",
    ]);
  });
  t("formulaLabel reads in dressing order", () => {
    return eq(W.formulaLabel("Bottoms:Jeans + Shoes:Boots + Tops:Sweaters"),
              "Sweaters + Jeans + Boots");
  });
  t("buildFormulas: groups by shape, needs 2+ looks and 6+ wears", () => {
    const mk = (id, cat, sub) => ({ id, category: cat, subcategory: sub });
    W.items = [
      mk("s1", "Tops", "Sweaters"), mk("s2", "Tops", "Sweaters"),
      mk("j1", "Bottoms", "Jeans"), mk("b1", "Shoes", "Boots"),
      mk("t1", "Tops", "Tee shirts"),
    ];
    W.itemById = new Map(W.items.map(i => [i.id, i]));
    // A + B share a shape (8 wears total) → a formula. C's tee shape appears in
    // only one look with one wear → below both thresholds, so it's dropped.
    const looks = [{ id: "A" }, { id: "B" }, { id: "C" }];
    W.outfitItemMap = new Map([
      ["A", ["s1", "j1", "b1"]],
      ["B", ["s2", "j1", "b1"]],
      ["C", ["t1", "j1", "b1"]],
    ]);
    W.outfitWearMap = new Map([
      ["A", new (W.Set)(["2026-01-01", "2026-01-02", "2026-01-03", "2026-01-04"])],
      ["B", new (W.Set)(["2026-02-01", "2026-02-02", "2026-02-03", "2026-02-04"])],
      ["C", new (W.Set)(["2026-03-01"])],
    ]);
    const fs = W.buildFormulas(looks);
    return eq([fs.length, fs[0].label, fs[0].wears, fs[0].looks.length],
              [1, "Sweaters + Jeans + Boots", 8, 2]);
  });
  t("formulaShapeMap: slot -> allowed subcategories", () => {
    const m = W.formulaShapeMap("Bottoms:Jeans + Tops:Sweaters + Tops:Cardigans");
    return eq([[...(m.get("Tops") || [])].sort(), [...(m.get("Bottoms") || [])], m.has("Shoes")],
              [["Cardigans", "Sweaters"], ["Jeans"], false]);
  });

  // ---- item rhythm + partners + rotation (2026-07-21) ----
  t("wearRhythm: average cadence and longest gap over distinct wear days", () => {
    const ws = [{ item_id: "a", worn_on: "2026-01-01" }, { item_id: "a", worn_on: "2026-01-11" },
                { item_id: "a", worn_on: "2026-01-11" },   // same day twice = one wear day
                { item_id: "a", worn_on: "2026-02-10" }];
    const r = W.wearRhythm("a", ws);
    return eq([r.wearDays, r.avg, r.longest], [3, 20, 30]);
  });
  t("wearRhythm: under 3 wear days is noise, not a rhythm", () =>
    eq(W.wearRhythm("a", [{ item_id: "a", worn_on: "2026-01-01" }, { item_id: "a", worn_on: "2026-01-05" }]), null));
  t("itemPartners: distinct same-day co-wears, 2+ days to count", () => {
    const ws = [
      { item_id: "a", worn_on: "d1" }, { item_id: "b", worn_on: "d1" }, { item_id: "c", worn_on: "d1" },
      { item_id: "a", worn_on: "d2" }, { item_id: "b", worn_on: "d2" }, { item_id: "b", worn_on: "d2" },
      { item_id: "b", worn_on: "d3" },   // a wasn't worn that day — doesn't count
    ];
    return eq(W.itemPartners("a", 3, ws), [{ id: "b", days: 2 }]);
  });
  t("buildRotationStats: share of the Available closet worn in the window", () => {
    const pool = [{ id: "a", status: "Available" }, { id: "b", status: "Available" },
                  { id: "c", status: "Available" }, { id: "d", status: "Archive" }];
    const ws = [{ item_id: "a", worn_on: D(-5) }, { item_id: "a", worn_on: D(-6) },
                { item_id: "b", worn_on: D(-200) },   // outside the 90d window
                { item_id: "d", worn_on: D(-2) }];    // archived — not in the denominator
    const r = W.buildRotationStats(90, pool, ws, today);
    return eq([r.total, r.worn, r.pct], [3, 1, 33]);
  });

  // ---- wear-count map (perf fix for the smart-list sorts, 2026-07-21) ----
  // The map replaced per-item wearCountInRange calls inside sort comparators.
  // It must agree with that function exactly, in BOTH range modes — note the
  // pre-existing asymmetry it preserves: distinct DAYS on "all", raw rows in range.
  t("wearCountMapInRange matches wearCountInRange (all + ranged)", () => {
    const savedItems = W.items, savedWears = W.wears, savedRange = W.statsDateRange;
    W.items = [{ id: "x", status: "Available" }, { id: "y", status: "Available" }, { id: "z", status: "Available" }];
    W.wears = [{ item_id: "x", worn_on: D(-1) }, { item_id: "x", worn_on: D(-1) },  // same day twice
               { item_id: "x", worn_on: D(-200) }, { item_id: "y", worn_on: D(-200) }];
    const out = [];
    for (const r of ["all", "90d"]) {
      W.statsDateRange = r;
      const m = W.wearCountMapInRange();
      out.push(W.items.map(i => [(m.get(i.id) || 0), W.wearCountInRange(i.id)]));
    }
    W.items = savedItems; W.wears = savedWears; W.statsDateRange = savedRange;
    // all: x = 2 distinct DAYS, y = 1, z = 0
    // 90d: only x's recent day is in range, but ranged counting is RAW ROWS,
    // so the doubled log reads 2 — the asymmetry both functions must share.
    return eq(out, [[[2, 2], [1, 1], [0, 0]], [[2, 2], [0, 0], [0, 0]]]);
  });

  // ---- render summary ----
  const ul = document.getElementById("results");
  let pass = 0;
  for (const r of results) {
    const li = document.createElement("li");
    li.className = r.ok ? "pass" : "fail";
    li.textContent = (r.ok ? "✓ " : "✗ ") + r.name + (r.ok ? "" : " — " + r.msg);
    ul.appendChild(li);
    if (r.ok) pass++;
  }
  const sum = document.getElementById("summary");
  sum.textContent = `${pass}/${results.length} passed`;
  sum.className = pass === results.length ? "pass" : "fail";
  document.title = `${pass}/${results.length} — Wardrobe self-test`;
}
</script>
</body>
</html>
