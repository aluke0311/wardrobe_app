// ---- Replace / add / remove an item's photo (reuses the add-item pipeline) ----
function pickItemPhoto(id) {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = "image/*";
  input.onchange = (e) => { const f = e.target.files[0]; if (f) replaceItemPhoto(id, f); };
  input.click();
}

async function replaceItemPhoto(id, file) {
  const i = items.find(x => x.id === id);
  if (!i) return;
  toast("Uploading photo…");
  try {
    const { blob, ext } = await compressImage(file);
    const filename = `${(crypto.randomUUID ? crypto.randomUUID() : Date.now())}.${ext}`;
    const path = await uploadPhoto(blob, filename);
    const old = i.image_path;
    await rest(`/items?id=eq.${id}`, {
      method: "PATCH",
      headers: { "Content-Type": "application/json", Prefer: "return=minimal" },
      body: JSON.stringify({ image_path: path }),
    });
    i.image_path = path;
    if (old && old !== path) deletePhoto(old);  // fire-and-forget cleanup
    signedUrlBatch([path]);                     // pre-sign so the new photo renders immediately
    toast(old ? "Photo replaced" : "Photo added");
    if (detailId === id && detailView === "details") openItemDetails(id);
  } catch (e) { toast(e.message); }
}

async function removeItemPhoto(id) {
  const i = items.find(x => x.id === id);
  if (!i || !i.image_path) return;
  if (!confirm("Remove this photo?")) return;
  const old = i.image_path;
  try {
    await rest(`/items?id=eq.${id}`, {
      method: "PATCH",
      headers: { "Content-Type": "application/json", Prefer: "return=minimal" },
      body: JSON.stringify({ image_path: null }),
    });
    i.image_path = null;
    deletePhoto(old);
    toast("Photo removed");
    if (detailId === id && detailView === "details") openItemDetails(id);
  } catch (e) { toast(e.message); }
}

// ---- Save a single field to Supabase ----
async function saveField(id, field, value) {
  const i = items.find(x => x.id === id);
  if (!i) return;
  if (field === "name" && !value) { toast("Name can't be empty"); return; }
  const prev = i[field];
  i[field] = value; // optimistic
  const patch = { [field]: value };
  // An explicitly-entered purchase date is no longer a guess.
  if (field === "purchase_date") { i.date_is_guess = false; patch.date_is_guess = false; }
  try {
    await rest(`/items?id=eq.${id}`, {
      method: "PATCH",
      headers: { "Content-Type": "application/json", Prefer: "return=minimal" },
      body: JSON.stringify(patch),
    });
    // refresh details if still in details view for this item
    if (detailId === id && detailView === "details") openItemDetails(id);
  } catch (e) {
    i[field] = prev;
    toast(e.message);
  }
}

// ---- Field edit sheet ----
let _fieldEditId = null;
let _fieldEditKey = null;
let _fieldPending = undefined; // current pending value in sheet
let _fieldEditItem = null;    // the item object being edited (real item or _addState)
let _fieldOnSave = null;      // null = save to DB; fn(val) = custom save (used by Add form)

function openFieldEdit(id, field) {
  const cfg = FIELD_CONFIGS[field];
  if (!cfg) return;
  const i = items.find(x => x.id === id);
  if (!i) return;
  _fieldEditId = id;
  _fieldEditKey = field;
  _fieldPending = i[field];
  _fieldEditItem = i;
  _fieldOnSave = null;
  renderFieldSheet(i, field, cfg);
  $("#fieldSheet").hidden = false;
}

function closeFieldSheet() {
  $("#fieldSheet").hidden = true;
  _fieldEditId = null;
  _fieldEditKey = null;
  _fieldPending = undefined;
  _fieldEditItem = null;
  _fieldOnSave = null;
}

function renderFieldSheet(i, field, cfg) {
  const curVal = _fieldPending !== undefined ? _fieldPending : i[field];
  let content = "";
  if (cfg.type === "text" || cfg.type === "price") {
    const isPrice = cfg.type === "price";
    content = `<div class="sheet-expand" style="border:none;background:#fff;padding:16px 18px">
      <input class="inp" id="fieldTextInp" type="${isPrice ? "number" : "text"}"
        inputmode="${isPrice ? "decimal" : "text"}"
        value="${esc(curVal != null ? String(curVal) : "")}"
        placeholder="${esc(cfg.label)}…" style="width:100%;font-size:16px">
    </div>`;
  } else if (cfg.type === "date") {
    content = `<div class="sheet-expand" style="border:none;background:#fff;padding:16px 18px">
      <input class="inp" id="fieldTextInp" type="date" max="${todayStr()}"
        value="${esc(curVal != null ? String(curVal).slice(0, 10) : "")}" style="width:100%;font-size:16px">
    </div>`;
  } else if (cfg.type === "typeahead") {
    const suggestions = distinctScalar(field).filter(Boolean);
    const suggestHtml = suggestions.length
      ? `<div class="fld-sugg-lbl">Previously entered</div>
         <div class="fld-suggestions">${suggestions.map(s =>
           `<button class="sheet-chip" data-fv="${esc(s)}">${esc(s)}</button>`).join("")}</div>`
      : "";
    content = `<div class="sheet-expand" style="border:none;background:#fff;padding:16px 18px">
      <input class="inp" id="fieldTextInp" type="text" inputmode="text"
        value="${esc(curVal != null ? String(curVal) : "")}"
        placeholder="${esc(cfg.label)}…" style="width:100%;font-size:16px">
    </div>${suggestHtml}`;
  } else if (cfg.type === "color") {
    const chips = cfg.opts.map(o => {
      const on = curVal === o;
      const hex = colorHex(o);
      return `<button class="fld-color-chip${on ? " on" : ""}" data-fv="${esc(o)}" title="${esc(o)}"
        style="background:${hex};${on ? "outline:3px solid var(--accent);outline-offset:2px;" : ""}">
        ${on ? `<svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:#fff;stroke-width:3;fill:none"><path d="M5 12l5 5L19 7"/></svg>` : ""}
      </button>`;
    }).join("");
    content = `<div style="padding:16px 18px"><div class="fld-color-grid">${chips}</div></div>`;
  } else if (cfg.type === "formality") {
    const sel = Array.isArray(curVal) ? curVal : (curVal ? [+curVal] : []);
    const chips = OCCASION_LADDER.map((lbl, idx) => {
      const lvl = idx + 1, on = sel.includes(lvl);
      return `<button class="sheet-chip${on ? " on" : ""}" data-fv="${lvl}" style="text-align:left">
        <span style="font-weight:500">${lvl}. ${esc(lbl)}</span>
        <span style="font-size:11px;color:var(--muted);display:block;margin-top:1px">${esc(OCCASION_HINTS[idx])}</span>
      </button>`;
    }).join("");
    content = `<div class="sheet-expand" style="border:none"><div class="sheet-chips" style="flex-direction:column;align-items:stretch;gap:6px">${chips}</div></div>`;
  } else {
    // single or multi chips
    const isMulti = cfg.type === "multi";
    const selected = isMulti ? (Array.isArray(curVal) ? curVal : []) : (curVal ? [curVal] : []);
    const chips = cfg.opts.map(o => {
      const on = selected.includes(o);
      return `<button class="sheet-chip${on ? " on" : ""}" data-fv="${esc(o)}">${esc(o)}</button>`;
    }).join("");
    const filterHtml = (isMulti && cfg.filter)
      ? `<div style="padding:12px 18px 4px"><input id="multiFilter" class="inp" placeholder="Filter…" style="width:100%;font-size:15px"></div>`
      : "";
    content = `${filterHtml}<div class="sheet-expand" style="border:none"><div class="sheet-chips">${chips}</div></div>`;
  }

  const hasVal = curVal != null && curVal !== "" && !(Array.isArray(curVal) && curVal.length === 0);

  $("#fieldInner").innerHTML = `
    <div class="sheet-hdr">
      <button class="lnk" id="fldCancel">Cancel</button>
      <h2>${esc(cfg.label)}</h2>
      <button class="lnk" id="fldSave" style="font-weight:700">Save</button>
    </div>
    ${content}
    ${hasVal ? `<div style="padding:0 18px 8px"><button class="lnk" id="fldClear" style="color:var(--danger);font-size:14px">Clear</button></div>` : ""}
  `;

  // wire cancel
  $("#fldCancel").onclick = closeFieldSheet;

  // wire save — respects _fieldOnSave for Add form
  $("#fldSave").onclick = async () => {
    let val = _fieldPending;
    if (cfg.type === "text" || cfg.type === "price" || cfg.type === "typeahead" || cfg.type === "date") {
      const inp = $("#fieldTextInp");
      val = inp ? (cfg.type === "price" ? (inp.value ? parseFloat(inp.value) : null) : (inp.value.trim() || null)) : val;
    }
    if (_fieldEditKey === "name" && !val) { toast("Name can't be empty"); return; }
    if (_fieldOnSave) { _fieldOnSave(val); closeFieldSheet(); }
    else { await saveField(_fieldEditId, _fieldEditKey, val); closeFieldSheet(); }
  };

  // wire clear
  const clearBtn = $("#fldClear");
  if (clearBtn) {
    clearBtn.onclick = async () => {
      const cleared = Array.isArray(curVal) ? [] : null;
      if (_fieldOnSave) { _fieldOnSave(cleared); closeFieldSheet(); }
      else { await saveField(_fieldEditId, _fieldEditKey, cleared); closeFieldSheet(); }
    };
  }

  // text / typeahead input live update + suggestion filtering
  const ti = $("#fieldTextInp");
  if (ti) {
    ti.oninput = () => {
      _fieldPending = ti.value;
      if (cfg.type === "typeahead") {
        const q = ti.value.trim().toLowerCase();
        $("#fieldInner").querySelectorAll(".fld-suggestions .sheet-chip").forEach(chip => {
          chip.hidden = q.length > 0 && !chip.textContent.toLowerCase().includes(q);
        });
      }
    };
    setTimeout(() => ti.focus(), 80);
  }

  // multi filter input (e.g. fabric)
  const mf = $("#multiFilter");
  if (mf) {
    mf.oninput = () => {
      const q = mf.value.trim().toLowerCase();
      $("#fieldInner").querySelectorAll(".sheet-chips .sheet-chip").forEach(chip => {
        chip.hidden = q.length > 0 && !chip.textContent.toLowerCase().includes(q);
      });
    };
    setTimeout(() => mf.focus(), 80);
  }

  // chip clicks
  $("#fieldInner").querySelectorAll("[data-fv]").forEach(btn => {
    btn.onclick = () => {
      const v = btn.dataset.fv;
      if (cfg.type === "typeahead") {
        // fill text input, don't re-render
        _fieldPending = v;
        const inp = $("#fieldTextInp");
        if (inp) { inp.value = v; inp.focus(); }
        return;
      }
      if (cfg.type === "formality") {
        const n = +v;
        const cur = Array.isArray(_fieldPending) ? _fieldPending : (_fieldPending ? [+_fieldPending] : []);
        _fieldPending = cur.includes(n) ? cur.filter(x => x !== n) : [...cur, n].sort((a, b) => a - b);
      } else if (cfg.type === "multi") {
        const cur = Array.isArray(_fieldPending) ? _fieldPending : (Array.isArray((i || {})[field]) ? [...(i || {})[field]] : []);
        _fieldPending = cur.includes(v) ? cur.filter(x => x !== v) : [...cur, v];
      } else if (cfg.type === "color" || cfg.type === "single") {
        _fieldPending = (_fieldPending === v) ? null : v;
      }
      renderFieldSheet(_fieldEditItem, _fieldEditKey, cfg);
    };
  });
}

// ---- Contexts (wears.context — text[], multi-select) ----
// Tolerant accessor: returns an array whether context is null, a string (legacy /
// pre-migration), or an array (post-migration).
const ctxArr = (w) => !w || !w.context ? [] : (Array.isArray(w.context) ? w.context : [w.context]);

// Seed list + any custom contexts the user has already logged (derive-first).
function contextOptions() {
  const s = new Set(CONTEXT_SEED);
  for (const w of wears) for (const c of ctxArr(w)) s.add(c);
  return [...s];
}

// Distinct contexts an item has been worn for, with counts (most-worn first).
function itemContexts(itemId) {
  const counts = new Map();
  for (const w of wears) {
    if (w.item_id !== itemId) continue;
    for (const c of ctxArr(w)) counts.set(c, (counts.get(c) || 0) + 1);
  }
  return [...counts.entries()].map(([ctx, count]) => ({ ctx, count }))
    .sort((a, b) => b.count - a.count);
}

// Reusable multi-select context picker for log sheets. Reads/writes the module-global
// `_ctxSel` (array of chosen contexts). Self-re-renders into #ctxPicker so the rest of
// the surrounding sheet (e.g. the date input) is untouched.
let _ctxSel = [];
let _ctxAddOpen = false;  // whether the "+ Add…" typeahead input is expanded
let _logItemId = null;  // item being logged, for context-chip ordering (A2)
function contextPickerHtml() { return `<div id="ctxPicker" style="margin-top:18px"></div>`; }
function renderContextPicker() {
  const wrap = $("#ctxPicker");
  if (!wrap) return;
  let opts = contextOptions();
  // Sort this item's most-frequently-used contexts to the top (A2)
  if (_logItemId) {
    const freq = new Map(itemContexts(_logItemId).map(({ctx, count}) => [ctx, count]));
    opts = [...opts].sort((a, b) => (freq.get(b) || 0) - (freq.get(a) || 0));
  }
  const extra = _ctxSel.filter(c => !opts.includes(c));   // custom added this session
  const all = [...opts, ...extra];
  wrap.innerHTML = `
    <label style="display:block;font-size:13px;color:var(--muted);margin-bottom:8px">Context <span style="opacity:.6">(optional · choose any that apply)</span></label>
    <div class="sheet-chips" style="margin-bottom:8px">
      ${all.map(c => `<button class="sheet-chip${_ctxSel.includes(c) ? " on" : ""}" data-ctx="${esc(c)}">${esc(c)}</button>`).join("")}
      <button class="sheet-chip" data-ctx-add="1">+ Add…</button>
    </div>
    <div id="ctxOtherWrap" style="display:${_ctxAddOpen ? "flex" : "none"};flex-direction:column;gap:8px;margin-top:6px">
      <div style="display:flex;gap:8px">
        <input class="inp" id="ctxOther" placeholder="Type to find or add a context…" style="flex:1;font-size:15px" autocomplete="off">
        <button class="lnk" id="ctxOtherAdd" style="font-weight:700;flex:none">Add</button>
      </div>
      <div id="ctxSuggest" class="ctx-typeahead"></div>
    </div>`;
  wrap.querySelectorAll("[data-ctx]").forEach(b => b.onclick = () => {
    const v = b.dataset.ctx;
    _ctxSel = _ctxSel.includes(v) ? _ctxSel.filter(x => x !== v) : [..._ctxSel, v];
    _ctxAddOpen = false;
    renderContextPicker();
  });
  const addBtn = wrap.querySelector("[data-ctx-add]");
  if (addBtn) addBtn.onclick = () => {
    _ctxAddOpen = true;
    const ow = wrap.querySelector("#ctxOtherWrap");
    ow.style.display = "flex";
    wrap.querySelector("#ctxOther").focus();
  };
  // Live typeahead: filter known contexts as the user types; tap to pick or create.
  const renderSuggest = (q) => {
    const box = wrap.querySelector("#ctxSuggest");
    if (!box) return;
    const ql = q.trim().toLowerCase();
    if (!ql) { box.innerHTML = ""; return; }
    const matches = contextOptions().filter(c => !_ctxSel.includes(c) && c.toLowerCase().includes(ql)).slice(0, 6);
    const exact = contextOptions().some(c => c.toLowerCase() === ql) || _ctxSel.some(c => c.toLowerCase() === ql);
    box.innerHTML = matches.map(c => `<button class="ctx-ta-row" data-ctx-pick="${esc(c)}">${esc(c)}</button>`).join("")
      + (!exact ? `<button class="ctx-ta-row ctx-ta-new" data-ctx-new="${esc(q.trim())}">+ Create “${esc(q.trim())}”</button>` : "");
    box.querySelectorAll("[data-ctx-pick]").forEach(b => b.onclick = () => {
      _ctxSel.push(b.dataset.ctxPick); _ctxAddOpen = false; renderContextPicker();
    });
    const nb = box.querySelector("[data-ctx-new]");
    if (nb) nb.onclick = () => {
      const v = nb.dataset.ctxNew;
      if (v && !_ctxSel.includes(v)) _ctxSel.push(v);
      _ctxAddOpen = false; renderContextPicker();
    };
  };
  const commit = () => {
    const inp = wrap.querySelector("#ctxOther");
    const v = (inp.value || "").trim();
    if (v && !_ctxSel.includes(v)) _ctxSel.push(v);
    _ctxAddOpen = false;
    renderContextPicker();
  };
  const otherAdd = wrap.querySelector("#ctxOtherAdd");
  if (otherAdd) otherAdd.onclick = commit;
  const inp = wrap.querySelector("#ctxOther");
  if (inp) {
    inp.oninput = () => renderSuggest(inp.value);
    inp.onkeydown = (e) => { if (e.key === "Enter") { e.preventDefault(); commit(); } };
    if (_ctxAddOpen) inp.focus();
  }
}
const ctxSelOrNull = () => _ctxSel.length ? _ctxSel : null;

// ---- One-tap wear today (A1): POST immediately, then offer context + formality ----
async function logWearToday(id) {
  const today = todayStr();
  try {
    const rows = await rest("/wears", {
      method: "POST",
      headers: { "Content-Type": "application/json", Prefer: "return=representation" },
      body: JSON.stringify({ item_id: id, worn_on: today }),
    });
    const wear = Array.isArray(rows) && rows[0]
      ? rows[0]
      : { id: null, item_id: id, worn_on: today, outfit_id: null, context: null, formality_for: null };
    wears.push(wear);
    toast("Wear logged", { label: "Add context →", fn: () => openPostLogSheet([wear]) });
  } catch (e) { toast(e.message); }
}

// ---- Post-log sheet: context + formality_for capture (A2 + E4) ----
function openPostLogSheet(wearRows) {
  _logItemId = wearRows.length === 1 ? wearRows[0].item_id : null;

  let fmlFor = null;

  const renderFml = () => {

    }).join("");
    wrap.querySelectorAll("[data-pfml]").forEach(b => b.onclick = () => {

      fmlFor = fmlFor === v ? null : v;
      renderFml();
    });
  };

  $("#logInner").innerHTML = `
    <div class="sheet-hdr">
      <button class="lnk" id="postLogCancel">Skip</button>
      <h2>Add context</h2>
      <button class="lnk" id="postLogSave" style="font-weight:700">Save</button>
    </div>
    <div style="padding:20px 18px 30px">
      ${contextPickerHtml()}
      <div style="margin-top:20px">
        <label style="display:block;font-size:13px;color:var(--muted);margin-bottom:8px">How dressed up? <span style="opacity:.6">(optional)</span></label>
        <div class="sheet-chips" id="postFmlRow"></div>
      </div>
    </div>`;
  $("#logSheet").hidden = false;
  renderContextPicker();
  renderFml();

  const close = () => { $("#logSheet").hidden = true; _logItemId = null; };
  $("#postLogCancel").onclick = close;
  $("#postLogSave").onclick = async () => {
    const ctx = ctxSelOrNull();
    const updates = {};
    if (ctx) updates.context = ctx;
    if (fmlFor) updates.formality_for = fmlFor;
    if (Object.keys(updates).length) {
      const patchable = wearRows.filter(r => r.id);
      if (patchable.length) {
        try {
          await Promise.all(patchable.map(r =>
            rest(`/wears?id=eq.${r.id}`, {
              method: "PATCH",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(updates),
            })
          ));
          patchable.forEach(r => Object.assign(r, updates));
        } catch (_) { /* wear already logged — context/formality is best-effort */ }
      }
    }
    close();
  };
}

/* ===================================================================
   SEARCH  (keyword + Color/Fabric/Size/Season/Brand/Status filters)
   =================================================================== */
const FILTER_FORMALITY_OPTS = ["1","2","3","4","5","6","7","8"];
const FILTERS = [
  ["color",      "Color",       () => COLOR_FAMILIES.map(c => c[0])],
  ["fabric",     "Fabric",      () => distinctArr("fabric")],
  ["size",       "Size",        () => distinctScalar("size")],
  ["season",     "Season",      () => SEASONS],
  ["brand",      "Brand",       () => distinctScalar("brand")],
  ["status",     "Status",      () => STATUSES],
  ["category",   "Category",    () => Object.keys(TAXONOMY)],
  ["subcategory","Subcategory", () => distinctScalar("subcategory")],
  ["formality",  "Formality",   () => FILTER_FORMALITY_OPTS],
  ["retailer",   "Retailer",    () => distinctScalar("retailer")],
  ["acquisition","Acquisition", () => ["New","Secondhand","Gift"]],
  ["capsule",    "Capsule",     () => capsules.map(c => c.name).sort()],
];
let searchState = newSearchState();
let searchOpenRow = null;
function newSearchState() {
  return { q: "", color: new Set(), fabric: new Set(), size: new Set(), season: new Set(),
    brand: new Set(), status: new Set(), category: new Set(), subcategory: new Set(),
    formality: new Set(), retailer: new Set(), acquisition: new Set(), capsule: new Set() };
}
function distinctScalar(field) { return [...new Set(items.map(i => i[field]).filter(Boolean))].sort(); }
function distinctArr(field) { const s = new Set(); items.forEach(i => (i[field] || []).forEach(v => s.add(v))); return [...s].sort(); }

function openSearch() { searchOpenRow = null; switchTab("search"); }

function renderSearch() {
  const rowSummary = (key) => {
    const set = searchState[key];
    return set.size === 0 ? "Any" : (set.size === 1 ? [...set][0] : `${set.size} selected`);
  };
  const rows = FILTERS.map(([key, label]) => {
    const open = searchOpenRow === key;
    const chips = open ? `<div class="schips">${FILTERS.find(f => f[0] === key)[2]().map(opt =>
      `<button class="schip ${searchState[key].has(opt) ? "on" : ""}" data-chip="${key}|${esc(opt)}">${esc(opt)}</button>`).join("") || `<span class="muted" style="font-size:13px">None recorded yet</span>`}</div>` : "";
    return `<button class="srow" data-row="${key}">
      <span>${label}</span>
      <span class="rt">${esc(rowSummary(key))} ›</span>
    </button>${chips}`;
  }).join("");
  $("#searchBody").innerHTML = `
    <div class="schead">
      <button class="lnk" id="scCancel">Cancel</button>
      <span style="font-weight:600">Search</span>
      <button class="lnk" id="scRun">Search</button>
    </div>
    <div class="sbody">
      <input class="inp" id="scQuery" placeholder="e.g. keywords and category names" value="${esc(searchState.q)}">
      <div class="snote">Searches names, brands, notes and category names.</div>
      <div class="srows">${rows}</div>
      <div style="text-align:right;margin-top:14px"><button class="lnk" id="scReset">Reset</button></div>
    </div>`;
  $("#scQuery").oninput = (e) => { searchState.q = e.target.value; };
  $("#scCancel").onclick = () => switchTab("closet");
  $("#scReset").onclick = () => { searchState = newSearchState(); searchOpenRow = null; renderSearch(); };
  $("#scRun").onclick = runSearch;
  $("#searchBody").querySelector(".srows").onclick = (e) => {
    const chip = e.target.closest("[data-chip]");
    if (chip) {
      const [key, val] = chip.dataset.chip.split("|");
      searchState[key].has(val) ? searchState[key].delete(val) : searchState[key].add(val);
      renderSearch(); return;
    }
    const row = e.target.closest("[data-row]");
    if (row) { searchOpenRow = searchOpenRow === row.dataset.row ? null : row.dataset.row; renderSearch(); }
  };
}

function runSearch() {
  const q = searchState.q.trim().toLowerCase();
  const hit = (set, val) => set.size === 0 || (val != null && set.has(val));
  const hitArr = (set, arr) => set.size === 0 || (arr || []).some(v => set.has(v));
  const hitFormality = (set, item) => {
    if (!set.size) return true;
    return (itemFormalitySet(item) || []).some(v => set.has(String(v)));
  };
  // When a capsule scopes the closet, search only within its members.
  const pool = activeCapsuleId ? lensItems() : items;
  searchResults = pool.filter(i => {
    if (q) {
      const hay = [i.name, i.brand, i.notes, i.retailer, i.category, i.subcategory].filter(Boolean).join(" ").toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return hit(searchState.color, i.color_family) && hit(searchState.size, i.size)
      && hit(searchState.brand, i.brand) && hit(searchState.status, itemStatus(i))
      && hit(searchState.category, i.category) && hit(searchState.subcategory, i.subcategory)
      && hit(searchState.retailer, i.retailer) && hit(searchState.acquisition, i.acquisition)
      && hitArr(searchState.fabric, i.fabric) && hitArr(searchState.season, i.season)
      && hitArr(searchState.capsule, capsuleNamesForItem(i.id))
      && hitFormality(searchState.formality, i);
  });
  closetCat = null; closetSub = null;
  switchTab("closet");
}

async function saveNewItem() {
  const nameInp = $("#addName");
  const name = (nameInp?.value || _addState.name || "").trim();
  if (!name) { toast("Item name is required"); nameInp?.focus(); return; }

  const saveBtn = $("#addSave");
  if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = "Saving…"; }

  try {
    const payload = { name };
    if (_addState.category)    payload.category    = _addState.category;
    if (_addState.subcategory) payload.subcategory = _addState.subcategory;
    if (_addState.color_family) payload.color_family = _addState.color_family;
    if (_addState.fabric?.length) payload.fabric   = _addState.fabric;
    if (_addState.size)        payload.size        = _addState.size;
    if (_addState.brand)       payload.brand       = _addState.brand;
    if (_addState.season?.length) payload.season   = _addState.season;
    if (_addState.formality?.length) payload.formality = _addState.formality;
    if (_addState.status)      payload.status      = _addState.status;
    if (_addState.price != null) payload.price     = _addState.price;
    if (_addState.acquisition) payload.acquisition = _addState.acquisition;
    if (_addState.purchase_date) payload.purchase_date = _addState.purchase_date;
    if (_addState.retailer)    payload.retailer    = _addState.retailer;
    if (_addState.url)         payload.url         = _addState.url;
    if (_addState.notes)       payload.notes       = _addState.notes;

    const rows = await rest("/items", {
      method: "POST",
      headers: { "Content-Type": "application/json", Prefer: "return=representation" },
      body: JSON.stringify(payload),
    });
    const newItem = Array.isArray(rows) ? rows[0] : rows;
    if (!newItem?.id) throw new Error("Item created but no ID returned");

    // upload photo and patch
    if (_addPhotoBlob) {
      const { blob, ext } = _addPhotoBlob;
      const filename = `${(crypto.randomUUID ? crypto.randomUUID() : Date.now())}.${ext}`;
      const path = await uploadPhoto(blob, filename);
      await rest(`/items?id=eq.${newItem.id}`, {
        method: "PATCH",
        headers: { "Content-Type": "application/json", Prefer: "return=minimal" },
        body: JSON.stringify({ image_path: path }),
      });
      newItem.image_path = path;
      if (_addPhotoUrl) { URL.revokeObjectURL(_addPhotoUrl); _addPhotoUrl = null; }
    }

    items.unshift(newItem);
    itemById.set(newItem.id, newItem);
    if (newItem.image_path) signedUrlBatch([newItem.image_path]);

    // capsule memberships chosen in the Add form
    if (_addState.capsules?.length) {
      for (const cid of _addState.capsules) {
        try { await addItemsToCapsule(cid, [newItem.id]); } catch (_) { /* best-effort */ }
      }
    }

    toast("Item added!");
    // navigate to the new item photo view
    closetCat = newItem.category || null;
    closetSub = newItem.subcategory || null;
    switchTab("closet");
    openItem(newItem.id);
  } catch (e) {
    toast(e.message);
    if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = "Save"; }
  }
}

/* ===================================================================
   LOOKS  (outfit library — lens switcher · folders · grid · detail)
   =================================================================== *

   Status of imported data: 1,543 outfits = a date + a set of items, almost no
   name/context/notes. So everything here is DERIVED, not filed by hand:
   - formality: estimated per item (occasion range if set, else a taxonomy
     heuristic), averaged across the outfit, bucketed into 6 coarse folders.
   - season: from the dates the look was worn (multiple seasons => multiple
     folders), falling back to the outfit's own date.
   The user can browse by Formality / Season / Recent / All. Most looks were
   worn once, so this reads as a library where it's useful and a log otherwise. */

const LOOK_LENSES = ["Formality", "Season", "Capsule", "Recent", "All"];
const LOOKS_FLAT_CAP = 400;   // cap for the flat Recent/All grids (perf on phone)

// Formality folders — one per level on the 1-8 scale.
const FORMALITY_BUCKETS = [
  { key: "function", label: "Function"             },  // 1
  { key: "vcasual",  label: "Very Casual"           },  // 2
  { key: "casual",   label: "Casual"                },  // 3
  { key: "pcasual",  label: "Polished Casual"       },  // 4
  { key: "smart",    label: "Smart Casual"          },  // 5
  { key: "dressy",   label: "Dressed Up"            },  // 6
  { key: "bizpro",   label: "Business Professional" },  // 7
  { key: "formal",   label: "Formal"                },  // 8
];

// Bucket key → target formality level.
const BUCKET_RANGES = {
  function: 1, vcasual: 2, casual: 3, pcasual: 4, smart: 5, dressy: 6, bizpro: 7, formal: 8,
};

// Per-subcategory / category formality SETS (arrays of levels) for imputation.
// Items matching multiple contexts get multiple levels.
const SUBCAT_FORMALITY = {
  "Tee shirts": [2,3], "Graphic tees": [2,3], "Long-sleeve tees": [2,3], "Sleeveless": [3,4],
  "Blouses": [4,5], "Sweaters": [3,4,5], "Cardigans": [3,4,5], "Sweatshirts": [2,3],
  "Jeans": [3,4], "Pants": [4,5,6], "Shorts": [2,3], "Skirts": [3,4,5],
  "Leggings/Joggers": [1,2], "Tights": [3,4],
  "Short": [3,4], "Long": [4,6], "Cocktail": [6],
  "Blazers": [5,6,7], "Jackets": [3,4], "Coats": [3,4,5],
  "Boots": [3,4,5], "Sandals": [2,3,4], "Flats": [3,4,5], "Heels": [6,8], "Sneakers": [2,3],
  "Workout tops": [1], "Active shorts": [1], "Sports bras": [1],
};
const CAT_FORMALITY = {
  Tops: [2,3], Bottoms: [3,4], Dresses: [4,5], Outerwear: [3,4,5], Shoes: [3,4], Workout: [1],
};

// Vertical stacking order for collages: outerwear/tops up top, bottoms, then shoes.
const LAYER_ORDER = { Outerwear: 0, Tops: 1, Dresses: 1, Workout: 1, Bottoms: 2, Shoes: 3 };

let looksLens = "Formality";
let looksFolder = null;   // null = folder list (Formality/Season) | bucket key | season
let lookId = null;        // outfit id in detail (null = none)
let looksSearchQ = null;  // null = not searching | query string (search by piece/context)

// ---- derived helpers ----
function outfitItems(o) { return (outfitItemMap.get(o.id) || []).map(id => itemById.get(id)).filter(Boolean); }
function displayOutfits() { return outfits.filter(o => (outfitItemMap.get(o.id) || []).some(id => itemById.has(id))); }
// Looks pool, scoped to the active capsule when planning: only looks wearable
// entirely from that capsule's items (every piece is a member).
function looksScopedOutfits() {
  const list = displayOutfits();
  if (!activeCapsuleId) return list;
  const set = new Set((capsuleLinkMap.get(activeCapsuleId) || []).map(l => l.item_id));
  return list.filter(o => {
    const ids = (outfitItemMap.get(o.id) || []).filter(id => itemById.has(id));
    return ids.length && ids.every(id => set.has(id));
  });
}
function outfitName(o) { return o.name || `Look #${o._num || "?"}`; }
function outfitPieces(o) {
  return outfitItems(o).filter(i => i.image_path)
    .sort((a, b) => (LAYER_ORDER[a.category] ?? 1.5) - (LAYER_ORDER[b.category] ?? 1.5));
}

const seasonOf = (dateStr) => {
  const m = +String(dateStr).slice(5, 7);
  return (m <= 2 || m === 12) ? "Winter" : m <= 5 ? "Spring" : m <= 8 ? "Summer" : "Fall";
};
function effectiveWearDays(o) {
  const s = outfitWearMap.get(o.id);
  if (s && s.size) return [...s];
  return o.created_at ? [String(o.created_at).slice(0, 10)] : [];
}
function outfitSeasons(o) { return [...new Set(effectiveWearDays(o).map(seasonOf))]; }
function outfitWornCount(o) { return effectiveWearDays(o).length; }
function outfitLastWorn(o) { const d = effectiveWearDays(o).sort(); return d.length ? d[d.length - 1] : null; }
function outfitCost(o) { return outfitItems(o).reduce((s, i) => s + (i.price ? Number(i.price) : 0), 0); }

// Returns the formality SET (array of levels 1-8) for an item.
// Source order: explicit DB field → name keywords → subcategory/category seed → co-occurrence nudge.
function itemFormalitySet(i) {
  if (i.formality) {
    if (Array.isArray(i.formality)) return i.formality.length ? i.formality : null;
    return [+i.formality]; // legacy single-value (pre-migration)
  }
  const seed = SUBCAT_FORMALITY[i.subcategory] ?? CAT_FORMALITY[i.category] ?? [3];
  const set = new Set(seed);
  const name = (i.name || "").toLowerCase();
  if (/\bgown\b|tuxedo|\btux\b/.test(name))                 { set.clear(); set.add(8); }
  else if (/\bheel\b|pumps?\b/.test(name))                  { set.clear(); set.add(6); set.add(8); }
  else if (/blazer/.test(name))                             { [5,6,7].forEach(l => set.add(l)); }
  else if (/cocktail/.test(name))                           { set.clear(); set.add(6); }
  else if (/athletic|workout|gym|running|yoga/.test(name))  { set.clear(); set.add(1); }
  // Co-occurrence nudge: add the most-frequent level of explicitly-tagged co-worn items
  const coLevels = [];
  for (const w of wears) {
    if (w.item_id !== i.id || !w.outfit_id) continue;
    for (const oid of (outfitItemMap.get(w.outfit_id) || [])) {
      if (oid === i.id) continue;
      const other = itemById.get(oid);
      if (!other || !other.formality) continue;
      const s = Array.isArray(other.formality) ? other.formality : [+other.formality];
      s.forEach(l => coLevels.push(l));
    }
  }
  if (coLevels.length >= 3) {
    const freq = {};
    for (const l of coLevels) freq[l] = (freq[l] || 0) + 1;
    const mode = +Object.entries(freq).sort((a, b) => b[1] - a[1])[0][0];
    if (!set.has(mode)) set.add(mode);
  }
  return [...set].sort((a, b) => a - b);
}

// Single representative level (minimum of set) for display/grouping compatibility.
function itemFormality(i) {
  const s = itemFormalitySet(i);
  return s && s.length ? s[0] : 3;
}

function outfitBucket(o) {
  if (o._bucket) return o._bucket;
  if (o.formality_override) { o._bucket = o.formality_override; return o._bucket; }
  const its = outfitItems(o);
  let key = "casual";
  if (its.length) {
    const avg = Math.round(its.reduce((s, i) => s + itemFormality(i), 0) / its.length);
    const c = Math.max(1, Math.min(8, avg));
    key = ["function","vcasual","casual","pcasual","smart","dressy","bizpro","formal"][c - 1];
  }
  o._bucket = key;
  return key;
}

function relDate(d) {
  const ds = daysSince(d);
  if (ds == null) return "";
  if (ds <= 0) return "today";
  if (ds < 30) return `${ds}d ago`;
  if (ds < 365) return `${Math.floor(ds / 30)}mo ago`;
  return `${Math.floor(ds / 365)}y ago`;
}

// ---- collage building ----
// Saved Build-a-look arrangement → positioned-pieces HTML (or null if no usable layout).
// `wrapCls` frames the container; pieces use absolute % geometry so it scales to any size.
function layoutCanvasHtml(o, wrapCls) {
  const lay = (Array.isArray(o && o.layout) ? o.layout : [])
    .filter(p => { const it = itemById.get(p.item_id); return it && it.image_path; });
  if (!lay.length) return null;
  const cells = lay.map((p, i) => {
    const it = itemById.get(p.item_id);
    return `<div class="ocpiece" data-photo="${esc(it.image_path)}" style="left:${p.x * 100}%;top:${p.y * 100}%;width:${p.s * 100}%;z-index:${i + 1}"></div>`;
  }).join("");
  return `<div class="${wrapCls}">${cells}</div>`;
}

function outfitCollageHtml(o, max, mini) {
  const canvas = layoutCanvasHtml(o, "ocanvas" + (mini ? " omini" : ""));
  if (canvas) return canvas;
  const pieces = outfitPieces(o).slice(0, max);
  let cls = "ocollage" + (mini ? " omini" : "");
  if (!pieces.length) return `<div class="${cls} empty"><svg viewBox="0 0 24 24"><path d="M16 4l-4 9-4-9"/><path d="M12 13l-9 7h18l-9-7z"/></svg></div>`;
  if (pieces.length === 1) cls += " solo";
  const cells = pieces.map((p, idx) => {
    const span = (pieces.length === 3 && idx === 2) ? " span2" : "";  // wide bottom for 3-piece looks
    return `<div class="opiece${span}" data-photo="${esc(p.image_path)}"></div>`;
  }).join("");
  return `<div class="${cls}">${cells}</div>`;
}

// Formality label for a piece: explicit set or estimated set.
function pieceFormalityLabel(it) {
  const s = itemFormalitySet(it) || [3];
  const label = s.map(n => `${n}. ${occLabel(n)}`).join(", ");
  return it.formality ? label : "est. · " + label;
}

function emptyLooks() {
  return `<div class="placeholder">
    <svg class="pi" viewBox="0 0 24 24"><path d="M7 4l5 3 5-3 2 5-3 1v10H8V10L5 9z"/></svg>
    <b>No looks here</b><div>Outfits you build or log will show up here.</div></div>`;
}

// ---- toolbar / lens row ----
function looksToolbar(title, showBack, showShuffle) {
  return `<div class="cltoolbar">
    ${showBack
      ? `<button class="clback" id="looksBack"><svg viewBox="0 0 24 24"><path d="M15 6l-6 6 6 6"/></svg></button>`
      : `<span style="width:34px"></span>`}
    <div class="cltitle">${esc(title)}</div>
    ${showShuffle
      ? `<div style="display:flex;align-items:center;gap:2px">
           <button class="clsearch" id="looksSearch" title="Search looks"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/></svg></button>
           <button class="clsearch" id="looksNew" title="Build a look"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button>
           <button class="clsearch" id="looksShuffle" title="Random look"><svg viewBox="0 0 24 24"><path d="M16 3h5v5"/><path d="M4 20L21 3"/><path d="M21 16v5h-5"/><path d="M15 15l6 6"/><path d="M4 4l5 5"/></svg></button>
         </div>`
      : `<span style="width:34px"></span>`}

}
function looksLensHtml() {
  return `<div class="lens">${LOOK_LENSES.map(l =>
    `<button data-llens="${l}" class="${looksLens === l ? "on" : ""}">${l}</button>`).join("")}</div>`;
}

// ---- folder list (Formality / Season) ----
function looksFolderRow(label, count, rep, attrs) {
  const thumb = rep ? outfitCollageHtml(rep, 4, true)
    : `<div class="cthumb empty"><svg viewBox="0 0 24 24"><path d="M5 9l7-5 7 5"/><path d="M5 9c0 2.2 14 2.2 14 0"/></svg></div>`;
  return `<button class="frow" ${attrs}>
    ${thumb}
    <div class="fmeta"><div class="fname">${esc(label)}</div><div class="fcount">${count} look${count === 1 ? "" : "s"}</div></div>
    <svg class="chev" viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg>
  </button>`;
}
const repByRecency = (list) =>
  list.slice().sort((a, b) => String(outfitLastWorn(b) || "").localeCompare(String(outfitLastWorn(a) || "")))[0];

// A look "belongs to" a capsule when every one of its pieces is a capsule member.
function outfitFullyInCapsule(o, cid) {
  const members = new Set((capsuleLinkMap.get(cid) || []).map(l => l.item_id));
  if (!members.size) return false;
  const its = outfitItems(o);
  return its.length > 0 && its.every(it => members.has(it.id));
}
function folderRowsHtml(lens) {
  const all = looksScopedOutfits();
  let rows = "";
  if (lens === "Formality") {
    for (const b of FORMALITY_BUCKETS) {
      const list = all.filter(o => outfitBucket(o) === b.key);
      if (!list.length) continue;
      rows += looksFolderRow(b.label, list.length, repByRecency(list), `data-lfolder="${b.key}"`);
    }
  } else if (lens === "Capsule") {
    for (const c of capsules) {
      const list = all.filter(o => outfitFullyInCapsule(o, c.id));
      if (!list.length) continue;
      rows += looksFolderRow(c.name, list.length, repByRecency(list), `data-lfolder="${esc(c.id)}"`);
    }
  } else {
    for (const s of SEASONS) {
      const list = all.filter(o => outfitSeasons(o).includes(s));
      if (!list.length) continue;
      rows += looksFolderRow(s, list.length, repByRecency(list), `data-lfolder="${s}"`);
    }
  }
  return rows ? `<div class="frows">${rows}</div>` : emptyLooks();
}
function folderOutfits(lens, folder) {
  const all = looksScopedOutfits();
  const list = lens === "Formality"
    ? all.filter(o => outfitBucket(o) === folder)
    : lens === "Capsule"
    ? all.filter(o => outfitFullyInCapsule(o, folder))
    : all.filter(o => outfitSeasons(o).includes(folder));
  return list.sort((a, b) => String(outfitLastWorn(b) || "").localeCompare(String(outfitLastWorn(a) || "")));
}
function folderLabel(lens, folder) {
  if (lens === "Formality") return FORMALITY_BUCKETS.find(b => b.key === folder)?.label || folder;
  if (lens === "Capsule") return capsuleById.get(folder)?.name || folder;
  return folder;
}
function lensOutfitsSorted() {
  const all = looksScopedOutfits();
  if (looksLens === "Recent") return all.slice().sort((a, b) => String(outfitLastWorn(b) || "").localeCompare(String(outfitLastWorn(a) || "")));
  return all.slice().sort((a, b) => (b._num || 0) - (a._num || 0)); // All: newest created first
}

// ---- grid of outfit tiles ----
function outfitGridHtml(list) {
  if (!list.length) return emptyLooks();
  return `<div class="ogrid">${list.map(o => {
    const n = outfitItems(o).length, lw = outfitLastWorn(o);
    return `<button class="otile" data-look="${esc(o.id)}">
      ${outfitCollageHtml(o, 4)}
      <div class="oname">${esc(outfitName(o))}</div>
      <div class="ometa">${n} piece${n === 1 ? "" : "s"}${lw ? " · " + esc(relDate(lw)) : ""}</div>
    </button>`;
  }).join("")}</div>`;
}

// Banner shown across Looks while a capsule scopes the view to wearable looks.
// ---- OUTFIT SUGGESTIONS (Phase 4) ----

function buildExcludeSet() {
  _excludeSet = new Set(exclusions.map(e => [e.item_a, e.item_b].sort().join(":")));
}
function isExcluded(a, b) { return _excludeSet.has([a, b].sort().join(":")); }

// "Never suggest this item" — stored as a sentinel tag (no schema change needed).
const NO_SUGGEST_TAG = "no-suggest";
function isNoSuggest(i) { return !!i && (i.tags || []).includes(NO_SUGGEST_TAG); }
async function setNoSuggest(id, on) {
  const i = itemById.get(id); if (!i) return;
  const tags = (i.tags || []).filter(t => t !== NO_SUGGEST_TAG);
  if (on) tags.push(NO_SUGGEST_TAG);
  i.tags = tags;  // optimistic
  try {
    await rest(`/items?id=eq.${id}`, { method: "PATCH", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ tags }) });
  } catch (e) { toast(e.message); }
}

// Slot a piece falls into for suggestions. Cardigans dress like outerwear,
// so they never fill the "shirt" slot.
function suggestSlot(i) { return i.subcategory === "Cardigans" ? "Outerwear" : i.category; }

const NEUTRAL_COLORS = new Set(["White","Gray","Black","Beige","Brown","Metallic"]);

// No "pattern" field exists, so derive it: Graphic tees are always patterned, and
// most prints announce themselves in the item name. Used to avoid pairing two busy
// pieces together (the clash the user keeps hitting).
const PATTERN_RE = /\b(floral|plaid|stripe[ds]?|print(ed)?|graphic|leopard|animal|polka|checker(ed)?|gingham|paisley|tie.?dye|camo(uflage)?|houndstooth|argyle|geometric|patterned|sequin|snake|zebra|cheetah|tartan|tweed)\b/i;
function isPatterned(i) {
  if (!i) return false;
  if (i.subcategory === "Graphic tees") return true;
  return PATTERN_RE.test(i.name || "");
}

// Score a candidate combo of items. Higher = better.
// Combos the user has already been shown this session (key = sorted item ids).
// Lightly downweighted so reshuffles surface fresh outfits. Cleared on reload.
const _suggSeen = new Set();
const comboKey = pieces => pieces.map(p => p.id).sort().join(",");

function scoreCombo(its, target) {
  let s = 0;
  // dismissal memory: gently penalize combos already shown this session
  if (_suggSeen.has(comboKey(its))) s -= 4;
  if (!target) {
    // reward broader set overlap when no target level (more versatile combos rank higher)
    const sets = its.map(i => new Set(itemFormalitySet(i) || []));
    for (let lvl = 1; lvl <= 8; lvl++) {
      if (sets.every(st => st.has(lvl))) s++;
    }
  }
  // color: penalize 2+ different loud colors in same outfit
  const louds = [...new Set(its.map(i => i.color_family).filter(c => c && !NEUTRAL_COLORS.has(c)))];
  if (louds.length >= 2) s -= 3;
  // pattern: penalize mixing 2+ patterned/printed pieces (busy clash)
  if (its.filter(isPatterned).length >= 2) s -= 3;
  // NOTE: no rotation/last-worn weighting by design — suggestions are random
  // among pieces that plausibly match, not biased toward unworn items.
  return s;
}

function suggestOutfits(targetLevel = null, seedItemId = null, capsulePool = null) {
  const base = capsulePool || items.filter(i => itemStatus(i) === "Available");
  const avail = base.filter(i => i.image_path && !isNoSuggest(i));
  const seed = seedItemId ? itemById.get(seedItemId) : null;
  const slot = (...cats) => {
    let pool = avail.filter(i => cats.includes(suggestSlot(i)));
    if (targetLevel) {
      const f = pool.filter(i => (itemFormalitySet(i) || []).includes(targetLevel));
      if (f.length) pool = f;
    }
    // Random sample (Fisher–Yates) — no unworn/last-worn bias. A larger sample than
    // before so a single batch mixes more distinct pieces (less "same item every time").
    for (let k = pool.length - 1; k > 0; k--) { const j = Math.floor(Math.random() * (k + 1)); [pool[k], pool[j]] = [pool[j], pool[k]]; }
    pool = pool.slice(0, 10);
    if (seed && cats.includes(suggestSlot(seed)) && !pool.find(p => p.id === seed.id)) pool.unshift(seed);
    return pool;
  };

  const tops = slot("Tops");
  const dresses = slot("Dresses");
  const bottoms = slot("Bottoms");
  const shoes = slot("Shoes");
  const outerwear = slot("Outerwear");

  const exFree = its => !its.some((a, i) => its.some((b, j) => i < j && isExcluded(a.id, b.id)));
  // Pure-function items (set = [1] only) must never mix with non-function items.
  const formalityOk = its => {
    const isPureFunc = p => { const s = itemFormalitySet(p) || []; return s.length === 1 && s[0] === 1; };
    const hasFunc = its.some(isPureFunc);
    return !hasFunc || its.every(p => (itemFormalitySet(p) || []).includes(1));
  };

  const combos = [];

  // Dress + shoes + optional outerwear
  for (const d of dresses) {
    for (const sh of shoes) {
      for (const ow of [null, ...outerwear.slice(0, 2)]) {
        const its = [d, sh, ...(ow ? [ow] : [])];
        if (!exFree(its) || !formalityOk(its)) continue;
        combos.push({ pieces: its, score: scoreCombo(its, targetLevel) });
      }
    }
  }

  // Top + bottom + shoes + optional outerwear
  for (const t of tops) {
    for (const bt of bottoms) {
      if (isExcluded(t.id, bt.id)) continue;
      for (const sh of shoes.slice(0, 6)) {
        const its3 = [t, bt, sh];
        if (!exFree(its3) || !formalityOk(its3)) continue;
        combos.push({ pieces: its3, score: scoreCombo(its3, targetLevel) });
        for (const ow of outerwear.slice(0, 2)) {
          const its4 = [t, bt, sh, ow];
          if (exFree(its4) && formalityOk(its4)) combos.push({ pieces: its4, score: scoreCombo(its4, targetLevel) });
        }
      }
    }
  }

  combos.sort((a, b) => {
    // seed item always comes first
    if (seedItemId) {
      const ha = a.pieces.some(p => p.id === seedItemId) ? 1 : 0;
      const hb = b.pieces.some(p => p.id === seedItemId) ? 1 : 0;
      if (ha !== hb) return hb - ha;
    }
    return b.score - a.score;
  });

  // deduplicate: don't show the same set of item_ids twice
  const seen = new Set();
  const unique = [];
  for (const c of combos) {
    const key = c.pieces.map(p => p.id).sort().join(",");
    if (!seen.has(key)) { seen.add(key); unique.push(c); }
    if (unique.length >= 20) break;
  }

  // Weighted-random sample (softmax) so results vary each call while still
  // respecting the (small) match score. High temperature → mostly random among
  // things that plausibly go together, which is what we want here.
  if (unique.length > 1) {
    const t = 0.8;
    const scores = unique.map(c => c.score);
    const minS = Math.min(...scores);
    const maxS = Math.max(...scores);
    const norm = maxS > minS ? scores.map(s => (s - minS) / (maxS - minS)) : scores.map(() => 1);
    const weights = norm.map(s => Math.exp(s / t));
    // Sample without replacement, discounting combos that reuse items already
    // shown so arrowing through the batch actually swaps pieces (not "same item
    // every time"). A seeded item is in every combo, so it persists by design.
    const shuffled = [];
    const pickedItems = new Set();
    const avail2 = unique.map((c, i) => ({ c, w: weights[i] }));
    while (avail2.length && shuffled.length < 8) {
      const eff = avail2.map(a => {
        const overlap = a.c.pieces.reduce((n, p) => n + (pickedItems.has(p.id) ? 1 : 0), 0);
        return a.w * Math.pow(0.3, overlap);
      });
      const tot = eff.reduce((x, y) => x + y, 0) || 1;
      let r = Math.random() * tot, cumul = 0, pick = avail2.length - 1;
      for (let k = 0; k < avail2.length; k++) { cumul += eff[k]; if (r < cumul) { pick = k; break; } }
      shuffled.push(avail2[pick].c);
      avail2[pick].c.pieces.forEach(p => pickedItems.add(p.id));
      avail2.splice(pick, 1);
    }
    return shuffled;
  }
  return unique.slice(0, 8);
}

// Build a simple layout array for the suggestion canvas preview
function suggestionLayout(pieces) {
  const ORDER = ["Outerwear","Dresses","Tops","Bottoms","Shoes","Workout"];
  const sorted = pieces.slice().sort((a, b) => ORDER.indexOf(a.category) - ORDER.indexOf(b.category));
  const grids = [
    [[.5,.5,.75]],
    [[.3,.5,.45],[.72,.5,.45]],
    [[.5,.28,.55],[.28,.72,.42],[.72,.72,.42]],
    [[.28,.28,.44],[.72,.28,.44],[.28,.72,.44],[.72,.72,.44]],
  ];
  const pos = grids[Math.min(sorted.length - 1, 3)];
  return sorted.map((it, i) => ({ item_id: it.id, x: pos[i][0], y: pos[i][1], s: pos[i][2] }));
}

// Suggestion sheet state
let _sugg = { results: [], idx: 0, targetLevel: null, seedItemId: null, capsuleId: null };

function openSuggestSheet(seedItemId = null, capsuleId = null) {
  _sugg.seedItemId = seedItemId;
  _sugg.capsuleId = capsuleId;
  _sugg.targetLevel = null;
  _sugg.idx = 0;
  const pool = capsuleId
    ? capsuleItems(capsuleId).filter(i => itemStatus(i) === "Available")
    : null;
  _sugg.results = suggestOutfits(_sugg.targetLevel, seedItemId, pool);
  renderSuggestSheet();
  $("#logSheet").hidden = false;
}

function _suggPool() {
  if (!_sugg.capsuleId) return null;
  return capsuleItems(_sugg.capsuleId).filter(i => itemStatus(i) === "Available");
}

function renderSuggestSheet() {
  const res = _sugg.results;
  const combo = res[_sugg.idx];
  const total = res.length;

  const levelChips = OCCASION_LADDER.map((lbl, i) => {
    const lvl = i + 1, on = _sugg.targetLevel === lvl;
    return `<button class="cap-chip${on ? " on" : ""}" data-slvl="${lvl}" style="font-size:13px;text-align:left">${lvl}. ${esc(lbl)}</button>`;
  }).join("");

  let preview = "";
  if (combo) {
    const layout = suggestionLayout(combo.pieces);
    const fakeOutfit = { layout, formality_override: null, _bucket: null };
    const canvas = layoutCanvasHtml(fakeOutfit, "ocanvas sg-canvas");
    preview = canvas || combo.pieces.map(p =>
      `<div style="display:flex;align-items:center;gap:10px;padding:6px 0">
        ${thumbHtml(p.image_path)}
        <div><div style="font-size:14px;font-weight:500">${esc(p.name)}</div>
        <div style="font-size:12px;color:var(--muted)">${esc(p.category)}${p.color_family ? " · " + esc(p.color_family) : ""}</div></div>
      </div>`
    ).join("");
  }

  const nav = total > 1 ? `<div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-top:8px">
    <button class="icon-btn" data-sprev ${_sugg.idx === 0 ? "disabled" : ""}>
      <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <span style="font-size:13px;color:var(--muted)">${_sugg.idx + 1} of ${total}</span>
    <button class="icon-btn" data-snext ${_sugg.idx >= total - 1 ? "disabled" : ""}>
      <svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
    </button>
  </div>` : "";

  const capLabel = _sugg.capsuleId ? (() => {
    const c = capsuleById.get(_sugg.capsuleId);
    return c ? `<div style="font-size:12px;color:var(--accent);text-align:center;padding:0 16px 2px">From: ${esc(c.name)}</div>` : "";
  })() : "";

  $("#logInner").innerHTML = `
    <div class="sheet-hdr">
      <button class="lnk" id="sgClose">Close</button>
      <h2>Outfit suggestion</h2>
      <div style="width:48px"></div>
    </div>
    ${capLabel}
    <div style="padding:12px 16px 4px">
      <div style="font-size:12px;color:var(--muted);margin-bottom:6px">Formality</div>
      <div class="cap-catbar" style="flex-wrap:wrap;gap:6px">${levelChips}</div>
    </div>
    <div style="padding:12px 16px" id="sgPreview">
      ${combo ? preview : `<div class="center muted" style="padding:32px 0">Not enough items in this ${_sugg.capsuleId ? "capsule" : "closet"} to suggest an outfit.</div>`}
      ${nav}
    </div>
    ${combo ? `
    <div style="padding:0 16px 16px;display:flex;flex-direction:column;gap:10px">
      <button class="btn" data-swear>Wear this today</button>
      <button class="btn btn-sec" data-sbuild>Open in builder</button>
      <button class="lnk" style="font-size:14px;font-weight:600;color:var(--accent);padding:4px 0" data-snew>↻ New suggestions</button>
      <button class="lnk" style="font-size:14px;color:var(--muted);padding:4px 0" data-sfeedback>Give feedback…</button>
    </div>` : `
    <div style="padding:0 16px 16px"><button class="btn btn-sec" data-snew>↻ Try again</button></div>`}`;

  $("#sgClose").onclick = () => { $("#logSheet").hidden = true; };

  $("#logInner").querySelectorAll("[data-slvl]").forEach(b => {
    b.onclick = () => {
      const lvl = +b.dataset.slvl;
      _sugg.targetLevel = _sugg.targetLevel === lvl ? null : lvl;
      _sugg.idx = 0;
      _sugg.results = suggestOutfits(_sugg.targetLevel, _sugg.seedItemId, _suggPool());
      renderSuggestSheet();
    };
  });

  const prevBtn = $("#logInner").querySelector("[data-sprev]");
  const nextBtn = $("#logInner").querySelector("[data-snext]");
  if (prevBtn) prevBtn.onclick = () => { _sugg.idx = Math.max(0, _sugg.idx - 1); renderSuggestSheet(); };
  if (nextBtn) nextBtn.onclick = () => { _sugg.idx = Math.min(total - 1, _sugg.idx + 1); renderSuggestSheet(); };

  // Swipe the preview left/right to move through the batch
  const sw = $("#sgPreview");
  if (sw && total > 1) {
    let x0 = 0;
    sw.addEventListener("touchstart", e => { x0 = e.touches[0].clientX; }, { passive: true });
    sw.addEventListener("touchend", e => {
      const dx = e.changedTouches[0].clientX - x0;
      if (dx < -60 && _sugg.idx < total - 1) { _sugg.idx++; renderSuggestSheet(); }
      else if (dx > 60 && _sugg.idx > 0) { _sugg.idx--; renderSuggestSheet(); }
    }, { passive: true });
  }

  const wearBtn = $("#logInner").querySelector("[data-swear]");
  if (wearBtn && combo) wearBtn.onclick = async () => {
    const today = todayStr();
    try {
      const rows = await rest("/wears", {
        method: "POST",
        headers: { "Content-Type": "application/json", Prefer: "return=representation" },
        body: JSON.stringify(combo.pieces.map(p => ({ item_id: p.id, worn_on: today }))),
      });
      if (Array.isArray(rows)) wears.push(...rows);
      buildOutfitWearMap();
      // Route into the context + formality capture sheet (shared with daily-loop logging)
      if (Array.isArray(rows) && rows.length && rows[0].id) openPostLogSheet(rows);
      else { $("#logSheet").hidden = true; toast("Logged!"); }
    } catch (e) { toast(e.message); }
  };

  const buildBtn = $("#logInner").querySelector("[data-sbuild]");
  if (buildBtn && combo) buildBtn.onclick = () => {
    $("#logSheet").hidden = true;
    // seed the builder with the first piece, then open
    openBuilder(null, combo.pieces[0].id);
    // after builder opens, drop all pieces
    setTimeout(() => {
      if (!builder) return;
      for (let i = 1; i < combo.pieces.length; i++) {
        const p = combo.pieces[i];
        if (!builder.pieces.find(x => x.item_id === p.id)) {
          builder.pieces.push({ item_id: p.id, ...defaultPlacement(builder.pieces.length) });
        }
      }
      renderBuilder();
    }, 50);
  };

  const fbBtn = $("#logInner").querySelector("[data-sfeedback]");
  if (fbBtn && combo) fbBtn.onclick = () => openFeedbackSheet(combo.pieces);

  // New suggestions: remember everything currently shown, then regenerate a fresh batch.
  const newBtn = $("#logInner").querySelector("[data-snew]");
  if (newBtn) newBtn.onclick = () => {
    _sugg.results.forEach(c => _suggSeen.add(comboKey(c.pieces)));
    _sugg.idx = 0;
    _sugg.results = suggestOutfits(_sugg.targetLevel, _sugg.seedItemId, _suggPool());
    renderSuggestSheet();
  };

  hydratePhotos($("#logInner"));
}

// Feedback sheet from the suggester: never-suggest an item, or mark a pair as clashing.
function openFeedbackSheet(pieces) {
  const rows = pieces.map(p => {
    const off = isNoSuggest(p);
    return `<div class="frow" style="align-items:center">
      ${thumbHtml(p.image_path)}

      <button class="rv-set" style="flex:none;width:auto;padding:8px 14px;font-size:13px" data-nosug="${esc(p.id)}">
        ${off ? "Suggest again" : "Don't suggest"}
      </button>
    </div>`;
  }).join("");
  $("#logInner").innerHTML = `
    <div class="sheet-hdr">
      <button class="lnk" id="fbBack">Back</button>
      <h2>Feedback</h2>
      <div style="width:48px"></div>
    </div>

      <div class="muted" style="font-size:13px;margin-bottom:10px">Never suggest an item again, or tell us two pieces don't go together.</div>
      ${rows}
      <button class="btn btn-sec" id="fbPair" style="margin-top:16px">These don't go together…</button>
    </div>`;
  $("#fbBack").onclick = () => renderSuggestSheet();
  $("#fbPair").onclick = () => openExcludeSheet(pieces);
  $("#logInner").querySelectorAll("[data-nosug]").forEach(b => {
    b.onclick = async () => {
      const id = b.dataset.nosug;
      await setNoSuggest(id, !isNoSuggest(itemById.get(id)));
      _sugg.results = suggestOutfits(_sugg.targetLevel, _sugg.seedItemId, _suggPool());
      if (_sugg.idx >= _sugg.results.length) _sugg.idx = 0;
      toast(isNoSuggest(itemById.get(id)) ? "Won't suggest this item" : "Will suggest again");
      openFeedbackSheet(pieces);
    };
  });
  hydratePhotos($("#logInner"));
}

async function openExcludeSheet(pieces) {
  // Mark individual clashing PAIRS among the shown pieces. Every unordered pair is
  // listed; the user ticks only the specific pairs that don't go together (e.g. A×B
  // clashes but A×C is fine). Each ticked pair becomes its own exclusion.
  const pairKey = (a, b) => [a, b].sort().join(":");
  const allPairs = [];
  for (let i = 0; i < pieces.length; i++)
    for (let j = i + 1; j < pieces.length; j++) allPairs.push([pieces[i], pieces[j]]);
  const pairSel = new Set();  // canonical "a:b" keys the user has marked this session

  const renderExSheet = () => {
    const rows = allPairs.map(([p, q]) => {
      const key = pairKey(p.id, q.id);
      const already = isExcluded(p.id, q.id);
      const on = pairSel.has(key);
      return `<button class="ex-pair${on ? " on" : ""}${already ? " ex-locked" : ""}" data-expair="${esc(key)}"${already ? " disabled" : ""}>
        <div class="ex-pair-imgs">${thumbHtml(p.image_path, "ex-thumb")}<span class="ex-x">×</span>${thumbHtml(q.image_path, "ex-thumb")}</div>
        <div class="ex-pair-names">${esc(p.name)} <span class="ex-x">×</span> ${esc(q.name)}</div>
        ${already
          ? `<span class="ex-already">Excluded</span>`
          : `<span class="ex-tick">${on ? `<svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:var(--accent);stroke-width:2.5;fill:none"><polyline points="20 6 9 17 4 12"/></svg>` : ""}</span>`}
      </button>`;
    }).join("");
    const n = pairSel.size;
    $("#logInner").innerHTML = `
      <div class="sheet-hdr">
        <button class="lnk" id="exBack">Back</button>
        <h2>Which pairs clash?</h2>
        <button class="lnk" id="exSave" style="font-weight:700;${n < 1 ? "opacity:.4;pointer-events:none" : ""}">Save</button>
      </div>
      <div style="padding:8px 16px 12px">
        <div class="muted" style="font-size:13px;margin-bottom:12px">Tap each pair that doesn't go together. Only the pairs you mark are excluded — every other combination stays available.${n >= 1 ? ` <b style="color:var(--text)">${n} marked</b>` : ""}</div>
        ${rows}
        <div style="margin-top:14px">
          <input class="inp" id="exReason" type="text" placeholder="Reason (optional)" style="width:100%;font-size:15px" value="">
        </div>
      </div>`;
    $("#exBack").onclick = () => openFeedbackSheet(pieces);
    $("#exSave").onclick = async () => {
      if (!pairSel.size) return;
      const reason = $("#exReason").value.trim() || null;
      const payload = [...pairSel].map(k => {
        const [a, b] = k.split(":");
        return { item_a: a, item_b: b, ...(reason ? { reason } : {}) };
      });
      try {
        const res = await rest("/exclusions", {
          method: "POST",
          headers: { "Content-Type": "application/json", Prefer: "return=representation" },
          body: JSON.stringify(payload),
        });
        if (Array.isArray(res)) exclusions.push(...res);
        else if (res && res.id) exclusions.push(res);
        buildExcludeSet();
        toast(payload.length === 1 ? "Pair excluded" : `Excluded ${payload.length} pairs`);
        _sugg.results = suggestOutfits(_sugg.targetLevel, _sugg.seedItemId, _suggPool());
        if (_sugg.idx >= _sugg.results.length) _sugg.idx = 0;
        renderSuggestSheet();
      } catch (e) { toast(e.message); }
    };
    $("#logInner").querySelectorAll("[data-expair]").forEach(b => {
      b.onclick = () => {
        const k = b.dataset.expair;
        if (pairSel.has(k)) pairSel.delete(k); else pairSel.add(k);
        renderExSheet();
      };
    });
    hydratePhotos($("#logInner"));
  };
  renderExSheet();
}

  return `<div class="cap-banner">

// Looks matching a query — by piece (name/brand/category/sub) or by context
// (the look's own context + any context stamped on its logged wears).
function looksSearchResults(q) {
  const ql = q.trim().toLowerCase();
  const all = looksScopedOutfits();
  if (!ql) return all.slice().sort((a, b) => (b._num || 0) - (a._num || 0));
  const ctxByOutfit = new Map();
  for (const w of wears) {
    if (!w.outfit_id) continue;
    let s = ctxByOutfit.get(w.outfit_id);
    if (!s) { s = new Set(); ctxByOutfit.set(w.outfit_id, s); }
    for (const c of ctxArr(w)) s.add(String(c).toLowerCase());
  }
  return all.filter(o => {
    if (o.context && String(o.context).toLowerCase().includes(ql)) return true;
    const cs = ctxByOutfit.get(o.id);
    if (cs && [...cs].some(c => c.includes(ql))) return true;
    return outfitItems(o).some(it =>
      [it.name, it.brand, it.category, it.subcategory].filter(Boolean).join(" ").toLowerCase().includes(ql));
  });
}

function renderLooks() {
  lookId = null;
  $("#itemBar").hidden = true;
  const body = $("#looksBody");
  const banner = looksCapsuleBanner();
  if (looksSearchQ !== null) {
    const results = looksSearchResults(looksSearchQ);
    body.innerHTML = looksToolbar("Search looks", true, false) + banner + `
      <div style="padding:10px 14px 0"><input class="inp" id="looksSearchInp" placeholder="Search by piece or context…" value="${esc(looksSearchQ)}"></div>
      <div id="looksSearchCount" style="padding:6px 14px 2px;font-size:13px;color:var(--muted)">${results.length} look${results.length === 1 ? "" : "s"}</div>
      <div id="looksSearchResults">${outfitGridHtml(results)}</div>`;
    hydratePhotos(body);
    const inp = $("#looksSearchInp");
    if (inp) {
      inp.oninput = () => {
        looksSearchQ = inp.value;
        const r = looksSearchResults(looksSearchQ);
        const wrap = $("#looksSearchResults");
        if (wrap) { wrap.innerHTML = outfitGridHtml(r); hydratePhotos(body); }
        const cnt = $("#looksSearchCount"); if (cnt) cnt.textContent = `${r.length} look${r.length === 1 ? "" : "s"}`;
      };
      setTimeout(() => inp.focus(), 80);
    }
    return;
  }
  if (looksLens === "Recent" || looksLens === "All") {
    const full = lensOutfitsSorted();
    const list = full.slice(0, LOOKS_FLAT_CAP);
    const more = full.length > list.length
      ? `<div class="snote center" style="padding:0 16px 24px">Showing ${list.length} of ${full.length}. Narrow with Formality or Season.</div>` : "";
    body.innerHTML = looksToolbar("Looks", false, true) + banner + looksLensHtml() + outfitGridHtml(list) + more;
  } else if (looksFolder) {
    const list = folderOutfits(looksLens, looksFolder);
    body.innerHTML = looksToolbar(`${folderLabel(looksLens, looksFolder)} · ${list.length}`, true, true) + banner + outfitGridHtml(list);
  } else {
    body.innerHTML = looksToolbar("Looks", false, true) + banner + looksLensHtml() + folderRowsHtml(looksLens);
  }
  hydratePhotos(body);
}

function looksBack() {
  if (looksSearchQ !== null) { looksSearchQ = null; return renderLooks(); }
  if (lookId) { lookId = null; return renderLooks(); }
  if (looksFolder) { looksFolder = null; return renderLooks(); }
  renderLooks();
}

// ---- outfit detail ----
function openLook(id) {
  const o = outfitById.get(id);
  if (!o) return;
  lookId = id;

  const its = outfitItems(o);
  const pieces = outfitPieces(o);
  const n = outfitWornCount(o), lw = outfitLastWorn(o);
  const lastTxt = lw ? (daysSince(lw) <= 0 ? "Today" : relDate(lw)) : "Never";
  const cost = outfitCost(o);
  const seasons = outfitSeasons(o);
  // context: from the most recent wear date for this outfit
  const outfitWears = wears.filter(w => w.outfit_id === id).sort((a, b) => b.worn_on.localeCompare(a.worn_on));
  const lastWearCtx = lw ? outfitWears.filter(w => w.worn_on === lw).flatMap(w => w.context || []).filter((v, i, a) => a.indexOf(v) === i) : [];
  const lastWearIds = lw ? outfitWears.filter(w => w.worn_on === lw).map(w => w.id) : [];
  const bucket = FORMALITY_BUCKETS.find(b => b.key === outfitBucket(o));
  const lookLvl = BUCKET_RANGES[outfitBucket(o)];
  const missingLvlPieces = its.filter(it => !(itemFormalitySet(it) || []).includes(lookLvl));

  const lay = Array.isArray(o.layout) ? o.layout.filter(p => itemById.get(p.item_id) && itemById.get(p.item_id).image_path) : [];
  const heroBlock = lay.length
    ? `<div class="lk-canvas">${lay.map((p, idx) => {
        const it = itemById.get(p.item_id);
        return `<div class="lk-cpiece" data-look-item="${esc(it.id)}" data-photo="${esc(it.image_path)}" style="left:${p.x * 100}%;top:${p.y * 100}%;width:${p.s * 100}%;z-index:${idx + 1}"></div>`;
      }).join("")}</div>`
    : pieces.length
    ? `<div class="lk-hero${pieces.length === 1 ? " solo" : ""}">${pieces.map((p, idx) => {
        const span = (pieces.length === 3 && idx === 2) ? " span2" : "";
        return `<div class="lk-heropiece${span}" data-look-item="${esc(p.id)}" data-photo="${esc(p.image_path)}"></div>`;
      }).join("")}</div>`
    : `<div class="muted center" style="padding:30px">No photos for this look's pieces.</div>`;

  const pieceRows = its.map((it, idx) => `
    ${idx > 0 ? '<div class="det-divider"></div>' : ""}
    <button class="det-row" data-occ-item="${esc(it.id)}" style="align-items:center">
      <span style="flex:1;min-width:0">
        <span style="display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(it.name || "Untitled")}</span>
        <span style="display:block;color:var(--muted);font-size:12px;margin-top:2px">${esc(pieceFormalityLabel(it))}</span>
      </span>
      <svg class="chev" viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg>
    </button>`).join("");

  const body = $("#looksBody");
  body.innerHTML = `
    ${looksToolbar(esc(outfitName(o)), true, false)}
    <div class="det-body">
      ${heroBlock}
      <div class="center muted" style="font-size:12.5px;margin-bottom:8px">${its.length} piece${its.length === 1 ? "" : "s"} · tap a piece to open it</div>

      <div class="det-section-label">WEAR</div>
      <div class="det-card">
        <div class="det-row"><span class="det-lbl">Worn</span><span class="det-val">${n} time${n === 1 ? "" : "s"}</span></div>
        <div class="det-divider"></div>
        <div class="det-row"><span class="det-lbl">Last</span><span class="det-val">${esc(lastTxt)}</span></div>
        <div class="det-divider"></div>
        ${lastWearIds.length ? `<button class="det-row" id="lookCtxBtn"><span class="det-lbl">Context</span><span class="det-val">${lastWearCtx.length ? esc(lastWearCtx.join(", ")) : '<span style="color:var(--muted)">—</span>'}</span><svg class="chev" viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg></button><div class="det-divider"></div>` : ""}
        <div class="det-row"><span class="det-lbl">Total</span><span class="det-val">${cost > 0 ? esc(money(cost)) : "—"}</span></div>
      </div>

      <div class="det-section-label">CLASSIFICATION</div>
      <div class="det-card">
        <button class="det-row" data-look-formality="1"><span class="det-lbl">Formality</span><span class="det-val">${esc(bucket ? bucket.label : "—")}${o.formality_override ? ' <span style="font-size:11px;color:var(--muted)">(set)</span>' : ""}</span><svg class="chev" viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg></button>
        <div class="det-divider"></div>
        <div class="det-row"><span class="det-lbl">Season</span><span class="det-val">${seasons.length ? seasons.map(s => `<span class="lk-chip">${esc(s)}</span>`).join(" ") : "—"}</span></div>
      </div>

      <div class="det-section-label" style="display:flex;justify-content:space-between;align-items:center">PIECE FORMALITY<button class="lnk" id="lookEditPieces" style="font-size:12.5px;font-weight:600">Edit in canvas</button></div>
      <div class="det-card">${pieceRows || '<div class="det-row"><span class="det-val muted">No pieces</span></div>'}</div>
      ${missingLvlPieces.length ? `<button class="lnk" id="lookAddLevel" style="display:block;width:100%;text-align:center;font-size:13px;font-weight:600;padding:11px 0;margin-top:8px">+ Add “${lookLvl}. ${esc(occLabel(lookLvl))}” to ${missingLvlPieces.length} piece${missingLvlPieces.length === 1 ? "" : "s"}</button>` : ""}

      <div class="det-section-label">NOTES</div>
      <textarea class="det-notes-ta" id="lookNotes" placeholder="Notes about this look…">${esc(o.notes || "")}</textarea>
    </div>
    <div class="det-footer">
      <button class="lnk" id="lookWear" style="font-weight:600">Wear this look</button>
      <button class="lnk" id="lookDelete" style="color:var(--danger)">Delete</button>
    </div>
  `;
  $("#itemBar").hidden = true;
  hydratePhotos(body);
  window.scrollTo(0, 0);

  // notes auto-save (direct PATCH; skip re-render so typing isn't interrupted)
  const ta = $("#lookNotes");
  let noteTimer;
  ta.addEventListener("input", () => {
    clearTimeout(noteTimer);
    noteTimer = setTimeout(async () => {
      const val = ta.value.trim() || null, prev = o.notes;
      o.notes = val;
      try {
        await rest(`/outfits?id=eq.${id}`, {
          method: "PATCH",
          headers: { "Content-Type": "application/json", Prefer: "return=minimal" },
          body: JSON.stringify({ notes: val }),
        });
      } catch (e) { o.notes = prev; toast(e.message); }
    }, 900);
  });
}

// ---- wear this look (one wear row per piece, linked to the outfit) ----
function openWearLook(id) {
  const o = outfitById.get(id);
  if (!o) return;
  const its = outfitItems(o);
  const today = todayStr();
  _ctxSel = []; _ctxAddOpen = false;
  $("#logInner").innerHTML = `
    <div class="sheet-hdr">
      <button class="lnk" id="logCancel">Cancel</button>
      <h2>Wear This Look</h2>
      <button class="lnk" id="logSave" style="font-weight:700">Log</button>
    </div>
    <div style="padding:20px 18px 30px">
      <label style="display:block;font-size:13px;color:var(--muted);margin-bottom:8px">Date worn</label>
      <input class="inp" id="logDate" type="date" value="${today}" max="${today}" style="width:100%;font-size:16px">
      <div class="muted" style="font-size:13px;margin-top:12px">Logs a wear for all ${its.length} piece${its.length === 1 ? "" : "s"} in this look.</div>
      ${contextPickerHtml()}
    </div>`;
  $("#logSheet").hidden = false;
  renderContextPicker();
  $("#logCancel").onclick = () => { $("#logSheet").hidden = true; };
  $("#logSave").onclick = async () => {
    const date = $("#logDate").value;
    if (!date || !its.length) { $("#logSheet").hidden = true; return; }
    const ctx = ctxSelOrNull();
    try {
      const payload = its.map(it => ({ item_id: it.id, worn_on: date, outfit_id: id, context: ctx }));
      const rows = await rest("/wears", {
        method: "POST",
        headers: { "Content-Type": "application/json", Prefer: "return=representation" },
        body: JSON.stringify(payload),
      });
      const newWears = Array.isArray(rows) && rows.length ? rows
        : its.map(it => ({ id: null, item_id: it.id, worn_on: date, outfit_id: id, context: null, formality_for: null }));
      wears.push(...(Array.isArray(rows) ? rows : newWears));
      buildOutfitWearMap();
      if (lookId === id) openLook(id);
      openPostLogSheet(newWears);
    } catch (e) { toast(e.message); }
  };
}

// ---- delete a look (history is preserved: wears.outfit_id is SET NULL) ----
async function deleteLook(id) {
  if (!confirm("Delete this look? Your wear history is kept — only the saved outfit is removed.")) return;
  try {
    await rest(`/outfits?id=eq.${id}`, { method: "DELETE" });
    outfits = outfits.filter(o => o.id !== id);
    outfitById.delete(id);
    outfitItemMap.delete(id);
    wears.forEach(w => { if (w.outfit_id === id) w.outfit_id = null; });
    buildOutfitWearMap();
    lookId = null;
    renderLooks();
    toast("Look deleted");
  } catch (e) { toast(e.message); }
}

      await rest(`/outfits?id=eq.${id}`, {

      $("#logSheet").hidden = true;
