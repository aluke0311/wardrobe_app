/* ===================================================================
   SEARCH  (keyword + Color/Fabric/Size/Season/Brand/Status filters)
   =================================================================== */
const FILTERS = [
  ["color",  "Color",  () => COLOR_FAMILIES.map(c => c[0])],
  ["fabric", "Fabric", () => distinctArr("fabric")],
  ["size",   "Size",   () => distinctScalar("size")],
  ["season", "Season", () => SEASONS],
  ["brand",  "Brand",  () => distinctScalar("brand")],
  ["status", "Status", () => STATUSES],
];
let searchState = newSearchState();
let searchOpenRow = null;
function newSearchState() { return { q: "", color: new Set(), fabric: new Set(), size: new Set(), season: new Set(), brand: new Set(), status: new Set() }; }
function distinctScalar(field) { return [...new Set(items.map(i => i[field]).filter(Boolean))].sort(); }
function distinctArr(field) { const s = new Set(); items.forEach(i => (i[field] || []).forEach(v => s.add(v))); return [...s].sort(); }

function openSearch() { searchOpenRow = null; switchTab("search"); }

function renderSearch() {
  const rowSummary = (key) => {
    const set = searchState[key];
    return set.size === 0 ? "Any" : (set.size === 1 ? [...set][0] : `${set.size} selected`);
  };
  const rows = FILTERS.map(([key, label]) => {
    const open = searchOpenRow === key;
    const chips = open ? `<div class="schips">${FILTERS.find(f => f[0] === key)[2]().map(opt =>
      `<button class="schip ${searchState[key].has(opt) ? "on" : ""}" data-chip="${key}|${esc(opt)}">${esc(opt)}</button>`).join("") || `<span class="muted" style="font-size:13px">None recorded yet</span>`}</div>` : "";
    return `<button class="srow" data-row="${key}">
      <span>${label}</span>
      <span class="rt">${esc(rowSummary(key))} ›</span>
    </button>${chips}`;
  }).join("");
  $("#searchBody").innerHTML = `
    <div class="schead">
      <button class="lnk" id="scCancel">Cancel</button>
      <span style="font-weight:600">Search</span>
      <button class="lnk" id="scRun">Search</button>
    </div>
    <div class="sbody">
      <input class="inp" id="scQuery" placeholder="e.g. keywords and category names" value="${esc(searchState.q)}">
      <div class="snote">Searches names, brands, notes and category names.</div>
      <div class="srows">${rows}</div>
      <div style="text-align:right;margin-top:14px"><button class="lnk" id="scReset">Reset</button></div>
    </div>`;
  $("#scQuery").oninput = (e) => { searchState.q = e.target.value; };
  $("#scCancel").onclick = () => switchTab("closet");
  $("#scReset").onclick = () => { searchState = newSearchState(); searchOpenRow = null; renderSearch(); };
  $("#scRun").onclick = runSearch;
  $("#searchBody").querySelector(".srows").onclick = (e) => {
    const chip = e.target.closest("[data-chip]");
    if (chip) {
      const [key, val] = chip.dataset.chip.split("|");
      searchState[key].has(val) ? searchState[key].delete(val) : searchState[key].add(val);
      renderSearch(); return;
    }
    const row = e.target.closest("[data-row]");
    if (row) { searchOpenRow = searchOpenRow === row.dataset.row ? null : row.dataset.row; renderSearch(); }
  };
}

function runSearch() {
  const q = searchState.q.trim().toLowerCase();
  const hit = (set, val) => set.size === 0 || (val != null && set.has(val));
  const hitArr = (set, arr) => set.size === 0 || (arr || []).some(v => set.has(v));
  searchResults = items.filter(i => {
    if (q) {
      const hay = [i.name, i.brand, i.notes, i.category, i.subcategory].filter(Boolean).join(" ").toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return hit(searchState.color, i.color_family) && hit(searchState.size, i.size)
      && hit(searchState.brand, i.brand) && hit(searchState.status, itemStatus(i))
      && hitArr(searchState.fabric, i.fabric) && hitArr(searchState.season, i.season);
  });
  closetCat = null; closetSub = null;
  switchTab("closet");
}

      <div class="det-card" style="margin-bottom:14px">
        ${addFieldRow("Color", colorDisplay, "color_family")}
        <div class="det-divider"></div>
        ${addFieldRow("Size", esc(s.size || ""), "size")}
        <div class="det-divider"></div>
        ${addFieldRow("Brand", esc(s.brand || ""), "brand")}
        <div class="det-divider"></div>
        ${addFieldRow("Season", esc((s.season || []).join(", ")), "season")}
        <div class="det-divider"></div>
        ${addFieldRow("Status", esc(s.status || "Available"), "status")}
      </div>

      <div class="det-section-label">PRICING</div>
      <div class="det-card" style="margin-bottom:14px">
        ${addFieldRow("Price", s.price != null ? esc(money(s.price)) : "", "price")}
        <div class="det-divider"></div>
        ${addFieldRow("Acquired", esc(s.acquisition || ""), "acquisition")}
      </div>

      <div class="det-section-label">NOTES</div>
      <textarea class="det-notes-ta" id="addNotes" placeholder="Notes about this item…">${esc(s.notes || "")}</textarea>
    </div>
  `;

  // restore photo preview if we have one
  if (_addPhotoUrl) {
    const area = $("#addPhotoArea");
    area.style.backgroundImage = `url("${_addPhotoUrl}")`;
    area.classList.add("has-photo");
    area.innerHTML = "";
  }

  $("#addCancel").onclick = () => switchTab("home");
  $("#addSave").onclick = saveNewItem;
  $("#addCatBtn").onclick = openAddCatSheet;

  const nameInp = $("#addName");
  nameInp.oninput = () => { _addState.name = nameInp.value; };

  const notesEl = $("#addNotes");
  notesEl.oninput = () => { _addState.notes = notesEl.value.trim() || null; };

  const photoInput = $("#addPhotoInput");
  photoInput.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const { blob, ext } = await compressImage(file);
      _addPhotoBlob = { blob, ext };
      if (_addPhotoUrl) URL.revokeObjectURL(_addPhotoUrl);
      _addPhotoUrl = URL.createObjectURL(blob);
      const area = $("#addPhotoArea");
      area.style.backgroundImage = `url("${_addPhotoUrl}")`;
      area.classList.add("has-photo");
      area.innerHTML = "";
    } catch { toast("Couldn't process that image"); }
  };
}

      const valEl = $("#addCatVal");
      if (valEl) {

async function saveNewItem() {
  const nameInp = $("#addName");
  const name = (nameInp?.value || _addState.name || "").trim();
  if (!name) { toast("Item name is required"); nameInp?.focus(); return; }

  const saveBtn = $("#addSave");
  if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = "Saving…"; }

  try {
    const payload = { name };
    if (_addState.category)    payload.category    = _addState.category;
    if (_addState.subcategory) payload.subcategory = _addState.subcategory;
    if (_addState.color_family) payload.color_family = _addState.color_family;
    if (_addState.size)        payload.size        = _addState.size;
    if (_addState.brand)       payload.brand       = _addState.brand;
    if (_addState.season?.length) payload.season   = _addState.season;
    if (_addState.status)      payload.status      = _addState.status;
    if (_addState.price != null) payload.price     = _addState.price;
    if (_addState.acquisition) payload.acquisition = _addState.acquisition;
    if (_addState.notes)       payload.notes       = _addState.notes;

    const rows = await rest("/items", {
      method: "POST",
      headers: { "Content-Type": "application/json", Prefer: "return=representation" },
      body: JSON.stringify(payload),
    });
    const newItem = Array.isArray(rows) ? rows[0] : rows;
    if (!newItem?.id) throw new Error("Item created but no ID returned");

    // upload photo and patch
    if (_addPhotoBlob) {
      const { blob, ext } = _addPhotoBlob;
      const filename = `${(crypto.randomUUID ? crypto.randomUUID() : Date.now())}.${ext}`;
      const path = await uploadPhoto(blob, filename);
      await rest(`/items?id=eq.${newItem.id}`, {
        method: "PATCH",
        headers: { "Content-Type": "application/json", Prefer: "return=minimal" },
        body: JSON.stringify({ image_path: path }),
      });
      newItem.image_path = path;
      if (_addPhotoUrl) { URL.revokeObjectURL(_addPhotoUrl); _addPhotoUrl = null; }
    }

    items.unshift(newItem);
    if (newItem.image_path) signedUrlBatch([newItem.image_path]);

    toast("Item added!");
    // navigate to the new item photo view
    closetCat = newItem.category || null;
    closetSub = newItem.subcategory || null;
    switchTab("closet");
    openItem(newItem.id);
  } catch (e) {
    toast(e.message);
    if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = "Save"; }
  }
}

/* ===================================================================
   LOOKS  (outfit library — lens switcher · folders · grid · detail)
   =================================================================== *

   Status of imported data: 1,543 outfits = a date + a set of items, almost no
   name/context/notes. So everything here is DERIVED, not filed by hand:
   - formality: estimated per item (occasion range if set, else a taxonomy
     heuristic), averaged across the outfit, bucketed into 6 coarse folders.
   - season: from the dates the look was worn (multiple seasons => multiple
     folders), falling back to the outfit's own date.
   The user can browse by Formality / Season / Recent / All. Most looks were
   worn once, so this reads as a library where it's useful and a log otherwise. */

const LOOK_LENSES = ["Formality", "Season", "Recent", "All"];
const LOOKS_FLAT_CAP = 400;   // cap for the flat Recent/All grids (perf on phone)

// Formality folders — one per level on the 1-6 scale.
const FORMALITY_BUCKETS = [
  { key: "function", label: "Function"        },  // 1
  { key: "vcasual",  label: "Very Casual"      },  // 2
  { key: "ecasual",  label: "Everyday Casual"  },  // 3
  { key: "smart",    label: "Smart Casual"     },  // 4
  { key: "dressy",   label: "Dressed Up"       },  // 5
  { key: "formal",   label: "Formal"           },  // 6
];

// Bucket key → target formality level (used when nudging pieces toward a look's level).
const BUCKET_RANGES = {
  function: 1, vcasual: 2, ecasual: 3, smart: 4, dressy: 5, formal: 6,
};

// Per-subcategory / category formality seed on the 1-6 scale. Used when an item
// has no explicit formality set (most items start unset — Closet Review fills them).
const SUBCAT_FORMALITY = {
  "Tee shirts": 2, "Graphic tees": 3, "Long-sleeve tees": 2, "Sleeveless": 3,
  "Blouses": 4, "Sweaters": 3, "Cardigans": 3, "Sweatshirts": 2,
  "Jeans": 3, "Pants": 4, "Shorts": 3, "Skirts": 3, "Leggings/Joggers": 2, "Tights": 3,
  "Casual dresses": 3, "Work dresses": 4, "Cocktail dresses": 5,
  "Blazers": 4, "Jackets": 3, "Coats": 3,
  "Boots": 3, "Sandals": 3, "Flats": 3, "Heels": 4, "Sneakers": 3,
  "Workout tops": 1, "Active shorts": 1, "Sports bras": 1,
};
const CAT_FORMALITY = { Tops: 2, Bottoms: 3, Dresses: 4, Outerwear: 3, Shoes: 3, Workout: 1 };

// Vertical stacking order for collages: outerwear/tops up top, bottoms, then shoes.
const LAYER_ORDER = { Outerwear: 0, Tops: 1, Dresses: 1, Workout: 1, Bottoms: 2, Shoes: 3 };

let looksLens = "Formality";
let looksFolder = null;   // null = folder list (Formality/Season) | bucket key | season
let lookId = null;        // outfit id in detail (null = none)

// ---- derived helpers ----
function outfitItems(o) { return (outfitItemMap.get(o.id) || []).map(id => itemById.get(id)).filter(Boolean); }
function displayOutfits() { return outfits.filter(o => (outfitItemMap.get(o.id) || []).some(id => itemById.has(id))); }
// Looks pool, scoped to the active capsule when planning: only looks wearable
// entirely from that capsule's items (every piece is a member).
function looksScopedOutfits() {
  const list = displayOutfits();
  if (!activeCapsuleId) return list;
  const set = new Set((capsuleLinkMap.get(activeCapsuleId) || []).map(l => l.item_id));
  return list.filter(o => {
    const ids = (outfitItemMap.get(o.id) || []).filter(id => itemById.has(id));
    return ids.length && ids.every(id => set.has(id));
  });
}
function outfitName(o) { return o.name || `Look #${o._num || "?"}`; }
function outfitPieces(o) {
  return outfitItems(o).filter(i => i.image_path)
    .sort((a, b) => (LAYER_ORDER[a.category] ?? 1.5) - (LAYER_ORDER[b.category] ?? 1.5));
}

const seasonOf = (dateStr) => {
  const m = +String(dateStr).slice(5, 7);
  return (m <= 2 || m === 12) ? "Winter" : m <= 5 ? "Spring" : m <= 8 ? "Summer" : "Fall";
};
function effectiveWearDays(o) {
  const s = outfitWearMap.get(o.id);
  if (s && s.size) return [...s];
  return o.created_at ? [String(o.created_at).slice(0, 10)] : [];
}
function outfitSeasons(o) { return [...new Set(effectiveWearDays(o).map(seasonOf))]; }
function outfitWornCount(o) { return effectiveWearDays(o).length; }
function outfitLastWorn(o) { const d = effectiveWearDays(o).sort(); return d.length ? d[d.length - 1] : null; }
function outfitCost(o) { return outfitItems(o).reduce((s, i) => s + (i.price ? Number(i.price) : 0), 0); }

// Returns the formality level (1-6) for an item: explicit field first, then taxonomy seed.
function itemFormality(i) {
  if (i.formality) return i.formality;
  return SUBCAT_FORMALITY[i.subcategory] ?? CAT_FORMALITY[i.category] ?? 3;
}
function outfitBucket(o) {
  if (o._bucket) return o._bucket;
  if (o.formality_override) { o._bucket = o.formality_override; return o._bucket; }
  const its = outfitItems(o);
  let key = "ecasual";
  if (its.length) {
    const avg = Math.round(its.reduce((s, i) => s + itemFormality(i), 0) / its.length);
    const c = Math.max(1, Math.min(6, avg));
    key = ["function", "vcasual", "ecasual", "smart", "dressy", "formal"][c - 1];
  }
  o._bucket = key;
  return key;
}

function relDate(d) {
  const ds = daysSince(d);
  if (ds == null) return "";
  if (ds <= 0) return "today";
  if (ds < 30) return `${ds}d ago`;
  if (ds < 365) return `${Math.floor(ds / 30)}mo ago`;
  return `${Math.floor(ds / 365)}y ago`;
}

// ---- collage building ----
// Saved Build-a-look arrangement → positioned-pieces HTML (or null if no usable layout).
// `wrapCls` frames the container; pieces use absolute % geometry so it scales to any size.
function layoutCanvasHtml(o, wrapCls) {
  const lay = (Array.isArray(o && o.layout) ? o.layout : [])
    .filter(p => { const it = itemById.get(p.item_id); return it && it.image_path; });
  if (!lay.length) return null;
  const cells = lay.map((p, i) => {
    const it = itemById.get(p.item_id);
    return `<div class="ocpiece" data-photo="${esc(it.image_path)}" style="left:${p.x * 100}%;top:${p.y * 100}%;width:${p.s * 100}%;z-index:${i + 1}"></div>`;
  }).join("");
  return `<div class="${wrapCls}">${cells}</div>`;
}

function outfitCollageHtml(o, max, mini) {
  const canvas = layoutCanvasHtml(o, "ocanvas" + (mini ? " omini" : ""));
  if (canvas) return canvas;
  const pieces = outfitPieces(o).slice(0, max);
  let cls = "ocollage" + (mini ? " omini" : "");
  if (!pieces.length) return `<div class="${cls} empty"><svg viewBox="0 0 24 24"><path d="M16 4l-4 9-4-9"/><path d="M12 13l-9 7h18l-9-7z"/></svg></div>`;
  if (pieces.length === 1) cls += " solo";
  const cells = pieces.map((p, idx) => {
    const span = (pieces.length === 3 && idx === 2) ? " span2" : "";  // wide bottom for 3-piece looks
    return `<div class="opiece${span}" data-photo="${esc(p.image_path)}"></div>`;
  }).join("");
  return `<div class="${cls}">${cells}</div>`;
}

// Formality label for a piece: explicit formality field, else taxonomy seed.
function pieceFormalityLabel(it) {
  if (it.formality) return occLabel(it.formality);
  return "est. · " + occLabel(Math.max(1, Math.min(6, Math.round(itemFormality(it)))));
}

function emptyLooks() {
  return `<div class="placeholder">
    <svg class="pi" viewBox="0 0 24 24"><path d="M7 4l5 3 5-3 2 5-3 1v10H8V10L5 9z"/></svg>
    <b>No looks here</b><div>Outfits you build or log will show up here.</div></div>`;
}

// ---- toolbar / lens row ----
function looksToolbar(title, showBack, showShuffle) {
  return `<div class="cltoolbar">
    ${showBack
      ? `<button class="clback" id="looksBack"><svg viewBox="0 0 24 24"><path d="M15 6l-6 6 6 6"/></svg></button>`
      : `<span style="width:34px"></span>`}
    <div class="cltitle">${esc(title)}</div>
    ${showShuffle
      ? `<div style="display:flex;align-items:center;gap:2px">
           <button class="clsearch" id="looksNew" title="Build a look"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button>
           <button class="clsearch" id="looksShuffle" title="Random look"><svg viewBox="0 0 24 24"><path d="M16 3h5v5"/><path d="M4 20L21 3"/><path d="M21 16v5h-5"/><path d="M15 15l6 6"/><path d="M4 4l5 5"/></svg></button>
         </div>`
      : `<span style="width:34px"></span>`}
  </div>`;
}
function looksLensHtml() {
  return `<div class="lens">${LOOK_LENSES.map(l =>
    `<button data-llens="${l}" class="${looksLens === l ? "on" : ""}">${l}</button>`).join("")}</div>`;
}

// ---- folder list (Formality / Season) ----
function looksFolderRow(label, count, rep, attrs) {
  const thumb = rep ? outfitCollageHtml(rep, 4, true)
    : `<div class="cthumb empty"><svg viewBox="0 0 24 24"><path d="M5 9l7-5 7 5"/><path d="M5 9c0 2.2 14 2.2 14 0"/></svg></div>`;
  return `<button class="frow" ${attrs}>
    ${thumb}
    <div class="fmeta"><div class="fname">${esc(label)}</div><div class="fcount">${count} look${count === 1 ? "" : "s"}</div></div>
    <svg class="chev" viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg>
  </button>`;
}
const repByRecency = (list) =>
  list.slice().sort((a, b) => String(outfitLastWorn(b) || "").localeCompare(String(outfitLastWorn(a) || "")))[0];

function folderRowsHtml(lens) {
  const all = looksScopedOutfits();
  let rows = "";
  if (lens === "Formality") {
    for (const b of FORMALITY_BUCKETS) {
      const list = all.filter(o => outfitBucket(o) === b.key);
      if (!list.length) continue;
      rows += looksFolderRow(b.label, list.length, repByRecency(list), `data-lfolder="${b.key}"`);
    }
  } else {
    for (const s of SEASONS) {
      const list = all.filter(o => outfitSeasons(o).includes(s));
      if (!list.length) continue;
      rows += looksFolderRow(s, list.length, repByRecency(list), `data-lfolder="${s}"`);
    }
  }
  return rows ? `<div class="frows">${rows}</div>` : emptyLooks();
}
function folderOutfits(lens, folder) {
  const all = looksScopedOutfits();
  const list = lens === "Formality"
    ? all.filter(o => outfitBucket(o) === folder)
    : all.filter(o => outfitSeasons(o).includes(folder));
  return list.sort((a, b) => String(outfitLastWorn(b) || "").localeCompare(String(outfitLastWorn(a) || "")));
}
function folderLabel(lens, folder) {
  return lens === "Formality" ? (FORMALITY_BUCKETS.find(b => b.key === folder)?.label || folder) : folder;
}
function lensOutfitsSorted() {
  const all = looksScopedOutfits();
  if (looksLens === "Recent") return all.slice().sort((a, b) => String(outfitLastWorn(b) || "").localeCompare(String(outfitLastWorn(a) || "")));
  return all.slice().sort((a, b) => (b._num || 0) - (a._num || 0)); // All: newest created first
}

// ---- grid of outfit tiles ----
function outfitGridHtml(list) {
  if (!list.length) return emptyLooks();
  return `<div class="ogrid">${list.map(o => {
    const n = outfitItems(o).length, lw = outfitLastWorn(o);
    return `<button class="otile" data-look="${esc(o.id)}">
      ${outfitCollageHtml(o, 4)}
      <div class="oname">${esc(outfitName(o))}</div>
      <div class="ometa">${n} piece${n === 1 ? "" : "s"}${lw ? " · " + esc(relDate(lw)) : ""}</div>
    </button>`;
  }).join("")}</div>`;
}

// Banner shown across Looks while a capsule scopes the view to wearable looks.
function looksCapsuleBanner() {
  if (!activeCapsuleId) return "";
  const c = capsuleById.get(activeCapsuleId);
  if (!c) return "";
  return `<div class="cap-banner">
    <div class="cb-t">Wearable from · ${esc(c.name)}</div>
    <button class="cb-x" data-cap-clear>✕</button>
  </div>`;
}

function renderLooks() {
  lookId = null;
  $("#itemBar").hidden = true;
  const body = $("#looksBody");
  const banner = looksCapsuleBanner();
  if (looksLens === "Recent" || looksLens === "All") {
    const full = lensOutfitsSorted();
    const list = full.slice(0, LOOKS_FLAT_CAP);
    const more = full.length > list.length
      ? `<div class="snote center" style="padding:0 16px 24px">Showing ${list.length} of ${full.length}. Narrow with Formality or Season.</div>` : "";
    body.innerHTML = looksToolbar("Looks", false, true) + banner + looksLensHtml() + outfitGridHtml(list) + more;
  } else if (looksFolder) {
    const list = folderOutfits(looksLens, looksFolder);
    body.innerHTML = looksToolbar(`${folderLabel(looksLens, looksFolder)} · ${list.length}`, true, true) + banner + outfitGridHtml(list);
  } else {
    body.innerHTML = looksToolbar("Looks", false, true) + banner + looksLensHtml() + folderRowsHtml(looksLens);
  }
  hydratePhotos(body);
}

function looksBack() {
  if (lookId) { lookId = null; return renderLooks(); }
  if (looksFolder) { looksFolder = null; return renderLooks(); }
  renderLooks();
}

function openRandomLook() {
  const all = looksScopedOutfits();
  if (all.length) openLook(all[Math.floor(Math.random() * all.length)].id);
}

// ---- outfit detail ----
function openLook(id) {
  const o = outfitById.get(id);
  if (!o) return;
  lookId = id;

  const its = outfitItems(o);
  const pieces = outfitPieces(o);
  const n = outfitWornCount(o), lw = outfitLastWorn(o);
  const lastTxt = lw ? (daysSince(lw) <= 0 ? "Today" : relDate(lw)) : "Never";
  const cost = outfitCost(o);
  const seasons = outfitSeasons(o);
  const bucket = FORMALITY_BUCKETS.find(b => b.key === outfitBucket(o));

  const lay = Array.isArray(o.layout) ? o.layout.filter(p => itemById.get(p.item_id) && itemById.get(p.item_id).image_path) : [];
  const heroBlock = lay.length
    ? `<div class="lk-canvas">${lay.map((p, idx) => {
        const it = itemById.get(p.item_id);
        return `<div class="lk-cpiece" data-look-item="${esc(it.id)}" data-photo="${esc(it.image_path)}" style="left:${p.x * 100}%;top:${p.y * 100}%;width:${p.s * 100}%;z-index:${idx + 1}"></div>`;
      }).join("")}</div>`
    : pieces.length
    ? `<div class="lk-hero${pieces.length === 1 ? " solo" : ""}">${pieces.map((p, idx) => {
        const span = (pieces.length === 3 && idx === 2) ? " span2" : "";
        return `<div class="lk-heropiece${span}" data-look-item="${esc(p.id)}" data-photo="${esc(p.image_path)}"></div>`;
      }).join("")}</div>`
    : `<div class="muted center" style="padding:30px">No photos for this look's pieces.</div>`;

  const pieceRows = its.map((it, idx) => `
    ${idx > 0 ? '<div class="det-divider"></div>' : ""}
    <button class="det-row" data-occ-item="${esc(it.id)}">

        <div class="det-divider"></div>
        <div class="det-row"><span class="det-lbl">Season</span><span class="det-val">${seasons.length ? seasons.map(s => `<span class="lk-chip">${esc(s)}</span>`).join(" ") : "—"}</span></div>

// ---- wear this look (one wear row per piece, linked to the outfit) ----
function openWearLook(id) {
  const o = outfitById.get(id);
  if (!o) return;
  const its = outfitItems(o);
  const today = todayStr();
  $("#logInner").innerHTML = `
    <div class="sheet-hdr">
      <button class="lnk" id="logCancel">Cancel</button>
      <h2>Wear This Look</h2>
      <button class="lnk" id="logSave" style="font-weight:700">Log</button>
    </div>
    <div style="padding:20px 18px 30px">
      <label style="display:block;font-size:13px;color:var(--muted);margin-bottom:8px">Date worn</label>
      <input class="inp" id="logDate" type="date" value="${today}" max="${today}" style="width:100%;font-size:16px">
      <div class="muted" style="font-size:13px;margin-top:12px">Logs a wear for all ${its.length} piece${its.length === 1 ? "" : "s"} in this look.</div>
    </div>`;
  $("#logSheet").hidden = false;
  $("#logCancel").onclick = () => { $("#logSheet").hidden = true; };
  $("#logSave").onclick = async () => {
    const date = $("#logDate").value;
    if (!date || !its.length) { $("#logSheet").hidden = true; return; }
    try {
      const payload = its.map(it => ({ item_id: it.id, worn_on: date, outfit_id: id }));
      const rows = await rest("/wears", {
        method: "POST",
        headers: { "Content-Type": "application/json", Prefer: "return=representation" },
        body: JSON.stringify(payload),
      });
      if (Array.isArray(rows)) wears.push(...rows);
      buildOutfitWearMap();
      $("#logSheet").hidden = true;
      toast(`Logged ${its.length} wear${its.length === 1 ? "" : "s"} for ${date}`);
      if (lookId === id) openLook(id);
    } catch (e) { toast(e.message); }
  };
}

// ---- delete a look (history is preserved: wears.outfit_id is SET NULL) ----
async function deleteLook(id) {
  if (!confirm("Delete this look? Your wear history is kept — only the saved outfit is removed.")) return;
  try {
    await rest(`/outfits?id=eq.${id}`, { method: "DELETE" });
    outfits = outfits.filter(o => o.id !== id);
    outfitById.delete(id);
    outfitItemMap.delete(id);
    wears.forEach(w => { if (w.outfit_id === id) w.outfit_id = null; });
    buildOutfitWearMap();
    lookId = null;
    renderLooks();
    toast("Look deleted");
  } catch (e) { toast(e.message); }
}

// ---- override the whole look's formality bucket ----
function openLookFormalityEdit(id) {
  const o = outfitById.get(id);
  if (!o) return;
  let selected = o.formality_override || outfitBucket(o);

  const chips = FORMALITY_BUCKETS.map(b =>
    `<button class="sheet-chip${b.key === selected ? " on" : ""}" data-fbucket="${esc(b.key)}">${esc(b.label)}</button>`
  ).join("");

  $("#logInner").innerHTML = `
    <div class="sheet-hdr">
      <button class="lnk" id="fmlCancel">Cancel</button>
      <h2>Look formality</h2>
      <button class="lnk" id="fmlSave" style="font-weight:700">Save</button>
    </div>
    <div style="padding:14px 18px 30px">
      <div class="muted" style="font-size:13px;margin-bottom:14px">Override the derived formality for this look.</div>
      <div class="sheet-chips">${chips}</div>
      ${o.formality_override ? `<button class="lnk" id="fmlClear" style="color:var(--danger);font-size:14px;margin-top:16px">Remove override (use auto)</button>` : ""}
    </div>`;

  const syncChips = () => {
    $("#logInner").querySelectorAll("[data-fbucket]").forEach(b =>
      b.classList.toggle("on", b.dataset.fbucket === selected));
  };
  $("#logInner").querySelectorAll("[data-fbucket]").forEach(b => {
    b.onclick = () => { selected = b.dataset.fbucket; syncChips(); };
  });

  const fmlClear = $("#fmlClear");
  if (fmlClear) fmlClear.onclick = async () => {
    o.formality_override = null; o._bucket = null;
    try {
      await rest(`/outfits?id=eq.${id}`, {
        method: "PATCH",
        headers: { "Content-Type": "application/json", Prefer: "return=minimal" },
        body: JSON.stringify({ formality_override: null }),
      });
      toast("Auto formality restored");
    } catch (e) { o._bucket = null; toast(e.message); }
    $("#logSheet").hidden = true;
    openLook(id);
  };

  $("#fmlCancel").onclick = () => { $("#logSheet").hidden = true; };

  $("#fmlSave").onclick = async () => {
    const prev = o.formality_override;
    o.formality_override = selected; o._bucket = selected;
    try {
      await rest(`/outfits?id=eq.${id}`, {
        method: "PATCH",
        headers: { "Content-Type": "application/json", Prefer: "return=minimal" },
        body: JSON.stringify({ formality_override: selected }),
      });
      if (selected === "workout") {
        toast("Formality saved");
        $("#logSheet").hidden = true;
        openLook(id);
      } else {
        showNudgePiecesSheet(id, selected);
      }
    } catch (e) {
      o.formality_override = prev; o._bucket = null;
      toast(e.message);
      $("#logSheet").hidden = true;
    }
  };

  $("#logSheet").hidden = false;
}

// ---- offer to nudge pieces to match the look's new formality ----
function showNudgePiecesSheet(outfitId, bucketKey) {
  const o = outfitById.get(outfitId);
  if (!o) { $("#logSheet").hidden = true; return; }
  const its = outfitItems(o);
  const targetDefault = BUCKET_RANGES[bucketKey];
  if (!targetDefault || !its.length) { toast("Formality saved"); $("#logSheet").hidden = true; openLook(outfitId); return; }

  let target = targetDefault; // single level 1-6

  const renderSheet = () => {
    const chips = OCCASION_LADDER.map((lbl, idx) => {
      const lvl = idx + 1, on = lvl === target;
      return `<button class="sheet-chip${on ? " on" : ""}" data-nudgelvl="${lvl}" style="text-align:left">${lvl}. ${esc(lbl)}</button>`;
    }).join("");

    const pieceRows = its.map(it => {
      const f = itemFormality(it);
      return `<label style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)">
        <input type="checkbox" data-nudge="${esc(it.id)}" ${f !== target ? "checked" : ""} style="width:18px;height:18px;flex-shrink:0;accent-color:var(--accent)">
        <span style="flex:1;min-width:0">
          <span style="display:block;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(it.name || "Untitled")}</span>
          <span style="display:block;font-size:12px;color:var(--muted)">${esc(pieceFormalityLabel(it))}</span>
        </span>
      </label>`;
    }).join("");

    $("#logInner").innerHTML = `
      <div class="sheet-hdr">
        <button class="lnk" id="nudgeSkip">Skip</button>
        <h2>Nudge pieces?</h2>
        <button class="lnk" id="nudgeApply" style="font-weight:700">Apply</button>
      </div>
      <div style="padding:14px 18px 30px">
        <div class="muted" style="font-size:13px;margin-bottom:10px">Tap target formality, then apply to checked pieces.</div>
        <div class="sheet-chips" style="flex-direction:column;align-items:stretch;gap:6px;margin-bottom:14px">${chips}</div>
        <div style="font-size:13px;margin-bottom:12px">Target: <b>${esc(occLabel(target))}</b></div>
        <div>${pieceRows}</div>
      </div>`;

    $("#nudgeSkip").onclick = () => { toast("Formality saved"); $("#logSheet").hidden = true; openLook(outfitId); };

    $("#logInner").querySelectorAll("[data-nudgelvl]").forEach(btn => {
      btn.addEventListener("click", () => { target = +btn.dataset.nudgelvl; renderSheet(); });
    });

    $("#nudgeApply").onclick = async () => {
      const toNudge = [...$("#logInner").querySelectorAll("[data-nudge]:checked")].map(x => x.dataset.nudge);
      if (!toNudge.length) { toast("Formality saved"); $("#logSheet").hidden = true; openLook(outfitId); return; }
      try {
        const idList = toNudge.map(iid => `"${iid}"`).join(",");
        await rest(`/items?id=in.(${idList})`, {
          method: "PATCH",
          headers: { "Content-Type": "application/json", Prefer: "return=minimal" },
          body: JSON.stringify({ formality: target }),
        });
        toNudge.forEach(iid => {
          const it = itemById.get(iid) || items.find(x => x.id === iid);
          if (it) { it.formality = target; }
        });
        outfits.forEach(o => { o._bucket = null; });
        toast(`Formality saved · ${toNudge.length} piece${toNudge.length === 1 ? "" : "s"} updated`);
      } catch (e) { toast(e.message); }
      $("#logSheet").hidden = true;
      openLook(outfitId);
    };
  };

  renderSheet();
}

// ---- correct a piece's formality (edits items.formality — a single 1-6 level) ----
// Called from a look's PIECE FORMALITY list.
// Clears every outfit's cached bucket so looks re-derive after a change.
function openOccasionEdit(itemId, onSaved) {
  const it = itemById.get(itemId) || items.find(x => x.id === itemId);
  if (!it) return;
  let lvl = it.formality || null;

  const render = () => {
    const chips = OCCASION_LADDER.map((lbl, idx) => {
      const n = idx + 1, on = lvl === n;
      return `<button class="sheet-chip${on ? " on" : ""}" data-occ="${n}" style="text-align:left">${n}. ${esc(lbl)}</button>`;
    }).join("");
    $("#logInner").innerHTML = `
      <div class="sheet-hdr">
        <button class="lnk" id="occCancel">Cancel</button>
        <h2>How formal?</h2>
        <button class="lnk" id="occSave" style="font-weight:700">Save</button>
      </div>
      <div style="padding:14px 18px 24px">
        <div class="muted" style="font-size:13px;margin-bottom:12px">${esc(it.name || "Item")} — tap its formality level.</div>
        <div class="sheet-chips" style="flex-direction:column;align-items:stretch;gap:8px">${chips}</div>
        <div style="margin-top:14px;font-size:14px">Level: <b>${esc(lvl ? occLabel(lvl) : "Not set")}</b></div>
        ${lvl != null ? `<button class="lnk" id="occClear" style="color:var(--danger);font-size:14px;margin-top:10px">Clear</button>` : ""}
      </div>`;
    $("#occCancel").onclick = () => { $("#logSheet").hidden = true; };
    $("#occSave").onclick = async () => {
      const prev = it.formality;
      it.formality = lvl;
      outfits.forEach(o => { o._bucket = null; });
      $("#logSheet").hidden = true;
      try {
        await rest(`/items?id=eq.${it.id}`, {
          method: "PATCH",
          headers: { "Content-Type": "application/json", Prefer: "return=minimal" },
          body: JSON.stringify({ formality: lvl }),
        });
        toast("Formality updated");
        if (onSaved) onSaved();
      } catch (e) {
        it.formality = prev;
        outfits.forEach(o => { o._bucket = null; });
        toast(e.message);
      }
    };
    const oc = $("#occClear");
    if (oc) oc.onclick = () => { lvl = null; render(); };
    $("#logInner").querySelectorAll("[data-occ]").forEach(b => {
      b.onclick = () => { const n = +b.dataset.occ; lvl = (lvl === n) ? null : n; render(); };
    });
  };
  render();
  $("#logSheet").hidden = false;
}

/* ===================================================================
   GRID BAR  (density picker + select mode + bulk actions)
   =================================================================== */
function updateGridBar() {
  const n = selectedIds.size;
  const has = selectMode && n > 0;
  $("#gridBar").classList.toggle("selecting", selectMode);
  ["#gbMove", "#gbEdit", "#gbDelete", "#gbCapsule"].forEach(id => $(id).classList.toggle("active", has));
  $("#gbCount").textContent = n ? `${n} selected` : "";
  $("#gbSelect").textContent = selectMode ? "Done" : "Select";
}

function toggleSelectMode() {
  selectMode = !selectMode;
  if (!selectMode) { selectedIds.clear(); }
  renderCloset();
}

function exitSelectMode() {
  if (!selectMode) return;
  selectMode = false;
  selectedIds.clear();
}

function toggleSelect(id) {
  if (selectedIds.has(id)) selectedIds.delete(id); else selectedIds.add(id);
  // update just the affected tile + bar without full re-render
  const tile = $(`[data-item="${id}"]`);
  if (tile) {
    const sel = selectedIds.has(id);
    tile.classList.toggle("selected", sel);
    const dot = tile.querySelector(".sel-dot");
    if (dot) dot.classList.toggle("on", sel);
  }
  updateGridBar();
}

// ---- grid density picker ----
function openGridPicker() {
  const pop = $("#gridPickerPop");
  pop.hidden = !pop.hidden;
  if (!pop.hidden) {
    pop.querySelectorAll("[data-cols]").forEach(b => b.classList.toggle("on", +b.dataset.cols === gridCols));
  }
}

function setGridCols(n) {
  gridCols = n;
  store.setItem("wardrobe.gridCols", String(n));
  $("#gridPickerPop").hidden = true;
  // update all grids on screen without full re-render
  $$(".grid").forEach(g => g.style.setProperty("--grid-cols", n));
}

// ---- delete selected ----
async function deleteSelected() {
  if (!selectedIds.size) return;
  const n = selectedIds.size;
  if (!confirm(`Delete ${n} item${n === 1 ? "" : "s"}? This cannot be undone.`)) return;
  const ids = [...selectedIds];
  const inList = `(${ids.map(id => `"${id}"`).join(",")})`;
  try {
    await rest(`/items?id=in.${inList}`, { method: "DELETE" });
    items = items.filter(i => !ids.includes(i.id));
    exitSelectMode();
    renderCloset();
    toast(`${n} item${n === 1 ? "" : "s"} deleted`);
  } catch (e) { toast(e.message); }
}

// ---- bulk edit sheet ----
const BULK_FIELDS = [
  { key: "color_family", label: "Color",  type: "single", opts: COLOR_FAMILIES.map(c => c[0]) },
  { key: "fabric",       label: "Fabric", type: "multi",  opts: ["Cotton","Linen","Wool","Cashmere","Silk","Denim","Polyester","Spandex","Nylon","Fleece","Leather","Velvet"] },
  { key: "size",         label: "Size",   type: "single", opts: ["XXS","XS","S","M","L","XL","XXL","0","2","4","6","8","10","12","14","One size"] },
  { key: "season",       label: "Season", type: "multi",  opts: SEASONS },
  { key: "brand",        label: "Brand",  type: "text" },
  { key: "status",       label: "Status", type: "single", opts: ["Available","Storage","Archive"] },
];

function openBulkEdit() {
  if (!selectedIds.size) return;
  bulkPending = {};
  bulkOpenField = null;
  renderBulkSheet();
  $("#bulkSheet").hidden = false;
}

function closeBulkEdit() {
  $("#bulkSheet").hidden = true;
  bulkPending = {};
  bulkOpenField = null;
}

function renderBulkSheet() {
  const rows = BULK_FIELDS.map(f => {
    const isOpen = bulkOpenField === f.key;
    const val = bulkPending[f.key];
    const hasVal = val !== undefined && (Array.isArray(val) ? val.length > 0 : val !== "");
    const valHtml = hasVal
      ? `<span style="color:var(--accent);max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${Array.isArray(val) ? val.join(", ") : esc(val)}</span>`
      : "";
    let expansion = "";
    if (isOpen) {
      if (f.type === "single" || f.type === "multi") {
        const chips = f.opts.map(o => {
          const on = Array.isArray(val) ? val.includes(o) : val === o;
          return `<button class="sheet-chip${on ? " on" : ""}" data-bc-field="${f.key}" data-bc-val="${esc(o)}" data-bc-multi="${f.type === "multi"}">${esc(o)}</button>`;
        }).join("");
        expansion = `<div class="sheet-expand"><div class="sheet-chips">${chips}</div></div>`;
      } else {
        expansion = `<div class="sheet-expand"><input class="inp" id="bulkTextInp" value="${esc(val || "")}" placeholder="${esc(f.label)}…" style="width:100%"></div>`;
      }
    }
    return `<button class="sheet-row" data-bf="${f.key}">
      <span>${esc(f.label)}</span>
      <span class="rt">${valHtml}<svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:currentColor;stroke-width:2;fill:none;flex-shrink:0"><path d="M${isOpen ? "6 15l6-6 6 6" : "6 9l6 6 6-6"}"/></svg></span>
    </button>${expansion}`;
  }).join("");
  const n = selectedIds.size;
  $("#bulkInner").innerHTML = `
    <div class="sheet-hdr">
      <button class="lnk" id="bulkCancel">Cancel</button>
      <h2>Bulk Edit</h2>
      <button class="lnk" id="bulkSave" style="font-weight:700">Save</button>
    </div>
    ${rows}
    <div class="sheet-note">Changes apply to ${n} selected item${n === 1 ? "" : "s"}.</div>`;
  $("#bulkCancel").onclick = closeBulkEdit;
  $("#bulkSave").onclick = saveBulkEdit;
  // field row toggle
  $("#bulkInner").querySelectorAll("[data-bf]").forEach(btn => {
    btn.onclick = () => {
      saveBulkTextField();
      bulkOpenField = bulkOpenField === btn.dataset.bf ? null : btn.dataset.bf;
      renderBulkSheet();
    };
  });
  // chip toggles
  $("#bulkInner").querySelectorAll("[data-bc-field]").forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      const field = btn.dataset.bcField, val = btn.dataset.bcVal, isMulti = btn.dataset.bcMulti === "true";
      if (isMulti) {
        const cur = bulkPending[field] || [];
        bulkPending[field] = cur.includes(val) ? cur.filter(x => x !== val) : [...cur, val];
      } else {
        bulkPending[field] = bulkPending[field] === val ? undefined : val;
        if (bulkPending[field] === undefined) delete bulkPending[field];
      }
      renderBulkSheet();
    };
  });
  // text input live save
  const ti = $("#bulkTextInp");
  if (ti) { ti.oninput = () => { bulkPending[bulkOpenField] = ti.value; }; ti.focus(); }
}

function saveBulkTextField() {
  const ti = $("#bulkTextInp");
  if (ti && bulkOpenField) bulkPending[bulkOpenField] = ti.value;
}

async function saveBulkEdit() {
  saveBulkTextField();
  const patch = {};
  for (const [k, v] of Object.entries(bulkPending)) {
    if (v !== undefined && v !== "") patch[k] = v;
  }
  if (!Object.keys(patch).length) { closeBulkEdit(); return; }
  const ids = [...selectedIds];
  const inList = `(${ids.map(id => `"${id}"`).join(",")})`;
  try {
    await rest(`/items?id=in.${inList}`, { method: "PATCH", body: JSON.stringify(patch) });
    // update local state
    items.forEach(i => { if (ids.includes(i.id)) Object.assign(i, patch); });
    closeBulkEdit();
    exitSelectMode();
    renderCloset();
    toast(`Updated ${ids.length} item${ids.length === 1 ? "" : "s"}`);
  } catch (e) { toast(e.message); }
}

function openMoveSheet() {

}

}

function renderMoveSheet() {

async function applyMove(cat, sub) {
  const ids = [...selectedIds];
  const inList = `(${ids.map(id => `"${id}"`).join(",")})`;
  const patch = { category: cat, subcategory: sub };
  const isSingleItem = _moveItemId != null;
  try {
    await rest(`/items?id=in.${inList}`, { method: "PATCH", body: JSON.stringify(patch) });
    items.forEach(i => { if (ids.includes(i.id)) Object.assign(i, patch); });
    const reviewMode = _reviewMoveMode;
    closeMoveSheet();
    if (reviewMode) {
      exitSelectMode();
      reviewAfterEdit();
    } else if (isSingleItem) {
      const sid = _moveItemId;
      _moveItemId = null;
      exitSelectMode();
      openItem(sid);
    } else {
      exitSelectMode();
      renderCloset();

    toast(`Moved ${ids.length} item${ids.length === 1 ? "" : "s"} to ${cat} › ${sub}`);

/* ===================================================================
   CALENDAR
   =================================================================== */
let calendarYear  = new Date().getFullYear();
let calendarMonth = new Date().getMonth(); // 0-based
let calendarDay   = null; // null = month view | "YYYY-MM-DD" = day view

const CAL_MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const CAL_DOW    = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

// Build: date-string → [wear]
function wearDayMap() {
  const m = new Map();
  for (const w of wears) {
    if (!w.worn_on) continue;
    let a = m.get(w.worn_on); if (!a) { a = []; m.set(w.worn_on, a); }
    a.push(w);
  }
  return m;
}

// For one date: [{outfitId, itemIds, wearIds}] grouped by outfit_id (null = solo per item)
function dayGroups(dateStr) {
  const byKey = new Map();
  for (const w of wears) {
    if (w.worn_on !== dateStr) continue;
    const key = w.outfit_id || `__${w.item_id}`;
    if (!byKey.has(key)) byKey.set(key, { outfitId: w.outfit_id, itemIds: [], wearIds: [] });
    const g = byKey.get(key);
    if (!g.itemIds.includes(w.item_id)) g.itemIds.push(w.item_id);
    g.wearIds.push(w.id);
  }
  return [...byKey.values()];
}

// Mini calendar-cell collage (aspect-ratio 3/4, 2-col grid)
function calCellCollageHtml(itemIds, outfit) {
  const canvas = outfit && layoutCanvasHtml(outfit, "cal-ccanvas");
  if (canvas) return canvas;
  const pieces = itemIds.map(id => itemById.get(id)).filter(Boolean).slice(0, 4);
  if (!pieces.length) return '';
  const cells = pieces.map((p, i) => {
    const span = pieces.length === 3 && i === 2 ? ' span2' : '';
    return `<div class="cal-cp${span}" data-photo="${esc(p.image_path || '')}"></div>`;
  }).join('');
  return `<div class="cal-ccoll${pieces.length === 1 ? ' solo' : ''}">${cells}</div>`;
}

// Day-view outfit collage (88×88 square, 2-col grid)
function calOutfitCollageHtml(itemIds, outfit) {
  const canvas = outfit && layoutCanvasHtml(outfit, "cal-outfit-canvas");
  if (canvas) return canvas;
  const pieces = itemIds.map(id => itemById.get(id)).filter(Boolean).slice(0, 4);
  if (!pieces.length) return '<div class="cal-outfit-collage" style="background:#f4f4f7"></div>';
  const cells = pieces.map(p =>
    `<div class="cal-outfit-piece" data-photo="${esc(p.image_path || '')}"></div>`).join('');
  return `<div class="cal-outfit-collage${pieces.length === 1 ? ' solo' : ''}">${cells}</div>`;
}

// Most-worn item in current calendar month
function calMostWorn() {
  const prefix = `${calendarYear}-${String(calendarMonth + 1).padStart(2, '0')}`;
  const counts = new Map();
  for (const w of wears) {
    if (!w.worn_on || !w.worn_on.startsWith(prefix)) continue;
    counts.set(w.item_id, (counts.get(w.item_id) || 0) + 1);
  }
  if (!counts.size) return null;
  const [topId, topCount] = [...counts.entries()].sort((a, b) => b[1] - a[1])[0];
  return { item: itemById.get(topId), count: topCount };
}

// Consecutive-day wear streak ending today
function calStreak() {
  const worn = new Set(wears.map(w => w.worn_on));
  const d = new Date(); let streak = 0;
  while (worn.has(d.toISOString().slice(0, 10))) { streak++; d.setDate(d.getDate() - 1); }
  return streak;
}

function renderCalendar() {
  const body = $('#calendarBody');
  if (calendarDay) renderCalendarDay(body);
  else renderCalendarMonth(body);
}

function renderCalendarMonth(body) {
  const todayStr    = new Date().toISOString().slice(0, 10);
  const year        = calendarYear, month = calendarMonth;
  const firstDoW    = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const dayMap      = wearDayMap();

  // Build grid cells
  let cells = '';
  for (let i = 0; i < firstDoW; i++) cells += `<div class="cal-cell other-month"></div>`;
  for (let d = 1; d <= daysInMonth; d++) {
    const ds       = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayWears = dayMap.get(ds) || [];
    const isToday  = ds === todayStr;
    let collage = '';
    if (dayWears.length) {
      const firstOutfitId = dayWears.find(w => w.outfit_id)?.outfit_id;
      const itemIds = firstOutfitId
        ? (outfitItemMap.get(firstOutfitId) || [])
        : [...new Set(dayWears.map(w => w.item_id))];
      collage = calCellCollageHtml(itemIds.slice(0, 4), firstOutfitId ? outfitById.get(firstOutfitId) : null);
    }
    cells += `<div class="cal-cell${isToday ? ' today-cell' : ''}">
      <button class="cal-cell-btn" data-calday="${esc(ds)}">
        <div class="cal-daynum${isToday ? ' is-today' : ''}">${d}</div>
        ${collage}
      </button>
    </div>`;
  }
  const trailing = (7 - ((firstDoW + daysInMonth) % 7)) % 7;
  for (let i = 0; i < trailing; i++) cells += `<div class="cal-cell other-month"></div>`;

  // Stats
  const mw     = calMostWorn();
  const streak = calStreak();
  const mwHtml = mw?.item ? `
    <div class="cal-stat">
      <div class="cal-stat-img"${mw.item.image_path ? ` data-photo="${esc(mw.item.image_path)}"` : ''}></div>
      <div>
        <div class="cal-stat-lbl">Most Worn This Month</div>
        <div class="cal-stat-sub">${mw.count} day${mw.count !== 1 ? 's' : ''}</div>
      </div>
    </div>` : '';
  const streakHtml = `
    <div class="cal-stat">
      <div class="cal-stat-ico"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div>
      <div>
        <div class="cal-stat-lbl">${streak} Day Streak</div>
        <div class="cal-stat-sub">Continuous calendar recording</div>
      </div>
      ${streak ? `<div class="cal-stat-chev"><svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg></div>` : ''}
    </div>`;

  body.innerHTML = `<div class="tabbody">
    <div class="cal-nav">
      <button class="cal-nav-btn" id="calPrev"><svg viewBox="0 0 24 24"><path d="M15 6l-6 6 6 6"/></svg></button>
      <div class="cal-month-lbl"><strong>${CAL_MONTHS[month]}</strong> <em>${year}</em></div>
      <button class="cal-nav-btn" id="calNext"><svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg></button>
    </div>
    <div class="cal-dow">${CAL_DOW.map(h => `<div class="cal-dow-h">${h}</div>`).join('')}</div>
    <div class="cal-grid">${cells}</div>
    <div class="cal-stats">${mwHtml}${streakHtml}</div>
  </div>`;

  body.onclick = e => {
    if (e.target.closest('#calPrev')) {
      calendarMonth--; if (calendarMonth < 0) { calendarMonth = 11; calendarYear--; }
      renderCalendarMonth(body); return;
    }
    if (e.target.closest('#calNext')) {
      calendarMonth++; if (calendarMonth > 11) { calendarMonth = 0; calendarYear++; }
      renderCalendarMonth(body); return;
    }
    const btn = e.target.closest('[data-calday]');
    if (btn) { calendarDay = btn.dataset.calday; renderCalendarDay(body); }
  };

  hydratePhotos(body);
}

function renderCalendarDay(body) {
  const dateStr = calendarDay;
  const [y, m, d] = dateStr.split('-').map(Number);
  const title   = `${CAL_MONTHS[m - 1]} ${d}, ${y}`;
  const groups  = dayGroups(dateStr);

  const cardsHtml = groups.length ? groups.map(g => {
    const outfit  = g.outfitId ? outfitById.get(g.outfitId) : null;
    const collage = calOutfitCollageHtml(g.itemIds, outfit);
    const notes   = outfit?.notes || '';
    const wearIdsStr = g.wearIds.join(',');
    return `<div class="cal-outfit-card">
      <div class="cal-outfit-inner">
        ${collage}
        <button class="cal-outfit-notes-btn${notes ? ' has-notes' : ''}" data-cal-notes="${esc(g.outfitId || '')}">
          <span>${esc(notes || 'Tap to add notes')}</span>
          <svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg>
        </button>
      </div>
      <div class="cal-swipe-acts">
        <button class="cal-act cal-act-copy" data-calact="copy">
          <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          Copy
        </button>
        <button class="cal-act cal-act-move" data-calact="move">
          <svg viewBox="0 0 24 24"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>

        <button class="cal-act cal-act-del" data-wear-ids="${esc(wearIdsStr)}">
          <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
          Delete
        </button>
      </div>
    </div>`;
  }).join('')
  : `<div class="cal-day-empty">Nothing logged for this day.</div>`;

  const prevD    = new Date(y, m - 1, d - 1).toISOString().slice(0, 10);
  const nextD    = new Date(y, m - 1, d + 1).toISOString().slice(0, 10);
  const isFuture = new Date(y, m - 1, d + 1) > new Date();

  body.innerHTML = `<div class="tabbody">
    <div class="cal-day-header">
      <button id="calDayBack" style="color:var(--accent);font-size:15px;font-weight:500">Back</button>
      <div style="font-size:16px;font-weight:600">Day View</div>
      <button id="calDayEdit" style="color:var(--accent);font-size:15px;font-weight:500;opacity:.4">Edit</button>
    </div>
    <div class="cal-day-nav">
      <button class="cal-day-nav-btn" id="calDayPrev"><svg viewBox="0 0 24 24"><path d="M15 6l-6 6 6 6"/></svg></button>
      <div class="cal-day-title">${esc(title)}</div>
      <button class="cal-day-nav-btn" id="calDayNext"${isFuture ? ' disabled style="opacity:.4"' : ''}><svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg></button>
    </div>
    ${cardsHtml}
    <div class="cal-day-foot">
      <div class="cal-day-foot-ico"><svg viewBox="0 0 24 24"><path d="M16 4l-4 9-4-9"/><path d="M12 13l-9 7h18l-9-7z"/></svg></div>
      <div class="cal-day-foot-add">
        <span>add more items:</span>
        <button id="calAddClothing">+ Clothing</button>
        <button id="calAddLook">+ Look</button>
      </div>
    </div>
  </div>`;

  body.onclick = null;  // clear any stale picker/month delegation
  $('#calDayBack').onclick = () => { calendarDay = null; renderCalendarMonth(body); };
  $('#calDayPrev').onclick = () => { calendarDay = prevD; renderCalendarDay(body); };
  if (!isFuture) $('#calDayNext').onclick = () => { calendarDay = nextD; renderCalendarDay(body); };
  $('#calAddClothing').onclick = () => openCalAddClothing();
  $('#calAddLook').onclick     = () => openCalAddLook();

  body.querySelectorAll('.cal-outfit-card').forEach(wireCalSwipe);

  body.querySelectorAll('.cal-act-del').forEach(btn => {
    btn.onclick = async () => {
      const ids = btn.dataset.wearIds.split(',').filter(Boolean);
      if (!ids.length) return;
      if (!confirm(`Remove ${ids.length} wear record${ids.length !== 1 ? 's' : ''}?`)) return;
      try {
        await rest(`wears?id=in.(${ids.map(id => `"${id}"`).join(',')})`, { method: 'DELETE' });
        wears = wears.filter(w => !ids.includes(w.id));
        buildOutfitWearMap();
        renderCalendarDay(body);
        toast('Removed');
      } catch (e) { toast(e.message); }
    };
  });

  body.querySelectorAll('[data-calact]').forEach(btn => {
    btn.onclick = () => toast('Coming soon');
  });

  body.querySelectorAll('[data-cal-notes]').forEach(el => {
    el.onclick = () => {
      const outfitId = el.dataset.calNotes;
      if (!outfitId) { toast('Notes are only available for saved looks'); return; }
      openCalNotes(outfitId, () => renderCalendarDay(body));
    };
  });

  hydratePhotos(body);
}

function wireCalSwipe(card) {
  const inner = card.querySelector('.cal-outfit-inner');
  const acts  = card.querySelector('.cal-swipe-acts');
  const W = 210;
  let startX = 0, opened = false, tracking = false;

  card.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    tracking = true;
    inner.style.transition = 'none';
    acts.style.transition   = 'none';
  }, { passive: true });

  card.addEventListener('touchmove', e => {
    if (!tracking) return;
    const dx  = e.touches[0].clientX - startX;
    const off = Math.max(-W, Math.min(0, (opened ? -W : 0) + dx));
    inner.style.transform = `translateX(${off}px)`;
    acts.style.transform  = `translateX(${100 + (off / W * 100)}%)`;
  }, { passive: true });

  card.addEventListener('touchend', e => {
    if (!tracking) return;
    tracking = false;
    const dx = e.changedTouches[0].clientX - startX;
    inner.style.transition = 'transform .25s ease';
    acts.style.transition   = 'transform .25s ease';
    opened = opened ? dx < 30 : dx < -50;
    inner.style.transform = opened ? `translateX(-${W}px)` : 'translateX(0)';
    acts.style.transform  = opened ? 'translateX(0)' : 'translateX(100%)';
  }, { passive: true });
}

function statsPool() {
  const { status, category, season, formality } = statsFilters;
  const acqCutoff = acqRangeStart();
  return items.filter(i => {
    if (status.length) {
      if (!status.includes(i.status)) return false;
    } else {
      if (i.status === "Archive") return false;
    }
    if (category.length && !category.includes(i.category)) return false;
    if (season.length && !(i.season || []).some(s => season.includes(s))) return false;
    if (formality.length) {
      const iLvl = itemFormality(i);
      if (!formality.some(f => (OCCASION_LADDER.indexOf(f) + 1) === iLvl)) return false;
    }
    if (acqCutoff) {
      const pd = i.purchase_date;
      if (acqCutoff.older) { if (!pd || pd >= acqCutoff.cutoff) return false; }
      else                 { if (!pd || pd < acqCutoff.cutoff)  return false; }
    }
    return true;
  });
}

function rangeStart() {
  if (statsDateRange === "all") return null;
  const d = new Date();
  if (statsDateRange === "7d")  d.setDate(d.getDate() - 7);
  else if (statsDateRange === "14d") d.setDate(d.getDate() - 14);
  else if (statsDateRange === "30d") d.setDate(d.getDate() - 30);
  else if (statsDateRange === "90d") d.setDate(d.getDate() - 90);
  else if (statsDateRange === "6mo") d.setMonth(d.getMonth() - 6);
  else if (statsDateRange === "1yr") d.setFullYear(d.getFullYear() - 1);
  return d.toISOString().slice(0, 10);
}

function wearCountInRange(itemId) {
  const cutoff = rangeStart();
  if (!cutoff) return wearCount(itemId);
  return wears.filter(w => w.item_id === itemId && w.worn_on >= cutoff).length;
}

function acqRangeStart() {
  if (statsAcqRange === "all") return null;
  const older = statsAcqRange.startsWith("o");
  const period = statsAcqRange.slice(1); // "1yr","2yr","3yr","5yr"
  const d = new Date();
  if (period === "1yr") d.setFullYear(d.getFullYear() - 1);
  else if (period === "2yr") d.setFullYear(d.getFullYear() - 2);
  else if (period === "3yr") d.setFullYear(d.getFullYear() - 3);
  else if (period === "5yr") d.setFullYear(d.getFullYear() - 5);
  return { cutoff: d.toISOString().slice(0, 10), older };
}

function statsActiveFilterCount() {
  const { status, category, season, formality } = statsFilters;
  let n = (status.length ? 1 : 0) + (category.length ? 1 : 0) +
          (season.length ? 1 : 0) + (formality.length ? 1 : 0);
  if (statsAcqRange !== "all") n++;
  return n;
}

function statsRebuild() {
  if (statsView === "grid") {
    if (statsListKey) {
      const result = buildSmartList(statsListKey);
      if (result) { statsGridItems = result.list; statsGridTitle = result.title; statsSubtitleFn = result.subtitleFn || null; }
    } else if (statsFromField) {
      statsView = "field"; statsGridItems = []; statsGridTitle = "";
    } else {
      statsView = "main"; statsField = null; statsGridItems = []; statsGridTitle = ""; statsFromField = false;
    }
  }
  renderStats();
}

function dateRangeHuman() {
  const map = { "7d": "7 days", "14d": "14 days", "30d": "30 days", "90d": "90 days", "6mo": "6 months", "1yr": "1 year" };
  return map[statsDateRange] || statsDateRange;
}

function buildSmartList(key) {
  const av = statsPool();
  const wornSub = item => { const n = wearCountInRange(item.id); return n === 0 ? "0 wears" : `${n} wear${n === 1 ? "" : "s"}`; };
  if (key === "never-worn") {
    const title = statsDateRange === "all" ? "Not Logged on Calendar" : `Not Logged · past ${dateRangeHuman()}`;
    return { list: av.filter(i => wearCountInRange(i.id) === 0), title };
  }
  if (key === "most-worn")
    return { list: [...av].sort((a, b) => wearCountInRange(b.id) - wearCountInRange(a.id)).slice(0, 100),
      title: "Worn History", subtitleFn: wornSub };
  if (key === "least-worn")
    return { list: [...av].sort((a, b) => wearCountInRange(a.id) - wearCountInRange(b.id)).slice(0, 100),
      title: "Worn History", subtitleFn: wornSub };
  if (key === "best-cpw" || key === "worst-cpw") {
    // range-aware CPW: price / wears within the active range
    const cpwR = item => { const n = wearCountInRange(item.id); return n ? parseFloat(item.price) / n : null; };
    const cpwSub = item => { const c = cpwR(item); return c != null ? money(c) : ""; };
    const withWears = av.filter(i => i.price && wearCountInRange(i.id) > 0);
    const sorted = key === "best-cpw"
      ? withWears.sort((a, b) => (cpwR(a) || Infinity) - (cpwR(b) || Infinity))
      : withWears.sort((a, b) => (cpwR(b) || 0) - (cpwR(a) || 0));
    return { list: sorted.slice(0, 100), title: "Cost per Wear", subtitleFn: cpwSub };
  }
  if (key === "most-expensive" || key === "least-expensive") {
    const priceSub = item => { const p = parseFloat(item.price); return isNaN(p) ? "" : money(p); };
    const withPrice = av.filter(i => i.price != null && !isNaN(parseFloat(i.price)));
    const sorted = key === "most-expensive"
      ? withPrice.sort((a, b) => parseFloat(b.price) - parseFloat(a.price))
      : withPrice.sort((a, b) => parseFloat(a.price) - parseFloat(b.price));
    return { list: sorted.slice(0, 100), title: "Purchase Price", subtitleFn: priceSub };
  }
  if (key === "best-potential") {
    const cpwFmt = n => n >= 10 ? "$" + Math.round(n) : money(n);
    return {
      list: av.filter(i => i.price && wearCount(i.id) > 0)
        .sort((a, b) => {
          const na = wearCount(a.id), nb = wearCount(b.id);
          return (b.price / (nb * (nb + 1))) - (a.price / (na * (na + 1)));
        }).slice(0, 100),
      title: "Best Potential Improvement",
      subtitleFn: item => {
        const n = wearCount(item.id);
        if (!item.price || !n) return "";
        return cpwFmt(item.price / n) + " → " + cpwFmt(item.price / (n + 1)) + "/wear";
      },
    };
  }
  if (key === "recent") {
    const acqSub = item => {
      if (!item.purchase_date) return "";
      const d = new Date(item.purchase_date + "T00:00:00");
      return d.toLocaleDateString(undefined, { month: "short", year: "numeric" });
    };
    // most recently acquired by purchase_date (no hard window — always shows items)
    return { list: av.filter(i => i.purchase_date)
      .sort((a, b) => b.purchase_date.localeCompare(a.purchase_date)).slice(0, 100),
      title: "Recently Acquired", subtitleFn: acqSub };
  }
  return null;
}

function getFieldGroups(field) {
  const avail = statsPool();
  const noValue = [];
  const groups = {};
  const add = (label, item) => { if (!groups[label]) groups[label] = []; groups[label].push(item); };
  for (const item of avail) {
    if (field === "color_family") {
      if (!item.color_family) { noValue.push(item); continue; }
      add(item.color_family, item);
    } else if (field === "category") {
      if (!item.category) { noValue.push(item); continue; }
      add(item.category, item);
    } else if (field === "brand") {
      if (!item.brand || !item.brand.trim()) { noValue.push(item); continue; }
      add(item.brand.trim(), item);
    } else if (field === "price") {
      const p = parseFloat(item.price);
      if (!item.price || isNaN(p)) { noValue.push(item); continue; }
      const b = PRICE_BRACKETS.find(b => p >= b.min && p < b.max);
      if (b) add(b.label, item);
    } else if (field === "size") {
      if (!item.size) { noValue.push(item); continue; }
      add(item.size, item);
    } else if (field === "season") {
      if (!item.season || !item.season.length) { noValue.push(item); continue; }
      for (const s of item.season) add(s, item);
    } else if (field === "fabric") {
      if (!item.fabric || !item.fabric.length) { noValue.push(item); continue; }
      for (const f of item.fabric) add(f, item);
    } else if (field === "retailer") {
      if (!item.retailer || !item.retailer.trim()) { noValue.push(item); continue; }
      add(item.retailer.trim(), item);
    } else if (field === "acquisition") {
      if (!item.acquisition) { noValue.push(item); continue; }
      add(item.acquisition, item);
    }
  }
  let sorted;
  if (field === "price") sorted = PRICE_BRACKETS.map(b => ({ label: b.label, items: groups[b.label] || [] }));
  else if (field === "season") sorted = SEASONS.map(s => ({ label: s, items: groups[s] || [] })).filter(g => g.items.length);
  else if (field === "category") sorted = CATEGORIES.map(c => ({ label: c, items: groups[c] || [] })).filter(g => g.items.length);
  else sorted = Object.entries(groups).map(([label, items]) => ({ label, items })).sort((a, b) => b.items.length - a.items.length);
  return { noValue, groups: sorted };
}

function segmentColor(field, label, idx) {
  return field === "color_family" ? colorHex(label) : DONUT_PALETTE[idx % DONUT_PALETTE.length];
}

function donutSvgHighlight(segments, activeIdx) {
  const total = segments.reduce((s, x) => s + x.count, 0);
  if (!total) return "";
  const cx = 80, cy = 80, R = 72, r = 46, gap = total > 1 ? 0.012 : 0;
  let paths = "", angle = -Math.PI / 2;
  for (let i = 0; i < segments.length; i++) {
    const seg = segments[i];
    if (!seg.count) continue;
    const sweep = (seg.count / total) * Math.PI * 2 - gap;
    if (sweep <= 0) continue;
    const a2 = angle + sweep;
    const x1 = cx + R * Math.cos(angle), y1 = cy + R * Math.sin(angle);
    const x2 = cx + R * Math.cos(a2),    y2 = cy + R * Math.sin(a2);
    const x3 = cx + r * Math.cos(a2),    y3 = cy + r * Math.sin(a2);
    const x4 = cx + r * Math.cos(angle), y4 = cy + r * Math.sin(angle);
    const lg = sweep > Math.PI ? 1 : 0;
    const op = segments.length <= 1 ? 1 : (i === activeIdx ? 1 : 0.22);
    paths += `<path class="dseg" d="M${x1.toFixed(1)} ${y1.toFixed(1)} A${R} ${R} 0 ${lg} 1 ${x2.toFixed(1)} ${y2.toFixed(1)} L${x3.toFixed(1)} ${y3.toFixed(1)} A${r} ${r} 0 ${lg} 0 ${x4.toFixed(1)} ${y4.toFixed(1)}Z" fill="${seg.color}" style="opacity:${op};transition:opacity .15s"/>`;
    angle = a2 + gap;
  }
  return `<svg width="160" height="160" viewBox="0 0 160 160" style="display:block;flex-shrink:0">${paths}</svg>`;
}

function wireDonutArrows(segments, total) {
  const upBtn = document.getElementById("donutUp");
  const dnBtn = document.getElementById("donutDn");
  if (!upBtn || !segments.length) return;
  const update = () => {
    document.querySelectorAll(".dseg").forEach((p, i) => {
      p.style.opacity = segments.length <= 1 ? 1 : (i === statsDonutIdx ? 1 : 0.22);
    });
    const seg = segments[statsDonutIdx];
    const lbl = document.getElementById("donutLbl");
    if (lbl && seg) lbl.innerHTML = `<div style="font-size:20px;font-weight:700;line-height:1.2">${esc(seg.label)}</div>
      <div class="muted" style="font-size:15px;margin-top:4px">${total ? ((seg.count/total)*100).toFixed(1) : 0}%</div>`;
    // highlight matching list row
    document.querySelectorAll("#statsBody [data-sv]:not([data-sf])").forEach(btn => {
      const active = seg && btn.dataset.sv === seg.label;
      btn.classList.toggle("donut-hi", active);
      if (active) btn.scrollIntoView({ behavior: "smooth", block: "nearest" });
    });
  };
  upBtn.addEventListener("click", () => { statsDonutIdx = (statsDonutIdx - 1 + segments.length) % segments.length; update(); });
  dnBtn.addEventListener("click", () => { statsDonutIdx = (statsDonutIdx + 1) % segments.length; update(); });
}

function renderStatsFieldPage() {
  const label = STATS_FIELD_LABELS[statsField] || statsField;
  const { noValue, groups: rawGroups } = getFieldGroups(statsField);

  // Assign stable colors based on count-sorted order, then optionally sort list by name
  const groupsWithColor = rawGroups.map((g, i) => ({ ...g, color: segmentColor(statsField, g.label, i) }));
  const CANONICAL_FIELDS = ["price", "season", "category"];
  const canSort = !CANONICAL_FIELDS.includes(statsField);
  const displayGroups = (canSort && statsFieldSort === "name")
    ? [...groupsWithColor].sort((a, b) => a.label.localeCompare(b.label))
    : groupsWithColor;

  // Donut always uses count order
  const segments = groupsWithColor.filter(g => g.items.length > 0)
    .map(g => ({ label: g.label, count: g.items.length, color: g.color }));
  if (statsDonutIdx >= segments.length) statsDonutIdx = 0;
  const total = segments.reduce((s, x) => s + x.count, 0);

  const donut = donutSvgHighlight(segments, statsDonutIdx);

  const arrowBtn = (id, up) =>

      ${swatch}<div class="fmeta"><div class="fname">${esc(g.label)}</div></div>

      <button class="stats-sort-btn${statsFieldSort === "name" ? " on" : ""}" data-ss="name">Sort by Name</button>

  $("#statsBody").innerHTML = `

      ${donut}

        ${arrowBtn("donutUp", true)}

      else { const g = groups.find(g => g.label === val); list = g ? g.items : []; title = val; }

function startReview(key) {
  const f = REVIEW_FIELDS.find(x => x.key === key);
  if (!f) return;
  reviewField = key;
  reviewQueue = reviewPool().filter(f.missing).map(i => i.id);
  reviewIdx = 0;
  statsView = "review-deal";
  renderStats();
}

function reviewAfterEdit() {
  // value was saved — advance to the next item
  reviewIdx++;
  if (statsView === "review-deal") renderStats();
}

function reviewSkip() { reviewIdx++; renderStats(); }

function renderReviewDeal() {
  const body = $("#statsBody");
  const f = REVIEW_FIELDS.find(x => x.key === reviewField);
  if (!f) { statsView = "review"; renderStats(); return; }
  const total = reviewQueue.length;
  const toolbar = `<div class="cltoolbar">
      <button class="clback" id="stBack"><svg viewBox="0 0 24 24"><path d="M15 6l-6 6 6 6"/></svg></button>
      <div class="cltitle">${esc(f.label)}</div><span style="width:34px"></span>
    </div>`;

  if (reviewIdx >= total) {
    body.innerHTML = toolbar + `<div class="rv-done">
      <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      <b>${esc(f.label)} — done</b><div>You reviewed all ${total} item${total === 1 ? "" : "s"}.</div>
      <button class="rv-set" id="rvBackList" style="margin-top:20px;max-width:240px">Back to review</button>
    </div>`;
    $("#stBack").addEventListener("click", statsNavBack);
    $("#rvBackList").addEventListener("click", statsNavBack);
    return;
  }

  const item = items.find(i => i.id === reviewQueue[reviewIdx]);
  if (!item) { reviewSkip(); return; }
  const cur = f.value(item);
  const curHtml = cur
    ? `Current: <b>${esc(cur)}</b>`
    : `<span class="rv-empty">Empty — not set</span>`;
  const path = item.category ? (item.subcategory ? `${item.category} › ${item.subcategory}` : item.category) : "Uncategorized";

  body.innerHTML = toolbar
    + `<div class="rv-prog">${reviewIdx + 1} of ${total}</div>
    <div class="rv-card">
      ${item.image_path
        ? `<div class="rv-photo" data-photo="${esc(item.image_path)}"></div>`
        : `<div class="rv-photo empty"><svg viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="14" rx="2"/><circle cx="12" cy="13" r="3"/></svg></div>`}
      <div class="rv-info">
        <div class="rv-name">${esc(item.name || "Untitled")}</div>
        <div class="rv-path">${esc(path)}</div>
        <div class="rv-cur">${curHtml}</div>
      </div>
    </div>
    <div class="rv-actions">
      <button class="rv-set" id="rvSet">Set ${esc(f.label)}</button>
      <button class="rv-skip" id="rvSkip">Skip</button>
      <button class="rv-edit" id="rvEdit">Edit Item</button>
    </div>`;
  $("#stBack").addEventListener("click", statsNavBack);
  $("#rvSet").addEventListener("click", () => f.edit(item));
  $("#rvSkip").addEventListener("click", reviewSkip);
  $("#rvEdit").addEventListener("click", () => openItemFromReview(item.id));
  hydratePhotos(body);
}

let _fromCapsule = null;         // item opened from a capsule (closetBack returns here)
let _pendingAddIds = null;       // items to fold into a capsule right after creation
let _capNotesTimer = null;
let _capSort = "category";       // detail grid grouping: "category" | "formality"
let _capUnpackedOnly = false;    // trip detail: show only not-yet-packed items
let _capPickCat = null;          // picker category filter (null = all)

// canonical category order for grouping (packing-friendly)
const CAP_CAT_ORDER = ["Outerwear", "Tops", "Dresses", "Bottoms", "Shoes", "Workout"];
const catRank = (c) => { const i = CAP_CAT_ORDER.indexOf(c); return i < 0 ? 99 : i; };
const sortFmlName = (a, b) => {
  const fa = itemFormality(a), fb = itemFormality(b);
  if (fa !== fb) return fa - fb;
  return (a.name || "").localeCompare(b.name || "");
};
// → [{key, items}] grouped by category in canonical order, items sorted by formality then name
function groupByCategory(list) {
  const map = new Map();
  for (const i of list) { const c = i.category || "Other"; if (!map.has(c)) map.set(c, []); map.get(c).push(i); }
  const keys = [...map.keys()].sort((a, b) => { const r = catRank(a) - catRank(b); return r !== 0 ? r : a.localeCompare(b); });
  return keys.map(k => ({ key: k, items: map.get(k).sort(sortFmlName) }));
}
// → [{key, items}] grouped by the 5 formality levels (only non-empty)
function groupByFormality(list) {
  const buckets = OCCASION_LADDER.map(lbl => ({ key: lbl, items: [] }));
  for (const i of list) { const lv = Math.max(1, Math.min(5, Math.round(itemFormality(i)))); buckets[lv - 1].items.push(i); }
  return buckets.filter(b => b.items.length)
    .map(b => ({ key: b.key, items: b.items.sort((a, b) => (a.name || "").localeCompare(b.name || "")) }));
}

const isTrip = (c) => c && c.kind !== "capsule";
const capModeLabel = (c) => isTrip(c) ? "Trip" : "Capsule";

function capValue(cid) {
  return capsuleItems(cid).reduce((s, i) => s + (Number(i.price) || 0), 0);
}
function fmtDate(d) {
  if (!d) return "";
  const dt = new Date(d + "T00:00:00");
  return dt.toLocaleDateString(undefined, { month: "short", day: "numeric" });
}
function capDateLabel(c) {
  if (!c.start_date && !c.end_date) return "";
  if (c.start_date && c.end_date) return `${fmtDate(c.start_date)} – ${fmtDate(c.end_date)}`;
  return fmtDate(c.start_date || c.end_date);
}

// small 2×2 collage thumbnail for a capsule card
function capCollageHtml(cid) {
  const paths = capsuleItems(cid).filter(i => i.image_path).slice(0, 4).map(i => i.image_path);
  if (!paths.length) return `<div class="cap-collage empty"><svg viewBox="0 0 24 24"><rect x="3" y="8" width="18" height="12" rx="2"/><path d="M9 8V5h6v3"/></svg></div>`;
  const cls = paths.length === 1 ? "cap-collage solo" : "cap-collage";
  return `<div class="${cls}">${paths.map(p => `<div class="cc-cell" data-photo="${esc(p)}"></div>`).join("")}</div>`;
}

function renderCapsules() {
  const body = $("#capsulesBody");
  if (capsuleView === "form")      body.innerHTML = renderCapsuleForm();
  else if (capsuleView === "pick") body.innerHTML = renderCapsulePicker();
  else if (capsuleView === "detail" && capsuleById.get(capsuleId)) body.innerHTML = renderCapsuleDetail();
  else { capsuleView = "list"; body.innerHTML = renderCapsuleList(); }
  hydratePhotos(body);
  wireCapsules();
  if (capsuleView === "detail") {
    const c = capsuleById.get(capsuleId);
    if (c && isTrip(c) && c.start_date && c.end_date && (c.locations || []).length) {
      loadTripWeather(c);
    }
  }
}

function capToolbar(title, showBack, right = "") {
  return `<div class="cltoolbar">
    ${showBack
      ? `<button class="clback" id="capBack"><svg viewBox="0 0 24 24"><path d="M15 6l-6 6 6 6"/></svg></button>`
      : `<span style="width:34px"></span>`}
    <div class="cltitle">${esc(title)}</div>
    ${right || `<span style="width:34px"></span>`}
  </div>`;
}

function renderCapsuleList() {
  if (!capsules.length) {
    return capToolbar("Capsules", false) + `
      <div class="cap-empty">
        <svg viewBox="0 0 24 24"><rect x="3" y="8" width="18" height="12" rx="2"/><path d="M9 8V5h6v3"/></svg>
        <b>No capsules yet</b>
        <div>Build a style capsule or a packing list for a trip — a named set of pieces you can plan outfits from.</div>
      </div>
      <button class="cap-newbtn" data-cap-new>＋ New capsule</button>`;
  }
  const cards = capsules.map(c => {
    const n = capsuleItemCount(c.id);
    const dates = capDateLabel(c);
    const bits = [`${n} item${n === 1 ? "" : "s"}`];
    if (capValue(c.id)) bits.push(money(capValue(c.id)));
    if (dates) bits.unshift(dates);
    return `<button class="cap-card" data-cap="${esc(c.id)}">
      ${capCollageHtml(c.id)}
      <div class="cap-meta">
        <div class="cap-badge${isTrip(c) ? " trip" : ""}">${capModeLabel(c)}</div>
        <div class="cap-name">${esc(c.name)}</div>
        <div class="cap-sub">${esc(bits.join(" · "))}</div>
      </div>
      <svg class="chev" viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg>
    </button>`;
  }).join("");
  return capToolbar("Capsules", false) +
    `<div class="cap-list">${cards}</div>` +
    `<button class="cap-newbtn" data-cap-new>＋ New capsule</button>`;
}
