  const selBar = p.length ? `
    <div class="bld-sel-bar">
      <button data-bview="1"><svg viewBox="0 0 24 24"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>View item</button>
      <button data-blayer="back"><svg viewBox="0 0 24 24"><path d="M4 8l8-4 8 4-8 4z"/></svg>Send back</button>
      <button data-blayer="front"><svg viewBox="0 0 24 24"><path d="M4 16l8 4 8-4M4 8l8-4 8 4-8 4z"/></svg>Bring front</button>
      <button class="danger" data-bdelete="1"><svg viewBox="0 0 24 24"><path d="M5 7h14M9 7V5h6v2M6 7l1 13h10l1-13"/></svg>Remove</button>
    </div>` : "";
  body.innerHTML = `
    <div class="bld-top">
      <button class="lnk" id="bldCancel">Cancel</button>
      <input class="bld-name" id="bldName" placeholder="${builder.outfitId ? "Edit look" : "Name (optional)"}" value="${esc(builder.name)}">
      <button class="lnk" id="bldSave" style="font-weight:700;color:var(--accent)">Save</button>
    </div>
    <div class="bld-stage">
      <div class="bCanvas" id="bCanvas">${empty}${pieceEls}</div>
      <div class="bld-actions">
        <button class="btn-ghost" id="bldAdd"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>Clothing</button>
      </div>
      ${selBar}
      <div class="bld-hint">Drag to move · drag the blue handle to resize · tap a piece to select</div>
    </div>`;
  hydratePhotos(body);
  window.scrollTo(0, 0);
  const nameInp = $("#bldName");
  if (nameInp) nameInp.oninput = () => { builder.name = nameInp.value; };
  wireBuilderCanvas();
}

// pointer-driven move + corner-handle resize (touch + mouse)
function wireBuilderCanvas() {
  const canvas = $("#bCanvas");
  if (!canvas) return;
  let drag = null;
  canvas.addEventListener("pointerdown", (e) => {
    const pieceEl = e.target.closest(".bpiece");
    if (!pieceEl) return;
    const idx = +pieceEl.dataset.bidx;
    selectPiece(idx);
    const resizing = !!e.target.closest("[data-bresize]");
    const rect = canvas.getBoundingClientRect();
    const pc = builder.pieces[idx];
    drag = { idx, el: pieceEl, mode: resizing ? "resize" : "move", rect,
      sx: e.clientX, sy: e.clientY, ox: pc.x, oy: pc.y, os: pc.s };
    pieceEl.setPointerCapture(e.pointerId);
    pieceEl.style.cursor = "grabbing";
    e.preventDefault();
  });
  canvas.addEventListener("pointermove", (e) => {
    if (!drag) return;
    const pc = builder.pieces[drag.idx];
    if (drag.mode === "move") {
      pc.x = clamp01(drag.ox + (e.clientX - drag.sx) / drag.rect.width);
      pc.y = clamp01(drag.oy + (e.clientY - drag.sy) / drag.rect.height);
      drag.el.style.left = pc.x * 100 + "%";
      drag.el.style.top = pc.y * 100 + "%";
    } else {
      const d = (e.clientX - drag.sx) / drag.rect.width;
      pc.s = Math.max(0.12, Math.min(0.92, drag.os + d * 2));
      drag.el.style.width = pc.s * 100 + "%";
    }
    e.preventDefault();
  });
  const end = () => { if (drag) { drag.el.style.cursor = "grab"; drag = null; } };
  canvas.addEventListener("pointerup", end);
  canvas.addEventListener("pointercancel", end);
}

function selectPiece(idx) {
  builder.selIdx = idx;
  $$("#bCanvas .bpiece").forEach(el => el.classList.toggle("sel", +el.dataset.bidx === idx));
}

function layerPiece(dir) {
  const i = builder.selIdx, p = builder.pieces;
  if (i < 0) return;
  if (dir === "front" && i < p.length - 1) { [p[i], p[i + 1]] = [p[i + 1], p[i]]; builder.selIdx = i + 1; }
  else if (dir === "back" && i > 0) { [p[i], p[i - 1]] = [p[i - 1], p[i]]; builder.selIdx = i - 1; }
  renderBuilderCanvas();
}

function deleteBuilderPiece() {
  const i = builder.selIdx;
  if (i < 0) return;
  builder.pieces.splice(i, 1);
  builder.selIdx = builder.pieces.length ? Math.min(i, builder.pieces.length - 1) : -1;
  renderBuilderCanvas();
}

// Base pool for the builder picker — scoped to a capsule's pieces when the
// builder was opened for trip-day planning (scopeCapsuleId set).
function builderPool() {
  // Photoless items are allowed — they place on the canvas as the tee placeholder.
  let pool = items.filter(i => itemStatus(i) !== "Archive");
  if (builder && builder.scopeCapsuleId) {
    const set = new Set((capsuleLinkMap.get(builder.scopeCapsuleId) || []).map(l => l.item_id));
    pool = pool.filter(i => set.has(i.id));
  }
  if (hasActiveFilter(builderFilter)) pool = pool.filter(i => itemMatchesFilter(i, builderFilter, { noStatusDefault: true }));

function builderPickContent() {
  const pool = builderPool();
  const q = builder.pickQ.trim().toLowerCase();
  if (q) {
    // search: scoped to current category/subcat when set
    const hit = i => (i.name || "").toLowerCase().includes(q) || (i.brand || "").toLowerCase().includes(q) ||
      (i.subcategory || "").toLowerCase().includes(q);
    const scoped = pool.filter(i => {
      if (builder.pickCat && (i.category || "Other") !== builder.pickCat) return false;
      if (builder.pickSub && (i.subcategory || "") !== builder.pickSub) return false;
      return hit(i);
    });
    return builderItemGrid(scoped);
  }
  if (builder.pickCat) {
    const catPool = pool.filter(i => (i.category || "Other") === builder.pickCat);
    const subcats = [...new Set(catPool.map(i => i.subcategory).filter(Boolean))];
    subcats.sort();
    if (builder.pickSub) {
      // item grid with subcat chips at top for quick switching
      const subPool = catPool.filter(i => (i.subcategory || "") === builder.pickSub);
      const chip = (key, lbl, n, on) => `<button class="cap-chip${on ? " on" : ""}" data-bsub="${esc(key)}">${esc(lbl)} ${n}</button>`;
      const chips = subcats.map(s => chip(s, s, catPool.filter(i => i.subcategory === s).length, s === builder.pickSub)).join("");
      return `<div class="cap-catbar">${chips}</div>` + builderItemGrid(subPool);
    }
    if (!subcats.length) return builderItemGrid(catPool);  // no subcats → flat grid
    // subcategory folder rows
    return subcats.map(s => {
      const si = catPool.filter(i => i.subcategory === s);
      return `<button class="frow" data-bsub="${esc(s)}">${thumbHtml(si[0]?.image_path || null)}
        <div class="fmeta"><div class="fname">${esc(s)}</div><div class="fcount">${si.length} item${si.length === 1 ? "" : "s"}</div></div>
        <svg class="chev" viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg></button>`;
    }).join("");
  }
  // category folder rows
  const counts = new Map();
  for (const i of pool) { const c = i.category || "Other"; counts.set(c, (counts.get(c) || 0) + 1); }
  const cats = [...counts.keys()].sort((a, b) => { const r = catRank(a) - catRank(b); return r !== 0 ? r : a.localeCompare(b); });
  return cats.map(c => {
    const rep = pool.find(i => (i.category || "Other") === c);
    return `<button class="frow" data-bcat="${esc(c)}">${thumbHtml(rep ? rep.image_path : null)}
      <div class="fmeta"><div class="fname">${esc(c)}</div><div class="fcount">${counts.get(c)} item${counts.get(c) === 1 ? "" : "s"}</div></div>
      <svg class="chev" viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg></button>`;
  }).join("");
}

function builderItemGrid(list) {

// Canonical key for an item-set (order-independent, dedup-safe).
function itemSetKey(ids) { return [...new Set(ids)].sort().join("|"); }
// Find a non-archived outfit with an identical item-set (excludeId optional).
function findDuplicateOutfit(itemIds, excludeId) {
  const key = itemSetKey(itemIds);
  for (const o of outfits) {
    if (o.id === excludeId || o.archived) continue;
    const ids = outfitItemMap.get(o.id) || [];
    if (ids.length && itemSetKey(ids) === key) return o;
  }
  return null;
}

// ---- wear-sync after piece edits ------------------------------------------
// Editing a look's pieces doesn't rewrite wear history, but a look edited right
// after being worn usually means "I actually wore the new pieces". These
// reconcile ONE day's outfit-linked wear rows with the look's current piece
// set: swapped-out pieces lose that day's wear row, swapped-in pieces gain one
// with the group's context/formality copied over (so tags follow the swap).

// Most recent date this look was worn (within 14 days) whose wear rows no
// longer match the current piece set. Older wears are history — left alone.
function wearSyncCandidate(outfitId) {
  const dates = [...new Set(wears.filter(w => w.outfit_id === outfitId).map(w => w.worn_on))].sort();
  if (!dates.length) return null;
  const d = dates[dates.length - 1];
  if (daysSince(d) > 14) return null;
  const current = new Set(outfitItemMap.get(outfitId) || []);
  if (!current.size) return null;
  const group = wears.filter(w => w.outfit_id === outfitId && w.worn_on === d);
  const have = new Set(group.map(w => w.item_id));
  const mismatch = group.some(w => !current.has(w.item_id)) || [...current].some(x => !have.has(x));
  return mismatch ? d : null;
}

async function syncWearsToLook(outfitId, dateStr) {
  const current = new Set(outfitItemMap.get(outfitId) || []);
  const group = wears.filter(w => w.outfit_id === outfitId && w.worn_on === dateStr);
  if (!current.size || !group.length) return null;
  const stale = group.filter(w => !current.has(w.item_id) && w.id);
  const have = new Set(group.map(w => w.item_id));
  const missing = [...current].filter(x => !have.has(x));
  if (!stale.length && !missing.length) return null;
  // Copy context/formality from a row that's staying (fall back to any row).
  const src = group.find(w => current.has(w.item_id) && (ctxArr(w).length || w.formality_for))
    || group.find(w => ctxArr(w).length || w.formality_for) || null;
  if (stale.length) {
    await rest(`/wears?id=in.(${stale.map(w => `"${w.id}"`).join(",")})`, { method: "DELETE" });
    const gone = new Set(stale.map(w => w.id));
    wears = wears.filter(w => !gone.has(w.id));
  }
  if (missing.length) {
    const payload = missing.map(item_id => ({
      item_id, worn_on: dateStr, outfit_id: outfitId,
      context: src && ctxArr(src).length ? ctxArr(src) : null,
      formality_for: (src && src.formality_for) || null,
    }));
    const rows = await rest("/wears", {
      method: "POST", headers: { "Content-Type": "application/json", Prefer: "return=representation" },
      body: JSON.stringify(payload),
    });
    wears.push(...(Array.isArray(rows) ? rows : payload));
  }
  buildOutfitWearMap();
  return { added: missing.length, removed: stale.length };
}

// Move one day's wear rows from one look to another (merge follow-up).
async function repointWears(fromId, toId, dateStr) {
  await rest(`/wears?outfit_id=eq.${fromId}&worn_on=eq.${dateStr}`, {
    method: "PATCH", headers: { "Content-Type": "application/json", Prefer: "return=minimal" },
    body: JSON.stringify({ outfit_id: toId }),
  });
  wears.forEach(w => { if (w.outfit_id === fromId && w.worn_on === dateStr) w.outfit_id = toId; });
  buildOutfitWearMap();
}

// After an EDITED look merges into an existing duplicate: the edit landed on the
// surviving look, but the edited look still exists with its old pieces. Offer to
// move the recent wear over (re-point + piece-sync) and decide the old look's fate.
function openMergeFollowUp(oldId, dupId, wearDate) {
  const oldO = outfitById.get(oldId);
  if (!oldO) return;
  const wearRow = wearDate ? `
      <div style="margin-bottom:20px">
        <div class="muted" style="font-size:13px;margin-bottom:8px">It was worn ${esc(calDayLabel(wearDate))} with the old pieces.</div>
        <button class="sheet-chip" id="mergeMoveWear">Move that wear to this look →</button>
      </div>` : "";
  $("#logInner").innerHTML = `
    <div class="sheet-hdr">
      <button class="lnk" id="mergeClose">Done</button>
      <h2>Merged</h2>
      <span></span>
    </div>
    <div style="padding:20px 18px 30px">
      <div class="muted" style="font-size:13px;margin-bottom:20px">Your edit matched an existing look, so it was applied there. “${esc(outfitName(oldO))}” still exists with the old pieces.</div>
      ${wearRow}
      <div class="muted" style="font-size:13px;margin-bottom:8px">Keep the old look?</div>
      <div class="sheet-chips">
        <button class="sheet-chip" id="mergeKeep">Keep it</button>
        <button class="sheet-chip" id="mergeArchive">Archive it</button>
        <button class="sheet-chip" id="mergeDelete">Delete it</button>
      </div>
    </div>`;
  $("#logSheet").hidden = false;
  const close = () => { $("#logSheet").hidden = true; };
  $("#mergeClose").onclick = close;
  $("#mergeKeep").onclick = close;
  if (wearDate) $("#mergeMoveWear").onclick = async () => {
    try {
      await repointWears(oldId, dupId, wearDate);
      await syncWearsToLook(dupId, wearDate);
      const b = $("#mergeMoveWear");
      if (b) { b.textContent = "Wear moved ✓"; b.disabled = true; }
    } catch (e) { toast(e.message); }
  };
  $("#mergeArchive").onclick = async () => {
    try {
      await rest(`/outfits?id=eq.${oldId}`, {
        method: "PATCH", headers: { "Content-Type": "application/json", Prefer: "return=minimal" },
        body: JSON.stringify({ archived: true }),
      });
      oldO.archived = true;
      close(); toast("Old look archived");
    } catch (e) { toast(e.message); }
  };
  // Delete preserves history like deleteLook (wears.outfit_id is SET NULL), but
  // without leaveLook() — we're on the surviving look, not the deleted one.
  $("#mergeDelete").onclick = async () => {
    try {
      await rest(`/outfits?id=eq.${oldId}`, { method: "DELETE" });
      outfits = outfits.filter(o => o.id !== oldId);
      outfitById.delete(oldId);
      outfitItemMap.delete(oldId);
      wears.forEach(w => { if (w.outfit_id === oldId) w.outfit_id = null; });
      buildOutfitWearMap();
      close(); toast("Old look deleted");
    } catch (e) { toast(e.message); }
  };
}

async function saveBuilder() {
  if (!builder) return;
  const p = builder.pieces;
  if (p.length < 2) { toast("A look needs at least 2 pieces"); return; }
  const layout = p.map(pc => ({ item_id: pc.item_id, x: +pc.x.toFixed(4), y: +pc.y.toFixed(4), s: +pc.s.toFixed(4) }));
  const itemIds = p.map(pc => pc.item_id);
  const name = builder.name.trim() || null;
  const wasNew = !builder.outfitId;
  try {
    let id = builder.outfitId;
    // Dedup guard: a new look (or one re-edited to an existing set) merges into
    // the matching outfit instead of creating a duplicate. Latest arrangement wins.
    const dup = findDuplicateOutfit(itemIds, builder.outfitId || null);
    if (dup) {
      await rest(`/outfits?id=eq.${dup.id}`, {
        method: "PATCH", headers: { "Content-Type": "application/json", Prefer: "return=minimal" },
        body: JSON.stringify(name ? { name, layout } : { layout }),
      });
      dup.layout = layout; if (name) dup.name = name; dup._bucket = null;
      buildOutfitIndexes();
      // Edited-look merge: the edit landed on dup, but oldId's recent wear (if
      // any) still points at oldId with the old pieces. Same-day wear moves
      // silently (same policy as the non-merge sync); anything else is offered
      // in the follow-up sheet along with the old look's fate.
      const oldId = builder.outfitId || null;
      const mergePlanCtx = builder.planCtx || null;
      let mergeMsg = "Merged into existing look";
      let mergeWearDate = null;
      if (oldId) {
        const oldDates = [...new Set(wears.filter(w => w.outfit_id === oldId).map(w => w.worn_on))].sort();
        const d = oldDates.length ? oldDates[oldDates.length - 1] : null;
        if (d && daysSince(d) <= 14) {
          if (d === todayStr()) {
            await repointWears(oldId, dup.id, d);
            await syncWearsToLook(dup.id, d);
            mergeMsg = "Merged into existing look · today's wear moved";
          } else {
            mergeWearDate = d;
          }
        }
      }
      finishBuilder(dup.id, mergeMsg);
      if (oldId && !mergePlanCtx) openMergeFollowUp(oldId, dup.id, mergeWearDate);
      return;
    }
    if (!id) {
      const rows = await rest("/outfits?select=*", {
        method: "POST", headers: { "Content-Type": "application/json", Prefer: "return=representation" },
        body: JSON.stringify({ name, layout }),
      });
      const o = Array.isArray(rows) ? rows[0] : rows;
      if (!o || !o.id) throw new Error("Could not create look");
      id = o.id; o.layout = layout;
      outfits.push(o);
      const links = itemIds.map(item_id => ({ outfit_id: id, item_id }));
      await rest("/outfit_items", {
        method: "POST", headers: { "Content-Type": "application/json", Prefer: "return=minimal" },
        body: JSON.stringify(links),
      });
      outfitLinks = outfitLinks.concat(links);
    } else {
      await rest(`/outfits?id=eq.${id}`, {
        method: "PATCH", headers: { "Content-Type": "application/json", Prefer: "return=minimal" },
        body: JSON.stringify({ name, layout }),
      });
      const o = outfitById.get(id); if (o) { o.name = name; o.layout = layout; }
      const current = new Set(outfitItemMap.get(id) || []);
      const toAdd = itemIds.filter(x => !current.has(x));
      const toRemove = [...current].filter(x => !itemIds.includes(x));
      if (toAdd.length) {
        const links = toAdd.map(item_id => ({ outfit_id: id, item_id }));
        await rest("/outfit_items", {
          method: "POST", headers: { "Content-Type": "application/json", Prefer: "return=minimal" },
          body: JSON.stringify(links),
        });
        outfitLinks = outfitLinks.concat(links);
      }
      if (toRemove.length) {
        const inList = `(${toRemove.map(x => `"${x}"`).join(",")})`;
        await rest(`/outfit_items?outfit_id=eq.${id}&item_id=in.${inList}`, { method: "DELETE" });
        outfitLinks = outfitLinks.filter(l => !(l.outfit_id === id && toRemove.includes(l.item_id)));
      }
    }
    buildOutfitIndexes();  // resets _bucket caches so formality re-derives
    const planCtx = builder && builder.planCtx;
    let savedMsg = wasNew ? "Look created" : "Look saved";
    let syncOffer = null;
    if (!wasNew) {
      const d = wearSyncCandidate(id);
      if (d === todayStr()) {
        // Same-day edit = "this is what I actually wore" — sync silently.
        const r = await syncWearsToLook(id, d);
        if (r) savedMsg = "Look saved · today's wear updated";
      } else if (d && !planCtx) {
        syncOffer = d;
      }
    }
    finishBuilder(id, savedMsg);
    if (syncOffer) {
      toast(`Worn ${calDayLabel(syncOffer)} with the old pieces`, [
        { label: "Update that wear →", fn: async () => {
          try {
            const r = await syncWearsToLook(id, syncOffer);
            toast(r ? "Wear updated to match the look" : "Already up to date");
          } catch (e) { toast(e.message); }
        } },
      ]);
    }
  } catch (e) { toast(e.message); }
}

// After a builder save, either route to the saved look (normal flow) or, when the
// builder was opened for a trip day, attach the look to that day and return there.
function finishBuilder(id, msg) {
  const planCtx = builder && builder.planCtx;
  builder = null;
  $("#app").classList.remove("builder-mode");
  if (planCtx) {
    switchTab("capsules");                 // resets capsuleView — set plan state AFTER
    capsuleId = planCtx.capsuleId; capsuleView = "plan";
    addPlanLook(planCtx.capsuleId, planCtx.date, id);  // optimistic c.plan update + re-render
    renderCapsules();
    toast("Added to " + planDayLabel(planCtx.date));
    return;
  }
  looksLens = "All"; looksFolder = null;
  switchTab("looks");
  openLook(id);
  toast(msg);
}

function capsuleBack() {
  if (capsuleView === "plan") { capsuleView = "detail"; return renderCapsules(); }
  if (capsuleView === "pick") { capsuleView = "detail"; return renderCapsules(); }
  if (capsuleView === "form") { _capForm = null; _pendingAddIds = null; capsuleView = capsuleId ? "detail" : "list"; return renderCapsules(); }
  if (capsuleView === "detail") { capsuleView = "list"; capsuleId = null; return renderCapsules(); }
  renderCapsules();
}

function wireCapsules() {
  const body = $("#capsulesBody");
  // form inputs (re-render only on mode change to keep field focus otherwise)
  if (capsuleView === "form") {
    body.querySelectorAll("[data-capmode]").forEach(b => b.onclick = () => {
      syncCapForm(); _capForm.kind = b.dataset.capmode; renderCapsules();
    });
    const create = $("#capCreate"); if (create) create.onclick = saveNewCapsule;
    return;
  }
  if (capsuleView === "pick") {
    const s = $("#capPickSearch");
    if (s) s.oninput = () => { _capPickFilter = s.value; renderPickerGrid(); };
    const done = $("#capPickDone"); if (done) done.onclick = saveCapsulePicker;
    const filterBtn = $("#capPickFilter");
    if (filterBtn) filterBtn.onclick = () => openFilterSheet(pickerFilter, { onApply: () => renderCapsules(), title: "Filter Clothing", dims: PICKER_FILTER_DIMS });
    body.querySelectorAll("[data-pick-status]").forEach(b => {
      b.onclick = () => { _capPickStatus = b.dataset.pickStatus; _capPickCat = null; _capPickSub = null; renderPickerGrid(); };
    });
    const sortBtn = $("#capPickSort");
    const sortPop = $("#capPickSortPop");
    if (sortBtn && sortPop) {
      sortBtn.onclick = (e) => { e.stopPropagation(); sortPop.hidden = !sortPop.hidden; };
      sortPop.querySelectorAll("[data-cpsort]").forEach(b => {
        b.onclick = () => { setGridSort(b.dataset.cpsort); sortPop.hidden = true; renderPickerGrid(); };
      });
    }

const _wxCache = {};  // capsuleId → {days, ts}
const WX_TTL = 600000; // 10 min
let _wxAutoTimer = null;  // interval that re-fetches weather while a trip detail is open
let _locSheet = null;  // {cid, step:"search"|"range", searchQ, results, loc, from, to}

function wmoEmoji(code) {
  if (code == null) return "—";
  if (code === 0) return "☀️";
  if (code <= 2) return "🌤️";
  if (code === 3) return "☁️";
  if (code <= 48) return "🌫️";
  if (code <= 55) return "🌦️";
  if (code <= 65) return "🌧️";
  if (code <= 77) return "❄️";
  if (code <= 82) return "🌧️";
  if (code <= 86) return "🌨️";
  if (code <= 99) return "⛈️";
  return "🌡️";
}

async function geocodeLocation(q) {
  const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=6&language=en&format=json`);
  const data = await res.json();
  return (data.results || []).map(r => ({
    name: r.name, admin1: r.admin1 || "", country: r.country || "",
    lat: r.latitude, lon: r.longitude
  }));
}

// Fetch weather for a lat/lon + date range.
// 3 zones: past (archive), recent+near-future (forecast), far-future (3-yr historical avg).
async function fetchWeatherRange(lat, lon, startStr, endStr) {
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const todayStr = localISO(today);
  const fc92 = new Date(today); fc92.setDate(fc92.getDate() - 92);
  const fc92Str = localISO(fc92);
  const fcCutoff = new Date(today); fcCutoff.setDate(fcCutoff.getDate() + 15);
  const fcCutoffStr = localISO(fcCutoff);
  const result = {};

  // Zone A: within forecast API window (today-92 to today+15)
  const zAS = startStr > fc92Str ? startStr : fc92Str;
  const zAE = endStr < fcCutoffStr ? endStr : fcCutoffStr;
  if (zAS <= zAE) {
    try {
      const d = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
        `&daily=temperature_2m_max,temperature_2m_min,weather_code&timezone=auto` +
        `&temperature_unit=fahrenheit&start_date=${zAS}&end_date=${zAE}`).then(r => r.json());
      if (d.daily) d.daily.time.forEach((date, i) => {
        result[date] = { maxT: Math.round(d.daily.temperature_2m_max[i]), minT: Math.round(d.daily.temperature_2m_min[i]), code: d.daily.weather_code[i], hist: false };
      });
    } catch (e) {}
  }

  // Zone B: older than 92 days — ERA5 archive (real historical data)
  if (startStr < fc92Str) {
    const zBE = endStr < fc92Str ? endStr : localISO(new Date(fc92.getTime() - 86400000));
    try {
      const d = await fetch(`https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}` +
        `&daily=temperature_2m_max,temperature_2m_min,weather_code` +
        `&start_date=${startStr}&end_date=${zBE}&temperature_unit=fahrenheit`).then(r => r.json());
      if (d.daily) d.daily.time.forEach((date, i) => {
        if (!result[date]) result[date] = { maxT: Math.round(d.daily.temperature_2m_max[i]), minT: Math.round(d.daily.temperature_2m_min[i]), code: d.daily.weather_code[i], hist: false };
      });
    } catch (e) {}
  }

  // Zone C: future beyond forecast window — average same calendar dates from 3 prior years
  if (endStr > fcCutoffStr) {
    const histDates = [];
    { let d = new Date(startStr + "T00:00:00"), e = new Date(endStr + "T00:00:00");
      while (d <= e) { const s = localISO(d); if (s > fcCutoffStr && !result[s]) histDates.push(s); d.setDate(d.getDate() + 1); } }
    if (histDates.length) {
      const tripSY = parseInt(histDates[0].slice(0, 4));
      const tripEY = parseInt(histDates[histDates.length - 1].slice(0, 4));
      const totals = {};
      for (let yOff = 1; yOff <= 3; yOff++) {
        const aS = histDates[0].replace(/^\d{4}/, String(tripSY - yOff));
        const aE = histDates[histDates.length - 1].replace(/^\d{4}/, String(tripEY - yOff));
        if (aE >= todayStr) continue;
        try {
          const d = await fetch(`https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}` +
            `&daily=temperature_2m_max,temperature_2m_min,weather_code` +
            `&start_date=${aS}&end_date=${aE}&temperature_unit=fahrenheit`).then(r => r.json());
          if (!d.daily) continue;
          d.daily.time.forEach((archDate, i) => {
            const mapped = archDate.replace(/^\d{4}/, String(parseInt(archDate.slice(0, 4)) + yOff));
            if (!histDates.includes(mapped)) return;
            if (!totals[mapped]) totals[mapped] = { mx: 0, mn: 0, codes: [], n: 0 };
            totals[mapped].mx += Math.round(d.daily.temperature_2m_max[i]);
            totals[mapped].mn += Math.round(d.daily.temperature_2m_min[i]);
            totals[mapped].codes.push(d.daily.weather_code[i]);
            totals[mapped].n++;
          });
        } catch (e) {}
      }
      for (const [date, t] of Object.entries(totals)) {
        if (t.n > 0) result[date] = { maxT: Math.round(t.mx / t.n), minT: Math.round(t.mn / t.n), code: t.codes[Math.floor(t.codes.length / 2)], hist: true };
      }
    }
  }
  return result;
}

// Build ordered per-day array across all locations for a trip capsule.
async function buildTripWeather(capsule) {
  if (!capsule.start_date || !capsule.end_date) return [];
  const locs = capsule.locations || [];
  if (!locs.length) return [];

  const dates = [];
  { let d = new Date(capsule.start_date + "T00:00:00"), e = new Date(capsule.end_date + "T00:00:00");
    while (d <= e) { dates.push(localISO(d)); d.setDate(d.getDate() + 1); } }
  if (!dates.length) return [];

  function locForDate(ds) {
    const specific = locs.filter(l => l.from && l.to && ds >= l.from && ds <= l.to);
    if (specific.length) return specific[specific.length - 1];
    const partial = locs.find(l => (l.from && !l.to && ds >= l.from) || (!l.from && l.to && ds <= l.to));
    if (partial) return partial;
    return locs.find(l => !l.from && !l.to) || locs[0];
  }

  // Group consecutive dates sharing the same location
  const groups = [];
  let curKey = null, curLoc = null, curDates = [];
  for (const ds of dates) {
    const loc = locForDate(ds);
    const key = loc ? `${loc.lat},${loc.lon}` : null;
    if (key !== curKey) {
      if (curDates.length && curLoc) groups.push({ loc: curLoc, dates: curDates });
      curKey = key; curLoc = loc; curDates = [ds];
    } else { curDates.push(ds); }
  }
  if (curDates.length && curLoc) groups.push({ loc: curLoc, dates: curDates });

  // Fetch weather per group in parallel
  const fetched = await Promise.all(groups.map(async g => {
    const wx = await fetchWeatherRange(g.loc.lat, g.loc.lon, g.dates[0], g.dates[g.dates.length - 1]);
    return { g, wx };
  }));

  const days = [];
  for (const { g, wx } of fetched) {
    g.dates.forEach((ds, i) => {
      const w = wx[ds];
      days.push({ date: ds, maxT: w ? w.maxT : null, minT: w ? w.minT : null, code: w ? w.code : null, hist: w ? w.hist : false, locName: g.loc.name, firstOfLoc: i === 0 });
    });
  }
  return days;
}

function weatherStripHtml(days) {
  const multiLoc = new Set(days.map(d => d.locName)).size > 1;
  let html = '<div class="wx-days">';
  let prevLoc = null;
  for (const day of days) {
    if (multiLoc && day.locName !== prevLoc && prevLoc !== null) {
      const city = day.locName.split(",")[0];
      html += `<div class="wx-loc-card"><div class="wx-loc-arrow">→</div><div class="wx-loc-lbl">${esc(city)}</div></div>`;
    }
    prevLoc = day.locName;
    const dateObj = new Date(day.date + "T00:00:00");
    const dow = dateObj.toLocaleDateString(undefined, { weekday: "short" });
    const md = dateObj.toLocaleDateString(undefined, { month: "numeric", day: "numeric" });
    const temps = day.maxT != null ? `${day.maxT}° / ${day.minT}°` : "—";
    html += `<div class="wx-day${day.hist ? " hist" : ""}">
      <div class="wx-date">${esc(dow)}</div>
      <div class="wx-date">${esc(md)}</div>
      <div class="wx-icon">${wmoEmoji(day.code)}</div>
      <div class="wx-temps">${esc(temps)}</div>
      ${day.hist ? `<div class="wx-hist-lbl">avg</div>` : ""}
    </div>`;
  }
  html += '</div>';
  return html;
}

async function loadTripWeather(capsule) {
  const cached = _wxCache[capsule.id];
  if (cached && Date.now() - cached.ts < WX_TTL) { _patchWeatherStrip(cached.days); return; }
  try {
    const days = await buildTripWeather(capsule);
    _wxCache[capsule.id] = { days, ts: Date.now() };
    _patchWeatherStrip(days);
  } catch (e) { const el = $("#wxStrip"); if (el) el.innerHTML = ""; }
}
function _patchWeatherStrip(days) {
  const el = $("#wxStrip");
  if (!el) return;
  el.innerHTML = days.length ? `<div class="wx-strip">${weatherStripHtml(days)}</div>` : "";
}

// ---- location add sheet ----
function openLocationSheet(cid) {
  const c = capsuleById.get(cid);
  _locSheet = { cid, step: "search", searchQ: "", results: [], loc: null,
    from: (c && c.start_date) || "", to: (c && c.end_date) || "" };
  _renderLocSheet();
  $("#logSheet").hidden = false;
}
function closeLocationSheet() { _locSheet = null; $("#logSheet").hidden = true; }

function _renderLocSheet() {
  const s = _locSheet;
  if (!s) return;
  if (s.step === "search") {
    const rows = s.results.map((r, i) => {
      const sub = [r.admin1, r.country].filter(Boolean).join(", ");
      return `<div class="loc-result" data-loc-idx="${i}">
        <span class="loc-result-pin">📍</span>
        <div><div class="loc-result-name">${esc(r.name)}</div>${sub ? `<div class="loc-result-sub">${esc(sub)}</div>` : ""}</div>
      </div>`;
    }).join("");
    $("#logInner").innerHTML = `
      <div class="sheet-hdr">
        <button class="lnk" id="locCancel">Cancel</button>
        <h2>Add location</h2>
        <span style="width:54px"></span>
      </div>
      <div class="loc-search-wrap">
        <input class="inp" id="locSearchInp" placeholder="Search city…" value="${esc(s.searchQ)}" autocomplete="off">
      </div>
      ${rows || (s.searchQ ? `<div style="padding:12px 0;color:var(--muted);font-size:14px">No results found</div>` : "")}`;
    const inp = $("#locSearchInp");
    if (inp) {
      inp.focus();
      let timer;
      inp.oninput = () => {
        _locSheet.searchQ = inp.value;
        clearTimeout(timer);
        if (!inp.value.trim()) { _locSheet.results = []; _renderLocSheet(); return; }
        timer = setTimeout(async () => {
          try { _locSheet.results = await geocodeLocation(inp.value.trim()); } catch (e) { _locSheet.results = []; }
          if (_locSheet && _locSheet.step === "search") _renderLocSheet();
        }, 380);
      };
    }
    $("#locCancel").onclick = closeLocationSheet;
    $("#logInner").querySelectorAll("[data-loc-idx]").forEach(el => {
      el.onclick = () => {
        const r = _locSheet.results[+el.dataset.locIdx];
        const city = r.name + ([r.admin1, r.country].filter(Boolean).length ? `, ${[r.admin1, r.country].filter(Boolean)[0]}` : "");
        _locSheet.loc = { name: city, lat: r.lat, lon: r.lon };
        _locSheet.step = "range";
        _renderLocSheet();
      };
    });
  } else {
    const s = _locSheet;
    const c = capsuleById.get(s.cid);
    const hasOthers = (c && (c.locations || []).length > 0);
    $("#logInner").innerHTML = `
      <div class="sheet-hdr">
        <button class="lnk" id="locBack">← Back</button>
        <h2>${esc(s.loc.name.split(",")[0])}</h2>
        <span style="width:54px"></span>
      </div>
      <div style="padding:14px 0 8px">
        <div style="font-size:15px;font-weight:600;margin-bottom:16px">📍 ${esc(s.loc.name)}</div>
        <label class="fld">From</label>
        <input class="inp" type="date" id="locFrom" value="${esc(s.from)}" ${c && c.start_date ? `min="${esc(c.start_date)}"` : ""} ${c && c.end_date ? `max="${esc(c.end_date)}"` : ""}>
        <label class="fld" style="margin-top:12px">To</label>
        <input class="inp" type="date" id="locTo" value="${esc(s.to)}" ${c && c.start_date ? `min="${esc(c.start_date)}"` : ""} ${c && c.end_date ? `max="${esc(c.end_date)}"` : ""}>
        <div style="font-size:12px;color:var(--muted);margin-top:8px">Leave as-is if this location covers the whole trip.</div>
        <button class="btn" id="locSave" style="margin-top:16px">Save location</button>
      </div>`;
    const fromEl = $("#locFrom"), toEl = $("#locTo");
    if (fromEl) fromEl.onchange = () => { _locSheet.from = fromEl.value; };
    if (toEl) toEl.onchange = () => { _locSheet.to = toEl.value; };
    $("#locBack").onclick = () => { _locSheet.step = "search"; _renderLocSheet(); };
    $("#locSave").onclick = _saveLocation;
  }
}

async function _saveLocation() {
  const s = _locSheet;
  if (!s || !s.loc) return;
  const c = capsuleById.get(s.cid);
  if (!c) return;
  const locs = [...(c.locations || [])];
  // Store null when dates match trip start/end (means "whole trip"); store specific value when different
  const from = (s.from && s.from !== (c.start_date || "")) ? s.from : null;
  const to   = (s.to   && s.to   !== (c.end_date   || "")) ? s.to   : null;
  locs.push({ name: s.loc.name, lat: s.loc.lat, lon: s.loc.lon, from, to });
  closeLocationSheet();
  try {
    await rest(`/capsules?id=eq.${s.cid}`, { method: "PATCH", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ locations: locs }) });
    c.locations = locs;
    delete _wxCache[s.cid]; // invalidate cache
    renderCapsules();
    toast("Location added");
  } catch (e) { toast(e.message); }
}

async function removeLocation(cid, idx) {
  const c = capsuleById.get(cid);
  if (!c) return;
  const locs = [...(c.locations || [])];
  locs.splice(idx, 1);
  try {
    await rest(`/capsules?id=eq.${cid}`, { method: "PATCH", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ locations: locs }) });
    c.locations = locs;
    delete _wxCache[cid];
    renderCapsules();
  } catch (e) { toast(e.message); }
}

/* ===================================================================
   TABS + WIRING
   =================================================================== */
const TAB_TITLES = {
  home: "Wardrobe", closet: "Closet", looks: "Looks", calendar: "Calendar",
  capsules: "Capsules", stats: "Style Stats", search: "Search", add: "Add Item",
  builder: "Build a Look", settings: "Settings",
};

// Tapping a bottom-nav / Home tile should land on the top level of that tab,
// not resume a deep subpage left over from last visit. (Programmatic switchTab
// calls that pre-set folder state and then openItem() don't go through here.)
function resetTabRoot(name) {
  if (name === "closet") { closetCat = null; closetSub = null; searchResults = null; }
  else if (name === "looks") { looksFolder = null; lookId = null; looksSearchQ = null; looksItemFilter = null; }
  else if (name === "calendar") { calendarDay = null; }
}

function switchTab(name) {
  $$(".screen").forEach(s => s.classList.toggle("active", s.id === `tab-${name}`));
  $$("#tabbar button").forEach(b => b.classList.toggle("on", b.dataset.tab === name));
  $("#title").textContent = TAB_TITLES[name] || "Wardrobe";
  $("#headerAdd").hidden = name !== "home";
  // A genuine tab tap abandons any pending item/look-return (even to the home tab
  // of that return, whose block below may be skipped). openItemFrom()/openLookFrom()
  // do NOT route through switchTab.
  _itemReturn = null;
  _lookReturn = null;
  if (name !== "closet") {
    hideGridBar();
    exitSelectMode();
    $("#gridPickerPop").hidden = true;
    $("#itemBar").hidden = true;
    $("#app").classList.remove("detail-photo");
    detailId = null; detailView = null; _fromBuilder = null; _itemReturn = null;
  }

  if (name !== "builder") { $("#app").classList.remove("builder-mode"); builder = null; }
  if (name !== "capsules") { clearInterval(_wxAutoTimer); _wxAutoTimer = null; }  // stop weather auto-refresh

  if (name === "home") renderHome();
  else if (name === "closet")   renderCloset();
  else if (name === "add")      renderAdd();
  else if (name === "builder")  renderBuilder();
  else if (name === "looks")    renderLooks();
  else if (name === "calendar") renderCalendar();
  else if (name === "capsules") { capsuleView = "list"; capsuleId = null; renderCapsules(); }
  else if (name === "stats")    { statsView = "main"; statsDateRange = "all"; renderStats(); }
  else if (name === "settings") renderSettings();

  window.scrollTo(0, 0);
}

function renderSettings() {
  $("#settingsBody").innerHTML = `
    <div style="padding:24px 18px" class="stack">
      <div class="card stack">
        <div><div class="fld">Signed in as</div><div id="set_email">${esc(session?.user?.email || "")}</div></div>
        <button class="btn" id="signOutBtn" style="background:var(--danger)">Sign out</button>
      </div>
      <div class="center muted" style="font-size:12px"><span class="appver">${esc(APP_VERSION)}</span></div>
    </div>`;
  $("#signOutBtn").onclick = () => handleSignedOut();
}

function wireEvents() {
  // login
  $("#loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const btn = $("#loginBtn"), err = $("#loginErr");
    err.hidden = true; btn.disabled = true; btn.textContent = "Signing in…";
    try {
      await signIn($("#email").value.trim(), $("#pw").value);
      $("#pw").value = "";
      await bootApp();
    } catch (e2) {
      err.textContent = e2.message; err.hidden = false;
    } finally { btn.disabled = false; btn.textContent = "Sign in"; }
  });

  // bottom nav
  $("#tabbar").addEventListener("click", (e) => {
    const b = e.target.closest("button[data-tab]");
    if (b) { resetTabRoot(b.dataset.tab); switchTab(b.dataset.tab); }
  });

  // home launcher tiles
  $("#homeBody").addEventListener("click", (e) => {
    const t = e.target.closest("[data-go]");
    if (t) { resetTabRoot(t.dataset.go); switchTab(t.dataset.go); }
  });

  // closet: lens / folders / subcategories / items / back / search
  $("#closetBody").addEventListener("click", (e) => {
    if (e.target.closest("#clBack")) return closetBack();
    if (e.target.closest("[data-cap-clear]")) { activeCapsuleId = null; closetCat = null; closetSub = null; return renderCloset(); }
    if (e.target.closest("#clSearch")) return openSearch();
    if (e.target.closest("[data-cap-filter]")) return openClosetCapsuleFilter();
    const lens = e.target.closest("[data-lens]");
    if (lens) { closetLens = lens.dataset.lens; closetCat = null; closetSub = null; searchResults = null; return renderCloset(); }
    const cat = e.target.closest("[data-cat]");
    if (cat) { closetCat = cat.dataset.cat; closetSub = null; searchResults = null; return renderCloset(); }
    const sub = e.target.closest("[data-sub]");
    if (sub) { closetSub = sub.dataset.sub; return renderCloset(); }
    const it = e.target.closest("[data-item]");
    if (it) {
      if (selectMode) { toggleSelect(it.dataset.item); return; }
      return openItem(it.dataset.item);
    }
  });

  // looks: lens / folders / outfit tiles / detail actions
  $("#looksBody").addEventListener("click", (e) => {
    if (e.target.closest("#looksBack")) return looksBack();
    if (e.target.closest("[data-cap-clear]")) { activeCapsuleId = null; return renderLooks(); }
    const lgc = e.target.closest("[data-lookcols]");
    if (lgc) return setLookCols(+lgc.dataset.lookcols);
    if (e.target.closest("#looksGrid")) { const pop = $("#lookGridPop"); if (pop) pop.hidden = !pop.hidden; return; }
    if (e.target.closest("#looksFilter")) { return openFilterSheet(looksFilter, { onApply: () => { looksSearchQ = null; renderLooks(); }, title: "Filter Looks", dims: LOOKS_FILTER_DIMS }); }
    if (e.target.closest("#looksNew")) return openNewLookSheet();
    if (e.target.closest("#looksShuffle")) return openRandomLook();
    if (e.target.closest("#lookHeartBtn")) {
      if (!lookId) return;
      toggleLikeLook(lookId).then(r => { const btn = $("#lookHeartBtn"); if (btn) btn.classList.toggle("on", r === 1); });
      return;
    }
    const lens = e.target.closest("[data-llens]");
    if (lens) { looksLens = lens.dataset.llens; looksFolder = null; lookId = null; return renderLooks(); }
    const folder = e.target.closest("[data-lfolder]");
    if (folder) { looksFolder = folder.dataset.lfolder; return renderLooks(); }
    const lkact = e.target.closest("[data-lkact]");
    if (lkact && lookId) {
      const a = lkact.dataset.lkact;
      if (a === "details")   return openLookDetails(lookId);
      if (a === "folder")    return openLookFormalityEdit(lookId);
      if (a === "duplicate") return duplicateLook(lookId);
      if (a === "calendar")  return openWearLook(lookId);
      if (a === "archive")   return archiveLook(lookId);
      if (a === "delete")    return deleteLook(lookId);
      return;
    }
    if (e.target.closest("#lookWearsBtn")) { if (lookId) openLookWears(lookId); return; }
    const wearDate = e.target.closest("[data-wear-date]");
    if (wearDate && lookId) {
      const d = wearDate.dataset.wearDate;
      const ows = wears.filter(w => w.outfit_id === lookId && w.worn_on === d);
      const ids = ows.map(w => w.id).filter(Boolean);
      const cur = ows.flatMap(w => ctxArr(w)).filter((v, i, a) => a.indexOf(v) === i);
      if (ids.length) openContextSheet(ids, cur, () => openLookWears(lookId));
      return;
    }
    if (e.target.closest("[data-look-formality]")) { if (lookId) openLookFormalityEdit(lookId); return; }
    if (e.target.closest("#lookEditPieces")) { if (lookId) openBuilder(lookId); return; }
    if (e.target.closest("#lookAddLevel")) { if (lookId) showNudgePiecesSheet(lookId, outfitBucket(outfitById.get(lookId))); return; }
    const pieceOpen = e.target.closest("[data-piece-open]");
    if (pieceOpen) {
      // Thumbnail tap opens the item; must run BEFORE the [data-occ-item] row check.
      const it = itemById.get(pieceOpen.dataset.pieceOpen);
      if (it) openItemFrom(it.id, { cat: it.category, sub: it.subcategory });
      return;
    }
    const occItem = e.target.closest("[data-occ-item]");
    if (occItem) { openOccasionEdit(occItem.dataset.occItem, () => { if (lookId) openLookDetails(lookId); }); return; }
    const piece = e.target.closest("[data-look-item]");
    if (piece) {
      const it = itemById.get(piece.dataset.lookItem);
      if (it) openItemFrom(it.id, { cat: it.category, sub: it.subcategory });
      return;
    }
    const look = e.target.closest("[data-look]");
    if (look) return openLook(look.dataset.look);
  });

  // build-a-look canvas: toolbar, picker, piece controls
  $("#builderBody").addEventListener("click", (e) => {
    if (!builder) return;
    if (e.target.closest("#bldCancel")) return builderCancel();
    if (e.target.closest("#bldSave")) return saveBuilder();
    if (e.target.closest("#bldAdd")) { builder.picking = true; builder.pickCat = null; builder.pickQ = ""; return renderBuilder(); }
    if (e.target.closest("#bldPickBack")) return builderPickBack();
    if (e.target.closest("#bldPickFilter")) return openFilterSheet(builderFilter, { onApply: renderBuilderPicker, title: "Filter Clothing", dims: BUILDER_FILTER_DIMS });
    const bcat = e.target.closest("[data-bcat]");
    if (bcat) { builder.pickCat = bcat.dataset.bcat; builder.pickSub = null; return renderBuilder(); }
    const bsub = e.target.closest("[data-bsub]");
    if (bsub) { builder.pickSub = bsub.dataset.bsub; return renderBuilder(); }
    const bcap = e.target.closest("[data-bcap]");
    if (bcap) { builder.scopeCapsuleId = bcap.dataset.bcap || null; builder.pickCat = null; builder.pickSub = null; return renderBuilder(); }
    const railadd = e.target.closest("[data-railadd]");
    if (railadd) return addPieceToBuilder(railadd.dataset.railadd, true);  // keep rail open
    if (e.target.closest("[data-railback]")) return builderPickBack();
    if (e.target.closest("[data-railclose]")) { builder.picking = false; builder.pickCat = null; builder.pickSub = null; builder.pickQ = ""; return renderBuilder(); }
    const badd = e.target.closest("[data-badd]");
    if (badd) return addPieceToBuilder(badd.dataset.badd);
    const layer = e.target.closest("[data-blayer]");
    if (layer) return layerPiece(layer.dataset.blayer);
    if (e.target.closest("[data-bdelete]")) return deleteBuilderPiece();
    if (e.target.closest("[data-bview]")) {
      const i = builder.selIdx;
      if (i < 0) { toast("Tap a piece first"); return; }
      const it = itemById.get(builder.pieces[i].item_id);
      if (!it) return;
      _fromBuilder = JSON.parse(JSON.stringify(builder));  // stash to restore on back
      closetCat = it.category || null; closetSub = it.subcategory || null; searchResults = null;
      switchTab("closet"); openItem(it.id);
      return;
    }
  });

  // capsules: list / detail / form / picker
  $("#capsulesBody").addEventListener("click", (e) => {
    if (e.target.closest("#capBack")) return capsuleBack();
    if (e.target.closest("[data-cap-new]")) return openCapsuleNew();
    if (e.target.closest("[data-cap-byday]")) return openTripPlan(capsuleId);
    if (e.target.closest("[data-cap-plan]")) return planFromCapsule(capsuleId);
    if (e.target.closest("[data-cap-suggest]")) return openSuggestSheet(null, capsuleId);
    const planRemove = e.target.closest("[data-plan-remove]");
    if (planRemove) { e.stopPropagation(); return removePlanLook(capsuleId, planRemove.dataset.planDate, planRemove.dataset.planRemove); }
    const planWore = e.target.closest("[data-plan-wore]");
    if (planWore) { e.stopPropagation(); return planWoreIt(planWore.dataset.planDate, planWore.dataset.planWore); }
    const planOpen = e.target.closest("[data-plan-open]");
    if (planOpen) { looksLens = "All"; looksFolder = null; return openLookFrom(planOpen.dataset.planOpen); }
    const planFromBucket = e.target.closest("[data-plan-frombucket]");
    if (planFromBucket) return openBucketAssignSheet(planFromBucket.dataset.planFrombucket);
    const planAssign = e.target.closest("[data-plan-assign]");
    if (planAssign) return openPlanLookPicker(planAssign.dataset.planAssign);
    const planSuggest = e.target.closest("[data-plan-suggest]");
    if (planSuggest) return openSuggestSheet(null, capsuleId, { capsuleId, date: planSuggest.dataset.planSuggest });
    const planBuild = e.target.closest("[data-plan-build]");
    if (planBuild) return openBuilder(null, null, { capsuleId, date: planBuild.dataset.planBuild });
    if (e.target.closest("[data-cap-add]")) return openCapsulePicker(capsuleId);
    if (e.target.closest("[data-cap-look-add]")) return openCapsuleLookPicker();
    const capLook = e.target.closest("[data-cap-look]");
    if (capLook) { looksLens = "All"; looksFolder = null; return openLookFrom(capLook.dataset.capLook); }
    if (e.target.closest("[data-cap-rename]")) return renameCapsule(capsuleId);
    if (e.target.closest("[data-cap-dup]")) return duplicateCapsule(capsuleId);
    if (e.target.closest("[data-cap-share]")) return shareCapsuleList(capsuleId);
    if (e.target.closest("[data-cap-del]")) return deleteCapsule(capsuleId);
    if (e.target.closest("[data-wx-refresh]")) {
      const c = capsuleById.get(capsuleId);
      if (c) { delete _wxCache[c.id]; const el = $("#wxStrip"); if (el) el.innerHTML = `<div class="wx-loading muted">Refreshing…</div>`; loadTripWeather(c); }
      return;
    }
    if (e.target.closest("[data-loc-add]")) return openLocationSheet(capsuleId);
    const locDel = e.target.closest("[data-loc-del]");
    if (locDel) { e.stopPropagation(); return removeLocation(capsuleId, parseInt(locDel.dataset.locDel)); }
    const sortBtn = e.target.closest("[data-capsort]");
    if (sortBtn) { _capSort = sortBtn.dataset.capsort; return renderCapsules(); }
    if (e.target.closest("[data-cap-unpacked]")) { _capUnpackedOnly = !_capUnpackedOnly; return renderCapsules(); }
    const pickCat = e.target.closest("[data-pickcat]");
    if (pickCat) { _capPickCat = pickCat.dataset.pickcat === "__all__" ? null : pickCat.dataset.pickcat; _capPickSub = null; return renderPickerGrid(); }
    const pickSub = e.target.closest("[data-picksub]");
    if (pickSub) { _capPickSub = pickSub.dataset.picksub === "" ? null : pickSub.dataset.picksub; return renderPickerGrid(); }
    const pack = e.target.closest("[data-pack]");
    if (pack) { e.stopPropagation(); return togglePack(pack.dataset.pack); }
    const capItem = e.target.closest("[data-cap-item]");
    if (capItem) return openItemFrom(capItem.dataset.capItem, { cat: null, sub: null });
    const pick = e.target.closest("[data-pick]");
    if (pick) return togglePick(pick.dataset.pick);
    const card = e.target.closest("[data-cap]");
    if (card) return openCapsule(card.dataset.cap);
  });

  // grid action bar
  $("#gbSelect").addEventListener("click", toggleSelectMode);
  $("#gbSort").addEventListener("click", openSortMenu);
  $("#gbGrid").addEventListener("click", openGridPicker);
  $("#gbEdit").addEventListener("click", () => { if (selectedIds.size) openBulkEdit(); });
  $("#gbDelete").addEventListener("click", () => { if (selectedIds.size) deleteSelected(); });
  $("#gbMove").addEventListener("click", () => { if (selectedIds.size) openMoveSheet(); });
  $("#gbCapsule").addEventListener("click", () => { if (selectedIds.size) openCapsuleSheet(); });
  $("#sortMenuPop").addEventListener("click", (e) => {
    const b = e.target.closest("[data-sort]");
    if (b) { setGridSort(b.dataset.sort); $("#sortMenuPop").hidden = true; renderCurrentGrid(); }
  });
  $("#gridPickerPop").addEventListener("click", (e) => {
    const b = e.target.closest("[data-cols]");
    if (b) setGridCols(+b.dataset.cols);
  });
  // close sort/density pops on outside tap
  document.addEventListener("click", (e) => {
    if (!e.target.closest("#gbSort") && !e.target.closest("#sortMenuPop")) $("#sortMenuPop").hidden = true;
    if (!e.target.closest("#gbGrid") && !e.target.closest("#gridPickerPop")) $("#gridPickerPop").hidden = true;
    const csp = $("#capPickSortPop"); if (csp && !e.target.closest("#capPickSort") && !e.target.closest("#capPickSortPop")) csp.hidden = true;
  }, true);
  // bulk edit sheet
  $("#bulkBg").addEventListener("click", closeBulkEdit);
  // move sheet (also covers add-cat sheet which reuses the same container)
  $("#moveBg").addEventListener("click", () => {
    if (_capSheetMode) { closeCapsuleSheet(); }
    else if (_addCatMode) { _addCatMode = false; moveCatOpen = null; $("#moveSheet").hidden = true; }
    else closeMoveSheet();
  });

  // item action bar (photo view)
  $("#ibEdit").addEventListener("click", () => { if (detailId) openItemDetails(detailId); });
  $("#ibMove").addEventListener("click", () => { if (detailId) openItemMoveSheet(detailId); });
  $("#ibLog").addEventListener("click", () => { if (detailId) logWearToday(detailId); });
  $("#ibDelete").addEventListener("click", () => { if (detailId) deleteItem(detailId); });

  // field edit sheet
  $("#fieldBg").addEventListener("click", closeFieldSheet);

  // log wear / location sheet
  $("#logBg").addEventListener("click", () => { if (_locSheet) _locSheet = null; $("#logSheet").hidden = true; });

  // add item: field rows + category picker
  document.getElementById("tab-add").addEventListener("click", (e) => {
    const addField = e.target.closest("[data-add-field]");
    if (addField) { openAddFieldEdit(addField.dataset.addField); return; }
  });

  // header ＋ (home only) -> add item
  $("#headerAdd").addEventListener("click", () => switchTab("add"));

  // header gear -> settings
  $("#headerGear").addEventListener("click", () => switchTab("settings"));

  // tap the header (not its buttons) -> scroll to top, like the iOS status bar.
  // body is the real scroll container (html/body height:100%), and smooth
  // behavior on body.scrollTo is unreliable — animate scrollTop by hand.
  document.querySelector("header.bar").addEventListener("click", (e) => {
    if (e.target.closest("button")) return;
    const sc = document.body.scrollTop ? document.body : document.documentElement;
    const from = sc.scrollTop;
    if (!from) return;
    const t0 = performance.now(), dur = 260;
    const step = () => {
      const p = Math.min(1, (performance.now() - t0) / dur);
      sc.scrollTop = from * Math.pow(1 - p, 3);  // ease-out cubic
      if (p < 1) setTimeout(step, 16);           // timer, not rAF — rAF stalls in hidden docs
    };
    step();
  });

  // bottom-sheet swipe-down-to-dismiss (each .sheet has a sibling .sheet-bg whose
  // click handler does the real cleanup — we just trigger it past a drag threshold)
  [["bulkInner","bulkBg"],["moveInner","moveBg"],["fieldInner","fieldBg"],
   ["logInner","logBg"],["statsFilterInner","statsFilterBg"],["statsRangeInner","statsRangeBg"],
   ["qaSheetInner","qaSheetBg"]]
    .forEach(([s, b]) => wireSheetSwipe(s, b));

  // Global left-edge swipe (< 24px) → back, mirrors the on-screen back button
  const SHEET_IDS = ['bulkSheet','moveSheet','fieldSheet','logSheet',
                     'statsFilterSheet','statsRangeSheet','quickActSheet'];
  let _gswX = 0, _gswTracking = false;
  document.addEventListener('touchstart', e => {
    _gswTracking = e.touches[0].clientX < 24;
    if (_gswTracking) _gswX = e.touches[0].clientX;
  }, { passive: true });
  document.addEventListener('touchend', e => {
    if (!_gswTracking) return;
    _gswTracking = false;
    if (e.changedTouches[0].clientX - _gswX < 60) return;
    if (SHEET_IDS.some(id => { const el = document.getElementById(id); return el && !el.hidden; })) return;
    if (document.getElementById('clBack'))     closetBack();
    else if (document.getElementById('looksBack')) looksBack();
    else if (document.getElementById('stBack'))    statsNavBack();
    else if (calendarDay) { calendarDay = null; renderCalendarMonth($("#calendarBody")); }
  }, { passive: true });

  // Long-press on grid tile (500 ms) → quick-action sheet.
  // Long-press on the item-photo Log button (500 ms) → back-date picker
  // (a plain tap still logs today via the #ibLog click handler).
  let _lpTimer = null, _lpItemId = null, _lpFired = false;
  document.addEventListener('touchstart', e => {
    const ibLog = e.target.closest('#ibLog');
    if (ibLog) {
      _lpFired = false;
      _lpTimer = setTimeout(() => { _lpTimer = null; _lpFired = true; if (detailId) openLogWear(detailId); }, 500);
      return;
    }
    const tile = e.target.closest('.gtile[data-item]');
    if (!tile || selectMode) { _lpItemId = null; return; }
    _lpFired = false;
    _lpItemId = tile.dataset.item;
    _lpTimer  = setTimeout(() => { _lpTimer = null; _lpFired = true; openQuickActions(_lpItemId); }, 500);
  }, { passive: true });
  document.addEventListener('touchmove',  () => { clearTimeout(_lpTimer); _lpTimer = null; }, { passive: true });
  document.addEventListener('touchend',   () => { clearTimeout(_lpTimer); _lpTimer = null; }, { passive: true });
  // Suppress the click that fires immediately after a long-press completes
  document.addEventListener('click', e => { if (_lpFired) { _lpFired = false; e.stopPropagation(); } }, true);
}

// Swipe-down on a bottom sheet to dismiss it. Only engages when the sheet is
// scrolled to the top, so it doesn't fight with scrolling long sheet content.
function wireSheetSwipe(sheetId, bgId) {
  const sheet = document.getElementById(sheetId);
  if (!sheet) return;
  let startY = 0, dragging = false, dy = 0;
  sheet.addEventListener("touchstart", e => {
    if (sheet.scrollTop > 0) { dragging = false; return; }
    startY = e.touches[0].clientY; dragging = true; dy = 0;
    sheet.classList.add("dragging");
  }, { passive: true });
  sheet.addEventListener("touchmove", e => {
    if (!dragging) return;
    dy = Math.max(0, e.touches[0].clientY - startY);
    sheet.style.transform = dy ? `translateY(${dy}px)` : "";
  }, { passive: true });
  sheet.addEventListener("touchend", () => {
    if (!dragging) return;
    dragging = false;
    sheet.classList.remove("dragging");
    sheet.style.transform = "";
    if (dy > 90) { const bg = document.getElementById(bgId); if (bg) bg.click(); }
  });
}

/* ===================================================================
   AUTH / BOOT
   =================================================================== */
function showLogin() {
  $("#login").classList.add("active");
  $("#app").hidden = true;
}
function showApp() {
  $("#login").classList.remove("active");
  $("#app").hidden = false;
}
function handleSignedOut() {
  saveSession(null);
  items = []; wears = []; outfits = []; outfitLinks = []; dataReady = false; _urlCache.clear();
  itemById = new Map(); outfitById = new Map(); outfitItemMap = new Map(); outfitWearMap = new Map();
  showLogin();
}

async function bootApp() {
  showApp();
  switchTab("home");      // land on home immediately, even before data arrives
  try {
    await loadData();
    prewarmUrlCache();    // fire-and-forget: batch-sign all photo URLs into cache
    prunePhotoCache();    // fire-and-forget: drop cached bytes for photos no item references
    renderHome();         // re-render so tile subtitles (counts) fill in
  } catch (e) {
    $("#homeBody").innerHTML = `<div class="placeholder"><b>Couldn't load data</b>
      <div class="err">${esc(e.message)}</div>
      <button class="btn" style="max-width:180px" onclick="retryLoad()">Retry</button></div>`;
  }
}
async function retryLoad() {
  $("#homeBody").innerHTML = `<div class="spin"></div>`;
  try { await loadData(); prewarmUrlCache(); prunePhotoCache(); renderHome(); } catch (e) { toast(e.message); }
}
window.retryLoad = retryLoad;

/* ===================================================================
   INIT
   =================================================================== */
(function init() {
  $$(".appver").forEach(el => el.textContent = APP_VERSION);
  const savedCols = parseInt(store.getItem("wardrobe.gridCols") || "0");
  if (savedCols >= 2 && savedCols <= 5) gridCols = savedCols;
  const savedLookCols = parseInt(store.getItem("wardrobe.lookCols") || "0");
  if (savedLookCols >= 2 && savedLookCols <= 4) lookCols = savedLookCols;
  document.documentElement.style.setProperty("--look-cols", lookCols);
  ["closet", "search"].forEach(s => {
    const k = store.getItem(`wardrobe.sort.${s}`);
    if (k) _gridSortKeys[s] = k;
  });
  wireEvents();
  loadSession();
  if (session?.access_token) bootApp();
  else showLogin();
})();
</script>
