// ---- unified item grid (Wave 1 keystone; surfaces migrate in Wave 2) ----
// cfg: { cols, group, select, selSet, onTap, metricOnly, subtitleFn,
//        packedSet, trip, emptyMsg }
function itemGridView(list, cfg = {}) {
  const {
    cols       = gridCols,
    group      = null,         // null | 'category' | 'formality'
    select     = false,
    selSet     = null,         // Set of selected ids; falls back to selectedIds
    onTap      = "item",       // data-* attribute name for delegation
    metricOnly = false,
    subtitleFn = null,
    packedSet  = null,         // Set → show pack-tick; null → no tick
    trip       = false,
    emptyMsg   = "No items here",
  } = cfg;

  if (!list.length) return `<div class="placeholder"><b>${esc(emptyMsg)}</b></div>`;

  const activeSelSet = selSet ?? (select ? selectedIds : new Set());

  const tileHtml = (i) => {
    if (packedSet) {
      const isPacked = packedSet.has(i.id);
      return `<button class="gtile${isPacked ? " packed" : ""}" data-${onTap}="${esc(i.id)}">
        <div class="pack-tick" data-pack="${esc(i.id)}"><svg viewBox="0 0 24 24"><path d="M5 12l5 5L19 7"/></svg></div>
        ${thumbHtml(i.image_path, "gphoto")}<div class="gname">${esc(i.name || "Untitled")}</div>
      </button>`;
    }
    const sel = select && activeSelSet.has(i.id);
    const sub = subtitleFn ? subtitleFn(i) : "";
    if (metricOnly) {
      return `<button class="gtile" data-${onTap}="${esc(i.id)}">
        ${thumbHtml(i.image_path, "gphoto")}
        <div class="gtile-metric">${esc(sub)}</div>
      </button>`;
    }
    const chk = `<div class="sel-dot${sel ? " on" : ""}"><svg viewBox="0 0 24 24"><path d="M5 12l5 5L19 7"/></svg></div>`;
    return `<button class="gtile${sel ? " selected" : ""}" data-${onTap}="${esc(i.id)}">
      ${select ? chk : ""}
      ${thumbHtml(i.image_path, "gphoto")}
      <div class="gname">${esc(i.name || "Untitled")}</div>
      ${sub ? `<div class="gtile-sub">${esc(sub)}</div>` : ""}
    </button>`;
  };

  const gridDiv = (items) =>
    `<div class="grid" style="--grid-cols:${cols}">${items.map(tileHtml).join("")}</div>`;

  if (!group) return gridDiv(list);

  const groups = group === "formality" ? groupByFormality(list) : groupByCategory(list);
  return groups.map(g => {
    let cnt;
    if (trip && packedSet) {
      const packed = g.items.filter(i => packedSet.has(i.id)).length;
      cnt = `<span class="g-cnt${packed === g.items.length ? " done" : ""}" data-grp-cnt>${packed}/${g.items.length} packed</span>`;
    } else {
      cnt = `<span class="g-cnt">${g.items.length} item${g.items.length === 1 ? "" : "s"}</span>`;
    }
    return `<div class="cap-grp" data-grp="${esc(g.key)}">
      <div class="cap-grp-hdr"><span class="g-name">${esc(g.key)}</span>${cnt}</div>
      ${gridDiv(g.items)}
    </div>`;
  }).join("");
}

function renderClosetCategory(cat) {
  const inCat = cat === "Other" ? lensItems().filter(isOtherCat) : lensItems().filter(i => i.category === cat);
  let rows = "";
  if (cat !== "Other") {
    for (const s of (TAXONOMY[cat] || [])) {
      const list = inCat.filter(i => i.subcategory === s);
      rows += rowHtml(folderThumb(list), s, list.length, `data-sub="${esc(s)}"`);
    }
    const subs = TAXONOMY[cat] || [];
    const other = inCat.filter(i => !i.subcategory || !subs.includes(i.subcategory));
    if (other.length) rows += rowHtml(folderThumb(other), "Other", other.length, `data-sub="__other__"`);
  }
  const hdr = `<div class="fhdr">${thumbHtml(folderThumb(inCat))}

  // categories with no subcategory taxonomy (Other) jump straight to a grid
  return clToolbar(cat, true, true) + (rows ? hdr + `<div class="frows">${rows}</div>` : hdr + gridHtml(sortItems(inCat)));

function categoryGrid(cat, sub) {
  const inCat = cat === "Other" ? lensItems().filter(isOtherCat) : lensItems().filter(i => i.category === cat);
  if (sub === "__all__") return sortItems(inCat);
  if (sub === "__other__") { const subs = TAXONOMY[cat] || []; return sortItems(inCat.filter(i => !i.subcategory || !subs.includes(i.subcategory))); }
  return sortItems(inCat.filter(i => i.subcategory === sub));
}

// Snapshot the screen currently showing so back can return there. null when we're
// already on the destination tab (the default back behavior is then correct).
function makeScreenReturn(homeTab) {
  const active = document.querySelector(".screen.active");
  const tab = active ? active.id.replace("tab-", "") : homeTab;
  if (tab === homeTab) return null;
  const fn = () => restoreTab(tab);
  fn.tab = tab;  // lets openItem() label its back button with the real destination
  return fn;
}
function makeItemReturn() { return makeScreenReturn("closet"); }

// Re-show a tab from its PRESERVED view-state (unlike switchTab, which resets
// per-tab view globals like capsuleView/statsView). Used to return from item detail.
function restoreTab(tab) {
  $$(".screen").forEach(s => s.classList.toggle("active", s.id === `tab-${tab}`));
  $$("#tabbar button").forEach(b => b.classList.toggle("on", b.dataset.tab === tab));
  $("#title").textContent = TAB_TITLES[tab] || "";
  $("#headerAdd").hidden = tab !== "home";
  $("#itemBar").hidden = true;
  $("#app").classList.remove("detail-photo");
  hideGridBar();
  if (tab === "capsules")      renderCapsules();
  else if (tab === "stats")    renderStats();
  else if (tab === "looks") {
    // A look was open when we left (e.g. tapped one of its pieces) — return to
    // it, not the list. renderLooks() would wipe lookId.
    if (lookId && outfitById.has(lookId)) {
      if (lookView === "details")    openLookDetails(lookId);
      else if (lookView === "wears") openLookWears(lookId);
      else                           openLook(lookId);
    } else renderLooks();
  }
  else if (tab === "calendar") renderCalendar();
  else if (tab === "home")     renderHome();
  else                         renderCloset();
}

// Open an item while remembering the origin screen. Use from any non-closet entry
// point (looks, capsules, stats, suggestions, calendar…) instead of bare
// switchTab("closet") + openItem, so back returns to where the item was opened.
// V3 nav-audit fix: pass `browseCtx` ({cat, sub}) instead of pre-setting
// closetCat/closetSub at the call site — the closet browse state is snapshotted
// here and restored when the return thunk fires, so viewing an item from another
// screen no longer silently moves the closet tab's position.
function openItemFrom(id, browseCtx) {
  const ret = makeItemReturn();             // capture BEFORE we bring the closet forward
  if (ret) {
    const snap = { cat: closetCat, sub: closetSub, res: searchResults };
    _itemReturn = () => { closetCat = snap.cat; closetSub = snap.sub; searchResults = snap.res; ret(); };
    _itemReturn.tab = ret.tab;
  } else _itemReturn = null;
  if (browseCtx) {  // sibling prev/next nav browses the item's own category
    closetCat = browseCtx.cat ?? null;
    closetSub = browseCtx.sub ?? null;
    searchResults = null;
  }
  builder = null; $("#app").classList.remove("builder-mode");
  $$(".screen").forEach(s => s.classList.toggle("active", s.id === "tab-closet"));
  $$("#tabbar button").forEach(b => b.classList.toggle("on", b.dataset.tab === "closet"));
  $("#title").textContent = "";
  $("#headerAdd").hidden = true;
  hideGridBar();
  openItem(id);
}

// Open a look while remembering the origin screen. Use from any non-Looks entry
// point (calendar, stats, capsules…) instead of switchTab("looks") + openLook,
// so back returns to where the look was opened.
function openLookFrom(id) {

function closetBack() {
  if (selectMode) { exitSelectMode(); renderCloset(); return; }
  if (detailId && detailView === "details") { openItem(detailId); return; }
  if (detailId && _reviewMode) {
    _reviewMode = false;
    detailId = null; detailView = null;
    $("#itemBar").hidden = true;
    $("#app").classList.remove("detail-photo");
    // Return to review deal card
    $$(".screen").forEach(s => s.classList.toggle("active", s.id === "tab-stats"));
    $$("#tabbar button").forEach(b => b.classList.toggle("on", b.dataset.tab === "stats"));
    $("#title").textContent = "Style Stats";
    $("#headerAdd").hidden = true;
    statsView = "review-deal";
    renderStats(); return;
  }
  if (detailId && _fromBuilder) {
    const stash = _fromBuilder; _fromBuilder = null;
    detailId = null; detailView = null;
    $("#itemBar").hidden = true;
    $("#app").classList.remove("detail-photo");
    builder = stash;
    $("#app").classList.add("builder-mode");
    switchTab("builder");
    return;
  }
  if (detailId && _itemReturn) {
    const r = _itemReturn; _itemReturn = null;
    detailId = null; detailView = null;
    $("#itemBar").hidden = true;
    $("#app").classList.remove("detail-photo");
    r(); return;
  }
  if (detailId) {
    detailId = null; detailView = null;
    $("#itemBar").hidden = true;
    $("#app").classList.remove("detail-photo");
    renderCloset(); return;
  }
  if (closetSub) { closetSub = null; }
  else if (closetCat) { closetCat = null; }
  renderCloset();
}

// Items visible in the current subcategory/grid context (for prev/next navigation).
function siblingItems() {

// ---- Photo view ----
function openItem(id) {
  const i = items.find(x => x.id === id);
  if (!i) return;
  detailId = id;
  detailView = null;

  // Label the back button with where closetBack() will ACTUALLY go — its priority
  // order (review deal → builder → origin screen → closet grid). closetSub/closetCat
  // may hold this item's category for sibling nav, but back doesn't go there.
  const backLabel = _reviewMode ? "Review"
    : _fromBuilder ? "Look"
    : _itemReturn ? ({ home: "Home", calendar: "Calendar", stats: "Stats", capsules: "Capsules",
                       looks: (lookId && outfitById.has(lookId)) ? "Look" : "Looks" }[_itemReturn.tab] || "Back")
    : closetSub
    ? (closetSub === "__all__" ? closetCat : closetSub === "__other__" ? "Other" : closetSub)
    : closetCat || "Closet";

  const sibs = siblingItems();
  const sibIdx = sibs.findIndex(x => x.id === id);
  const sibLabel = closetSub && closetSub !== "__all__" && closetSub !== "__other__"
    ? closetSub : closetCat || "Closet";
  const sibBar = sibs.length > 1 ? `
    <div class="item-sib-bar">
      <button class="item-sib-btn" id="itemPrev" ${sibIdx <= 0 ? "disabled" : ""}>
        <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <span class="item-sib-label">${sibIdx + 1} of ${sibs.length}${sibLabel !== "Closet" ? `<br><span style="font-size:11px">${esc(sibLabel)}</span>` : ""}</span>
      <button class="item-sib-btn" id="itemNext" ${sibIdx >= sibs.length - 1 ? "disabled" : ""}>
        <svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
      </button>
    </div>` : "";

  const body = $("#closetBody");
  body.innerHTML = `
    <div class="item-nav">
      <button class="item-back" id="clBack">
        <svg viewBox="0 0 24 24"><path d="M15 6l-6 6 6 6"/></svg>
        <span>${esc(backLabel)}</span>
      </button>
      <div class="item-nav-title">${esc(i.name || "Untitled")}</div>
      <div class="item-nav-right">
        <button class="item-nav-btn" id="itemShuffle" title="Suggest outfit">
          <svg viewBox="0 0 24 24"><path d="M16 3h5v5"/><path d="M4 20L21 3"/><path d="M21 16v5h-5"/><path d="M15 15l6 6"/><path d="M4 4l5 5"/></svg>
        </button>
        <button class="item-add-look" id="itemAddLook">Add to Look</button>
      </div>
    </div>
    ${sibBar}
    <div class="item-stat-strip">${esc(itemStatLine(i))}</div>
    ${workhorseBadgeHtml(i)}
    ${i.image_path
      ? `<div class="item-photo" data-photo="${esc(i.image_path)}"></div>`
      : `<div class="item-photo empty"><svg viewBox="0 0 24 24" style="width:64px;height:64px;stroke:#ccc;stroke-width:1.4;fill:none"><rect x="2" y="6" width="20" height="14" rx="2"/><circle cx="12" cy="13" r="3"/></svg></div>`}
  `;

  hideGridBar();
  $("#itemBar").hidden = false;
  $("#app").classList.add("detail-photo");

  hydratePhotos(body);

  // Slide-in animation when arriving via sibling navigation
  const photoForAnim = body.querySelector('.item-photo');
  if (photoForAnim && _itemSlideDir) {
    photoForAnim.classList.add(_itemSlideDir === "next" ? "itm-anim-next" : "itm-anim-prev");
    _itemSlideDir = null;
  }

  $("#itemShuffle").onclick = () => openSuggestSheet(i.id);
  $("#itemAddLook").onclick = () => openBuilder(null, i.id);

  const goSib = (dir) => {
    const s = siblingItems(); const idx = s.findIndex(x => x.id === id);
    if (dir === "next" && idx < s.length - 1) { _itemSlideDir = "next"; openItem(s[idx + 1].id); }
    else if (dir === "prev" && idx > 0) { _itemSlideDir = "prev"; openItem(s[idx - 1].id); }
  };
  const prevBtn = $("#itemPrev"), nextBtn = $("#itemNext");
  if (prevBtn) prevBtn.onclick = () => goSib("prev");
  if (nextBtn) nextBtn.onclick = () => goSib("next");

  // Swipe photo left/right to navigate siblings
  if (sibs.length > 1) {
    const photoEl = body.querySelector('.item-photo');
    if (photoEl) {
      let _psx = 0, _psy = 0;
      photoEl.addEventListener('touchstart', e => { _psx = e.touches[0].clientX; _psy = e.touches[0].clientY; }, { passive: true });
      photoEl.addEventListener('touchend', e => {
        const dx = e.changedTouches[0].clientX - _psx, dy = e.changedTouches[0].clientY - _psy;
        if (Math.abs(dx) < 60 || Math.abs(dx) < Math.abs(dy)) return;
        goSib(dx < 0 ? "next" : "prev");
      }, { passive: true });
    }
  }
}

// ---- Details / edit view ----
function openItemDetails(id) {

  // Purchase date + time in closet
  let purchasedText = null, timeInClosetText = null;
  if (i.purchase_date) {
    const pd = new Date(i.purchase_date + "T00:00:00");

      ? pd.toLocaleDateString(undefined, { year: "numeric", month: "short" })
      : pd.toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" });
    const d = daysSince(i.purchase_date);
    if (d < 30) timeInClosetText = `${d}d`;
    else if (d < 365) timeInClosetText = `${Math.floor(d / 30)}mo`;

    return `<button class="det-row" data-det-field="${field}">

      <div class="cltitle">Details</div>

        <button class="det-row" id="detOutfits"${oc ? "" : " disabled"} style="width:100%;text-align:left">
          <span class="det-val"${oc ? "" : ' style="color:var(--muted)"'}>Used in ${oc} look${oc === 1 ? "" : "s"}</span>
          ${oc ? '<svg class="chev" viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg>' : ""}

// ---- Replace / add / remove an item's photo (reuses the add-item pipeline) ----
function pickItemPhoto(id) {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = "image/*";
  input.onchange = (e) => { const f = e.target.files[0]; if (f) replaceItemPhoto(id, f); };
  input.click();
}

async function replaceItemPhoto(id, file) {
  const i = items.find(x => x.id === id);
  if (!i) return;
  toast("Uploading photo…");
  try {
    const { blob, ext } = await compressImage(file);
    const filename = `${(crypto.randomUUID ? crypto.randomUUID() : Date.now())}.${ext}`;
    const path = await uploadPhoto(blob, filename);
    const old = i.image_path;
    await rest(`/items?id=eq.${id}`, {
      method: "PATCH",
      headers: { "Content-Type": "application/json", Prefer: "return=minimal" },
      body: JSON.stringify({ image_path: path }),
    });
    i.image_path = path;
    if (old && old !== path) deletePhoto(old);  // fire-and-forget cleanup
    signedUrlBatch([path]);                     // pre-sign so the new photo renders immediately
    toast(old ? "Photo replaced" : "Photo added");
    if (detailId === id && detailView === "details") openItemDetails(id);
  } catch (e) { toast(e.message); }
}

async function removeItemPhoto(id) {
  const i = items.find(x => x.id === id);
  if (!i || !i.image_path) return;
  if (!confirm("Remove this photo?")) return;
  const old = i.image_path;
  try {
    await rest(`/items?id=eq.${id}`, {
      method: "PATCH",
      headers: { "Content-Type": "application/json", Prefer: "return=minimal" },
      body: JSON.stringify({ image_path: null }),
    });
    i.image_path = null;
    deletePhoto(old);
    toast("Photo removed");
    if (detailId === id && detailView === "details") openItemDetails(id);
  } catch (e) { toast(e.message); }
}

// ---- Save a single field to Supabase ----
async function saveField(id, field, value) {
  const i = items.find(x => x.id === id);
  if (!i) return;
  if (field === "name" && !value) { toast("Name can't be empty"); return; }
  const prev = i[field];
  i[field] = value; // optimistic
  const patch = { [field]: value };
  // An explicitly-entered purchase date is no longer a guess.
  if (field === "purchase_date") { i.date_is_guess = false; patch.date_is_guess = false; }
  // Changing a piece's formality re-categorizes every look it's in (unless the
  // look has a manual override) — drop their cached buckets so they re-derive.
  if (field === "formality") {
    for (const o of outfits) if ((outfitItemMap.get(o.id) || []).includes(id)) o._bucket = null;
  }
  try {
    await rest(`/items?id=eq.${id}`, {
      method: "PATCH",
      headers: { "Content-Type": "application/json", Prefer: "return=minimal" },
      body: JSON.stringify(patch),
    });
    // refresh details if still in details view for this item
    if (detailId === id && detailView === "details") openItemDetails(id);
  } catch (e) {
    i[field] = prev;
    toast(e.message);
  }
}

// ---- Field edit sheet ----
let _fieldEditId = null;
let _fieldEditKey = null;
let _fieldPending = undefined; // current pending value in sheet
let _fieldEditItem = null;    // the item object being edited (real item or _addState)
let _fieldOnSave = null;      // null = save to DB; fn(val) = custom save (used by Add form)

function openFieldEdit(id, field) {
  const cfg = FIELD_CONFIGS[field];
  if (!cfg) return;
  const i = items.find(x => x.id === id);
  if (!i) return;
  _fieldEditId = id;
  _fieldEditKey = field;
  _fieldPending = i[field];
  _fieldEditItem = i;
  _fieldOnSave = null;
  renderFieldSheet(i, field, cfg);
  $("#fieldSheet").hidden = false;
}

function closeFieldSheet() {
  $("#fieldSheet").hidden = true;
  _fieldEditId = null;
  _fieldEditKey = null;
  _fieldPending = undefined;
  _fieldEditItem = null;
  _fieldOnSave = null;
}

function renderFieldSheet(i, field, cfg) {
  const curVal = _fieldPending !== undefined ? _fieldPending : i[field];
  // Per-field keyboard hints: URLs want the url keyboard + no autocorrect; proper
  // nouns (name/brand/retailer) capitalize words and skip autocorrect/spellcheck.
  const isUrl = field === "url";
  const capWords = field === "name" || field === "brand" || field === "retailer";
  const textAttrs = isUrl
    ? `type="url" inputmode="url" autocapitalize="off" autocorrect="off" spellcheck="false"`
    : `type="text" inputmode="text" autocapitalize="${capWords ? "words" : "sentences"}" autocorrect="${capWords ? "off" : "on"}" spellcheck="${capWords ? "false" : "true"}"`;
  let content = "";
  if (cfg.type === "text" || cfg.type === "price") {
    const isPrice = cfg.type === "price";
    const attrs = isPrice ? `type="number" inputmode="decimal"` : textAttrs;
    content = `<div class="sheet-expand" style="border:none;background:#fff;padding:16px 18px">
      <input class="inp" id="fieldTextInp" ${attrs}
        value="${esc(curVal != null ? String(curVal) : "")}"
        placeholder="${esc(cfg.label)}…" style="width:100%;font-size:16px">
    </div>`;
  } else if (cfg.type === "date") {
    content = `<div class="sheet-expand" style="border:none;background:#fff;padding:16px 18px">
      <input class="inp" id="fieldTextInp" type="date" max="${todayStr()}"
        value="${esc(curVal != null ? String(curVal).slice(0, 10) : "")}" style="width:100%;font-size:16px">
    </div>`;
  } else if (cfg.type === "typeahead") {
    const suggestions = distinctByFreq(field);  // most-used first
    const suggestHtml = suggestions.length
      ? `<div class="fld-sugg-lbl">Previously entered</div>
         <div class="fld-suggestions">${suggestions.map(s =>
           `<button class="sheet-chip${s === curVal ? " on" : ""}" data-fv="${esc(s)}">${esc(s)}</button>`).join("")}</div>`
      : "";
    content = `<div class="sheet-expand" style="border:none;background:#fff;padding:16px 18px">
      <input class="inp" id="fieldTextInp" ${textAttrs}
        value="${esc(curVal != null ? String(curVal) : "")}"
        placeholder="${esc(cfg.label)}…" style="width:100%;font-size:16px">
    </div>${suggestHtml}`;
  } else if (cfg.type === "color") {
    const chips = cfg.opts.map(o => {
      const on = curVal === o;
      const hex = colorHex(o);
      return `<button class="fld-color-chip${on ? " on" : ""}" data-fv="${esc(o)}" title="${esc(o)}"
        style="background:${hex};${on ? "outline:3px solid var(--accent);outline-offset:2px;" : ""}">
        ${on ? `<svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:#fff;stroke-width:3;fill:none"><path d="M5 12l5 5L19 7"/></svg>` : ""}
      </button>`;
    }).join("");
    content = `<div style="padding:16px 18px"><div class="fld-color-grid">${chips}</div></div>`;
  } else if (cfg.type === "formality") {
    const sel = Array.isArray(curVal) ? curVal : (curVal ? [+curVal] : []);
    const chips = OCCASION_LADDER.map((lbl, idx) => {
      const lvl = idx + 1, on = sel.includes(lvl);
      return `<button class="sheet-chip${on ? " on" : ""}" data-fv="${lvl}" style="text-align:left">
        <span style="font-weight:500">${lvl}. ${esc(lbl)}</span>
        <span style="font-size:11px;color:var(--muted);display:block;margin-top:1px">${esc(OCCASION_HINTS[idx])}</span>
      </button>`;
    }).join("");
    content = `<div class="sheet-expand" style="border:none"><div class="sheet-chips" style="flex-direction:column;align-items:stretch;gap:6px">${chips}</div></div>`;
  } else {
    // single or multi chips
    const isMulti = cfg.type === "multi";
    const selected = isMulti ? (Array.isArray(curVal) ? curVal : []) : (curVal ? [curVal] : []);
    const chips = cfg.opts.map(o => {
      const on = selected.includes(o);
      return `<button class="sheet-chip${on ? " on" : ""}" data-fv="${esc(o)}">${esc(o)}</button>`;
    }).join("");
    const filterHtml = (isMulti && cfg.filter)
      ? `<div style="padding:12px 18px 4px"><input id="multiFilter" class="inp" placeholder="Filter…" style="width:100%;font-size:15px"></div>`
      : "";
    content = `${filterHtml}<div class="sheet-expand" style="border:none"><div class="sheet-chips">${chips}</div></div>`;
  }

  const hasVal = curVal != null && curVal !== "" && !(Array.isArray(curVal) && curVal.length === 0);

  $("#fieldInner").innerHTML = `
    <div class="sheet-hdr">
      <button class="lnk" id="fldCancel">Cancel</button>
      <h2>${esc(cfg.label)}</h2>
      <button class="lnk" id="fldSave" style="font-weight:700">Save</button>
    </div>
    ${content}
    ${hasVal ? `<div style="padding:0 18px 8px"><button class="lnk" id="fldClear" style="color:var(--danger);font-size:14px">Clear</button></div>` : ""}
  `;

  // wire cancel
  $("#fldCancel").onclick = closeFieldSheet;

  // wire save — respects _fieldOnSave for Add form
  $("#fldSave").onclick = async () => {
    let val = _fieldPending;
    if (cfg.type === "text" || cfg.type === "price" || cfg.type === "typeahead" || cfg.type === "date") {
      const inp = $("#fieldTextInp");
      val = inp ? (cfg.type === "price" ? (inp.value ? parseFloat(inp.value) : null) : (inp.value.trim() || null)) : val;
    }
    if (_fieldEditKey === "name" && !val) { toast("Name can't be empty"); return; }
    if (_fieldOnSave) { _fieldOnSave(val); closeFieldSheet(); }
    else { await saveField(_fieldEditId, _fieldEditKey, val); closeFieldSheet(); }
  };

  // wire clear
  const clearBtn = $("#fldClear");
  if (clearBtn) {
    clearBtn.onclick = async () => {
      const cleared = Array.isArray(curVal) ? [] : null;
      if (_fieldOnSave) { _fieldOnSave(cleared); closeFieldSheet(); }
      else { await saveField(_fieldEditId, _fieldEditKey, cleared); closeFieldSheet(); }
    };
  }

  // text / typeahead input live update + suggestion filtering
  const ti = $("#fieldTextInp");
  if (ti) {
    ti.oninput = () => {
      _fieldPending = ti.value;
      if (cfg.type === "typeahead") {
        const q = ti.value.trim().toLowerCase();
        $("#fieldInner").querySelectorAll(".fld-suggestions .sheet-chip").forEach(chip => {
          chip.hidden = q.length > 0 && !chip.textContent.toLowerCase().includes(q);
        });
      }
    };
    setTimeout(() => ti.focus(), 80);
  }

  // multi filter input (e.g. fabric)
  const mf = $("#multiFilter");
  if (mf) {
    mf.oninput = () => {
      const q = mf.value.trim().toLowerCase();
      $("#fieldInner").querySelectorAll(".sheet-chips .sheet-chip").forEach(chip => {
        chip.hidden = q.length > 0 && !chip.textContent.toLowerCase().includes(q);
      });
    };
    setTimeout(() => mf.focus(), 80);
  }

  // chip clicks
  $("#fieldInner").querySelectorAll("[data-fv]").forEach(btn => {
    btn.onclick = () => {
      const v = btn.dataset.fv;
      if (cfg.type === "typeahead") {
        // fill text input + highlight the chosen chip; don't re-render
        _fieldPending = v;
        const inp = $("#fieldTextInp");
        if (inp) inp.value = v;
        $("#fieldInner").querySelectorAll(".fld-suggestions .sheet-chip")
          .forEach(c => c.classList.toggle("on", c.dataset.fv === v));
        return;
      }
      if (cfg.type === "formality") {
        const n = +v;
        const cur = Array.isArray(_fieldPending) ? _fieldPending : (_fieldPending ? [+_fieldPending] : []);
        _fieldPending = cur.includes(n) ? cur.filter(x => x !== n) : [...cur, n].sort((a, b) => a - b);
      } else if (cfg.type === "multi") {
        const cur = Array.isArray(_fieldPending) ? _fieldPending : (Array.isArray((i || {})[field]) ? [...(i || {})[field]] : []);
        _fieldPending = cur.includes(v) ? cur.filter(x => x !== v) : [...cur, v];
      } else if (cfg.type === "color" || cfg.type === "single") {
        _fieldPending = (_fieldPending === v) ? null : v;
      }
      renderFieldSheet(_fieldEditItem, _fieldEditKey, cfg);
    };
  });
}

// ---- Contexts (wears.context — text[], multi-select) ----
// Tolerant accessor: returns an array whether context is null, a string (legacy /
// pre-migration), or an array (post-migration).
const ctxArr = (w) => !w || !w.context ? [] : (Array.isArray(w.context) ? w.context : [w.context]);

// Seed list + any custom contexts the user has already logged (derive-first).
function contextOptions() {
  // Most-used first (never-used seeds trail, alphabetical among ties).
  const counts = new Map(CONTEXT_SEED.map(c => [c, 0]));
  for (const w of wears) for (const c of ctxArr(w)) counts.set(c, (counts.get(c) || 0) + 1);
  return [...counts.keys()].sort((a, b) => (counts.get(b) - counts.get(a)) || a.localeCompare(b));
}

// Distinct contexts an item has been worn for, with counts (most-worn first).
function itemContexts(itemId) {
  const counts = new Map();
  for (const w of wears) {
    if (w.item_id !== itemId) continue;
    for (const c of ctxArr(w)) counts.set(c, (counts.get(c) || 0) + 1);
  }
  return [...counts.entries()].map(([ctx, count]) => ({ ctx, count }))
    .sort((a, b) => b.count - a.count);
}

// V3: her weekly rhythm predicts the context ("Sundays are usually Church").
// Top context for the date's weekday, counted in distinct DAYS (so a 5-piece
// look doesn't count 5×); needs ≥3 days to trust. Suggestion only — never saved.
function weekdayTopContext(dateStr) {
  const dow = new Date(dateStr + "T00:00:00").getDay();
  const days = new Map();  // context → Set of dates
  for (const w of wears) {
    if (!w.worn_on) continue;
    const cs = ctxArr(w);
    if (!cs.length) continue;
    if (new Date(w.worn_on + "T00:00:00").getDay() !== dow) continue;
    for (const c of cs) { if (!days.has(c)) days.set(c, new Set()); days.get(c).add(w.worn_on); }
  }
  let best = null, n = 0;
  for (const [c, s] of days) if (s.size > n) { n = s.size; best = c; }
  if (n < 3) return null;
  const names = ["Sundays", "Mondays", "Tuesdays", "Wednesdays", "Thursdays", "Fridays", "Saturdays"];
  return { ctx: best, label: `usual for ${names[dow]}` };
}

// Reusable multi-select context picker for log sheets. Reads/writes the module-global
// `_ctxSel` (array of chosen contexts). Self-re-renders into #ctxPicker so the rest of
// the surrounding sheet (e.g. the date input) is untouched.
let _ctxSel = [];
let _ctxAddOpen = false;  // whether the "+ Add…" typeahead input is expanded
let _ctxSuggest = null;   // {ctx,label} weekday-based suggestion (post-log sheet only)
let _logItemId = null;  // item being logged, for context-chip ordering (A2)
function contextPickerHtml() { return `<div id="ctxPicker" style="margin-top:18px"></div>`; }
function renderContextPicker() {
  const wrap = $("#ctxPicker");
  if (!wrap) return;
  let opts = contextOptions();
  // Sort this item's most-frequently-used contexts to the top (A2)
  if (_logItemId) {
    const freq = new Map(itemContexts(_logItemId).map(({ctx, count}) => [ctx, count]));
    opts = [...opts].sort((a, b) => (freq.get(b) || 0) - (freq.get(a) || 0));
  }
  const extra = _ctxSel.filter(c => !opts.includes(c));   // custom added this session
  const all = [...opts, ...extra];
  // V3 weekday suggestion: one pre-offered chip, one tap to confirm; disappears
  // once picked (it's then just a selected chip below).
  const sug = _ctxSuggest && !_ctxSel.includes(_ctxSuggest.ctx)
    ? `<button class="sheet-chip" data-ctx-sug="${esc(_ctxSuggest.ctx)}" style="border-color:var(--accent);color:var(--accent);margin-bottom:8px">✨ ${esc(_ctxSuggest.ctx)} <span style="opacity:.65;font-weight:400">· ${esc(_ctxSuggest.label)}</span></button>`
    : "";
  wrap.innerHTML = `
    <label style="display:block;font-size:13px;color:var(--muted);margin-bottom:8px">Context <span style="opacity:.6">(optional · choose any that apply)</span></label>
    ${sug}
    <div class="sheet-chips" style="margin-bottom:8px">
      ${all.map(c => `<button class="sheet-chip${_ctxSel.includes(c) ? " on" : ""}" data-ctx="${esc(c)}">${esc(c)}</button>`).join("")}
      <button class="sheet-chip" data-ctx-add="1">+ Add…</button>
    </div>
    <div id="ctxOtherWrap" style="display:${_ctxAddOpen ? "flex" : "none"};flex-direction:column;gap:8px;margin-top:6px">
      <div style="display:flex;gap:8px">
        <input class="inp" id="ctxOther" placeholder="Type to find or add a context…" style="flex:1;font-size:15px" autocomplete="off">
        <button class="lnk" id="ctxOtherAdd" style="font-weight:700;flex:none">Add</button>
      </div>
      <div id="ctxSuggest" class="ctx-typeahead"></div>
    </div>`;
  wrap.querySelectorAll("[data-ctx]").forEach(b => b.onclick = () => {
    const v = b.dataset.ctx;
    _ctxSel = _ctxSel.includes(v) ? _ctxSel.filter(x => x !== v) : [..._ctxSel, v];
    _ctxAddOpen = false;
    renderContextPicker();
  });
  const sugBtn = wrap.querySelector("[data-ctx-sug]");
  if (sugBtn) sugBtn.onclick = () => {
    _ctxSel = [..._ctxSel, sugBtn.dataset.ctxSug];
    renderContextPicker();
  };
  const addBtn = wrap.querySelector("[data-ctx-add]");
  if (addBtn) addBtn.onclick = () => {
    _ctxAddOpen = true;
    const ow = wrap.querySelector("#ctxOtherWrap");
    ow.style.display = "flex";
    wrap.querySelector("#ctxOther").focus();
  };
  // Live typeahead: filter known contexts as the user types; tap to pick or create.
  const renderSuggest = (q) => {
    const box = wrap.querySelector("#ctxSuggest");
    if (!box) return;
    const ql = q.trim().toLowerCase();
    if (!ql) { box.innerHTML = ""; return; }
    const matches = contextOptions().filter(c => !_ctxSel.includes(c) && c.toLowerCase().includes(ql)).slice(0, 6);
    const exact = contextOptions().some(c => c.toLowerCase() === ql) || _ctxSel.some(c => c.toLowerCase() === ql);
    box.innerHTML = matches.map(c => `<button class="ctx-ta-row" data-ctx-pick="${esc(c)}">${esc(c)}</button>`).join("")
      + (!exact ? `<button class="ctx-ta-row ctx-ta-new" data-ctx-new="${esc(q.trim())}">+ Create “${esc(q.trim())}”</button>` : "");
    box.querySelectorAll("[data-ctx-pick]").forEach(b => b.onclick = () => {
      _ctxSel.push(b.dataset.ctxPick); _ctxAddOpen = false; renderContextPicker();
    });
    const nb = box.querySelector("[data-ctx-new]");
    if (nb) nb.onclick = () => {
      const v = nb.dataset.ctxNew;
      if (v && !_ctxSel.includes(v)) _ctxSel.push(v);
      _ctxAddOpen = false; renderContextPicker();
    };
  };
  const commit = () => {
    const inp = wrap.querySelector("#ctxOther");
    const v = (inp.value || "").trim();
    if (v && !_ctxSel.includes(v)) _ctxSel.push(v);
    _ctxAddOpen = false;
    renderContextPicker();
  };
  const otherAdd = wrap.querySelector("#ctxOtherAdd");
  if (otherAdd) otherAdd.onclick = commit;
  const inp = wrap.querySelector("#ctxOther");
  if (inp) {
    inp.oninput = () => renderSuggest(inp.value);
    inp.onkeydown = (e) => { if (e.key === "Enter") { e.preventDefault(); commit(); } };
    if (_ctxAddOpen) inp.focus();
  }
}
const ctxSelOrNull = () => _ctxSel.length ? _ctxSel : null;

// ---- One-tap wear today (A1): POST immediately, then offer context + formality ----
// D2 soft dup-wear guard: if this item already has a wear logged today, don't
// silently double-log — ask first. "Log again →" bypasses the guard for the
// (rare, legit) case of wearing the same piece twice in a day.
async function logWearToday(id, { force = false } = {}) {
  const today = todayStr();
  if (!force && wears.some(w => w.item_id === id && w.worn_on === today)) {
    toast("Already logged today", { label: "Log again →", fn: () => logWearToday(id, { force: true }) });
    return;
  }
  try {
    const fml = deriveWearFormality([id]);
    const rows = await rest("/wears", {
      method: "POST",
      headers: { "Content-Type": "application/json", Prefer: "return=representation" },
      body: JSON.stringify({ item_id: id, worn_on: today, formality_for: fml }),
    });
    const wear = Array.isArray(rows) && rows[0]
      ? rows[0]
      : { id: null, item_id: id, worn_on: today, outfit_id: null, context: null, formality_for: fml };
    wears.push(wear);
    toast("Wear logged", [
      { label: "Undo", fn: () => undoLoggedWears([wear]) },
      { label: "Add context →", fn: () => openPostLogSheet([wear]) },
    ]);
  } catch (e) { toast(e.message); }
}

// G3: shared undo for one-tap logging — DELETE the created wear row(s), splice
// from local state, and re-render whatever's currently visible so it doesn't
// look logged anymore.
async function undoLoggedWears(rows) {
  const ids = rows.map(w => w.id).filter(Boolean);
  try {
    if (ids.length) await rest(`wears?id=in.(${ids.map(id => `"${id}"`).join(",")})`, { method: "DELETE" });
    wears = wears.filter(w => !rows.includes(w));
    toast("Undone");
    const activeScreen = $(".screen.active")?.id;
    if (activeScreen === "tab-calendar" && calendarDay) renderCalendarDay($("#calendarBody"));
    else if (activeScreen === "tab-home") renderHome();
    else if (detailId && detailView !== "details") openItem(detailId);
  } catch (e) { toast(e.message); }
}

// ---- Post-log sheet: context capture (A2) ----
// L2b: this is the user's PRIMARY hearting moment (she hearts looks when wearing
// them, not while browsing) — show a heart row whenever the logged wears share
// an outfit_id. The tap saves immediately (not gated on Save/Skip), same as the
// canvas heart, since a heart is its own complete action.
// V3: formality is no longer asked here — it's derived at log time
// (deriveWearFormality); the look's formality edit is the manual override.
// `undoable` shows an Undo toast when the sheet closes (look logs).
function openPostLogSheet(wearRows, { presetCtx, undoable = false } = {}) {
  _logItemId = wearRows.length === 1 ? wearRows[0].item_id : null;
  _ctxSel = presetCtx && presetCtx.length ? [...presetCtx] : []; _ctxAddOpen = false;
  _ctxSuggest = weekdayTopContext(wearRows[0]?.worn_on || todayStr());
  const oid = wearRows.length && wearRows.every(r => r.outfit_id && r.outfit_id === wearRows[0].outfit_id)
    ? wearRows[0].outfit_id : null;
  const o = oid ? outfitById.get(oid) : null;

  $("#logInner").innerHTML = `
    <div class="sheet-hdr">
      <button class="lnk" id="postLogCancel">Skip</button>
      <h2>Add context</h2>
      <button class="lnk" id="postLogSave" style="font-weight:700">Save</button>
    </div>
    <div style="padding:20px 18px 30px">
      ${o ? `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
        <label style="font-size:13px;color:var(--muted)">Loved wearing this look?</label>
        <button class="lk-heart-btn${o.rating === 1 ? " on" : ""}" id="postLikeBtn"><svg viewBox="0 0 24 24" style="width:26px;height:26px;stroke:currentColor;stroke-width:1.8;fill:none">${HEART_SVG}</svg></button>
      </div>` : ""}
      ${contextPickerHtml()}
    </div>`;
  $("#logSheet").hidden = false;
  renderContextPicker();
  if (o) {
    $("#postLikeBtn").onclick = () => {
      toggleLikeLook(oid).then(r => { const btn = $("#postLikeBtn"); if (btn) btn.classList.toggle("on", r === 1); });
    };
  }

  const close = () => {
    $("#logSheet").hidden = true; _logItemId = null; _ctxSuggest = null;
    if (undoable) toast("Logged ✓", { label: "Undo", fn: () => undoLoggedWears(wearRows) });
  };
  $("#postLogCancel").onclick = close;
  $("#postLogSave").onclick = async () => {
    const ctx = ctxSelOrNull();
    if (ctx) {
      const patchable = wearRows.filter(r => r.id);
      if (patchable.length) {
        try {
          await Promise.all(patchable.map(r =>
            rest(`/wears?id=eq.${r.id}`, {
              method: "PATCH",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ context: ctx }),
            })
          ));
          patchable.forEach(r => { r.context = ctx; });
        } catch (_) { /* wear already logged — context is best-effort */ }
      }
    }
    close();
  };
}

/* ===================================================================
   SEARCH  (keyword + Color/Fabric/Size/Season/Brand/Status filters)
   =================================================================== */
const FILTER_FORMALITY_OPTS = ["1","2","3","4","5","6","7","8"];
const FILTERS = [
  ["color",      "Color",       () => COLOR_FAMILIES.map(c => c[0])],
  ["fabric",     "Fabric",      () => distinctArr("fabric")],
  ["size",       "Size",        () => distinctScalar("size")],
  ["season",     "Season",      () => SEASONS],
  ["brand",      "Brand",       () => distinctScalar("brand")],
  ["status",     "Status",      () => STATUSES],
  ["category",   "Category",    () => Object.keys(TAXONOMY)],
  ["subcategory","Subcategory", () => distinctScalar("subcategory")],
  ["formality",  "Formality",   () => FILTER_FORMALITY_OPTS],
  ["retailer",   "Retailer",    () => distinctScalar("retailer")],
  ["acquisition","Acquisition", () => ["New","Secondhand","Gift"]],
  ["capsule",    "Capsule",     () => capsules.map(c => c.name).sort()],
];
// Per-surface filter dims: closet uses lens for status + folders for category/subcategory (not in funnel).
// Stats includes category (useful: filter to Tops only), but not subcategory (too granular).
// Looks has no category/subcategory dims (outfits are cross-category by design).
const CLOSET_FILTER_DIMS = FILTERS.filter(([k]) => !["status","category","subcategory","capsule"].includes(k));
const STATS_FILTER_DIMS  = FILTERS.filter(([k]) => k !== "subcategory"); // keep category: "show Tops only" is a useful stats lens
// L4: "Liked" is outfit-only (o.rating) — appended only here, not to the shared
// FILTERS array, so itemMatchesFilter (which destructures specific keys) simply
// never sees it and other surfaces stay unaffected.
const LOOKS_FILTER_DIMS  = [...FILTERS.filter(([k]) => !["category","subcategory"].includes(k)), ["liked", "Liked", () => ["Liked"]]];
// Builder picker already has its own category/subcategory folder nav + a single-select
// capsule scope chip bar — the funnel only needs attribute dims layered on top.
const BUILDER_FILTER_DIMS = FILTERS.filter(([k]) => !["category","subcategory","capsule"].includes(k));
// Shared calendar +Clothing / capsule add-items picker (the `_capPick*` family): it
// already has its own status chips + category/subcategory folder nav, but — unlike
// the builder picker — capsule STAYS IN as a funnel dim (this was the reported bug:
// no way to narrow these pickers to a capsule/trip's members).
const PICKER_FILTER_DIMS = FILTERS.filter(([k]) => !["status","category","subcategory"].includes(k));

// ---- unified filter state (persists across renders per surface) ----
function newFilterState(overrides) {
  const s = { q: "", color: new Set(), fabric: new Set(), size: new Set(),
    season: new Set(), brand: new Set(), status: new Set(), category: new Set(),
    subcategory: new Set(), formality: new Set(), retailer: new Set(),
    acquisition: new Set(), capsule: new Set(), liked: new Set() };
  if (overrides) Object.assign(s, overrides);
  return s;
}
function hasActiveFilter(f) {
  if (f.q) return true;
  return ["color","fabric","size","season","brand","status","category","subcategory",
          "formality","retailer","acquisition","capsule","liked"].some(k => f[k] instanceof Set && f[k].size > 0);
}
function filterActiveCount(f) {
  let n = f.q ? 1 : 0;
  for (const k of ["color","fabric","size","season","brand","status","category","subcategory",
                   "formality","retailer","acquisition","capsule","liked"]) if (f[k]?.size) n++;
  return n;
}
let closetFilter = newFilterState();
let statsFilter  = newFilterState();
let looksFilter  = newFilterState();
let builderFilter = newFilterState();
let pickerFilter = newFilterState();
// Shared funnel-button + count-badge markup for a picker toolbar (builder, calendar
// +Clothing, capsule add-items). Extracted so new picker surfaces don't copy-paste it.
function funnelBtnHtml(id, state) {
  const n = filterActiveCount(state);
  return `<div style="position:relative">
    <button class="clsearch" id="${esc(id)}"><svg viewBox="0 0 24 24"><path d="M22 3H2l8 9.46V19l4 2v-8.54L22 3z"/></svg></button>
    ${n ? `<span class="filter-badge">${n}</span>` : ""}
  </div>`;
}
function distinctScalar(field) { return [...new Set(items.map(i => i[field]).filter(Boolean))].sort(); }
// Like distinctScalar but ordered by how often each value occurs (most-used first).
function distinctByFreq(field) {
  const counts = new Map();
  for (const i of items) { const v = i[field]; if (v) counts.set(v, (counts.get(v) || 0) + 1); }
  return [...counts.keys()].sort((a, b) => counts.get(b) - counts.get(a) || a.localeCompare(b));
}
function distinctArr(field) { const s = new Set(); items.forEach(i => (i[field] || []).forEach(v => s.add(v))); return [...s].sort(); }

// Retired standalone search screen — logic folded into openFilterSheet + itemMatchesFilter.
function openSearch() {
  openFilterSheet(closetFilter, { onApply: renderCloset, title: "Filter Closet", dims: CLOSET_FILTER_DIMS });
}

function openFilterSheet(state, { onApply = () => {}, title = "Filter", dims } = {}) {
  const activeDims = dims || FILTERS;
  let openRow = null;

  function renderBody() {
    const rowSummary = (key) => {
      const set = state[key];
      if (!set || set.size === 0) return "Any";
      if (set.size > 1) return `${set.size} selected`;
      const val = [...set][0];
      if (key === "formality") return `${val}. ${OCCASION_LADDER[+val - 1]}`;
      return val;
    };
    const rows = activeDims.map(([key, label, optsF]) => {
      const open = openRow === key;
      const opts = optsF();
      const chips = open
        ? `<div class="schips">${opts.map(opt => {
            const chipLabel = key === "formality" ? `${opt}. ${OCCASION_LADDER[+opt - 1]}` : opt;
            return `<button class="schip ${state[key]?.has(opt) ? "on" : ""}" data-chip="${key}|${esc(opt)}">${esc(chipLabel)}</button>`;
          }).join("") || `<span style="color:var(--muted);font-size:13px">None recorded yet</span>`}</div>`
        : "";
      return `<button class="srow" data-row="${key}">
        <span>${label}</span>
        <span class="rt">${esc(rowSummary(key))} ›</span>
      </button>${chips}`;
    }).join("");

    const activeN = filterActiveCount(state);
    $("#filterSheetInner").innerHTML = `
      <div class="schead">
        <button class="lnk" id="fsReset" style="color:var(--danger)">Reset</button>
        <span style="font-weight:600">${esc(title)}</span>
        <button class="lnk" id="fsDone" style="font-weight:700">Done</button>
      </div>
      <div class="sbody">
        <input class="inp" id="fsQuery" placeholder="Keyword search…" value="${esc(state.q || "")}">
        <div class="srows" id="fsRows">${rows}</div>
        ${activeN ? `<div style="text-align:right;margin-top:14px"><button class="lnk" id="fsReset2" style="color:var(--danger)">Reset all</button></div>` : ""}
      </div>`;

    $("#fsQuery").oninput = (e) => { state.q = e.target.value; onApply(); };

    const doReset = () => {
      for (const [key] of activeDims) { if (state[key] instanceof Set) state[key] = new Set(); }
      state.q = "";
      openRow = null;
      onApply();
      renderBody();
    };
    $("#fsReset").onclick = doReset;
    const r2 = $("#fsReset2"); if (r2) r2.onclick = doReset;
    $("#fsDone").onclick = () => { $("#filterSheet").hidden = true; };

    $("#fsRows").onclick = (e) => {
      const chip = e.target.closest("[data-chip]");
      if (chip) {
        const raw = chip.dataset.chip;
        const sep = raw.indexOf("|");
        const key = raw.slice(0, sep), val = raw.slice(sep + 1);
        if (state[key].has(val)) state[key].delete(val); else state[key].add(val);
        onApply();
        renderBody();
        return;
      }
      const row = e.target.closest("[data-row]");
      if (row) { openRow = openRow === row.dataset.row ? null : row.dataset.row; renderBody(); }
    };
  }

  renderBody();
  $("#filterSheetBg").onclick = () => { $("#filterSheet").hidden = true; };
  $("#filterSheet").hidden = false;
}

async function saveNewItem() {
  const nameInp = $("#addName");
  const name = (nameInp?.value || _addState.name || "").trim();
  if (!name) { toast("Item name is required"); nameInp?.focus(); return; }

  const saveBtn = $("#addSave");
  if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = "Saving…"; }

  try {
    const payload = { name };
    if (_addState.category)    payload.category    = _addState.category;
    if (_addState.subcategory) payload.subcategory = _addState.subcategory;
    if (_addState.color_family) payload.color_family = _addState.color_family;
    if (_addState.fabric?.length) payload.fabric   = _addState.fabric;
    if (_addState.size)        payload.size        = _addState.size;
    if (_addState.brand)       payload.brand       = _addState.brand;
    if (_addState.season?.length) payload.season   = _addState.season;
    if (_addState.formality?.length) payload.formality = _addState.formality;
    if (_addState.status)      payload.status      = _addState.status;
    if (_addState.price != null) payload.price     = _addState.price;
    if (_addState.acquisition) payload.acquisition = _addState.acquisition;
    if (_addState.purchase_date) payload.purchase_date = _addState.purchase_date;
    if (_addState.retailer)    payload.retailer    = _addState.retailer;
    if (_addState.url)         payload.url         = _addState.url;
    if (_addState.notes)       payload.notes       = _addState.notes;

    const rows = await rest("/items", {
      method: "POST",
      headers: { "Content-Type": "application/json", Prefer: "return=representation" },
      body: JSON.stringify(payload),
    });
    const newItem = Array.isArray(rows) ? rows[0] : rows;
    if (!newItem?.id) throw new Error("Item created but no ID returned");

    // upload photo and patch
    if (_addPhotoBlob) {
      const { blob, ext } = _addPhotoBlob;
      const filename = `${(crypto.randomUUID ? crypto.randomUUID() : Date.now())}.${ext}`;
      const path = await uploadPhoto(blob, filename);
      await rest(`/items?id=eq.${newItem.id}`, {
        method: "PATCH",
        headers: { "Content-Type": "application/json", Prefer: "return=minimal" },
        body: JSON.stringify({ image_path: path }),
      });
      newItem.image_path = path;
      if (_addPhotoUrl) { URL.revokeObjectURL(_addPhotoUrl); _addPhotoUrl = null; }
    }

    items.unshift(newItem);
    itemById.set(newItem.id, newItem);
    if (newItem.image_path) signedUrlBatch([newItem.image_path]);

    // capsule memberships chosen in the Add form
    if (_addState.capsules?.length) {
      for (const cid of _addState.capsules) {
        try { await addItemsToCapsule(cid, [newItem.id]); } catch (_) { /* best-effort */ }
      }
    }

    toast("Item added!");
    // navigate to the new item photo view
    closetCat = newItem.category || null;
    closetSub = newItem.subcategory || null;
    switchTab("closet");
    openItem(newItem.id);
  } catch (e) {
    toast(e.message);
    if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = "Save"; }
  }
}

/* ===================================================================
   LOOKS  (outfit library — lens switcher · folders · grid · detail)
   =================================================================== *

   Status of imported data: 1,543 outfits = a date + a set of items, almost no
   name/context/notes. So everything here is DERIVED, not filed by hand:
   - formality: estimated per item (occasion range if set, else a taxonomy
     heuristic), averaged across the outfit, bucketed into 6 coarse folders.
   - season: from the dates the look was worn (multiple seasons => multiple
     folders), falling back to the outfit's own date.
   The user can browse by Formality / Season / Recent / All. Most looks were
   worn once, so this reads as a library where it's useful and a log otherwise. */

const LOOK_LENSES = ["Formality", "Season", "Context", "Capsule", "Liked", "Recent", "All", "Archived"];
const NO_CONTEXT_FOLDER = "__no_context__"; // L8 trailing folder so context-less looks don't disappear
const LOOKS_FLAT_CAP = 400;   // cap for the flat Recent/All grids (perf on phone)

// Formality folders — one per level on the 1-8 scale.
const FORMALITY_BUCKETS = [
  { key: "function", label: "Function"             },  // 1
  { key: "vcasual",  label: "Very Casual"           },  // 2
  { key: "casual",   label: "Casual"                },  // 3
  { key: "pcasual",  label: "Polished Casual"       },  // 4
  { key: "smart",    label: "Smart Casual"          },  // 5
  { key: "dressy",   label: "Dressed Up"            },  // 6
  { key: "bizpro",   label: "Business Professional" },  // 7
  { key: "formal",   label: "Formal"                },  // 8
];

// Bucket key → target formality level.
const BUCKET_RANGES = {
  function: 1, vcasual: 2, casual: 3, pcasual: 4, smart: 5, dressy: 6, bizpro: 7, formal: 8,
};

// Per-subcategory / category formality SETS (arrays of levels) for imputation.
// Items matching multiple contexts get multiple levels.
const SUBCAT_FORMALITY = {
  "Tee shirts": [2,3], "Graphic tees": [2,3], "Long-sleeve tees": [2,3], "Sleeveless": [3,4],
  "Blouses": [4,5], "Sweaters": [3,4,5], "Cardigans": [3,4,5], "Sweatshirts": [2,3],
  "Jeans": [3,4], "Pants": [4,5,6], "Shorts": [2,3], "Skirts": [3,4,5],
  "Leggings/Joggers": [1,2], "Tights": [3,4],
  "Short": [3,4], "Long": [4,6], "Cocktail": [6],
  "Blazers": [5,6,7], "Jackets": [3,4], "Coats": [3,4,5],
  "Boots": [3,4,5], "Sandals": [2,3,4], "Flats": [3,4,5], "Heels": [6,8], "Sneakers": [2,3],
  "Workout tops": [1], "Active shorts": [1], "Sports bras": [1], "Swimwear": [1],
};
const CAT_FORMALITY = {
  Tops: [2,3], Bottoms: [3,4], Dresses: [4,5], Outerwear: [3,4,5], Shoes: [3,4], Workout: [1],
};

// Vertical stacking order for collages: outerwear/tops up top, bottoms, then shoes.
const LAYER_ORDER = { Outerwear: 0, Tops: 1, Dresses: 1, Workout: 1, Bottoms: 2, Shoes: 3 };

let looksLens = "Formality";
let looksFolder = null;   // null = folder list (Formality/Season) | bucket key | season
let lookId = null;        // outfit id in detail (null = none)
let lookView = "canvas";  // when lookId set: "canvas" | "details" | "wears"
let looksSearchQ = null;  // null = not searching | query string (search by piece/context)
let looksItemFilter = null;  // item id → Looks shows only looks containing that piece (from item detail)

// ---- derived helpers ----
function outfitItems(o) { return (outfitItemMap.get(o.id) || []).map(id => itemById.get(id)).filter(Boolean); }
// A look needs 2+ real (still-existing) pieces to show anywhere.
function displayOutfits() { return outfits.filter(o => (outfitItemMap.get(o.id) || []).filter(id => itemById.has(id)).length >= 2); }
// Looks the user hasn't archived (archived ones are hidden from browse/pickers).
// Every ACTIVE look this item is a member of, newest-worn first (archived looks
// stay out of the item's looks list too — user call 2026-07-11).
function outfitsForItem(itemId) {
  return activeOutfits()
    .filter(o => (outfitItemMap.get(o.id) || []).includes(itemId))
    .sort((a, b) => String(outfitLastWorn(b) || "").localeCompare(String(outfitLastWorn(a) || "")));
}
// L9: archived-ness is DERIVED, not just written — a look with any archived
// piece is effectively archived too, with no cascade PATCH and no new column.
// o.archived stays the source of truth for the manual Archive/Unarchive button;
// this only affects what browse/pickers show.
function effectiveArchived(o) { return o.archived || outfitItems(o).some(i => itemStatus(i) === "Archive"); }
function activeOutfits() { return displayOutfits().filter(o => !effectiveArchived(o)); }
function archivedOutfits() { return displayOutfits().filter(o => effectiveArchived(o)); }
// Looks pool, scoped to the active capsule when planning: only looks wearable
// entirely from that capsule's items (every piece is a member). Excludes archived.
function looksScopedOutfits() {
  let list = activeOutfits();
  if (activeCapsuleId) {
    const set = new Set((capsuleLinkMap.get(activeCapsuleId) || []).map(l => l.item_id));
    list = list.filter(o => {
      const ids = (outfitItemMap.get(o.id) || []).filter(id => itemById.has(id));
      return ids.length && ids.every(id => set.has(id));
    });
  }
  if (hasActiveFilter(looksFilter)) list = list.filter(o => outfitMatchesFilter(o, looksFilter));
  return list;
}
function outfitName(o) { return o.name || `Look #${o._num || "?"}`; }
function outfitPieces(o) {
  // Photoless pieces stay in — they render as the tee placeholder glyph.
  return outfitItems(o).slice()
    .sort((a, b) => (LAYER_ORDER[a.category] ?? 1.5) - (LAYER_ORDER[b.category] ?? 1.5));
}

const seasonOf = (dateStr) => {
  const m = +String(dateStr).slice(5, 7);
  return (m <= 2 || m === 12) ? "Winter" : m <= 5 ? "Spring" : m <= 8 ? "Summer" : "Fall";
};
function effectiveWearDays(o) {
  const s = outfitWearMap.get(o.id);
  if (s && s.size) return [...s];
  return o.created_at ? [String(o.created_at).slice(0, 10)] : [];
}
function outfitSeasons(o) { return [...new Set(effectiveWearDays(o).map(seasonOf))]; }
// L8: union of contexts across every real wear of this look (no created_at fallback —
// a look with no wear-context data simply has no context folders yet).
// One pass over wears → Map(outfit_id -> Set(contexts)). The Context lens used
// to call a per-outfit wears scan once per outfit PER FOLDER (O(contexts ×
// outfits × wears) ≈ 95M iterations at current data size — seconds of jank);
// build this map once per render instead and read from it.
function outfitContextMap() {
  const m = new Map();
  for (const w of wears) {

function deriveWearFormality(itemIds) {
