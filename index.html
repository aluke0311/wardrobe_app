<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<title>Wardrobe</title>
<style>
  /* ---------- design tokens ---------- */
  :root {
    --bg: #ffffff;
    --surface: #ffffff;
    --ink: #2b2b33;
    --muted: #9a9aa6;
    --line: #ececf1;
    --accent: #8b8fd0;          /* calm periwinkle, Stylebook-ish */
    --accent-soft: #eef0fb;
    --danger: #c0392b;
    --radius: 16px;
    --nav-h: 64px;
    --safe-b: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font: 16px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overscroll-behavior-y: none;
    -webkit-font-smoothing: antialiased;
  }
  h1, h2, h3 { margin: 0; font-weight: 600; }
  button { font: inherit; color: inherit; cursor: pointer; border: none; background: none; }
  .muted { color: var(--muted); }
  .center { text-align: center; }

  /* ---------- login ---------- */
  #login { display: none; min-height: 100%; align-items: center; justify-content: center; padding: 24px; }
  #login.active { display: flex; }
  #login .box { width: 100%; max-width: 360px; }
  #login h1 { font-size: 28px; letter-spacing: .02em; }
  .stack > * + * { margin-top: 14px; }
  .card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 18px; }
  .fld { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
  .inp {
    width: 100%; padding: 12px 14px; border: 1px solid var(--line);
    border-radius: 12px; font: inherit; background: #fff; color: var(--ink);
  }
  .inp:focus { outline: none; border-color: var(--accent); }
  .btn {
    width: 100%; padding: 13px; border-radius: 12px; background: var(--accent);
    color: #fff; font-weight: 600; text-align: center;
  }
  .btn:disabled { opacity: .6; }
  .err { color: var(--danger); font-size: 13.5px; }

  /* ---------- app shell ---------- */
  [hidden] { display: none !important; }
  #app[hidden] { display: none; }
  .bar {
    position: sticky; top: 0; z-index: 10;
    display: flex; align-items: center; justify-content: center;
    height: 52px; padding: 0 14px;
    background: rgba(255,255,255,.92); backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--line);
  }
  .bar h1 { font-size: 17px; letter-spacing: .14em; text-transform: uppercase; }
  .bar .gear {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    font-size: 19px; color: var(--muted); width: 34px; height: 34px;
  }
  .ver { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--muted); }

  .tabbody { padding-bottom: calc(var(--nav-h) + var(--safe-b)); }
  .screen { display: none; }
  .screen.active { display: block; }

  /* ---------- home launcher ---------- */
  .launch {
    display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
    padding: 24px 18px 8px;
  }
  .tile {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 12px; padding: 26px 14px; border-radius: var(--radius);
    background: var(--surface); border: 1px solid var(--line);
    transition: transform .08s ease, background .12s ease;
  }
  .tile:active { transform: scale(.97); background: var(--accent-soft); }
  .tile svg { width: 46px; height: 46px; stroke: var(--accent); stroke-width: 1.6; fill: none; }
  .tile .tlabel { font-size: 14.5px; font-weight: 600; letter-spacing: .01em; }
  .tile .tsub { font-size: 12px; color: var(--muted); margin-top: -6px; }
  .tile.wide { grid-column: 1 / -1; }

  /* ---------- placeholder screens ---------- */
  .placeholder {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 10px; text-align: center; padding: 80px 32px; color: var(--muted);
  }
  .placeholder .pi { width: 54px; height: 54px; stroke: var(--line); stroke-width: 1.6; fill: none; }
  .placeholder b { color: var(--ink); font-size: 17px; }

  /* ---------- bottom nav ---------- */
  .tabbar {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 20;
    display: grid; grid-template-columns: repeat(5, 1fr);
    height: calc(var(--nav-h) + var(--safe-b)); padding-bottom: var(--safe-b);
    background: rgba(255,255,255,.94); backdrop-filter: blur(8px);
    border-top: 1px solid var(--line);
  }
  .tabbar button {
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
    color: var(--muted); font-size: 10.5px;
  }
  .tabbar button svg { width: 23px; height: 23px; stroke: currentColor; stroke-width: 1.7; fill: none; }
  .tabbar button.on { color: var(--accent); }

  /* ---------- misc ---------- */
  .spin { width: 26px; height: 26px; margin: 60px auto; border: 3px solid var(--line);
    border-top-color: var(--accent); border-radius: 50%; animation: sp .8s linear infinite; }
  @keyframes sp { to { transform: rotate(360deg); } }
  #toast {
    position: fixed; left: 50%; bottom: calc(var(--nav-h) + 18px + var(--safe-b));
    transform: translateX(-50%) translateY(20px);
    background: var(--ink); color: #fff; padding: 10px 16px; border-radius: 999px;
    font-size: 13.5px; opacity: 0; pointer-events: none; transition: all .2s ease; z-index: 50;
    max-width: 90vw;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ---------- header add button ---------- */
  .addbtn { position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    font-size: 26px; color: var(--accent); width: 36px; height: 36px; line-height: 1; }
  .addbtn[hidden] { display: none; }

  /* ---------- closet toolbar + lens ---------- */
  .cltoolbar { display: flex; align-items: center; gap: 8px; padding: 12px 14px 6px; }
  .clback, .clsearch { width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; color: var(--ink); }
  .clback svg, .clsearch svg { width: 22px; height: 22px; stroke: currentColor; stroke-width: 1.8; fill: none; }
  .cltitle { flex: 1; font-size: 15px; font-weight: 600; }
  .lens { display: flex; gap: 4px; margin: 2px 14px 8px; background: #f4f4f7; border-radius: 11px; padding: 3px; }
  .lens button { flex: 1; padding: 7px 4px; border-radius: 9px; font-size: 12.5px; color: var(--muted); font-weight: 600; }
  .lens button.on { background: #fff; color: var(--ink); box-shadow: 0 1px 3px rgba(0,0,0,.08); }

  /* ---------- folder rows ---------- */
  .frows { padding: 0 14px 16px; }
  .frow { display: flex; align-items: center; gap: 14px; width: 100%; text-align: left;
    padding: 12px 2px; border-bottom: 1px solid var(--line); }
  .cthumb { width: 64px; height: 64px; flex: none; border-radius: 10px; background: #faf9f8 center/contain no-repeat; }
  .cthumb.empty { display: flex; align-items: center; justify-content: center; background: #f4f4f7; }
  .cthumb.empty svg { width: 30px; height: 30px; stroke: var(--line); stroke-width: 1.5; fill: none; }
  .fmeta { flex: 1; min-width: 0; }
  .fname { font-size: 17px; font-weight: 600; }
  .fname.big { font-size: 20px; }
  .fcount { font-size: 13.5px; color: var(--muted); margin-top: 2px; }
  .chev { width: 18px; height: 18px; flex: none; stroke: var(--line); stroke-width: 2; fill: none; }
  .fhdr { display: flex; align-items: center; gap: 14px; padding: 6px 16px 4px; }
  .seclabel { font-style: italic; color: var(--muted); font-size: 15px; padding: 10px 16px 4px; }

  /* ---------- style stats ---------- */
  .sec-hdr { font-size: 13px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase;
    color: var(--muted); padding: 24px 18px 8px; }
  .kpi-row { display: flex; align-items: stretch; }
  .kpi-cell { flex: 1; padding: 4px 0 8px; }
  .kpi-cell:first-child { border-right: 1px solid var(--line); padding-right: 18px; }
  .kpi-cell:last-child { padding-left: 18px; }
  .kpi-val { font-size: 28px; font-weight: 700; color: var(--text); line-height: 1.1; }
  .kpi-lbl { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .stats-donut-row { display: flex; align-items: center; gap: 20px; padding: 20px 20px 16px; }
  .stats-catbar { display: flex; gap: 8px; padding: 10px 14px 6px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .stats-catbar::-webkit-scrollbar { display: none; }
  .stats-catbtn { flex-shrink: 0; padding: 6px 14px; border-radius: 20px; font-size: 13.5px; background: var(--surface); border: 1px solid var(--line); color: var(--text); white-space: nowrap; }
  .stats-catbtn.on { background: var(--accent); color: #fff; border-color: var(--accent); }
  .stats-sort-bar { display: flex; justify-content: center; gap: 10px; padding: 10px 14px 20px; }
  .stats-sort-btn { padding: 7px 22px; border-radius: 20px; font-size: 14px; background: var(--surface); border: 1px solid var(--line); color: var(--text); }
  .stats-sort-btn.on { background: var(--accent); color: #fff; border-color: var(--accent); }
  .frow.donut-hi { background: rgba(88,112,196,0.07); }
  .gtile-sub { font-size: 11px; color: var(--accent); text-align: center; line-height: 1.3; margin-top: 1px; }
  .sf-section { margin-bottom: 4px; }
  .sf-label { font-size: 12px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; color: var(--muted); padding: 12px 14px 2px; }
  .filter-badge { position: absolute; top: 1px; right: 1px; background: var(--accent); color: #fff; border-radius: 50%; font-size: 9px; width: 13px; height: 13px; display: flex; align-items: center; justify-content: center; font-weight: 700; pointer-events: none; }
  /* stylebook-style section cards */
  .stats-sec { margin: 18px 14px 0; }
  .stats-sec-hdr { background: #ededf2; border-radius: 14px 14px 0 0; padding: 13px 16px; display: flex; flex-direction: column; }
  .stats-sec-hdr .t { font-size: 18px; font-weight: 700; color: var(--text); }
  .stats-sec-hdr .s { font-size: 13px; color: var(--muted); margin-top: 1px; }
  .stats-sec-body { background: var(--surface); border: 1px solid var(--line); border-top: none; border-radius: 0 0 14px 14px; padding: 4px 16px; }
  .stats-sec-body .frow:last-child { border-bottom: none; }
  .stats-note { color: var(--muted); font-size: 12.5px; padding: 12px 18px 4px; line-height: 1.4; }
  /* number-only metric tile */
  .gtile-metric { font-size: 17px; font-weight: 600; color: var(--text); text-align: center; margin-top: 5px; }
  /* floating segmented toggle (worn history / cpw / price) */
  .stats-toggle-float { position: fixed; left: 50%; transform: translateX(-50%); bottom: calc(var(--nav-h) + var(--safe-b) + 14px); z-index: 18; }
  .stats-seg { display: inline-flex; background: #ededf2; border-radius: 999px; padding: 3px; box-shadow: 0 4px 16px rgba(0,0,0,.14); }
  .stats-seg button { padding: 8px 22px; border-radius: 999px; font-size: 14px; font-weight: 600; color: var(--muted); background: transparent; white-space: nowrap; }
  .stats-seg button.on { background: #fff; color: var(--text); box-shadow: 0 1px 3px rgba(0,0,0,.14); }
  .rng-chk { width: 20px; height: 20px; stroke: var(--accent); stroke-width: 2.5; fill: none; flex: none; }
  /* closet review */
  .review-cta { width: calc(100% - 28px); margin: 26px 14px 0; display: flex; align-items: center; gap: 14px;
    padding: 16px; border-radius: 14px; background: var(--accent); color: #fff; text-align: left; }
  .review-cta .rc-ic { width: 26px; height: 26px; flex: none; stroke: #fff; stroke-width: 1.8; fill: none; }
  .review-cta .rc-t { font-size: 17px; font-weight: 700; }
  .review-cta .rc-s { font-size: 13px; opacity: .9; margin-top: 1px; }
  .rv-prog { text-align: center; color: var(--muted); font-size: 13px; padding: 4px 0 2px; font-variant-numeric: tabular-nums; }
  .rv-card { margin: 8px 14px 0; background: var(--surface); border: 1px solid var(--line); border-radius: 16px; overflow: hidden; }
  .rv-photo { width: 100%; aspect-ratio: 1/1; max-height: 46vh; background: #faf9f8 center/contain no-repeat; }
  .rv-photo.empty { display: flex; align-items: center; justify-content: center; }
  .rv-photo.empty svg { width: 56px; height: 56px; stroke: #ccc; stroke-width: 1.3; fill: none; }
  .rv-info { padding: 14px 16px 16px; }
  .rv-name { font-size: 18px; font-weight: 600; }
  .rv-path { font-size: 13px; color: var(--muted); margin-top: 2px; }
  .rv-cur { margin-top: 12px; font-size: 14px; }
  .rv-cur b { font-weight: 600; }
  .rv-cur .rv-empty { color: var(--accent); font-weight: 600; }
  .rv-actions { display: flex; gap: 10px; padding: 14px; flex-wrap: wrap; }
  .rv-set { flex: 1; padding: 14px; border-radius: 12px; background: var(--accent); color: #fff; font-size: 16px; font-weight: 600; }
  .rv-skip { padding: 14px 20px; border-radius: 12px; background: var(--surface); border: 1px solid var(--line); color: var(--text); font-size: 16px; font-weight: 600; }
  .rv-edit { flex: 1; padding: 14px; border-radius: 12px; background: var(--surface); border: 1px solid var(--accent); color: var(--accent); font-size: 16px; font-weight: 600; }
  .rv-done { text-align: center; padding: 70px 32px; color: var(--muted); }
  .rv-done svg { width: 52px; height: 52px; stroke: var(--accent); stroke-width: 1.6; fill: none; margin-bottom: 14px; }
  .rv-done b { display: block; font-size: 18px; color: var(--text); margin-bottom: 6px; }
  .rv-fieldrow .fcount.rv-cnt { color: var(--accent); font-weight: 600; }

  /* ---------- capsules ---------- */
  .cap-list { padding: 6px 14px 24px; display: flex; flex-direction: column; gap: 12px; }
  .cap-card { display: flex; gap: 13px; align-items: center; text-align: left;
    background: var(--surface); border: 1px solid var(--line); border-radius: 14px; padding: 12px; }
  .cap-card:active { background: var(--accent-soft); }
  .cap-collage { width: 64px; height: 64px; flex: none; border-radius: 10px; overflow: hidden;
    display: grid; grid-template-columns: 1fr 1fr; gap: 2px; background: #f4f4f7; }
  .cap-collage .cc-cell { background: #faf9f8 center/contain no-repeat; }
  .cap-collage.solo { grid-template-columns: 1fr; }
  .cap-collage.empty { display: flex; align-items: center; justify-content: center; }
  .cap-collage.empty svg { width: 26px; height: 26px; stroke: var(--line); stroke-width: 1.5; fill: none; }
  .cap-meta { flex: 1; min-width: 0; }
  .cap-name { font-size: 16.5px; font-weight: 600; color: var(--text); }
  .cap-sub { font-size: 13px; color: var(--muted); margin-top: 3px; }
  .cap-badge { display: inline-block; font-size: 10.5px; font-weight: 700; letter-spacing: .03em;
    text-transform: uppercase; padding: 2px 7px; border-radius: 6px; background: var(--accent-soft);
    color: var(--accent); margin-bottom: 4px; }
  .cap-badge.trip { background: #eaf6ef; color: #2f9e5e; }
  .cap-empty { text-align: center; padding: 64px 32px; color: var(--muted); }
  .cap-empty svg { width: 50px; height: 50px; stroke: var(--line); stroke-width: 1.5; fill: none; margin-bottom: 12px; }
  .cap-empty b { display: block; font-size: 17px; color: var(--text); margin-bottom: 6px; }
  .cap-newbtn { margin: 8px 14px 0; width: calc(100% - 28px); padding: 14px; border-radius: 12px;
    background: var(--accent); color: #fff; font-size: 16px; font-weight: 600; }
  /* create / edit form */
  .cap-form { padding: 16px 14px 24px; display: flex; flex-direction: column; gap: 16px; }
  .cap-modebar { display: flex; gap: 8px; }
  .cap-modebar button { flex: 1; padding: 12px; border-radius: 11px; border: 1px solid var(--line);
    background: var(--surface); color: var(--muted); font-weight: 600; font-size: 14.5px; }
  .cap-modebar button.on { border-color: var(--accent); background: var(--accent-soft); color: var(--accent); }
  .cap-dates { display: flex; gap: 10px; }
  .cap-dates > div { flex: 1; }
  /* detail */
  .cap-hdr { padding: 14px 16px 4px; }
  .cap-hdr .ch-name { font-size: 22px; font-weight: 700; }
  .cap-hdr .ch-sub { font-size: 13.5px; color: var(--muted); margin-top: 3px; }
  .cap-insight { margin: 12px 14px 0; background: var(--surface); border: 1px solid var(--line);
    border-radius: 14px; padding: 14px 16px; }
  .cap-cov { margin-top: 12px; }
  .cap-cov-lbl { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .cap-cov-chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .cap-cov-chip { font-size: 12px; padding: 4px 9px; border-radius: 8px; background: #f4f4f7; color: var(--muted); }
  .cap-cov-chip.on { background: var(--accent-soft); color: var(--accent); font-weight: 600; }
  .cap-plan { margin: 14px 14px 0; width: calc(100% - 28px); padding: 14px; border-radius: 12px;
    background: var(--accent); color: #fff; font-size: 16px; font-weight: 600; display: flex;
    align-items: center; justify-content: center; gap: 9px; }
  .cap-plan svg { width: 19px; height: 19px; stroke: #fff; stroke-width: 1.9; fill: none; }
  /* in-capsule organize toolbar + category groups */
  .cap-orgbar { display: flex; align-items: center; gap: 8px; padding: 6px 14px 2px; flex-wrap: wrap; }
  .cap-seg { display: inline-flex; background: #f4f4f7; border-radius: 9px; padding: 2px; }
  .cap-seg button { padding: 6px 12px; border-radius: 7px; font-size: 13px; font-weight: 600; color: var(--muted); }
  .cap-seg button.on { background: #fff; color: var(--ink); box-shadow: 0 1px 2px rgba(0,0,0,.06); }
  .cap-chip { padding: 6px 12px; border-radius: 999px; font-size: 13px; font-weight: 600; border: 1px solid var(--line);
    background: #fff; color: var(--muted); }
  .cap-chip.on { border-color: var(--accent); background: var(--accent-soft); color: var(--accent); }
  .cap-grp { margin-top: 4px; }
  .cap-grp-hdr { display: flex; align-items: baseline; justify-content: space-between; padding: 14px 16px 4px; }
  .cap-grp-hdr .g-name { font-size: 13px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: var(--ink); }
  .cap-grp-hdr .g-cnt { font-size: 12.5px; color: var(--muted); font-weight: 600; }
  .cap-grp-hdr .g-cnt.done { color: #2f9e5e; }
  .cap-catbar { display: flex; gap: 7px; overflow-x: auto; padding: 8px 14px 4px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
  .cap-catbar::-webkit-scrollbar { display: none; }
  .cap-catbar .cap-chip { flex-shrink: 0; }
  .cap-secrow { display: flex; align-items: center; justify-content: space-between;
    padding: 22px 16px 6px; }
  .cap-secrow .t { font-size: 13px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: var(--muted); }
  .cap-secrow .a { font-size: 14.5px; color: var(--accent); font-weight: 600; }
  .cap-footer { padding: 24px 14px 30px; }
  .cap-del { width: 100%; padding: 13px; border-radius: 12px; background: var(--surface);
    border: 1px solid var(--line); color: var(--danger); font-weight: 600; font-size: 15px; }
  .cap-actions { display: flex; gap: 10px; margin-bottom: 10px; }
  .cap-act2 { flex: 1; padding: 13px; border-radius: 12px; background: var(--surface);
    border: 1px solid var(--line); color: var(--ink); font-weight: 600; font-size: 15px; }
  /* packing progress + tick */
  .cap-pack { margin: 12px 14px 0; }
  .cap-pack-bar { height: 8px; border-radius: 5px; background: #ececf1; overflow: hidden; }
  .cap-pack-fill { height: 100%; background: #2f9e5e; border-radius: 5px; transition: width .25s; }
  .cap-pack-lbl { font-size: 12.5px; color: var(--muted); margin-top: 6px; }
  .gtile .pack-tick { position: absolute; top: 6px; right: 6px; width: 24px; height: 24px;
    border-radius: 50%; background: rgba(255,255,255,.92); border: 1.5px solid var(--line);
    display: flex; align-items: center; justify-content: center; z-index: 2; }
  .gtile .pack-tick svg { width: 14px; height: 14px; stroke: transparent; stroke-width: 3; fill: none; }
  .gtile.packed .pack-tick { background: #2f9e5e; border-color: #2f9e5e; }
  .gtile.packed .pack-tick svg { stroke: #fff; }
  .gtile.packed .gphoto { opacity: .55; }
  /* active-capsule banner in closet */
  .cap-banner { display: flex; align-items: center; gap: 10px; margin: 4px 14px 8px;
    padding: 10px 14px; border-radius: 11px; background: var(--accent-soft); }
  .cap-banner .cb-t { flex: 1; font-size: 14px; color: var(--accent); font-weight: 600; }
  .cap-banner .cb-x { width: 26px; height: 26px; flex: none; display: flex; align-items: center;
    justify-content: center; border-radius: 50%; color: var(--accent); font-size: 18px; line-height: 1; }
  /* in-grid "Add to capsule" bar button */
  #gbCapsule.active svg { stroke: var(--accent); }

  /* ---------- weather + locations ---------- */
  .wx-section { padding: 0 14px 4px; }
  .wx-sec-hdr { display: flex; align-items: center; justify-content: space-between; padding: 14px 0 8px; }
  .wx-sec-title { font-size: 13px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: var(--muted); }
  .wx-add-btn { font-size: 14px; color: var(--accent); font-weight: 600; }
  .loc-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--line); }
  .loc-pin { font-size: 15px; flex-shrink: 0; }
  .loc-info { flex: 1; min-width: 0; }
  .loc-name { font-size: 14px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .loc-range { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .loc-del { color: var(--muted); font-size: 22px; line-height: 1; padding: 2px 8px 4px; }
  .wx-strip { overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; padding: 10px 0 4px; }
  .wx-strip::-webkit-scrollbar { display: none; }
  .wx-days { display: flex; gap: 8px; padding-bottom: 2px; }
  .wx-day { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 10px 8px 8px; background: var(--accent-soft); border-radius: 12px; min-width: 56px; text-align: center; }
  .wx-day.hist { background: #f4f4f7; }
  .wx-date { font-size: 10px; color: var(--muted); white-space: nowrap; }
  .wx-icon { font-size: 22px; line-height: 1.2; }
  .wx-temps { font-size: 11px; font-weight: 600; white-space: nowrap; color: var(--ink); }
  .wx-hist-lbl { font-size: 9px; color: var(--muted); letter-spacing: .03em; }
  .wx-loc-card { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; padding: 10px 6px; border-radius: 12px; background: #f4f4f7; min-width: 44px; }
  .wx-loc-card .wx-loc-arrow { font-size: 14px; color: var(--muted); }
  .wx-loc-card .wx-loc-lbl { font-size: 10px; color: var(--muted); white-space: nowrap; max-width: 60px; overflow: hidden; text-overflow: ellipsis; }
  .wx-loading { font-size: 13px; color: var(--muted); padding: 10px 0 6px; }
  .wx-no-locs { font-size: 13px; color: var(--muted); padding: 4px 0 10px; }
  /* location search sheet */
  .loc-search-wrap { padding: 10px 0 4px; }
  .loc-result { display: flex; align-items: flex-start; gap: 10px; padding: 11px 0; border-bottom: 1px solid var(--line); cursor: pointer; }
  .loc-result-pin { font-size: 18px; flex-shrink: 0; }
  .loc-result-name { font-size: 15px; font-weight: 500; }
  .loc-result-sub { font-size: 12px; color: var(--muted); margin-top: 1px; }

  /* ---------- item grid ---------- */
  .grid { display: grid; grid-template-columns: repeat(var(--grid-cols,3), 1fr); gap: 10px; padding: 4px 14px 20px; }
  .gtile { position: relative; display: flex; flex-direction: column; gap: 5px; }
  .gphoto { width: 100%; aspect-ratio: 1; border-radius: 10px; background: #faf9f8 center/contain no-repeat; border: 1px solid var(--line); }
  .gphoto.empty { display: flex; align-items: center; justify-content: center; background: #f4f4f7; }
  .gphoto.empty svg { width: 28px; height: 28px; stroke: var(--line); stroke-width: 1.5; fill: none; }
  .gname { font-size: 11.5px; color: var(--muted); line-height: 1.25; overflow: hidden;
    text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  /* select mode overlay */
  .sel-dot { position: absolute; top: 5px; left: 5px; width: 21px; height: 21px; border-radius: 50%;
    border: 2px solid var(--accent); background: #fff; display: flex; align-items: center;
    justify-content: center; z-index: 2; pointer-events: none; }
  .sel-dot.on { background: var(--accent); }
  .sel-dot svg { display: none; width: 11px; height: 11px; stroke: #fff; stroke-width: 3; fill: none; }
  .sel-dot.on svg { display: block; }
  .gtile.selected .gphoto { outline: 2.5px solid var(--accent); border-color: var(--accent); }

  /* ---------- grid action bar ---------- */
  #gridBar { position: fixed; left: 0; right: 0; bottom: calc(var(--nav-h) + var(--safe-b)); z-index: 15;
    display: flex; align-items: center; justify-content: space-between;
    padding: 9px 20px 9px; background: #fff; border-top: 1px solid var(--line); }
  /* extra bottom padding when grid bar is visible so content isn't hidden behind it */
  .has-gridbar .tabbody { padding-bottom: calc(var(--nav-h) + var(--safe-b) + 58px); }
  /* action icons: hidden until select mode is active */
  .gb-acts { display: none; gap: 24px; align-items: center; }
  #gridBar.selecting .gb-acts { display: flex; }
  .gb-acts button { padding: 6px; display: flex; align-items: center; }
  .gb-acts button svg { width: 22px; height: 22px; stroke: var(--muted); stroke-width: 1.8; fill: none; }
  .gb-acts button.active svg { stroke: var(--accent); }
  .gb-count { font-size: 13px; color: var(--muted); padding-left: 4px; }
  .gb-right { display: flex; align-items: center; gap: 14px; position: relative; }
  #gbGrid svg { width: 20px; height: 20px; stroke: var(--muted); stroke-width: 1.8; fill: none; }
  #gbSelect { color: var(--accent); font-weight: 600; font-size: 16px; padding: 4px; }
  #gridPickerPop { position: absolute; bottom: calc(100% + 6px); right: 40px;
    background: #fff; border: 1px solid var(--line); border-radius: 12px;
    box-shadow: 0 6px 24px rgba(0,0,0,.13); overflow: hidden; z-index: 200; min-width: 150px; }
  #gridPickerPop button { display: block; width: 100%; padding: 13px 20px; text-align: left; font-size: 15px; }
  #gridPickerPop button.on { color: var(--accent); font-weight: 600; }
  #gridPickerPop button:not(:last-child) { border-bottom: 1px solid var(--line); }

  /* ---------- bottom sheets ---------- */
  .sheet-bg { position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 300; touch-action: none; }
  .sheet { position: fixed; left: 0; right: 0; bottom: 0; background: #fff;
    border-radius: 18px 18px 0 0; max-height: 88vh; overflow-y: auto; z-index: 301; }
  .sheet-hdr { display: flex; align-items: center; justify-content: space-between;
    padding: 16px 18px 12px; border-bottom: 1px solid var(--line); position: sticky; top: 0; background: #fff; }
  .sheet-hdr h2 { font-size: 17px; font-weight: 600; }
  .sheet-row { width: 100%; display: flex; align-items: center; justify-content: space-between;
    padding: 16px 18px; border-bottom: 1px solid var(--line); text-align: left; font-size: 16px; }
  .sheet-row .rt { color: var(--muted); display: flex; align-items: center; gap: 6px; font-size: 15px; }
  .sheet-expand { padding: 10px 16px 16px; background: #fafafb; border-bottom: 1px solid var(--line); }
  .sheet-chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .sheet-chip { padding: 7px 14px; border: 1px solid var(--line); border-radius: 999px; font-size: 13px; background: #fff; }
  .sheet-chip.on { background: var(--accent); color: #fff; border-color: var(--accent); }
  .sheet-note { color: var(--muted); font-size: 13px; padding: 12px 18px 24px; }
  /* move sheet */
  .mv-cat { width: 100%; padding: 14px 18px; border-bottom: 1px solid var(--line);
    font-size: 16px; font-weight: 500; text-align: left; display: flex; align-items: center; justify-content: space-between; }
  .mv-sub { width: 100%; padding: 12px 18px 12px 34px; border-bottom: 1px solid var(--line); font-size: 15px; text-align: left; }
  .mv-sub:hover, .mv-sub:active { background: var(--accent-soft); color: var(--accent); }

  /* ---------- item photo view ---------- */
  .item-nav { display: flex; align-items: center; padding: 10px 10px 6px; gap: 6px; border-bottom: 1px solid var(--line); }
  .item-back { display: flex; align-items: center; gap: 3px; color: var(--accent); font-size: 16px; font-weight: 500; padding: 4px 6px 4px 2px; flex-shrink: 0; }
  .item-back svg { width: 18px; height: 18px; stroke: var(--accent); stroke-width: 2; fill: none; flex-shrink: 0; }
  .item-nav-title { flex: 1; text-align: center; font-size: 17px; font-weight: 600; }
  .item-nav-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .item-nav-btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; }
  .item-nav-btn svg { width: 20px; height: 20px; stroke: var(--accent); stroke-width: 1.8; fill: none; }
  .item-add-look { color: var(--accent); font-size: 15px; font-weight: 500; padding: 4px; }
  .item-photo { width: 100%; background: #fafafa center/contain no-repeat;
    height: calc(100dvh - 52px - 48px - 58px - var(--safe-b)); min-height: 200px; }
  .item-photo.empty { display: flex; align-items: center; justify-content: center; }

  /* ---------- item action bar ---------- */
  #itemBar { position: fixed; left: 0; right: 0; bottom: 0; z-index: 25;
    display: flex; align-items: center; justify-content: space-around;
    padding: 10px 24px calc(10px + var(--safe-b)); background: rgba(255,255,255,.96);
    backdrop-filter: blur(8px); border-top: 1px solid var(--line); }
  #itemBar button { display: flex; align-items: center; justify-content: center; padding: 6px; }
  #itemBar button svg { width: 25px; height: 25px; stroke: var(--ink); stroke-width: 1.7; fill: none; }
  #itemBar button.danger svg { stroke: var(--danger); }
  /* hide tab bar in photo view so item bar has the full bottom chrome */
  #app.detail-photo .tabbar { display: none !important; }

  /* ---------- details view ---------- */
  .det-body { padding: 14px 16px calc(60px + var(--safe-b)); }
  .det-header { display: flex; gap: 14px; background: #f3f4f8; border-radius: 12px; padding: 14px; margin-bottom: 16px; }
  .det-thumb { width: 74px; height: 90px; flex-shrink: 0; border-radius: 8px; background: #e8e8ed center/contain no-repeat; }
  .det-thumb.empty { background: #e8e8ed; display: flex; align-items: center; justify-content: center; }
  .det-notes { flex: 1; border: none; background: transparent; resize: none; font-size: 15px;
    font-family: inherit; color: var(--ink); outline: none; min-height: 90px; padding: 0; }
  .det-section-label { font-size: 11px; font-weight: 600; letter-spacing: .08em; color: var(--muted);
    text-transform: uppercase; margin: 16px 0 8px 4px; }
  .det-card { background: #fff; border: 1px solid var(--line); border-radius: 14px; overflow: hidden; margin-bottom: 14px; }
  .det-row { width: 100%; display: flex; align-items: center; padding: 14px 16px; text-align: left; gap: 8px; }
  button.det-row:active { background: var(--accent-soft); }
  .det-lbl { font-size: 15px; color: var(--muted); min-width: 70px; flex-shrink: 0; }
  .det-val { flex: 1; font-size: 15px; color: var(--ink); display: flex; align-items: center; gap: 6px; }
  .det-val.placeholder { color: var(--muted); }
  .det-sub { font-size: 13px; color: var(--muted); margin-top: 2px; }
  .det-divider { height: 1px; background: var(--line); margin: 0 16px; }
  .det-notes-val { font-size: 15px; color: var(--ink); line-height: 1.5; padding: 14px 16px; }
  .det-footer { position: sticky; bottom: 0; background: rgba(255,255,255,.95);
    backdrop-filter: blur(8px); display: flex; justify-content: space-between;
    padding: 10px 24px calc(10px + var(--safe-b)); border-top: 1px solid var(--line); }
  .swatch { display: inline-block; width: 13px; height: 13px; border-radius: 50%; border: 1px solid rgba(0,0,0,.15); vertical-align: -1px; flex-shrink: 0; }

  /* ---------- search ---------- */
  .schead { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; }
  .lnk { color: var(--accent); font-weight: 600; font-size: 16px; }
  .sbody { padding: 4px 16px 30px; }
  .srows { background: #fff; border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; margin-top: 14px; }
  .srow { width: 100%; display: flex; align-items: center; justify-content: space-between;
    padding: 15px 16px; border-bottom: 1px solid var(--line); text-align: left; }
  .srow:last-child { border-bottom: none; }
  .srow .rt { color: var(--muted); display: flex; align-items: center; gap: 4px; }
  .schips { display: flex; flex-wrap: wrap; gap: 8px; padding: 4px 16px 16px; background: #fafafb; }
  .schip { padding: 7px 12px; border: 1px solid var(--line); border-radius: 999px; font-size: 13px; background: #fff; }
  .schip.on { background: var(--accent); color: #fff; border-color: var(--accent); }
  .snote { color: var(--muted); font-size: 13px; margin: 12px 4px; }
  /* ---------- field edit sheet (color chips) ---------- */
  .fld-color-grid { display: flex; flex-wrap: wrap; gap: 12px; }
  .fld-color-chip { width: 42px; height: 42px; border-radius: 50%; border: 2px solid rgba(0,0,0,.1);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .fld-color-chip[title="White"] { border-color: var(--line); }

  /* ---------- detail header info (replaces textarea-in-header) ---------- */
  .det-hinfo { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; gap: 3px; }
  .det-hname { font-size: 17px; font-weight: 600; line-height: 1.3; }
  .det-hbrand { font-size: 13.5px; color: var(--muted); }
  .det-hpath { font-size: 12px; color: var(--muted); }
  /* standalone notes textarea (below header) */
  .det-notes-ta {
    display: block; width: 100%; min-height: 76px; box-sizing: border-box;
    border: 1px solid var(--line); border-radius: 12px;
    padding: 12px 14px; font: inherit; font-size: 15px; color: var(--ink);
    background: #fff; resize: none; outline: none; margin-bottom: 14px; line-height: 1.5;
  }
  .det-notes-ta:focus { border-color: var(--accent); }

  /* ---------- field sheet typeahead suggestions ---------- */
  .fld-sugg-lbl { font-size: 11px; font-weight: 600; letter-spacing: .08em; color: var(--muted); text-transform: uppercase; padding: 12px 18px 4px; }
  .fld-suggestions { display: flex; flex-wrap: wrap; gap: 8px; padding: 8px 18px 20px; }

  /* ---------- add item photo area ---------- */
  .add-photo-wrap { position: relative; margin: 0 16px 16px; }
  .add-photo-area {
    width: 100%; aspect-ratio: 3/4; border-radius: 16px;
    background: #f4f4f7 center/contain no-repeat;
    display: flex; align-items: center; justify-content: center; overflow: hidden;
  }
  .add-photo-area.has-photo { background-color: #fff; }
  .add-photo-area > svg { width: 56px; height: 56px; stroke: #ccc; stroke-width: 1.2; fill: none; }
  .add-photo-label {
    position: absolute; bottom: 14px; right: 14px; cursor: pointer;
    background: rgba(0,0,0,.52); color: #fff; border-radius: 999px;
    padding: 9px 18px; font-size: 14px; font-weight: 600;
    display: flex; align-items: center; gap: 6px;
  }
  .add-photo-label svg { width: 15px; height: 15px; stroke: #fff; stroke-width: 2; fill: none; flex-shrink: 0; }

  /* ---------- looks (outfit grid + collage) ---------- */
  .ogrid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; padding: 10px 14px 24px; }
  .otile { display: flex; flex-direction: column; gap: 6px; text-align: left; }
  .ocollage { width: 100%; aspect-ratio: 3/4; border: 1px solid var(--line); border-radius: 12px;
    background: #fff; overflow: hidden; display: grid; grid-template-columns: repeat(2, 1fr);
    grid-auto-rows: 1fr; gap: 4px; padding: 9px; }
  .ocollage.solo { grid-template-columns: 1fr; }
  .ocollage.empty { display: flex; align-items: center; justify-content: center; background: #f4f4f7; }
  .ocollage.empty svg { width: 34px; height: 34px; stroke: var(--line); stroke-width: 1.5; fill: none; }
  .opiece { width: 100%; height: 100%; min-width: 0; min-height: 0; background: #fff center/contain no-repeat; }
  .opiece.span2 { grid-column: span 2; }
  .ocollage.omini { width: 64px; height: 64px; flex: none; aspect-ratio: auto; border-radius: 10px; padding: 4px; gap: 2px; }
  .oname { font-size: 13.5px; font-weight: 600; color: var(--ink); line-height: 1.25;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ometa { font-size: 12px; color: var(--muted); margin-top: -3px; }
  /* looks detail */
  .lk-hero { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px 16px 4px; }
  .lk-hero.solo { grid-template-columns: 1fr; max-width: 280px; margin: 0 auto; }
  .lk-heropiece { width: 100%; height: 150px; background: #fff center/contain no-repeat; }
  .lk-heropiece.span2 { grid-column: span 2; }
  .lk-chip { display: inline-block; padding: 4px 11px; border: 1px solid var(--line); border-radius: 999px; font-size: 12.5px; color: var(--ink); }
  /* look hero rendered from a saved canvas layout */
  .lk-canvas { position: relative; width: 100%; max-width: 360px; margin: 6px auto 4px; aspect-ratio: 3 / 4;
    background: #fafafa; border-radius: 12px; }
  .lk-cpiece { position: absolute; aspect-ratio: 1 / 1; transform: translate(-50%, -50%);
    background: center/contain no-repeat; }
  /* canvas-style collage (saved layout) reused on looks tiles / folder reps / calendar */
  .ocanvas { position: relative; width: 100%; aspect-ratio: 3 / 4; background: #fff;
    border: 1px solid var(--line); border-radius: 12px; overflow: hidden; }
  .ocanvas.omini { width: 64px; height: 64px; flex: none; aspect-ratio: auto; border-radius: 10px; }
  .ocanvas.bare { border: none; border-radius: 0; background: transparent; }
  .ocpiece { position: absolute; aspect-ratio: 1 / 1; transform: translate(-50%, -50%);
    background: center/contain no-repeat; }

  /* ===== BUILD-A-LOOK CANVAS ===== */
  #app.builder-mode .tabbar { display: none; }
  .bld-top { display: flex; align-items: center; justify-content: space-between; gap: 8px;
    padding: 12px 14px; border-bottom: 1px solid var(--line); position: sticky; top: 0;
    background: var(--bg); z-index: 4; }
  .bld-top .bld-name { flex: 1; min-width: 0; text-align: center; font-size: 16px; font-weight: 600;
    border: none; background: none; color: var(--ink); }
  .bld-top .bld-name::placeholder { color: var(--muted); font-weight: 400; }
  .bld-stage { padding: 14px; }
  .bCanvas { position: relative; width: 100%; max-width: 380px; margin: 0 auto; aspect-ratio: 3 / 4;
    background: #fafafa; border-radius: 14px; touch-action: none; overflow: hidden;
    box-shadow: inset 0 0 0 1px var(--line); }
  .bpiece { position: absolute; aspect-ratio: 1 / 1; transform: translate(-50%, -50%);
    background: center/contain no-repeat; touch-action: none; cursor: grab; }
  .bpiece.sel { outline: 1.5px solid var(--accent); outline-offset: 2px; border-radius: 4px; }
  .bp-handle { position: absolute; right: -11px; bottom: -11px; width: 26px; height: 26px;
    border-radius: 50%; background: var(--accent); display: none; align-items: center;
    justify-content: center; cursor: nwse-resize; box-shadow: 0 1px 4px rgba(0,0,0,.25); }
  .bpiece.sel .bp-handle { display: flex; }
  .bp-handle svg { width: 14px; height: 14px; stroke: #fff; stroke-width: 2.4; fill: none; }
  .bld-empty { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 8px; color: var(--muted); font-size: 14px; pointer-events: none; }
  .bld-empty svg { width: 40px; height: 40px; stroke: #ccc; stroke-width: 1.3; fill: none; }
  .bld-actions { display: flex; gap: 10px; max-width: 380px; margin: 16px auto 0; }
  .bld-actions .btn-ghost { flex: 1; padding: 13px; border: 1px solid var(--line); border-radius: 12px;
    background: #fff; font-size: 14.5px; font-weight: 600; color: var(--ink); display: flex;
    align-items: center; justify-content: center; gap: 7px; }
  .bld-actions .btn-ghost svg { width: 18px; height: 18px; stroke: currentColor; stroke-width: 2; fill: none; }
  .bld-sel-bar { display: flex; gap: 8px; justify-content: center; max-width: 380px; margin: 12px auto 0; }
  .bld-sel-bar button { padding: 9px 14px; border: 1px solid var(--line); border-radius: 999px;
    background: #fff; font-size: 13px; color: var(--ink); display: flex; align-items: center; gap: 6px; }
  .bld-sel-bar button.danger { color: var(--danger); }
  .bld-sel-bar button svg { width: 15px; height: 15px; stroke: currentColor; stroke-width: 1.9; fill: none; }
  .bld-hint { text-align: center; color: var(--muted); font-size: 12.5px; margin-top: 14px; }

  /* ===== CALENDAR ===== */
  .cal-nav { display: flex; align-items: center; padding: 8px 6px 4px; }
  .cal-nav-btn { color: var(--accent); padding: 8px 10px; }
  .cal-nav-btn svg { width: 22px; height: 22px; stroke: currentColor; stroke-width: 2; fill: none; }
  .cal-month-lbl { flex: 1; text-align: center; font-size: 27px; line-height: 1.15; }
  .cal-month-lbl strong { font-weight: 700; }
  .cal-month-lbl em { color: var(--muted); font-style: normal; font-weight: 400; }
  .cal-dow { display: grid; grid-template-columns: repeat(7, 1fr); padding: 2px 2px 6px; }
  .cal-dow-h { text-align: center; font-size: 10.5px; color: var(--muted); }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); border-top: 1px solid var(--line); border-left: 1px solid var(--line); margin: 0 2px; }
  .cal-cell { border-right: 1px solid var(--line); border-bottom: 1px solid var(--line); min-height: 68px; padding: 2px 2px 4px; display: flex; flex-direction: column; align-items: center; overflow: hidden; }
  .cal-cell.today-cell { background: #f4f4f7; }
  .cal-cell.other-month { background: #fafafa; }
  .cal-cell-btn { display: flex; flex-direction: column; align-items: center; width: 100%; background: none; border: none; padding: 0; cursor: pointer; }
  .cal-daynum { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11.5px; font-weight: 500; margin-bottom: 2px; flex-shrink: 0; }
  .cal-daynum.is-today { background: var(--accent); color: #fff; font-weight: 700; }
  .cal-ccoll { width: calc(100% - 4px); aspect-ratio: 3/4; border-radius: 4px; overflow: hidden; display: grid; grid-template-columns: repeat(2, 1fr); gap: 1px; background: #ececf1; }
  .cal-ccoll.solo { grid-template-columns: 1fr; }
  .cal-cp { background: #fff center/contain no-repeat; }
  .cal-cp.span2 { grid-column: span 2; }
  .cal-ccanvas { position: relative; width: calc(100% - 4px); aspect-ratio: 3/4; border-radius: 4px; overflow: hidden; background: #fff; }
  .cal-stats { padding: 20px 14px 8px; }
  .cal-stat { display: flex; align-items: center; gap: 14px; padding: 12px 0; border-bottom: 1px solid var(--line); }

<script>
/* ===================================================================
   CONFIG  (publishable key + URL are safe to ship in client code)
   =================================================================== */
const SUPABASE_URL = "https://ofwaxqrwbcixrnjkepuz.supabase.co";
const SUPABASE_KEY = "sb_publishable_MbsUbmttzon5YNsJgUsDrw_Mg5NMCGy";
const BUCKET = "wardrobe";
// Version label shown in the UI: "YYYY-MM-DD vN". N resets to 1 on a new day and
// increments for each additional push the same day (so same-day pushes differ).
const APP_VERSION = "2026-06-25 r1";

// category -> subcategories. Keep in sync with migration/import.py TAXONOMY.
const TAXONOMY = {
  "Tops": ["Tee shirts", "Graphic tees", "Long-sleeve tees", "Sleeveless", "Blouses", "Sweaters", "Cardigans", "Sweatshirts"],
  "Bottoms": ["Jeans", "Pants", "Shorts", "Skirts", "Leggings/Joggers", "Tights"],
  "Dresses": ["Casual dresses", "Work dresses", "Cocktail dresses"],
  "Outerwear": ["Blazers", "Jackets", "Coats"],
  "Shoes": ["Boots", "Sandals", "Flats", "Heels", "Sneakers"],
  "Workout": ["Workout tops", "Active shorts", "Sports bras"],
};
const CATEGORIES = Object.keys(TAXONOMY);

// Single color family per item: label + swatch. Keep in sync with import.py.
const COLOR_FAMILIES = [
  ["Green","#3a7d44"], ["Teal","#1f8f8f"], ["Blue","#2f6fd0"], ["Purple","#7d54a8"],
  ["Maroon","#7b2d3a"], ["Pink","#e88aa8"], ["Red","#c0392b"], ["Orange","#e08a2b"],
  ["Yellow","#e6c34a"], ["Beige","#d8c4a0"], ["Brown","#7a5230"], ["White","#ffffff"],
  ["Gray","#9a9a9a"], ["Black","#1a1a1a"],
  ["Metallic","linear-gradient(135deg,#bfc3c7,#f2f2f2,#c9a14a,#8a8d90)"],
];
const colorHex = (name) => (COLOR_FAMILIES.find(c => c[0] === name) || [])[1] || "#ccc";

// Formality scale 1-6 (index 0 = level 1). Matches outfit bucket labels.
const OCCASION_LADDER = ["Function", "Very Casual", "Everyday Casual", "Smart Casual", "Dressed Up", "Formal"];
const occLabel = (n) => (n >= 1 && n <= 6) ? OCCASION_LADDER[n - 1] : null;

const ACQUISITIONS = ["New", "Secondhand", "Gift"];
const STATUSES = ["Available", "Storage", "Archive", "Wishlist"];
const SEASONS = ["Spring", "Summer", "Fall", "Winter"];
const CAPSULE_KINDS = ["capsule", "packing", "travel"];

const MAX_DIM = 1200;          // longest edge after downscale
const ENCODE_Q = 0.82;         // quality used for both webp + jpeg fallback
const SIGNED_TTL = 3600;       // signed photo URL lifetime (s)

/* ===================================================================
   SESSION  (persisted in localStorage)
   =================================================================== */
const SESSION_KEY = "wardrobe.session";
let session = null;   // { access_token, refresh_token, user, expires_at }

// Safe storage: localStorage is blocked in some contexts (e.g. data: URLs,
// private-mode quirks). Fall back to an in-memory store so the app never throws.
const store = (() => {
  try {
    const k = "__wardrobe_probe__";
    localStorage.setItem(k, "1"); localStorage.removeItem(k);
    return localStorage;
  } catch {
    const mem = new Map();
    return {
      getItem: (k) => (mem.has(k) ? mem.get(k) : null),
      setItem: (k, v) => mem.set(k, v),
      removeItem: (k) => mem.delete(k),
    };
  }
})();

function loadSession() {
  try { session = JSON.parse(store.getItem(SESSION_KEY)) || null; }
  catch { session = null; }
}
function saveSession(s) {
  session = s;
  if (s) store.setItem(SESSION_KEY, JSON.stringify(s));
  else store.removeItem(SESSION_KEY);
}

/* ===================================================================
   FETCH HELPERS
   =================================================================== */

// Auth endpoints (sign in / refresh). apikey only, no bearer needed.
async function authRequest(grant, body) {
  const r = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=${grant}`, {
    method: "POST",
    headers: { apikey: SUPABASE_KEY, "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
  const data = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(data.error_description || data.msg || data.error || "Auth failed");
  return data;
}

function storeAuth(data) {
  saveSession({
    access_token: data.access_token,
    refresh_token: data.refresh_token,
    user: data.user,
    expires_at: Date.now() + (data.expires_in || 3600) * 1000,
  });
}

async function signIn(email, password) {
  storeAuth(await authRequest("password", { email, password }));
}

// Refresh the access token using the stored refresh token. Returns false on failure.
async function refreshSession() {
  if (!session?.refresh_token) return false;
  try { storeAuth(await authRequest("refresh_token", { refresh_token: session.refresh_token })); return true; }
  catch { return false; }
}

// Core authed fetch. Adds apikey + bearer, transparently refreshes once on 401.
async function api(path, opts = {}, _retried = false) {
  const headers = Object.assign(
    { apikey: SUPABASE_KEY, Authorization: `Bearer ${session?.access_token || ""}` },
    opts.headers || {}
  );
  let r;
  try { r = await fetch(`${SUPABASE_URL}${path}`, Object.assign({}, opts, { headers })); }
  catch (e) { throw new Error("Network error — check your connection."); }

  if (r.status === 401 && !_retried) {
    if (await refreshSession()) return api(path, opts, true);
    handleSignedOut();
    throw new Error("Session expired — please sign in again.");
  }
  return r;
}

// PostgREST helper. Returns parsed JSON (or null for empty).
async function rest(path, opts = {}) {
  const r = await api(`/rest/v1/${path}`, opts);
  if (!r.ok) {
    const e = await r.json().catch(() => ({}));
    throw new Error(e.message || e.hint || `Request failed (${r.status})`);
  }
  if (r.status === 204) return null;
  const txt = await r.text();
  return txt ? JSON.parse(txt) : null;
}

// Upload a Blob to Storage at <user_id>/<name>. RLS keys off the user-id folder.
async function uploadPhoto(blob, filename) {
  const path = `${session.user.id}/${filename}`;
  const r = await api(`/storage/v1/object/${BUCKET}/${path}`, {
    method: "POST",
    headers: { "Content-Type": blob.type, "x-upsert": "true" },
    body: blob,
  });
  if (!r.ok) {
    const e = await r.json().catch(() => ({}));
    throw new Error(e.message || `Photo upload failed (${r.status})`);
  }
  return path;
}

async function deletePhoto(path) {
  if (!path) return;
  await api(`/storage/v1/object/${BUCKET}/${path}`, { method: "DELETE" }).catch(() => {});
}

// Signed URLs for private photos. Cached in-memory so a grid doesn't re-sign each render.
const _urlCache = new Map();
async function signedUrl(path) {
  if (!path) return null;
  if (_urlCache.has(path)) return _urlCache.get(path);
  const r = await api(`/storage/v1/object/sign/${BUCKET}/${path}`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ expiresIn: SIGNED_TTL }),
  });
  if (!r.ok) return null;
  const { signedURL } = await r.json();
  const full = `${SUPABASE_URL}/storage/v1${signedURL}`;
  _urlCache.set(path, full);
  setTimeout(() => _urlCache.delete(path), (SIGNED_TTL - 60) * 1000);
  return full;
}

// Batch-sign up to `paths.length` URLs in a single API call (Supabase batch endpoint).
async function signedUrlBatch(paths) {
  if (!paths.length) return;
  try {
    const r = await api(`/storage/v1/object/sign/${BUCKET}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ paths, expiresIn: SIGNED_TTL }),
    });
    if (!r.ok) return;
    const rows = await r.json();
    for (const row of Array.isArray(rows) ? rows : []) {
      if (row.signedURL && !row.error) {
        const full = `${SUPABASE_URL}/storage/v1${row.signedURL}`;
        _urlCache.set(row.path, full);
        setTimeout(() => _urlCache.delete(row.path), (SIGNED_TTL - 60) * 1000);
      }
    }
  } catch (_) { /* non-fatal */ }
}

// Pre-warm the URL cache for all item photos right after data loads.
async function prewarmUrlCache() {
  const paths = [...new Set(
    items.filter(i => i.image_path && !_urlCache.has(i.image_path)).map(i => i.image_path)
  )];
  for (let i = 0; i < paths.length; i += 100) {
    signedUrlBatch(paths.slice(i, i + 100)); // fire and forget
  }
}

/* ===================================================================
   IMAGE COMPRESSION  (canvas downscale -> WebP, JPEG fallback)
   =================================================================== */
function compressImage(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      let { width: w, height: h } = img;
      if (Math.max(w, h) > MAX_DIM) {
        const s = MAX_DIM / Math.max(w, h);
        w = Math.round(w * s); h = Math.round(h * s);
      }
      const c = document.createElement("canvas");
      c.width = w; c.height = h;
      const ctx = c.getContext("2d");
      ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, w, h); // flatten any transparency
      ctx.drawImage(img, 0, 0, w, h);
      c.toBlob((blob) => {
        if (blob && blob.type === "image/webp") return resolve({ blob, ext: "webp" });
        c.toBlob((jpg) => jpg ? resolve({ blob: jpg, ext: "jpg" }) : reject(new Error("Could not process image")),
                 "image/jpeg", ENCODE_Q);
      }, "image/webp", ENCODE_Q);
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error("Could not read that image")); };
    img.src = url;
  });
}

/* ===================================================================
   APP STATE + DATA LOADING
   =================================================================== */
let items = [];   // all items (every status)
let wears = [];   // all wears
let outfits = [];      // all outfits (saved sets of items worn together)
let outfitLinks = [];  // outfit_items join rows {outfit_id, item_id}
let capsules = [];     // capsule rows {id,name,kind,start_date,end_date,notes,...}
let capsuleLinks = []; // capsule_items join rows {capsule_id, item_id, packed}
let dataReady = false;

// Derived indexes (rebuilt by buildOutfitIndexes after each load).
let itemById = new Map();        // item id -> item
let outfitById = new Map();      // outfit id -> outfit
let outfitItemMap = new Map();   // outfit id -> [item id]
let outfitWearMap = new Map();   // outfit id -> Set(worn_on)
let capsuleById = new Map();     // capsule id -> capsule
let capsuleLinkMap = new Map();  // capsule id -> [link rows {item_id, packed}]

// PostgREST/Supabase caps a single response at 1000 rows; page through the rest.
async function restAll(path) {
  const PAGE = 1000;
  let out = [], offset = 0;
  for (;;) {
    const sep = path.includes("?") ? "&" : "?";
    const chunk = await rest(`${path}${sep}limit=${PAGE}&offset=${offset}`);
    if (!chunk || chunk.length === 0) break;
    out = out.concat(chunk);
    if (chunk.length < PAGE) break;
    offset += PAGE;
  }
  return out;
}

async function loadData() {
  dataReady = false;
  const [it, wr, of, oi, cp, ci] = await Promise.all([
    restAll("items?select=*&order=created_at.desc"),
    restAll("wears?select=*&order=worn_on.desc"),
    restAll("outfits?select=*&order=created_at.desc"),
    restAll("outfit_items?select=outfit_id,item_id"),
    restAll("capsules?select=*&order=created_at.desc"),
    restAll("capsule_items?select=*"),  // includes `packed` once that column exists
  ]);
  items = it || [];
  wears = wr || [];
  outfits = of || [];
  outfitLinks = oi || [];
  capsules = cp || [];
  capsuleLinks = ci || [];
  buildOutfitIndexes();
  buildCapsuleIndexes();
  dataReady = true;
}

// Rebuild capsule lookup maps. Called after each load + after any mutation.
function buildCapsuleIndexes() {
  capsuleById = new Map(capsules.map(c => [c.id, c]));
  capsuleLinkMap = new Map();
  for (const l of capsuleLinks) {
    let a = capsuleLinkMap.get(l.capsule_id);
    if (!a) { a = []; capsuleLinkMap.set(l.capsule_id, a); }
    a.push(l);
  }
}
// Item objects belonging to a capsule (skips dangling links).
function capsuleItems(cid) {
  return (capsuleLinkMap.get(cid) || []).map(l => itemById.get(l.item_id)).filter(Boolean);
}
function capsuleItemCount(cid) { return capsuleItems(cid).length; }

// Rebuild the lookup maps + per-outfit derived caches. Called after each load.
function buildOutfitIndexes() {
  itemById = new Map(items.map(i => [i.id, i]));
  outfitById = new Map(outfits.map(o => [o.id, o]));
  outfitItemMap = new Map();
  for (const l of outfitLinks) {
    let a = outfitItemMap.get(l.outfit_id);
    if (!a) { a = []; outfitItemMap.set(l.outfit_id, a); }
    a.push(l.item_id);
  }
  // Stable display number: oldest outfit = #1 (Stylebook-style "Look #N").
  outfits.slice()
    .sort((a, b) => String(a.created_at || "").localeCompare(String(b.created_at || "")))
    .forEach((o, idx) => { o._num = idx + 1; o._bucket = null; });
  buildOutfitWearMap();
}
function buildOutfitWearMap() {
  outfitWearMap = new Map();
  for (const w of wears) {
    if (!w.outfit_id) continue;
    let s = outfitWearMap.get(w.outfit_id);
    if (!s) { s = new Set(); outfitWearMap.set(w.outfit_id, s); }
    s.add(w.worn_on);
  }
}

// ---- derived helpers ----
function wearCount(itemId) { return new Set(wears.filter(w => w.item_id === itemId).map(w => w.worn_on)).size; }
function lastWorn(itemId) {
  const ws = wears.filter(w => w.item_id === itemId).map(w => w.worn_on).sort();
  return ws.length ? ws[ws.length - 1] : null;
}
function costPerWear(item) {
  const n = wearCount(item.id);
  if (item.price == null || n === 0) return null;
  return item.price / n;
}
function daysSince(dateStr) {
  if (!dateStr) return null;
  return Math.floor((Date.now() - new Date(dateStr + "T00:00:00").getTime()) / 86400000);
}
function outfitCount(itemId) {
  return new Set(wears.filter(w => w.item_id === itemId && w.outfit_id).map(w => w.outfit_id)).size;
}
const itemStatus = (i) => i.status || "Available";
const money = (n) => (n == null ? "—" : "$" + Number(n).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 }));
const todayStr = () => new Date().toISOString().slice(0, 10);
const esc = (s) => String(s ?? "").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[c]));
const parseList = (s) => String(s || "").split(",").map(x => x.trim()).filter(Boolean);

   =================================================================== */
const $ = (sel, root = document) => root.querySelector(sel);
const $$ = (sel, root = document) => [...root.querySelectorAll(sel)];

let toastTimer;
function toast(msg) {
  const t = $("#toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2200);
}

// Lazy photo loading: sign + set background only when a node nears the viewport.
const photoObserver = new IntersectionObserver((entries) => {
  for (const e of entries) {
    if (!e.isIntersecting) continue;
    const n = e.target;
    photoObserver.unobserve(n);
    loadPhotoNode(n);
  }
}, { rootMargin: "300px" });

async function loadPhotoNode(n) {
  if (n.dataset.photoDone) return;
  n.dataset.photoDone = "1";
  const url = await signedUrl(n.dataset.photo);
  if (url) { n.style.backgroundImage = `url("${url}")`; n.style.backgroundColor = "transparent"; }
}
function hydratePhotos(root = document) {
  $$("[data-photo]", root)
    .filter(n => !n.dataset.photoDone && !n.dataset.photoObs)
    .forEach(n => { n.dataset.photoObs = "1"; photoObserver.observe(n); });
}

/* ===================================================================
   RENDER: CLOSET  (status lens · category → subcategory → grid)
   =================================================================== */
// Status is a cross-cutting LENS, not a category. A tee is always a Top; the lens
// decides which tees you see. "Available" is the default working set.
const LENSES = ["Available", "Storage", "Archive", "All"];
let closetLens = "Available";
let closetCat = null;     // null = root | category name | "Other"
let closetSub = null;     // null = subcategory list | subcategory | "__other__"
let searchResults = null; // null = not in search-results mode; else array of items
let detailId = null;      // item id currently shown in detail (null = none)
let detailView = null;    // null = photo view | "details" = details view
let _fromStats = false;   // item detail opened from stats (closetBack returns to stats)
let _reviewMode = false;  // item detail opened from closet review (closetBack returns to review)
let gridCols = 3;         // items per row (2–5), persisted to localStorage
let selectMode = false;   // multi-select active
let selectedIds = new Set();
let bulkPending = {};     // bulk edit: field -> pending value
let bulkOpenField = null; // which field row is expanded in bulk edit sheet

let activeCapsuleId = null; // when set, Closet is scoped to this capsule's items

// Items in the current lens. An active capsule overrides the status lens entirely
// (you want to see everything you packed, regardless of Available/Storage).
function lensItems() {
  if (activeCapsuleId) {
    const ids = new Set((capsuleLinkMap.get(activeCapsuleId) || []).map(l => l.item_id));
    return items.filter(i => ids.has(i.id));
  }
  return closetLens === "All" ? items : items.filter(i => itemStatus(i) === closetLens);
}
const isOtherCat = (i) => !i.category || !CATEGORIES.includes(i.category);
function folderThumb(list) { const f = list.find(i => i.image_path); return f ? f.image_path : null; }

function thumbHtml(path, cls = "cthumb") {
  return path
    ? `<div class="${cls}" data-photo="${esc(path)}"></div>`
    : `<div class="${cls} empty"><svg viewBox="0 0 24 24"><path d="M5 9l7-5 7 5"/><path d="M5 9c0 2.2 14 2.2 14 0"/></svg></div>`;
}
function rowHtml(thumb, name, count, attrs = "") {
  const sub = count === 0 ? "No items" : `${count} item${count === 1 ? "" : "s"}`;
  return `<button class="frow" ${attrs}>
    ${thumbHtml(thumb)}
    <div class="fmeta"><div class="fname">${esc(name)}</div><div class="fcount">${sub}</div></div>
    <svg class="chev" viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg>
  </button>`;
}
function gridHtml(list, subtitleFn = null, opts = {}) {
  if (!list.length) return `<div class="placeholder"><b>No items here</b></div>`;
  const chk = `<div class="sel-dot"><svg viewBox="0 0 24 24"><path d="M5 12l5 5L19 7"/></svg></div>`;
  return `<div class="grid" style="--grid-cols:${gridCols}">${list.map(i => {
    const sel = selectMode && selectedIds.has(i.id);
    const sub = subtitleFn ? subtitleFn(i) : "";
    if (opts.metricOnly) {
      // number-only tile (Stylebook worn-history / cpw / price grids)
      return `<button class="gtile" data-item="${esc(i.id)}">
        ${thumbHtml(i.image_path, "gphoto")}
        <div class="gtile-metric">${esc(sub)}</div>
      </button>`;
    }
    return `<button class="gtile${sel ? " selected" : ""}" data-item="${esc(i.id)}">
      ${selectMode ? chk.replace("sel-dot", "sel-dot" + (sel ? " on" : "")) : ""}
      ${thumbHtml(i.image_path, "gphoto")}
      <div class="gname">${esc(i.name || "Untitled")}</div>
      ${sub ? `<div class="gtile-sub">${esc(sub)}</div>` : ""}
    </button>`;
  }).join("")}</div>`;
}

function clToolbar(title, showBack, showPlus) {
  const right = showPlus
    ? `<button class="clsearch" id="clPlus" style="font-size:22px;font-weight:300;line-height:1">＋</button>`
    : `<button class="clsearch" id="clSearch"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/></svg></button>`;
  return `<div class="cltoolbar">
    ${showBack
      ? `<button class="clback" id="clBack"><svg viewBox="0 0 24 24"><path d="M15 6l-6 6 6 6"/></svg></button>`
      : `<span style="width:34px"></span>`}
    <div class="cltitle">${esc(title)}</div>
    ${right}
  </div>`;
}
function lensHtml() {
  return `<div class="lens">${LENSES.map(l =>
    `<button data-lens="${l}" class="${closetLens === l ? "on" : ""}">${l}</button>`).join("")}</div>`;
}

function renderClosetRoot() {
  const av = lensItems();
  let rows = "";
  for (const cat of CATEGORIES) {
    const list = av.filter(i => i.category === cat);
    if (!list.length) continue;
    rows += rowHtml(folderThumb(list), cat, list.length, `data-cat="${esc(cat)}"`);
  }
  const other = av.filter(isOtherCat);
  if (other.length) rows += rowHtml(folderThumb(other), "Other", other.length, `data-cat="Other"`);
  if (!rows) rows = `<div class="placeholder"><b>Nothing here</b></div>`;
  const top = activeCapsuleId ? "" : lensHtml();
  return clToolbar(activeCapsuleId ? "Closet" : "Closet", false) + top + `<div class="frows">${rows}</div>`;
}

// Banner shown across Closet screens while a capsule scopes the view.
function capsuleBanner() {
  const c = capsuleById.get(activeCapsuleId);
  if (!c) return "";
  return `<div class="cap-banner">
    <div class="cb-t">Planning · ${esc(c.name)}</div>
    <button class="cb-x" data-cap-clear>✕</button>
  </div>`;
}

function renderClosetCategory(cat) {
  const inCat = cat === "Other" ? lensItems().filter(isOtherCat) : lensItems().filter(i => i.category === cat);
  let rows = "";
  if (cat !== "Other") {
    for (const s of (TAXONOMY[cat] || [])) {
      const list = inCat.filter(i => i.subcategory === s);
      rows += rowHtml(folderThumb(list), s, list.length, `data-sub="${esc(s)}"`);
    }
    const subs = TAXONOMY[cat] || [];
    const other = inCat.filter(i => !i.subcategory || !subs.includes(i.subcategory));
    if (other.length) rows += rowHtml(folderThumb(other), "Other", other.length, `data-sub="__other__"`);
  }
  const hdr = `<div class="fhdr">${thumbHtml(folderThumb(inCat))}
    <div class="fmeta"><div class="fname big">${esc(cat)}</div>
    <div class="fcount">${inCat.length} item${inCat.length === 1 ? "" : "s"}</div></div></div>
    <button class="frow" data-sub="__all__" style="color:var(--accent);font-weight:600">
      <span>All Items in ${esc(cat)}</span>
      <svg class="chev" viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg>
    </button>`;
  // categories with no subcategory taxonomy (Other) jump straight to a grid
  return clToolbar(cat, true) + (rows ? hdr + `<div class="frows">${rows}</div>` : hdr + gridHtml(inCat));
}

function categoryGrid(cat, sub) {
  const inCat = cat === "Other" ? lensItems().filter(isOtherCat) : lensItems().filter(i => i.category === cat);
  if (sub === "__all__") return inCat;
  if (sub === "__other__") { const subs = TAXONOMY[cat] || []; return inCat.filter(i => !i.subcategory || !subs.includes(i.subcategory)); }
  return inCat.filter(i => i.subcategory === sub);
}

function renderCloset() {
  detailId = null;
  detailView = null;
  $("#itemBar").hidden = true;
  $("#app").classList.remove("detail-photo");
  const body = $("#closetBody");
  if (searchResults) {
    body.innerHTML = clToolbar(`Results · ${searchResults.length}`, true) + gridHtml(searchResults);
  } else if (closetCat && closetSub) {
    const label = closetSub === "__all__" ? "All" : closetSub === "__other__" ? "Other" : closetSub;
    body.innerHTML = clToolbar(`${closetCat} · ${label}`, true, true) + gridHtml(categoryGrid(closetCat, closetSub));
  } else if (closetCat) {
    body.innerHTML = renderClosetCategory(closetCat);
  } else {
    body.innerHTML = renderClosetRoot();
  }
  // While a capsule scopes the closet, show a clear-able banner under the toolbar
  // on every screen (root already omits the lens row).
  if (activeCapsuleId && closetCat) {
    const tb = body.querySelector(".cltoolbar");
    if (tb) tb.insertAdjacentHTML("afterend", capsuleBanner());
  } else if (activeCapsuleId && !closetCat && !searchResults) {
    const lens = body.querySelector(".cltoolbar");
    if (lens) lens.insertAdjacentHTML("afterend", capsuleBanner());
  }
  hydratePhotos(body);
  const hasGrid = !!body.querySelector(".grid");
  $("#gridBar").hidden = !hasGrid;
  $("#app").classList.toggle("has-gridbar", hasGrid);
  updateGridBar();
  // wire "+" add button (pre-fills category context)
  const clPlus = $("#clPlus");
  if (clPlus) clPlus.onclick = () => switchTab("add");
}

function closetBack() {
  if (detailId && detailView === "details") { openItem(detailId); return; }
  if (detailId && _reviewMode) {
    _reviewMode = false;
    detailId = null; detailView = null;
    $("#itemBar").hidden = true;
    $("#app").classList.remove("detail-photo");
    // Return to review deal card
    $$(".screen").forEach(s => s.classList.toggle("active", s.id === "tab-stats"));
    $$("#tabbar button").forEach(b => b.classList.toggle("on", b.dataset.tab === "stats"));
    $("#title").textContent = "Style Stats";
    $("#headerAdd").hidden = true;
    statsView = "review-deal";
    renderStats(); return;
  }
  if (detailId && _fromStats) {
    _fromStats = false;
    detailId = null; detailView = null;
    $("#itemBar").hidden = true;
    $("#app").classList.remove("detail-photo");
    // Switch to stats screen without resetting statsView
    $$(".screen").forEach(s => s.classList.toggle("active", s.id === "tab-stats"));
    $$("#tabbar button").forEach(b => b.classList.toggle("on", b.dataset.tab === "stats"));
    $("#title").textContent = "Style Stats";
    $("#headerAdd").hidden = true;
    renderStats(); return;
  }
  if (detailId && _fromCapsule) {
    const cid = _fromCapsule; _fromCapsule = null;
    detailId = null; detailView = null;
    $("#itemBar").hidden = true;
    $("#app").classList.remove("detail-photo");
    $$(".screen").forEach(s => s.classList.toggle("active", s.id === "tab-capsules"));
    $$("#tabbar button").forEach(b => b.classList.toggle("on", b.dataset.tab === "capsules"));
    $("#title").textContent = "Capsules";
    $("#headerAdd").hidden = true;
    capsuleId = cid; capsuleView = "detail";
    renderCapsules(); return;
  }
  if (detailId) {
    detailId = null; detailView = null;
    $("#itemBar").hidden = true;
    $("#app").classList.remove("detail-photo");
    renderCloset(); return;
  }
  if (searchResults) { searchResults = null; }
  else if (closetSub) { closetSub = null; }
  else if (closetCat) { closetCat = null; }
  renderCloset();
}

// ---- Replace / add / remove an item's photo (reuses the add-item pipeline) ----
function pickItemPhoto(id) {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = "image/*";
  input.onchange = (e) => { const f = e.target.files[0]; if (f) replaceItemPhoto(id, f); };
  input.click();
}

async function replaceItemPhoto(id, file) {
  const i = items.find(x => x.id === id);
  if (!i) return;
  toast("Uploading photo…");
  try {
    const { blob, ext } = await compressImage(file);
    const filename = `${(crypto.randomUUID ? crypto.randomUUID() : Date.now())}.${ext}`;
    const path = await uploadPhoto(blob, filename);
    const old = i.image_path;
    await rest(`/items?id=eq.${id}`, {
      method: "PATCH",
      headers: { "Content-Type": "application/json", Prefer: "return=minimal" },
      body: JSON.stringify({ image_path: path }),
    });
    i.image_path = path;
    if (old && old !== path) deletePhoto(old);  // fire-and-forget cleanup
    signedUrlBatch([path]);                     // pre-sign so the new photo renders immediately
    toast(old ? "Photo replaced" : "Photo added");
    if (detailId === id && detailView === "details") openItemDetails(id);
  } catch (e) { toast(e.message); }
}

async function removeItemPhoto(id) {
  const i = items.find(x => x.id === id);
  if (!i || !i.image_path) return;
  if (!confirm("Remove this photo?")) return;
  const old = i.image_path;
  try {
    await rest(`/items?id=eq.${id}`, {
      method: "PATCH",
      headers: { "Content-Type": "application/json", Prefer: "return=minimal" },
      body: JSON.stringify({ image_path: null }),
    });
    i.image_path = null;
    deletePhoto(old);
    toast("Photo removed");
    if (detailId === id && detailView === "details") openItemDetails(id);
  } catch (e) { toast(e.message); }
}

// ---- Save a single field to Supabase ----
async function saveField(id, field, value) {
  const i = items.find(x => x.id === id);
  if (!i) return;
  const prev = i[field];
  i[field] = value; // optimistic
  try {
    await rest(`/items?id=eq.${id}`, {
      method: "PATCH",
      headers: { "Content-Type": "application/json", Prefer: "return=minimal" },
      body: JSON.stringify({ [field]: value }),
    });
    // refresh details if still in details view for this item
    if (detailId === id && detailView === "details") openItemDetails(id);
  } catch (e) {
    i[field] = prev;
    toast(e.message);
  }
}

// ---- Field edit sheet ----
let _fieldEditId = null;
let _fieldEditKey = null;
let _fieldPending = undefined; // current pending value in sheet
let _fieldEditItem = null;    // the item object being edited (real item or _addState)
let _fieldOnSave = null;      // null = save to DB; fn(val) = custom save (used by Add form)

function openFieldEdit(id, field) {
  const cfg = FIELD_CONFIGS[field];
  if (!cfg) return;
  const i = items.find(x => x.id === id);
  if (!i) return;
  _fieldEditId = id;
  _fieldEditKey = field;
  _fieldPending = i[field];
  _fieldEditItem = i;
  _fieldOnSave = null;
  renderFieldSheet(i, field, cfg);
  $("#fieldSheet").hidden = false;
}

function closeFieldSheet() {
  $("#fieldSheet").hidden = true;
  _fieldEditId = null;
  _fieldEditKey = null;
  _fieldPending = undefined;
  _fieldEditItem = null;
  _fieldOnSave = null;
}

function renderFieldSheet(i, field, cfg) {
  const curVal = _fieldPending !== undefined ? _fieldPending : i[field];
  let content = "";
  if (cfg.type === "text" || cfg.type === "price") {
    const isPrice = cfg.type === "price";
    content = `<div class="sheet-expand" style="border:none;background:#fff;padding:16px 18px">
      <input class="inp" id="fieldTextInp" type="${isPrice ? "number" : "text"}"
        inputmode="${isPrice ? "decimal" : "text"}"
        value="${esc(curVal != null ? String(curVal) : "")}"
        placeholder="${esc(cfg.label)}…" style="width:100%;font-size:16px">
    </div>`;
  } else if (cfg.type === "typeahead") {
    const suggestions = distinctScalar(field).filter(Boolean);
    const suggestHtml = suggestions.length
      ? `<div class="fld-sugg-lbl">Previously entered</div>
         <div class="fld-suggestions">${suggestions.map(s =>
           `<button class="sheet-chip" data-fv="${esc(s)}">${esc(s)}</button>`).join("")}</div>`
      : "";
    content = `<div class="sheet-expand" style="border:none;background:#fff;padding:16px 18px">
      <input class="inp" id="fieldTextInp" type="text" inputmode="text"
        value="${esc(curVal != null ? String(curVal) : "")}"
        placeholder="${esc(cfg.label)}…" style="width:100%;font-size:16px">
    </div>${suggestHtml}`;
  } else if (cfg.type === "color") {
    const chips = cfg.opts.map(o => {
      const on = curVal === o;
      const hex = colorHex(o);
      return `<button class="fld-color-chip${on ? " on" : ""}" data-fv="${esc(o)}" title="${esc(o)}"
        style="background:${hex};${on ? "outline:3px solid var(--accent);outline-offset:2px;" : ""}">
        ${on ? `<svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:#fff;stroke-width:3;fill:none"><path d="M5 12l5 5L19 7"/></svg>` : ""}
      </button>`;
    }).join("");
    content = `<div style="padding:16px 18px"><div class="fld-color-grid">${chips}</div></div>`;
  } else if (cfg.type === "formality") {
    const chips = OCCASION_LADDER.map((lbl, idx) => {
      const lvl = idx + 1, on = curVal === lvl;
      return `<button class="sheet-chip${on ? " on" : ""}" data-fv="${lvl}" style="text-align:left">${lvl}. ${esc(lbl)}</button>`;
    }).join("");
    content = `<div class="sheet-expand" style="border:none"><div class="sheet-chips" style="flex-direction:column;align-items:stretch;gap:8px">${chips}</div></div>`;
  } else {
    // single or multi chips
    const isMulti = cfg.type === "multi";
    const selected = isMulti ? (Array.isArray(curVal) ? curVal : []) : (curVal ? [curVal] : []);
    const chips = cfg.opts.map(o => {
      const on = selected.includes(o);
      return `<button class="sheet-chip${on ? " on" : ""}" data-fv="${esc(o)}">${esc(o)}</button>`;
    }).join("");
    const filterHtml = (isMulti && cfg.filter)
      ? `<div style="padding:12px 18px 4px"><input id="multiFilter" class="inp" placeholder="Filter…" style="width:100%;font-size:15px"></div>`
      : "";
    content = `${filterHtml}<div class="sheet-expand" style="border:none"><div class="sheet-chips">${chips}</div></div>`;
  }

  const hasVal = curVal != null && curVal !== "" && !(Array.isArray(curVal) && curVal.length === 0);

  $("#fieldInner").innerHTML = `
    <div class="sheet-hdr">
      <button class="lnk" id="fldCancel">Cancel</button>
      <h2>${esc(cfg.label)}</h2>
      <button class="lnk" id="fldSave" style="font-weight:700">Save</button>
    </div>
    ${content}
    ${hasVal ? `<div style="padding:0 18px 8px"><button class="lnk" id="fldClear" style="color:var(--danger);font-size:14px">Clear</button></div>` : ""}
  `;

  // wire cancel
  $("#fldCancel").onclick = closeFieldSheet;

  // wire save — respects _fieldOnSave for Add form
  $("#fldSave").onclick = async () => {
    let val = _fieldPending;
    if (cfg.type === "text" || cfg.type === "price" || cfg.type === "typeahead") {
      const inp = $("#fieldTextInp");
      val = inp ? (cfg.type === "price" ? (inp.value ? parseFloat(inp.value) : null) : (inp.value.trim() || null)) : val;
    }
    if (_fieldOnSave) { _fieldOnSave(val); closeFieldSheet(); }
    else { await saveField(_fieldEditId, _fieldEditKey, val); closeFieldSheet(); }
  };

  // wire clear
  const clearBtn = $("#fldClear");
  if (clearBtn) {
    clearBtn.onclick = async () => {
      const cleared = Array.isArray(curVal) ? [] : null;
      if (_fieldOnSave) { _fieldOnSave(cleared); closeFieldSheet(); }
      else { await saveField(_fieldEditId, _fieldEditKey, cleared); closeFieldSheet(); }
    };
  }

  // text / typeahead input live update + suggestion filtering
  const ti = $("#fieldTextInp");
  if (ti) {
    ti.oninput = () => {
      _fieldPending = ti.value;
      if (cfg.type === "typeahead") {
        const q = ti.value.trim().toLowerCase();
        $("#fieldInner").querySelectorAll(".fld-suggestions .sheet-chip").forEach(chip => {
          chip.hidden = q.length > 0 && !chip.textContent.toLowerCase().includes(q);
        });
      }
    };
    setTimeout(() => ti.focus(), 80);
  }

  // multi filter input (e.g. fabric)
  const mf = $("#multiFilter");
  if (mf) {
    mf.oninput = () => {
      const q = mf.value.trim().toLowerCase();
      $("#fieldInner").querySelectorAll(".sheet-chips .sheet-chip").forEach(chip => {
        chip.hidden = q.length > 0 && !chip.textContent.toLowerCase().includes(q);
      });
    };
    setTimeout(() => mf.focus(), 80);
  }

  // chip clicks
  $("#fieldInner").querySelectorAll("[data-fv]").forEach(btn => {
    btn.onclick = () => {
      const v = btn.dataset.fv;
      if (cfg.type === "typeahead") {
        // fill text input, don't re-render
        _fieldPending = v;
        const inp = $("#fieldTextInp");
        if (inp) { inp.value = v; inp.focus(); }
        return;
      }
      if (cfg.type === "formality") {
        const n = +v;
        _fieldPending = (_fieldPending === n) ? null : n;
      } else if (cfg.type === "multi") {
        const cur = Array.isArray(_fieldPending) ? _fieldPending : (Array.isArray((i || {})[field]) ? [...(i || {})[field]] : []);
        _fieldPending = cur.includes(v) ? cur.filter(x => x !== v) : [...cur, v];
      } else if (cfg.type === "color" || cfg.type === "single") {
        _fieldPending = (_fieldPending === v) ? null : v;
      }
      renderFieldSheet(_fieldEditItem, _fieldEditKey, cfg);
    };
  });
}
