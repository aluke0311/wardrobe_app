<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<title>Wardrobe</title>
<style>
  /* ---------- design tokens ---------- */
  :root {
    --bg: #ffffff;
    --surface: #ffffff;
    --ink: #2b2b33;
    --muted: #9a9aa6;
    --line: #ececf1;
    --accent: #8b8fd0;          /* calm periwinkle, Stylebook-ish */
    --accent-soft: #eef0fb;
    --danger: #c0392b;
    --radius: 16px;
    --nav-h: 64px;
    --safe-b: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font: 16px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overscroll-behavior-y: none;
    -webkit-font-smoothing: antialiased;
  }
  h1, h2, h3 { margin: 0; font-weight: 600; }
  button { font: inherit; color: inherit; cursor: pointer; border: none; background: none; }
  .muted { color: var(--muted); }
  .center { text-align: center; }

  /* ---------- login ---------- */
  #login { display: none; min-height: 100%; align-items: center; justify-content: center; padding: 24px; }
  #login.active { display: flex; }
  #login .box { width: 100%; max-width: 360px; }
  #login h1 { font-size: 28px; letter-spacing: .02em; }
  .stack > * + * { margin-top: 14px; }
  .card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 18px; }
  .fld { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
  .inp {
    width: 100%; padding: 12px 14px; border: 1px solid var(--line);
    border-radius: 12px; font: inherit; background: #fff; color: var(--ink);
  }
  .inp:focus { outline: none; border-color: var(--accent); }
  .btn {
    width: 100%; padding: 13px; border-radius: 12px; background: var(--accent);
    color: #fff; font-weight: 600; text-align: center;
  }
  .btn:disabled { opacity: .6; }
  .err { color: var(--danger); font-size: 13.5px; }

  /* ---------- app shell ---------- */
  [hidden] { display: none !important; }
  #app[hidden] { display: none; }
  .bar {
    position: sticky; top: 0; z-index: 10;
    display: flex; align-items: center; justify-content: center;
    height: 52px; padding: 0 14px;
    background: rgba(255,255,255,.92); backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--line);
  }
  .bar h1 { font-size: 17px; letter-spacing: .14em; text-transform: uppercase; }
  .bar .gear {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    font-size: 19px; color: var(--muted); width: 34px; height: 34px;
  }
  .ver { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--muted); }

  .tabbody { padding-bottom: calc(var(--nav-h) + var(--safe-b)); }
  .screen { display: none; }
  .screen.active { display: block; }

  /* ---------- home launcher ---------- */
  .launch {
    display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
    padding: 24px 18px 8px;
  }
  .tile {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 12px; padding: 26px 14px; border-radius: var(--radius);
    background: var(--surface); border: 1px solid var(--line);
    transition: transform .08s ease, background .12s ease;
  }
  .tile:active { transform: scale(.97); background: var(--accent-soft); }
  .tile svg { width: 46px; height: 46px; stroke: var(--accent); stroke-width: 1.6; fill: none; }
  .tile .tlabel { font-size: 14.5px; font-weight: 600; letter-spacing: .01em; }
  .tile .tsub { font-size: 12px; color: var(--muted); margin-top: -6px; }
  .tile.wide { grid-column: 1 / -1; }

  /* ---------- placeholder screens ---------- */
  .placeholder {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 10px; text-align: center; padding: 80px 32px; color: var(--muted);
  }
  .placeholder .pi { width: 54px; height: 54px; stroke: var(--line); stroke-width: 1.6; fill: none; }
  .placeholder b { color: var(--ink); font-size: 17px; }

  /* ---------- bottom nav ---------- */
  .tabbar {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 20;
    display: grid; grid-template-columns: repeat(5, 1fr);
    height: calc(var(--nav-h) + var(--safe-b)); padding-bottom: var(--safe-b);
    background: rgba(255,255,255,.94); backdrop-filter: blur(8px);
    border-top: 1px solid var(--line);
  }
  .tabbar button {
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
    color: var(--muted); font-size: 10.5px;
  }
  .tabbar button svg { width: 23px; height: 23px; stroke: currentColor; stroke-width: 1.7; fill: none; }
  .tabbar button.on { color: var(--accent); }

  /* ---------- misc ---------- */
  .spin { width: 26px; height: 26px; margin: 60px auto; border: 3px solid var(--line);
    border-top-color: var(--accent); border-radius: 50%; animation: sp .8s linear infinite; }
  @keyframes sp { to { transform: rotate(360deg); } }
  #toast {
    position: fixed; left: 50%; bottom: calc(var(--nav-h) + 18px + var(--safe-b));
    transform: translateX(-50%) translateY(20px);
    background: var(--ink); color: #fff; padding: 10px 16px; border-radius: 999px;
    font-size: 13.5px; opacity: 0; pointer-events: none; transition: all .2s ease; z-index: 50;
    max-width: 90vw;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ---------- header add button ---------- */
  .addbtn { position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    font-size: 26px; color: var(--accent); width: 36px; height: 36px; line-height: 1; }
  .addbtn[hidden] { display: none; }

  /* ---------- closet toolbar + lens ---------- */
  .cltoolbar { display: flex; align-items: center; gap: 8px; padding: 12px 14px 6px; }
  .clback, .clsearch { width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; color: var(--ink); }
  .clback svg, .clsearch svg { width: 22px; height: 22px; stroke: currentColor; stroke-width: 1.8; fill: none; }
  .cltitle { flex: 1; font-size: 15px; font-weight: 600; }
  .lens { display: flex; gap: 4px; margin: 2px 14px 8px; background: #f4f4f7; border-radius: 11px; padding: 3px; }
  .lens button { flex: 1; padding: 7px 4px; border-radius: 9px; font-size: 12.5px; color: var(--muted); font-weight: 600; }
  .lens button.on { background: #fff; color: var(--ink); box-shadow: 0 1px 3px rgba(0,0,0,.08); }

  /* ---------- folder rows ---------- */
  .frows { padding: 0 14px 16px; }
  .frow { display: flex; align-items: center; gap: 14px; width: 100%; text-align: left;
    padding: 12px 2px; border-bottom: 1px solid var(--line); }
  .cthumb { width: 64px; height: 64px; flex: none; border-radius: 10px; background: #faf9f8 center/contain no-repeat; }
  .cthumb.empty { display: flex; align-items: center; justify-content: center; background: #f4f4f7; }
  .cthumb.empty svg { width: 30px; height: 30px; stroke: var(--line); stroke-width: 1.5; fill: none; }
  .fmeta { flex: 1; min-width: 0; }
  .fname { font-size: 17px; font-weight: 600; }
  .fname.big { font-size: 20px; }
  .fcount { font-size: 13.5px; color: var(--muted); margin-top: 2px; }
  .chev { width: 18px; height: 18px; flex: none; stroke: var(--line); stroke-width: 2; fill: none; }
  .fhdr { display: flex; align-items: center; gap: 14px; padding: 6px 16px 4px; }
  .seclabel { font-style: italic; color: var(--muted); font-size: 15px; padding: 10px 16px 4px; }

  /* ---------- item grid ---------- */
  .grid { display: grid; grid-template-columns: repeat(var(--grid-cols,3), 1fr); gap: 10px; padding: 4px 14px 20px; }
  .gtile { position: relative; display: flex; flex-direction: column; gap: 5px; }
  .gphoto { width: 100%; aspect-ratio: 1; border-radius: 10px; background: #faf9f8 center/contain no-repeat; border: 1px solid var(--line); }
  .gphoto.empty { display: flex; align-items: center; justify-content: center; background: #f4f4f7; }
  .gphoto.empty svg { width: 28px; height: 28px; stroke: var(--line); stroke-width: 1.5; fill: none; }
  .gname { font-size: 11.5px; color: var(--muted); line-height: 1.25; overflow: hidden;
    text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  /* select mode overlay */
  .sel-dot { position: absolute; top: 5px; left: 5px; width: 21px; height: 21px; border-radius: 50%;
    border: 2px solid var(--accent); background: #fff; display: flex; align-items: center;
    justify-content: center; z-index: 2; pointer-events: none; }
  .sel-dot.on { background: var(--accent); }
  .sel-dot svg { display: none; width: 11px; height: 11px; stroke: #fff; stroke-width: 3; fill: none; }
  .sel-dot.on svg { display: block; }
  .gtile.selected .gphoto { outline: 2.5px solid var(--accent); border-color: var(--accent); }

  /* ---------- grid action bar ---------- */
  #gridBar { position: fixed; left: 0; right: 0; bottom: calc(var(--nav-h) + var(--safe-b)); z-index: 15;
    display: flex; align-items: center; justify-content: space-between;
    padding: 9px 20px 9px; background: #fff; border-top: 1px solid var(--line); }
  /* extra bottom padding when grid bar is visible so content isn't hidden behind it */
  .has-gridbar .tabbody { padding-bottom: calc(var(--nav-h) + var(--safe-b) + 58px); }
  /* action icons: hidden until select mode is active */
  .gb-acts { display: none; gap: 24px; align-items: center; }
  #gridBar.selecting .gb-acts { display: flex; }
  .gb-acts button { padding: 6px; display: flex; align-items: center; }
  .gb-acts button svg { width: 22px; height: 22px; stroke: var(--muted); stroke-width: 1.8; fill: none; }
  .gb-acts button.active svg { stroke: var(--accent); }
  .gb-count { font-size: 13px; color: var(--muted); padding-left: 4px; }
  .gb-right { display: flex; align-items: center; gap: 14px; position: relative; }
  #gbGrid svg { width: 20px; height: 20px; stroke: var(--muted); stroke-width: 1.8; fill: none; }
  #gbSelect { color: var(--accent); font-weight: 600; font-size: 16px; padding: 4px; }
  #gridPickerPop { position: absolute; bottom: calc(100% + 6px); right: 40px;
    background: #fff; border: 1px solid var(--line); border-radius: 12px;
    box-shadow: 0 6px 24px rgba(0,0,0,.13); overflow: hidden; z-index: 200; min-width: 150px; }
  #gridPickerPop button { display: block; width: 100%; padding: 13px 20px; text-align: left; font-size: 15px; }
  #gridPickerPop button.on { color: var(--accent); font-weight: 600; }
  #gridPickerPop button:not(:last-child) { border-bottom: 1px solid var(--line); }

  /* ---------- bottom sheets ---------- */
  .sheet-bg { position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 300; touch-action: none; }
  .sheet { position: fixed; left: 0; right: 0; bottom: 0; background: #fff;
    border-radius: 18px 18px 0 0; max-height: 88vh; overflow-y: auto; z-index: 301; }
  .sheet-hdr { display: flex; align-items: center; justify-content: space-between;
    padding: 16px 18px 12px; border-bottom: 1px solid var(--line); position: sticky; top: 0; background: #fff; }
  .sheet-hdr h2 { font-size: 17px; font-weight: 600; }
  .sheet-row { width: 100%; display: flex; align-items: center; justify-content: space-between;
    padding: 16px 18px; border-bottom: 1px solid var(--line); text-align: left; font-size: 16px; }
  .sheet-row .rt { color: var(--muted); display: flex; align-items: center; gap: 6px; font-size: 15px; }
  .sheet-expand { padding: 10px 16px 16px; background: #fafafb; border-bottom: 1px solid var(--line); }
  .sheet-chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .sheet-chip { padding: 7px 14px; border: 1px solid var(--line); border-radius: 999px; font-size: 13px; background: #fff; }
  .sheet-chip.on { background: var(--accent); color: #fff; border-color: var(--accent); }
  .sheet-note { color: var(--muted); font-size: 13px; padding: 12px 18px 24px; }
  /* move sheet */
  .mv-cat { width: 100%; padding: 14px 18px; border-bottom: 1px solid var(--line);
    font-size: 16px; font-weight: 500; text-align: left; display: flex; align-items: center; justify-content: space-between; }
  .mv-sub { width: 100%; padding: 12px 18px 12px 34px; border-bottom: 1px solid var(--line); font-size: 15px; text-align: left; }
  .mv-sub:hover, .mv-sub:active { background: var(--accent-soft); color: var(--accent); }

  /* ---------- item detail ---------- */
  .ide-hero { width: 100%; height: 340px; background: #faf9f8 center/contain no-repeat; border-bottom: 1px solid var(--line); }
  .ide-pad { padding: 16px 18px 30px; }
  .ide-name { font-size: 22px; font-weight: 600; }
  .ide-brand { color: var(--muted); margin-top: 2px; }
  .ide-attrs { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 18px; margin: 18px 0; }
  .attr .lbl { font-size: 12px; color: var(--muted); }
  .attr .val { font-size: 15px; margin-top: 2px; }
  .swatch { display: inline-block; width: 13px; height: 13px; border-radius: 50%; border: 1px solid rgba(0,0,0,.15); vertical-align: -1px; margin-right: 5px; }
  .ide-kpis { display: flex; gap: 26px; padding: 14px 0; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); }
  .kpi .big { font-size: 21px; font-weight: 600; }
  .kpi .lbl { font-size: 12px; color: var(--muted); }
  .movebar { display: flex; gap: 8px; margin-top: 18px; }
  .movebar button { flex: 1; padding: 10px; border: 1px solid var(--line); border-radius: 10px; font-size: 13px; font-weight: 600; color: var(--muted); }
  .movebar button.on { background: var(--accent-soft); color: var(--accent); border-color: var(--accent); }

  /* ---------- search ---------- */
  .schead { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; }
  .lnk { color: var(--accent); font-weight: 600; font-size: 16px; }
  .sbody { padding: 4px 16px 30px; }
  .srows { background: #fff; border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; margin-top: 14px; }
  .srow { width: 100%; display: flex; align-items: center; justify-content: space-between;
    padding: 15px 16px; border-bottom: 1px solid var(--line); text-align: left; }
  .srow:last-child { border-bottom: none; }
  .srow .rt { color: var(--muted); display: flex; align-items: center; gap: 4px; }
  .schips { display: flex; flex-wrap: wrap; gap: 8px; padding: 4px 16px 16px; background: #fafafb; }
  .schip { padding: 7px 12px; border: 1px solid var(--line); border-radius: 999px; font-size: 13px; background: #fff; }
  .schip.on { background: var(--accent); color: #fff; border-color: var(--accent); }
  .snote { color: var(--muted); font-size: 13px; margin: 12px 4px; }
</style>

<body>

<!-- ===================== LOGIN ===================== -->
<section id="login">
  <div class="box stack">
    <div class="center">
      <h1>WARDROBE</h1>
      <div class="muted">Sign in to your closet.</div>
    </div>
    <form id="loginForm" class="card stack" autocomplete="on">
      <div>
        <label class="fld" for="email">Email</label>
        <input class="inp" id="email" type="email" inputmode="email" autocomplete="username" required>
      </div>
      <div>
        <label class="fld" for="pw">Password</label>
        <input class="inp" id="pw" type="password" autocomplete="current-password" required>
      </div>
      <div id="loginErr" class="err" hidden></div>
      <button class="btn" id="loginBtn" type="submit">Sign in</button>
    </form>
    <div class="center muted" style="font-size:12px"><span class="appver"></span></div>
  </div>
</section>

<!-- ===================== APP ===================== -->
<div id="app" hidden>
  <header class="bar">
    <button id="headerAdd" class="addbtn" aria-label="Add item" hidden>＋</button>
    <h1 id="title">Wardrobe</h1>
    <button id="headerGear" class="gear" aria-label="Settings">⚙</button>
  </header>

  <main class="tabbody">
    <!-- HOME -->
    <section class="screen active" id="tab-home">
      <div id="homeBody"></div>
    </section>

    <!-- CLOSET -->
    <section class="screen" id="tab-closet">
      <div id="closetBody"></div>
    </section>

    <!-- LOOKS -->
    <section class="screen" id="tab-looks">
      <div id="looksBody"></div>
    </section>

    <!-- CALENDAR -->
    <section class="screen" id="tab-calendar">
      <div id="calendarBody"></div>
    </section>

    <!-- CAPSULES -->
    <section class="screen" id="tab-capsules">
      <div id="capsulesBody"></div>
    </section>

    <!-- STATS -->
    <section class="screen" id="tab-stats">
      <div id="statsBody"></div>
    </section>

    <!-- SEARCH -->
    <section class="screen" id="tab-search">
      <div id="searchBody"></div>
    </section>

    <!-- ADD / EDIT ITEM -->
    <section class="screen" id="tab-add">
      <div id="addBody"></div>
    </section>

    <!-- SETTINGS -->
    <section class="screen" id="tab-settings">
      <div id="settingsBody"></div>
    </section>
  </main>

  <!-- grid action bar (shown only when a grid is visible in closet) -->
  <div id="gridBar" hidden>
    <div class="gb-acts">
      <button id="gbMove" title="Move to folder">
        <svg viewBox="0 0 24 24"><path d="M3 7h4l2-3h6l2 3h4v13H3z"/><path d="M3 7v13"/></svg>
      </button>
      <button id="gbEdit" title="Bulk edit">
        <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </button>
      <button id="gbDelete" title="Delete selected">
        <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      </button>
      <span id="gbCount" class="gb-count"></span>
    </div>
    <div class="gb-right" style="margin-left:auto">
      <button id="gbGrid" title="Grid density">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      </button>
      <div id="gridPickerPop" hidden>
        <button data-cols="2">2 per row</button>
        <button data-cols="3">3 per row</button>
        <button data-cols="4">4 per row</button>
        <button data-cols="5">5 per row</button>
      </div>
      <button id="gbSelect">Select</button>
    </div>
  </div>

  <!-- bottom nav -->
  <nav class="tabbar" id="tabbar">
    <button data-tab="home" class="on">
      <svg viewBox="0 0 24 24"><path d="M3 11l9-7 9 7"/><path d="M5 10v9h14v-9"/></svg>
      Home
    </button>
    <button data-tab="closet">
      <svg viewBox="0 0 24 24"><path d="M12 3l-1.5 3L4 9v11h16V9l-6.5-3z"/><path d="M12 6v14"/></svg>
      Closet
    </button>
    <button data-tab="looks">
      <svg viewBox="0 0 24 24"><path d="M7 4l5 3 5-3 2 5-3 1v10H8V10L5 9z"/></svg>
      Looks
    </button>
    <button data-tab="calendar">
      <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg>
      Calendar
    </button>
    <button data-tab="capsules">
      <svg viewBox="0 0 24 24"><rect x="3" y="8" width="18" height="12" rx="2"/><path d="M9 8V5h6v3"/></svg>
      Capsules
    </button>
  </nav>
</div>

<div id="toast"></div>

<!-- ===== BULK EDIT SHEET ===== -->
<div id="bulkSheet" hidden>
  <div class="sheet-bg" id="bulkBg"></div>
  <div class="sheet" id="bulkInner"></div>
</div>

<!-- ===== MOVE-TO-FOLDER SHEET ===== -->
<div id="moveSheet" hidden>
  <div class="sheet-bg" id="moveBg"></div>
  <div class="sheet" id="moveInner"></div>
</div>

<script>

   CONFIG  (publishable key + URL are safe to ship in client code)
   =================================================================== */
const SUPABASE_URL = "https://ofwaxqrwbcixrnjkepuz.supabase.co";
const SUPABASE_KEY = "sb_publishable_MbsUbmttzon5YNsJgUsDrw_Mg5NMCGy";
const BUCKET = "wardrobe";

// category -> subcategories. Keep in sync with migration/import.py TAXONOMY.

};
const CATEGORIES = Object.keys(TAXONOMY);

// Single color family per item: label + swatch. Keep in sync with import.py.
const COLOR_FAMILIES = [
  ["Green","#3a7d44"], ["Teal","#1f8f8f"], ["Blue","#2f6fd0"], ["Purple","#7d54a8"],
  ["Maroon","#7b2d3a"], ["Pink","#e88aa8"], ["Red","#c0392b"], ["Orange","#e08a2b"],

const ENCODE_Q = 0.82;         // quality used for both webp + jpeg fallback

/* ===================================================================
   SESSION  (persisted in localStorage)
   =================================================================== */
const SESSION_KEY = "wardrobe.session";
let session = null;   // { access_token, refresh_token, user, expires_at }

// Safe storage: localStorage is blocked in some contexts (e.g. data: URLs,
// private-mode quirks). Fall back to an in-memory store so the app never throws.
const store = (() => {
  try {
    const k = "__wardrobe_probe__";
    localStorage.setItem(k, "1"); localStorage.removeItem(k);
    return localStorage;
  } catch {
    const mem = new Map();
    return {
      getItem: (k) => (mem.has(k) ? mem.get(k) : null),
      setItem: (k, v) => mem.set(k, v),
      removeItem: (k) => mem.delete(k),
    };
  }
})();

function loadSession() {
  try { session = JSON.parse(store.getItem(SESSION_KEY)) || null; }
  catch { session = null; }
}
function saveSession(s) {
  session = s;
  if (s) store.setItem(SESSION_KEY, JSON.stringify(s));
  else store.removeItem(SESSION_KEY);
}

/* ===================================================================
   FETCH HELPERS
   =================================================================== */

// Auth endpoints (sign in / refresh). apikey only, no bearer needed.
async function authRequest(grant, body) {
  const r = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=${grant}`, {
    method: "POST",
    headers: { apikey: SUPABASE_KEY, "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
  const data = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(data.error_description || data.msg || data.error || "Auth failed");
  return data;
}

function storeAuth(data) {
  saveSession({
    access_token: data.access_token,
    refresh_token: data.refresh_token,
    user: data.user,
    expires_at: Date.now() + (data.expires_in || 3600) * 1000,
  });
}

async function signIn(email, password) {
  storeAuth(await authRequest("password", { email, password }));
}

// Refresh the access token using the stored refresh token. Returns false on failure.
async function refreshSession() {
  if (!session?.refresh_token) return false;
  try { storeAuth(await authRequest("refresh_token", { refresh_token: session.refresh_token })); return true; }
  catch { return false; }
}

// Core authed fetch. Adds apikey + bearer, transparently refreshes once on 401.
async function api(path, opts = {}, _retried = false) {
  const headers = Object.assign(
    { apikey: SUPABASE_KEY, Authorization: `Bearer ${session?.access_token || ""}` },
    opts.headers || {}
  );
  let r;
  try { r = await fetch(`${SUPABASE_URL}${path}`, Object.assign({}, opts, { headers })); }
  catch (e) { throw new Error("Network error — check your connection."); }

  if (r.status === 401 && !_retried) {
    if (await refreshSession()) return api(path, opts, true);
    handleSignedOut();
    throw new Error("Session expired — please sign in again.");
  }
  return r;
}

// PostgREST helper. Returns parsed JSON (or null for empty).
async function rest(path, opts = {}) {
  const r = await api(`/rest/v1/${path}`, opts);
  if (!r.ok) {
    const e = await r.json().catch(() => ({}));
    throw new Error(e.message || e.hint || `Request failed (${r.status})`);
  }
  if (r.status === 204) return null;
  const txt = await r.text();
  return txt ? JSON.parse(txt) : null;
}

// Upload a Blob to Storage at <user_id>/<name>. RLS keys off the user-id folder.
async function uploadPhoto(blob, filename) {
  const path = `${session.user.id}/${filename}`;
  const r = await api(`/storage/v1/object/${BUCKET}/${path}`, {
    method: "POST",
    headers: { "Content-Type": blob.type, "x-upsert": "true" },
    body: blob,
  });
  if (!r.ok) {
    const e = await r.json().catch(() => ({}));
    throw new Error(e.message || `Photo upload failed (${r.status})`);
  }
  return path;
}

async function deletePhoto(path) {
  if (!path) return;
  await api(`/storage/v1/object/${BUCKET}/${path}`, { method: "DELETE" }).catch(() => {});
}

// Signed URLs for private photos. Cached in-memory so a grid doesn't re-sign each render.
const _urlCache = new Map();
async function signedUrl(path) {
  if (!path) return null;
  if (_urlCache.has(path)) return _urlCache.get(path);
  const r = await api(`/storage/v1/object/sign/${BUCKET}/${path}`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ expiresIn: SIGNED_TTL }),
  });
  if (!r.ok) return null;
  const { signedURL } = await r.json();
  const full = `${SUPABASE_URL}/storage/v1${signedURL}`;
  _urlCache.set(path, full);
  setTimeout(() => _urlCache.delete(path), (SIGNED_TTL - 60) * 1000);
  return full;
}

// Batch-sign up to `paths.length` URLs in a single API call (Supabase batch endpoint).
async function signedUrlBatch(paths) {
  if (!paths.length) return;
  try {
    const r = await api(`/storage/v1/object/sign/${BUCKET}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ paths, expiresIn: SIGNED_TTL }),
    });
    if (!r.ok) return;
    const rows = await r.json();
    for (const row of Array.isArray(rows) ? rows : []) {
      if (row.signedURL && !row.error) {
        const full = `${SUPABASE_URL}/storage/v1${row.signedURL}`;
        _urlCache.set(row.path, full);
        setTimeout(() => _urlCache.delete(row.path), (SIGNED_TTL - 60) * 1000);
      }
    }
  } catch (_) { /* non-fatal */ }
}

// Pre-warm the URL cache for all item photos right after data loads.
async function prewarmUrlCache() {
  const paths = [...new Set(
    items.filter(i => i.image_path && !_urlCache.has(i.image_path)).map(i => i.image_path)
  )];
  for (let i = 0; i < paths.length; i += 100) {
    signedUrlBatch(paths.slice(i, i + 100)); // fire and forget
  }
}

/* ===================================================================
   IMAGE COMPRESSION  (canvas downscale -> WebP, JPEG fallback)
   =================================================================== */
function compressImage(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      let { width: w, height: h } = img;
      if (Math.max(w, h) > MAX_DIM) {
        const s = MAX_DIM / Math.max(w, h);
        w = Math.round(w * s); h = Math.round(h * s);
      }
      const c = document.createElement("canvas");
      c.width = w; c.height = h;
      const ctx = c.getContext("2d");
      ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, w, h); // flatten any transparency
      ctx.drawImage(img, 0, 0, w, h);
      c.toBlob((blob) => {
        if (blob && blob.type === "image/webp") return resolve({ blob, ext: "webp" });
        c.toBlob((jpg) => jpg ? resolve({ blob: jpg, ext: "jpg" }) : reject(new Error("Could not process image")),
                 "image/jpeg", ENCODE_Q);
      }, "image/webp", ENCODE_Q);
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error("Could not read that image")); };
    img.src = url;
  });
}

/* ===================================================================
   APP STATE + DATA LOADING
   =================================================================== */
let items = [];   // all items (every status)
let wears = [];   // all wears
let dataReady = false;

// PostgREST/Supabase caps a single response at 1000 rows; page through the rest.
async function restAll(path) {
  const PAGE = 1000;
  let out = [], offset = 0;
  for (;;) {
    const sep = path.includes("?") ? "&" : "?";
    const chunk = await rest(`${path}${sep}limit=${PAGE}&offset=${offset}`);
    if (!chunk || chunk.length === 0) break;
    out = out.concat(chunk);
    if (chunk.length < PAGE) break;
    offset += PAGE;
  }
  return out;
}

async function loadData() {
  dataReady = false;
  const [it, wr] = await Promise.all([
    restAll("items?select=*&order=created_at.desc"),
    restAll("wears?select=*&order=worn_on.desc"),
  ]);
  items = it || [];
  wears = wr || [];
  dataReady = true;
}

// ---- derived helpers ----
function wearCount(itemId) { return new Set(wears.filter(w => w.item_id === itemId).map(w => w.worn_on)).size; }
function lastWorn(itemId) {
  const ws = wears.filter(w => w.item_id === itemId).map(w => w.worn_on).sort();
  return ws.length ? ws[ws.length - 1] : null;
}
function costPerWear(item) {
  const n = wearCount(item.id);
  if (item.price == null || n === 0) return null;
  return item.price / n;
}
function daysSince(dateStr) {
  if (!dateStr) return null;
  return Math.floor((Date.now() - new Date(dateStr + "T00:00:00").getTime()) / 86400000);
}
const itemStatus = (i) => i.status || "Available";
const money = (n) => (n == null ? "—" : "$" + Number(n).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 }));
const todayStr = () => new Date().toISOString().slice(0, 10);
const esc = (s) => String(s ?? "").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[c]));
const parseList = (s) => String(s || "").split(",").map(x => x.trim()).filter(Boolean);

/* ===================================================================
   DOM UTILS
   =================================================================== */
const $ = (sel, root = document) => root.querySelector(sel);
const $$ = (sel, root = document) => [...root.querySelectorAll(sel)];

let toastTimer;
function toast(msg) {
  const t = $("#toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2200);
}

// Lazy photo loading: sign + set background only when a node nears the viewport.
const photoObserver = new IntersectionObserver((entries) => {
  for (const e of entries) {
    if (!e.isIntersecting) continue;
    const n = e.target;
    photoObserver.unobserve(n);
    loadPhotoNode(n);
  }
}, { rootMargin: "300px" });

async function loadPhotoNode(n) {
  if (n.dataset.photoDone) return;
  n.dataset.photoDone = "1";
  const url = await signedUrl(n.dataset.photo);
  if (url) { n.style.backgroundImage = `url("${url}")`; n.style.backgroundColor = "transparent"; }
}
function hydratePhotos(root = document) {
  $$("[data-photo]", root)
    .filter(n => !n.dataset.photoDone && !n.dataset.photoObs)
    .forEach(n => { n.dataset.photoObs = "1"; photoObserver.observe(n); });
}

/* ===================================================================
   RENDER: CLOSET  (status lens · category → subcategory → grid)
   =================================================================== */
// Status is a cross-cutting LENS, not a category. A tee is always a Top; the lens
// decides which tees you see. "Available" is the default working set.
const LENSES = ["Available", "Storage", "Archive", "All"];
let closetLens = "Available";
let closetCat = null;     // null = root | category name | "Other"
let closetSub = null;     // null = subcategory list | subcategory | "__other__"
let searchResults = null; // null = not in search-results mode; else array of items
let detailId = null;      // item id currently shown in detail (null = none)
let gridCols = 3;         // items per row (2–5), persisted to localStorage
let selectMode = false;   // multi-select active
let selectedIds = new Set();
let bulkPending = {};     // bulk edit: field -> pending value
let bulkOpenField = null; // which field row is expanded in bulk edit sheet

// Items in the current lens.
function lensItems() {
  return closetLens === "All" ? items : items.filter(i => itemStatus(i) === closetLens);
}
const isOtherCat = (i) => !i.category || !CATEGORIES.includes(i.category);
function folderThumb(list) { const f = list.find(i => i.image_path); return f ? f.image_path : null; }

function thumbHtml(path, cls = "cthumb") {
  return path
    ? `<div class="${cls}" data-photo="${esc(path)}"></div>`
    : `<div class="${cls} empty"><svg viewBox="0 0 24 24"><path d="M5 9l7-5 7 5"/><path d="M5 9c0 2.2 14 2.2 14 0"/></svg></div>`;
}
function rowHtml(thumb, name, count, attrs = "") {
  const sub = count === 0 ? "No items" : `${count} item${count === 1 ? "" : "s"}`;
  return `<button class="frow" ${attrs}>
    ${thumbHtml(thumb)}
    <div class="fmeta"><div class="fname">${esc(name)}</div><div class="fcount">${sub}</div></div>
    <svg class="chev" viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg>
  </button>`;
}
function gridHtml(list) {
  if (!list.length) return `<div class="placeholder"><b>No items here</b></div>`;
  const chk = `<div class="sel-dot"><svg viewBox="0 0 24 24"><path d="M5 12l5 5L19 7"/></svg></div>`;
  return `<div class="grid" style="--grid-cols:${gridCols}">${list.map(i => {
    const sel = selectMode && selectedIds.has(i.id);
    return `<button class="gtile${sel ? " selected" : ""}" data-item="${esc(i.id)}">
      ${selectMode ? chk.replace("sel-dot", "sel-dot" + (sel ? " on" : "")) : ""}
      ${thumbHtml(i.image_path, "gphoto")}
      <div class="gname">${esc(i.name || "Untitled")}</div>
    </button>`;
  }).join("")}</div>`;
}

function clToolbar(title, showBack, showPlus) {
  const right = showPlus
    ? `<button class="clsearch" id="clPlus" style="font-size:22px;font-weight:300;line-height:1">＋</button>`
    : `<button class="clsearch" id="clSearch"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/></svg></button>`;
  return `<div class="cltoolbar">
    ${showBack
      ? `<button class="clback" id="clBack"><svg viewBox="0 0 24 24"><path d="M15 6l-6 6 6 6"/></svg></button>`
      : `<span style="width:34px"></span>`}
    <div class="cltitle">${esc(title)}</div>
    ${right}
  </div>`;
}
function lensHtml() {
  return `<div class="lens">${LENSES.map(l =>
    `<button data-lens="${l}" class="${closetLens === l ? "on" : ""}">${l}</button>`).join("")}</div>`;
}

function renderClosetRoot() {
  const av = lensItems();
  let rows = "";
  for (const cat of CATEGORIES) {
    const list = av.filter(i => i.category === cat);
    if (!list.length) continue;
    rows += rowHtml(folderThumb(list), cat, list.length, `data-cat="${esc(cat)}"`);
  }
  const other = av.filter(isOtherCat);
  if (other.length) rows += rowHtml(folderThumb(other), "Other", other.length, `data-cat="Other"`);
  if (!rows) rows = `<div class="placeholder"><b>Nothing in ${esc(closetLens)}</b></div>`;
  return clToolbar("Closet", false) + lensHtml() + `<div class="frows">${rows}</div>`;
}

function renderClosetCategory(cat) {
  const inCat = cat === "Other" ? lensItems().filter(isOtherCat) : lensItems().filter(i => i.category === cat);
  let rows = "";
  if (cat !== "Other") {
    for (const s of (TAXONOMY[cat] || [])) {
      const list = inCat.filter(i => i.subcategory === s);
      rows += rowHtml(folderThumb(list), s, list.length, `data-sub="${esc(s)}"`);
    }
    const subs = TAXONOMY[cat] || [];
    const other = inCat.filter(i => !i.subcategory || !subs.includes(i.subcategory));
    if (other.length) rows += rowHtml(folderThumb(other), "Other", other.length, `data-sub="__other__"`);
  }
  const hdr = `<div class="fhdr">${thumbHtml(folderThumb(inCat))}
    <div class="fmeta"><div class="fname big">${esc(cat)}</div>
    <div class="fcount">${inCat.length} item${inCat.length === 1 ? "" : "s"}</div></div></div>
    <button class="frow" data-sub="__all__" style="color:var(--accent);font-weight:600">
      <span>All Items in ${esc(cat)}</span>
      <svg class="chev" viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg>
    </button>`;
  // categories with no subcategory taxonomy (Other) jump straight to a grid
  return clToolbar(cat, true) + (rows ? hdr + `<div class="frows">${rows}</div>` : hdr + gridHtml(inCat));
}

function categoryGrid(cat, sub) {
  const inCat = cat === "Other" ? lensItems().filter(isOtherCat) : lensItems().filter(i => i.category === cat);
  if (sub === "__all__") return inCat;
  if (sub === "__other__") { const subs = TAXONOMY[cat] || []; return inCat.filter(i => !i.subcategory || !subs.includes(i.subcategory)); }
  return inCat.filter(i => i.subcategory === sub);
}

function renderCloset() {
  detailId = null;
  const body = $("#closetBody");
  if (searchResults) {
    body.innerHTML = clToolbar(`Results · ${searchResults.length}`, true) + gridHtml(searchResults);
  } else if (closetCat && closetSub) {
    const label = closetSub === "__all__" ? "All" : closetSub === "__other__" ? "Other" : closetSub;
    body.innerHTML = clToolbar(`${closetCat} · ${label}`, true, true) + gridHtml(categoryGrid(closetCat, closetSub));
  } else if (closetCat) {
    body.innerHTML = renderClosetCategory(closetCat);
  } else {
    body.innerHTML = renderClosetRoot();
  }
  hydratePhotos(body);
  const hasGrid = !!body.querySelector(".grid");
  $("#gridBar").hidden = !hasGrid;
  $("#app").classList.toggle("has-gridbar", hasGrid);
  updateGridBar();
  // wire "+" add button (pre-fills category context)
  const clPlus = $("#clPlus");
  if (clPlus) clPlus.onclick = () => switchTab("add");
}

function closetBack() {
  if (detailId) { renderCloset(); return; }
  if (searchResults) { searchResults = null; }
  else if (closetSub) { closetSub = null; }
  else if (closetCat) { closetCat = null; }
  renderCloset();
}

async function changeStatus(id, status) {
  const i = items.find(x => x.id === id);
  if (!i || itemStatus(i) === status) return;
  const prev = i.status;
  i.status = status; openItem(id); // optimistic
  try {
    await rest(`items?id=eq.${id}`, {
      method: "PATCH",
      headers: { "Content-Type": "application/json", Prefer: "return=minimal" },
      body: JSON.stringify({ status }),
    });
    toast(`Moved to ${status}`);
  } catch (e) { i.status = prev; openItem(id); toast(e.message); }
}

/* ===================================================================
   SEARCH  (keyword + Color/Fabric/Size/Season/Brand/Status filters)
   =================================================================== */
const FILTERS = [
  ["color",  "Color",  () => COLOR_FAMILIES.map(c => c[0])],
  ["fabric", "Fabric", () => distinctArr("fabric")],
  ["size",   "Size",   () => distinctScalar("size")],
  ["season", "Season", () => SEASONS],
  ["brand",  "Brand",  () => distinctScalar("brand")],
  ["status", "Status", () => STATUSES],
];
let searchState = newSearchState();
let searchOpenRow = null;
function newSearchState() { return { q: "", color: new Set(), fabric: new Set(), size: new Set(), season: new Set(), brand: new Set(), status: new Set() }; }
function distinctScalar(field) { return [...new Set(items.map(i => i[field]).filter(Boolean))].sort(); }
function distinctArr(field) { const s = new Set(); items.forEach(i => (i[field] || []).forEach(v => s.add(v))); return [...s].sort(); }

function openSearch() { searchOpenRow = null; switchTab("search"); }

function renderSearch() {
  const rowSummary = (key) => {
    const set = searchState[key];
    return set.size === 0 ? "Any" : (set.size === 1 ? [...set][0] : `${set.size} selected`);
  };
  const rows = FILTERS.map(([key, label]) => {
    const open = searchOpenRow === key;
    const chips = open ? `<div class="schips">${FILTERS.find(f => f[0] === key)[2]().map(opt =>
      `<button class="schip ${searchState[key].has(opt) ? "on" : ""}" data-chip="${key}|${esc(opt)}">${esc(opt)}</button>`).join("") || `<span class="muted" style="font-size:13px">None recorded yet</span>`}</div>` : "";
    return `<button class="srow" data-row="${key}">
      <span>${label}</span>
      <span class="rt">${esc(rowSummary(key))} ›</span>
    </button>${chips}`;
  }).join("");
  $("#searchBody").innerHTML = `
    <div class="schead">
      <button class="lnk" id="scCancel">Cancel</button>
      <span style="font-weight:600">Search</span>
      <button class="lnk" id="scRun">Search</button>
    </div>
    <div class="sbody">
      <input class="inp" id="scQuery" placeholder="e.g. keywords and category names" value="${esc(searchState.q)}">
      <div class="snote">Searches names, brands, notes and category names.</div>
      <div class="srows">${rows}</div>
      <div style="text-align:right;margin-top:14px"><button class="lnk" id="scReset">Reset</button></div>
    </div>`;
  $("#scQuery").oninput = (e) => { searchState.q = e.target.value; };
  $("#scCancel").onclick = () => switchTab("closet");
  $("#scReset").onclick = () => { searchState = newSearchState(); searchOpenRow = null; renderSearch(); };
  $("#scRun").onclick = runSearch;
  $("#searchBody").querySelector(".srows").onclick = (e) => {
    const chip = e.target.closest("[data-chip]");
    if (chip) {
      const [key, val] = chip.dataset.chip.split("|");
      searchState[key].has(val) ? searchState[key].delete(val) : searchState[key].add(val);
      renderSearch(); return;
    }
    const row = e.target.closest("[data-row]");
    if (row) { searchOpenRow = searchOpenRow === row.dataset.row ? null : row.dataset.row; renderSearch(); }
  };
}

function runSearch() {
  const q = searchState.q.trim().toLowerCase();
  const hit = (set, val) => set.size === 0 || (val != null && set.has(val));
  const hitArr = (set, arr) => set.size === 0 || (arr || []).some(v => set.has(v));
  searchResults = items.filter(i => {
    if (q) {
      const hay = [i.name, i.brand, i.notes, i.category, i.subcategory].filter(Boolean).join(" ").toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return hit(searchState.color, i.color_family) && hit(searchState.size, i.size)
      && hit(searchState.brand, i.brand) && hit(searchState.status, itemStatus(i))
      && hitArr(searchState.fabric, i.fabric) && hitArr(searchState.season, i.season);
  });
  closetCat = null; closetSub = null;
  switchTab("closet");
}

/* ===================================================================
   ADD ITEM  (stub — built next slice)
   =================================================================== */
function renderAdd() {
  $("#addBody").innerHTML = `
    <div class="schead">
      <button class="lnk" id="addCancel">Cancel</button>
      <span style="font-weight:600">Add Item</span>
      <span style="width:54px"></span>
    </div>
    ${placeholder("Add an item")}`;
  $("#addCancel").onclick = () => switchTab("home");
}

/* ===================================================================
   GRID BAR  (density picker + select mode + bulk actions)
   =================================================================== */
function updateGridBar() {
  const n = selectedIds.size;
  const has = selectMode && n > 0;
  $("#gridBar").classList.toggle("selecting", selectMode);
  ["#gbMove", "#gbEdit", "#gbDelete"].forEach(id => $(id).classList.toggle("active", has));
  $("#gbCount").textContent = n ? `${n} selected` : "";
  $("#gbSelect").textContent = selectMode ? "Done" : "Select";
}

function toggleSelectMode() {
  selectMode = !selectMode;
  if (!selectMode) { selectedIds.clear(); }
  renderCloset();
}

function exitSelectMode() {
  if (!selectMode) return;
  selectMode = false;
  selectedIds.clear();
}

function toggleSelect(id) {
  if (selectedIds.has(id)) selectedIds.delete(id); else selectedIds.add(id);
  // update just the affected tile + bar without full re-render
  const tile = $(`[data-item="${id}"]`);
  if (tile) {
    const sel = selectedIds.has(id);
    tile.classList.toggle("selected", sel);
    const dot = tile.querySelector(".sel-dot");
    if (dot) dot.classList.toggle("on", sel);
  }
  updateGridBar();
}

// ---- grid density picker ----
function openGridPicker() {
  const pop = $("#gridPickerPop");
  pop.hidden = !pop.hidden;
  if (!pop.hidden) {
    pop.querySelectorAll("[data-cols]").forEach(b => b.classList.toggle("on", +b.dataset.cols === gridCols));
  }
}

function setGridCols(n) {
  gridCols = n;
  store.setItem("wardrobe.gridCols", String(n));
  $("#gridPickerPop").hidden = true;
  // update all grids on screen without full re-render
  $$(".grid").forEach(g => g.style.setProperty("--grid-cols", n));
}

// ---- delete selected ----
async function deleteSelected() {
  if (!selectedIds.size) return;
  const n = selectedIds.size;
  if (!confirm(`Delete ${n} item${n === 1 ? "" : "s"}? This cannot be undone.`)) return;
  const ids = [...selectedIds];
  const inList = `(${ids.map(id => `"${id}"`).join(",")})`;
  try {
    await rest(`/items?id=in.${inList}`, { method: "DELETE" });
    items = items.filter(i => !ids.includes(i.id));
    exitSelectMode();
    renderCloset();
    toast(`${n} item${n === 1 ? "" : "s"} deleted`);
  } catch (e) { toast(e.message); }
}

// ---- bulk edit sheet ----
const BULK_FIELDS = [
  { key: "color_family", label: "Color",  type: "single", opts: COLOR_FAMILIES.map(c => c[0]) },
  { key: "fabric",       label: "Fabric", type: "multi",  opts: ["Cotton","Linen","Wool","Cashmere","Silk","Denim","Polyester","Spandex","Nylon","Fleece","Leather","Velvet"] },
  { key: "size",         label: "Size",   type: "single", opts: ["XXS","XS","S","M","L","XL","XXL","0","2","4","6","8","10","12","14","One size"] },
  { key: "season",       label: "Season", type: "multi",  opts: SEASONS },
  { key: "brand",        label: "Brand",  type: "text" },
  { key: "status",       label: "Status", type: "single", opts: ["Available","Storage","Archive"] },
];

function openBulkEdit() {
  if (!selectedIds.size) return;
  bulkPending = {};
  bulkOpenField = null;
  renderBulkSheet();
  $("#bulkSheet").hidden = false;
}

function closeBulkEdit() {
  $("#bulkSheet").hidden = true;
  bulkPending = {};
  bulkOpenField = null;
}

function renderBulkSheet() {
  const rows = BULK_FIELDS.map(f => {
    const isOpen = bulkOpenField === f.key;
    const val = bulkPending[f.key];
    const hasVal = val !== undefined && (Array.isArray(val) ? val.length > 0 : val !== "");
    const valHtml = hasVal
      ? `<span style="color:var(--accent);max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${Array.isArray(val) ? val.join(", ") : esc(val)}</span>`
      : "";
    let expansion = "";
    if (isOpen) {
      if (f.type === "single" || f.type === "multi") {
        const chips = f.opts.map(o => {
          const on = Array.isArray(val) ? val.includes(o) : val === o;
          return `<button class="sheet-chip${on ? " on" : ""}" data-bc-field="${f.key}" data-bc-val="${esc(o)}" data-bc-multi="${f.type === "multi"}">${esc(o)}</button>`;
        }).join("");
        expansion = `<div class="sheet-expand"><div class="sheet-chips">${chips}</div></div>`;
      } else {
        expansion = `<div class="sheet-expand"><input class="inp" id="bulkTextInp" value="${esc(val || "")}" placeholder="${esc(f.label)}…" style="width:100%"></div>`;
      }
    }
    return `<button class="sheet-row" data-bf="${f.key}">
      <span>${esc(f.label)}</span>
      <span class="rt">${valHtml}<svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:currentColor;stroke-width:2;fill:none;flex-shrink:0"><path d="M${isOpen ? "6 15l6-6 6 6" : "6 9l6 6 6-6"}"/></svg></span>
    </button>${expansion}`;
  }).join("");
  const n = selectedIds.size;
  $("#bulkInner").innerHTML = `
    <div class="sheet-hdr">
      <button class="lnk" id="bulkCancel">Cancel</button>
      <h2>Bulk Edit</h2>
      <button class="lnk" id="bulkSave" style="font-weight:700">Save</button>
    </div>
    ${rows}
    <div class="sheet-note">Changes apply to ${n} selected item${n === 1 ? "" : "s"}.</div>`;
  $("#bulkCancel").onclick = closeBulkEdit;
  $("#bulkSave").onclick = saveBulkEdit;
  // field row toggle
  $("#bulkInner").querySelectorAll("[data-bf]").forEach(btn => {
    btn.onclick = () => {
      saveBulkTextField();
      bulkOpenField = bulkOpenField === btn.dataset.bf ? null : btn.dataset.bf;
      renderBulkSheet();
    };
  });
  // chip toggles
  $("#bulkInner").querySelectorAll("[data-bc-field]").forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      const field = btn.dataset.bcField, val = btn.dataset.bcVal, isMulti = btn.dataset.bcMulti === "true";
      if (isMulti) {
        const cur = bulkPending[field] || [];
        bulkPending[field] = cur.includes(val) ? cur.filter(x => x !== val) : [...cur, val];
      } else {
        bulkPending[field] = bulkPending[field] === val ? undefined : val;
        if (bulkPending[field] === undefined) delete bulkPending[field];
      }
      renderBulkSheet();
    };
  });
  // text input live save
  const ti = $("#bulkTextInp");
  if (ti) { ti.oninput = () => { bulkPending[bulkOpenField] = ti.value; }; ti.focus(); }
}

function saveBulkTextField() {
  const ti = $("#bulkTextInp");
  if (ti && bulkOpenField) bulkPending[bulkOpenField] = ti.value;
}

async function saveBulkEdit() {
  saveBulkTextField();
  const patch = {};
  for (const [k, v] of Object.entries(bulkPending)) {
    if (v !== undefined && v !== "") patch[k] = v;
  }
  if (!Object.keys(patch).length) { closeBulkEdit(); return; }
  const ids = [...selectedIds];
  const inList = `(${ids.map(id => `"${id}"`).join(",")})`;
  try {
    await rest(`/items?id=in.${inList}`, { method: "PATCH", body: JSON.stringify(patch) });
    // update local state
    items.forEach(i => { if (ids.includes(i.id)) Object.assign(i, patch); });
    closeBulkEdit();
    exitSelectMode();
    renderCloset();
    toast(`Updated ${ids.length} item${ids.length === 1 ? "" : "s"}`);
  } catch (e) { toast(e.message); }
}

// ---- move-to-folder sheet ----
let moveCatOpen = null;

function openMoveSheet() {
  if (!selectedIds.size) return;
  moveCatOpen = null;
  renderMoveSheet();
  $("#moveSheet").hidden = false;
}

function closeMoveSheet() {
  $("#moveSheet").hidden = true;
  moveCatOpen = null;
}

function renderMoveSheet() {
  const rows = CATEGORIES.map(cat => {
    const isOpen = moveCatOpen === cat;
    const subs = TAXONOMY[cat] || [];
    const subRows = isOpen ? subs.map(s =>
      `<button class="mv-sub" data-mv-cat="${esc(cat)}" data-mv-sub="${esc(s)}">${esc(s)}</button>`
    ).join("") : "";
    return `<button class="mv-cat" data-mv-toggle="${esc(cat)}">
      <span>${esc(cat)}</span>
      <svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:var(--muted);stroke-width:2;fill:none;flex-shrink:0"><path d="${isOpen ? "6 15l6-6 6 6" : "6 9l6 6 6-6"}"/></svg>
    </button>${subRows}`;
  }).join("");
  const n = selectedIds.size;
  $("#moveInner").innerHTML = `
    <div class="sheet-hdr">
      <button class="lnk" id="moveCancel">Cancel</button>
      <h2>Move to Folder</h2>
      <span style="width:60px"></span>
    </div>
    ${rows}
    <div class="sheet-note">Moving ${n} item${n === 1 ? "" : "s"} to a new category.</div>`;
  $("#moveCancel").onclick = closeMoveSheet;
  $("#moveInner").querySelectorAll("[data-mv-toggle]").forEach(b => {
    b.onclick = () => { moveCatOpen = moveCatOpen === b.dataset.mvToggle ? null : b.dataset.mvToggle; renderMoveSheet(); };
  });
  $("#moveInner").querySelectorAll("[data-mv-cat]").forEach(b => {
    b.onclick = () => applyMove(b.dataset.mvCat, b.dataset.mvSub);
  });
}

async function applyMove(cat, sub) {
  const ids = [...selectedIds];
  const inList = `(${ids.map(id => `"${id}"`).join(",")})`;
  const patch = { category: cat, subcategory: sub };
  try {
    await rest(`/items?id=in.${inList}`, { method: "PATCH", body: JSON.stringify(patch) });
    items.forEach(i => { if (ids.includes(i.id)) Object.assign(i, patch); });
    closeMoveSheet();
    exitSelectMode();
    renderCloset();
    toast(`Moved ${ids.length} item${ids.length === 1 ? "" : "s"} to ${cat} › ${sub}`);
  } catch (e) { toast(e.message); }
}

/* ===================================================================
   TABS + WIRING
   =================================================================== */
const TAB_TITLES = {
  home: "Wardrobe", closet: "Closet", looks: "Looks", calendar: "Calendar",
  capsules: "Capsules", stats: "Style Stats", search: "Search", add: "Add Item", settings: "Settings",
};

function switchTab(name) {
  $$(".screen").forEach(s => s.classList.toggle("active", s.id === `tab-${name}`));
  $$("#tabbar button").forEach(b => b.classList.toggle("on", b.dataset.tab === name));
  $("#title").textContent = TAB_TITLES[name] || "Wardrobe";
  $("#headerAdd").hidden = name !== "home";
  if (name !== "closet") {
    $("#gridBar").hidden = true;
    $("#app").classList.remove("has-gridbar");
    exitSelectMode();
    $("#gridPickerPop").hidden = true;
  }

  if (name === "home") renderHome();
  else if (name === "closet")   renderCloset();
  else if (name === "search")   renderSearch();
  else if (name === "add")      renderAdd();
  else if (name === "looks")    $("#looksBody").innerHTML    = placeholder("Looks");
  else if (name === "calendar") $("#calendarBody").innerHTML = placeholder("Calendar");
  else if (name === "capsules") $("#capsulesBody").innerHTML = placeholder("Capsules");
  else if (name === "stats")    $("#statsBody").innerHTML    = placeholder("Style Stats");
  else if (name === "settings") renderSettings();

  window.scrollTo(0, 0);
}

function renderSettings() {
  $("#settingsBody").innerHTML = `
    <div style="padding:24px 18px" class="stack">
      <div class="card stack">
        <div><div class="fld">Signed in as</div><div id="set_email">${esc(session?.user?.email || "")}</div></div>
        <button class="btn" id="signOutBtn" style="background:var(--danger)">Sign out</button>
      </div>
      <div class="center muted" style="font-size:12px"><span class="appver">${esc(APP_VERSION)}</span></div>
    </div>`;
  $("#signOutBtn").onclick = () => handleSignedOut();
}

function wireEvents() {
  // login
  $("#loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const btn = $("#loginBtn"), err = $("#loginErr");
    err.hidden = true; btn.disabled = true; btn.textContent = "Signing in…";
    try {
      await signIn($("#email").value.trim(), $("#pw").value);
      $("#pw").value = "";
      await bootApp();
    } catch (e2) {
      err.textContent = e2.message; err.hidden = false;
    } finally { btn.disabled = false; btn.textContent = "Sign in"; }
  });

  // bottom nav
  $("#tabbar").addEventListener("click", (e) => {
    const b = e.target.closest("button[data-tab]");
    if (b) switchTab(b.dataset.tab);
  });

  // home launcher tiles
  $("#homeBody").addEventListener("click", (e) => {
    const t = e.target.closest("[data-go]");
    if (t) switchTab(t.dataset.go);
  });

  // closet: lens / folders / subcategories / items / back / search
  $("#closetBody").addEventListener("click", (e) => {
    if (e.target.closest("#clBack")) return closetBack();
    if (e.target.closest("#clSearch")) return openSearch();
    const lens = e.target.closest("[data-lens]");
    if (lens) { closetLens = lens.dataset.lens; closetCat = null; closetSub = null; searchResults = null; return renderCloset(); }
    const cat = e.target.closest("[data-cat]");
    if (cat) { closetCat = cat.dataset.cat; closetSub = null; searchResults = null; return renderCloset(); }
    const sub = e.target.closest("[data-sub]");
    if (sub) { closetSub = sub.dataset.sub; return renderCloset(); }
    const it = e.target.closest("[data-item]");
    if (it) {
      if (selectMode) { toggleSelect(it.dataset.item); return; }
      return openItem(it.dataset.item);
    }
  });

  // grid action bar
  $("#gbSelect").addEventListener("click", toggleSelectMode);
  $("#gbGrid").addEventListener("click", openGridPicker);
  $("#gbEdit").addEventListener("click", () => { if (selectedIds.size) openBulkEdit(); });
  $("#gbDelete").addEventListener("click", () => { if (selectedIds.size) deleteSelected(); });
  $("#gbMove").addEventListener("click", () => { if (selectedIds.size) openMoveSheet(); });
  $("#gridPickerPop").addEventListener("click", (e) => {
    const b = e.target.closest("[data-cols]");
    if (b) setGridCols(+b.dataset.cols);
  });
  // close grid picker on outside tap
  document.addEventListener("click", (e) => {
    if (!e.target.closest("#gbGrid") && !e.target.closest("#gridPickerPop")) {
      $("#gridPickerPop").hidden = true;
    }
  }, true);
  // bulk edit sheet
  $("#bulkBg").addEventListener("click", closeBulkEdit);
  // move sheet
  $("#moveBg").addEventListener("click", closeMoveSheet);

  // header ＋ (home only) -> add item
  $("#headerAdd").addEventListener("click", () => switchTab("add"));

  // header gear -> settings
  $("#headerGear").addEventListener("click", () => switchTab("settings"));
}

/* ===================================================================
   AUTH / BOOT
   =================================================================== */
function showLogin() {
  $("#login").classList.add("active");
  $("#app").hidden = true;
}
function showApp() {
  $("#login").classList.remove("active");
  $("#app").hidden = false;
}
function handleSignedOut() {
  saveSession(null);
  items = []; wears = []; dataReady = false; _urlCache.clear();
  showLogin();
}

async function bootApp() {
  showApp();
  switchTab("home");      // land on home immediately, even before data arrives
  try {
    await loadData();
    prewarmUrlCache();    // fire-and-forget: batch-sign all photo URLs into cache
    renderHome();         // re-render so tile subtitles (counts) fill in
  } catch (e) {
    $("#homeBody").innerHTML = `<div class="placeholder"><b>Couldn't load data</b>
      <div class="err">${esc(e.message)}</div>
      <button class="btn" style="max-width:180px" onclick="retryLoad()">Retry</button></div>`;
  }
}
async function retryLoad() {
  $("#homeBody").innerHTML = `<div class="spin"></div>`;
  try { await loadData(); prewarmUrlCache(); renderHome(); } catch (e) { toast(e.message); }
}
window.retryLoad = retryLoad;

/* ===================================================================
   INIT
   =================================================================== */
(function init() {
  $$(".appver").forEach(el => el.textContent = APP_VERSION);
  const savedCols = parseInt(store.getItem("wardrobe.gridCols") || "0");
  if (savedCols >= 2 && savedCols <= 5) gridCols = savedCols;
  wireEvents();
  loadSession();
  if (session?.access_token) bootApp();
  else showLogin();
})();
</script>
