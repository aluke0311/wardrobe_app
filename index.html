function wireCalSwipe(card) {
  const inner = card.querySelector('.cal-outfit-inner');
  const acts  = card.querySelector('.cal-swipe-acts');
  const W = 210;
  let startX = 0, opened = false, tracking = false;

  card.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    tracking = true;
    inner.style.transition = 'none';
    acts.style.transition   = 'none';
  }, { passive: true });

  card.addEventListener('touchmove', e => {
    if (!tracking) return;
    const dx  = e.touches[0].clientX - startX;
    const off = Math.max(-W, Math.min(0, (opened ? -W : 0) + dx));
    inner.style.transform = `translateX(${off}px)`;
    acts.style.transform  = `translateX(${100 + (off / W * 100)}%)`;
  }, { passive: true });

  card.addEventListener('touchend', e => {
    if (!tracking) return;
    tracking = false;
    const dx = e.changedTouches[0].clientX - startX;
    inner.style.transition = 'transform .25s ease';
    acts.style.transition   = 'transform .25s ease';
    opened = opened ? dx < 30 : dx < -50;
    inner.style.transform = opened ? `translateX(-${W}px)` : 'translateX(0)';
    acts.style.transform  = opened ? 'translateX(0)' : 'translateX(100%)';
  }, { passive: true });
}

// G2: shared create-or-merge logic (was inline in makeLookFromDay). Dedup guard
// merges into an existing non-archived look with the same item-set instead of
// creating a duplicate outfit record (mirrors saveBuilder/saveComboAsOutfit).
async function createLookFromItems(itemIds, { name } = {}) {
  const dup = findDuplicateOutfit(itemIds, null);
  if (dup) return { outfitId: dup.id, isNew: false };
  const oRows = await rest("/outfits?select=*", {
    method: "POST",
    headers: { "Content-Type": "application/json", Prefer: "return=representation" },
    body: JSON.stringify({ name: name || null }),
  });
  const newOutfit = Array.isArray(oRows) ? oRows[0] : oRows;
  if (!newOutfit?.id) throw new Error("Could not create look");
  outfits.push(newOutfit);
  const links = itemIds.map(item_id => ({ outfit_id: newOutfit.id, item_id }));
  await rest("/outfit_items", {
    method: "POST",
    headers: { "Content-Type": "application/json", Prefer: "return=minimal" },
    body: JSON.stringify(links),
  });
  outfitLinks = outfitLinks.concat(links);
  buildOutfitIndexes();
  return { outfitId: newOutfit.id, isNew: true };
}

/* ---- make-a-look from solo items on a day ---- */
async function makeLookFromDay(dateStr, body) {
  const soloGroups = dayGroups(dateStr).filter(g => !g.outfitId);
  const itemIds = [...new Set(soloGroups.flatMap(g => g.itemIds))];
  const wearIds = soloGroups.flatMap(g => g.wearIds);
  if (itemIds.length < 2) return;

  const [y, m, d] = dateStr.split('-').map(Number);
  const name = new Date(y, m - 1, d).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });

  try {
    const { outfitId } = await createLookFromItems(itemIds, { name });

    // Stamp wears with the outfit_id + re-derive formality for the grouped set
    // (solo-derived values were per-item; the look as a whole is the better read)
    const fml = deriveWearFormality(itemIds);
    const inList = `(${wearIds.map(id => `"${id}"`).join(',')})`;
    await rest(`/wears?id=in.${inList}`, {
      method: "PATCH",
      headers: { "Content-Type": "application/json", Prefer: "return=minimal" },
      body: JSON.stringify({ outfit_id: outfitId, formality_for: fml }),
    });

    // Update local state
    const dayWears = wears.filter(w => wearIds.includes(w.id));
    for (const w of dayWears) { w.outfit_id = outfitId; w.formality_for = fml; }
    buildOutfitIndexes();

    renderCalendarDay(body);
    // G1: single-ask — pre-seed from whatever context is already on these wears
    // so opening the sheet doesn't blank out captured values.
    const presetCtx = dayWears.flatMap(w => ctxArr(w)).filter((v, i, a) => a.indexOf(v) === i);
    openPostLogSheet(dayWears, { presetCtx });
  } catch (e) { toast(e.message); }
}

// G6: "wear again" candidates — worn in the last 14 days ∪ liked ∪ most-worn this
// season, deduped, recency first. The most common real log is a repeat; this is
// the 2-tap path for it (tap the CTA, tap a look).
function outfitSeasonWornCount(o, season) {
  const s = outfitWearMap.get(o.id);
  if (!s) return 0;
  let n = 0;
  for (const d of s) if (seasonOf(d) === season) n++;
  return n;
}
function wearAgainCandidates() {
  const all = activeOutfits();
  const cutoff = localISO(new Date(Date.now() - 14 * 86400000));
  const season = currentSeason();
  const recentIds = new Set(wears.filter(w => w.outfit_id && w.worn_on >= cutoff).map(w => w.outfit_id));
  const seasonCounts = new Map();
  for (const o of all) { const n = outfitSeasonWornCount(o, season); if (n) seasonCounts.set(o.id, n); }
  const topSeasonIds = new Set([...seasonCounts.entries()].sort((a, b) => b[1] - a[1]).slice(0, 12).map(([id]) => id));
  const base = all.filter(o => recentIds.has(o.id) || o.rating === 1 || topSeasonIds.has(o.id))
    .sort((a, b) => String(outfitLastWorn(b) || "").localeCompare(String(outfitLastWorn(a) || "")));
  // V3: recency-sorting buries liked-but-neglected looks (they sort last and fall
  // off the 12 cap) — reserve 2 slots for them so resurfacing happens where she
  // actually logs, not just on the Stats page. Prefer in-season ones.
  const neglected = [];
  const negPool = likedNeglectedOutfits();
  const inSeasonNeg = negPool.filter(o => { const s = outfitSeasons(o); return !s.length || s.includes(season); });
  for (const o of [...inSeasonNeg, ...negPool]) {
    if (neglected.length >= 2) break;
    if (!neglected.some(n => n.id === o.id)) neglected.push(o);
  }
  const negIds = new Set(neglected.map(o => o.id));
  const list = [...base.filter(o => !negIds.has(o.id)).slice(0, 12 - neglected.length), ...neglected];
  return { list, neglectedIds: negIds };
}
function openWearAgainChooser(date) {
  const { list: cands, neglectedIds } = wearAgainCandidates();
  const strip = cands.length
    ? `<div class="wa-strip">${cands.map(o => `<button class="wa-tile" data-wa-look="${esc(o.id)}">

  $("#logSheet").hidden = false;
  hydratePhotos($("#logInner"));
  $("#waCancel").onclick = () => { $("#logSheet").hidden = true; };

async function logLookOnDay(id, { force = false } = {}) {
  const o = outfitById.get(id);
  if (!o) return;
  const its = outfitItems(o);
  if (!its.length) { toast('This look has no pieces'); return; }
  const date = calendarDay;
  // V3 soft dup guard (same as solo logs): don't silently double-log a look on a day
  if (!force && wears.some(w => w.outfit_id === id && w.worn_on === date)) {
    toast('Already logged that day', { label: 'Log again →', fn: () => logLookOnDay(id, { force: true }) });
    return;
  }
  try {
    const fml = deriveWearFormality(its.map(it => it.id));
    const payload = its.map(it => ({ item_id: it.id, worn_on: date, outfit_id: id, formality_for: fml }));
    const rows = await rest('/wears', {
      method: 'POST', headers: { 'Content-Type': 'application/json', Prefer: 'return=representation' },
      body: JSON.stringify(payload),
    });
    if (Array.isArray(rows)) wears.push(...rows);
    else payload.forEach(p => wears.push(p));
    buildOutfitWearMap();
    renderCalendarDay($('#calendarBody'));
    if (Array.isArray(rows) && rows.length && rows[0].id) openPostLogSheet(rows, { undoable: true });
    else toast(`Logged ${outfitName(o)} for ${date}`);
  } catch (e) { toast(e.message); }
}

function statsPool() {
  const acqCutoff = acqRangeStart();
  return items.filter(i => {
    if (!itemMatchesFilter(i, statsFilter)) return false;
    if (acqCutoff) {
      const pd = i.purchase_date;
      if (acqCutoff.older) { if (!pd || pd >= acqCutoff.cutoff) return false; }
      else                 { if (!pd || pd < acqCutoff.cutoff)  return false; }
    }
    return true;
  });
}

function rangeStart() {
  if (statsDateRange === "all") return null;
  const d = new Date();
  if (statsDateRange === "7d")  d.setDate(d.getDate() - 7);
  else if (statsDateRange === "14d") d.setDate(d.getDate() - 14);
  else if (statsDateRange === "30d") d.setDate(d.getDate() - 30);
  else if (statsDateRange === "90d") d.setDate(d.getDate() - 90);
  else if (statsDateRange === "6mo") d.setMonth(d.getMonth() - 6);
  else if (statsDateRange === "1yr") d.setFullYear(d.getFullYear() - 1);
  return localISO(d);
}

function wearCountInRange(itemId) {
  const cutoff = rangeStart();
  if (!cutoff) return wearCount(itemId);
  return wears.filter(w => w.item_id === itemId && w.worn_on >= cutoff).length;
}

function acqRangeStart() {
  if (statsAcqRange === "all") return null;
  const older = statsAcqRange.startsWith("o");
  const period = statsAcqRange.slice(1); // "1yr","2yr","3yr","5yr"
  const d = new Date();
  if (period === "1yr") d.setFullYear(d.getFullYear() - 1);
  else if (period === "2yr") d.setFullYear(d.getFullYear() - 2);
  else if (period === "3yr") d.setFullYear(d.getFullYear() - 3);
  else if (period === "5yr") d.setFullYear(d.getFullYear() - 5);
  return { cutoff: localISO(d), older };
}

function statsActiveFilterCount() {
  let n = filterActiveCount(statsFilter);
  if (statsAcqRange !== "all") n++;
  return n;
}

function statsRebuild() {
  if (statsView === "grid") {

      statsView = "field"; statsGridItems = []; statsGridTitle = "";
    } else {
      statsView = "main"; statsField = null; statsGridItems = []; statsGridTitle = ""; statsFromField = false;
    }
  }
  renderStats();
}

// Closet Review: fields dealt one item at a time. `missing` = empty (or, for the
// date, a guessed value that wants confirming). `value` renders the current value.
// Derive a likely season from purchase_date month or wear history.
// Returns an array (e.g. ["Summer"]) or null if no data to guess from.
function guessSeason(item) {
  const monthToSeason = m => m <= 2 || m === 12 ? "Winter" : m <= 5 ? "Spring" : m <= 8 ? "Summer" : "Fall";
  if (item.purchase_date) {
    const m = +String(item.purchase_date).slice(5, 7);
    return [monthToSeason(m)];
  }
  const itemWears = wears.filter(w => w.item_id === item.id && w.worn_on);
  if (itemWears.length) {
    const counts = new Map();
    for (const w of itemWears) { const s = monthToSeason(+String(w.worn_on).slice(5, 7)); counts.set(s, (counts.get(s) || 0) + 1); }
    const max = Math.max(...counts.values());
    return [...counts.entries()].filter(([, n]) => n >= max * 0.5).map(([s]) => s);
  }
  return null;
}

function buildSmartList(key) {
  const av = statsPool();
  const wornSub = item => { const n = wearCountInRange(item.id); return n === 0 ? "0 wears" : `${n} wear${n === 1 ? "" : "s"}`; };
  if (key === "never-worn") {
    const title = statsDateRange === "all" ? "Never Worn" : `Not Worn · past ${dateRangeHuman()}`;
    return { list: av.filter(i => wearCountInRange(i.id) === 0), title };
  }
  if (key === "most-worn")
    return { list: [...av].sort((a, b) => wearCountInRange(b.id) - wearCountInRange(a.id)).slice(0, 100),
      title: "Worn History", subtitleFn: wornSub };
  if (key === "least-worn")
    return { list: [...av].sort((a, b) => wearCountInRange(a.id) - wearCountInRange(b.id)).slice(0, 100),
      title: "Worn History", subtitleFn: wornSub };
  if (key === "best-cpw" || key === "worst-cpw") {
    // range-aware CPW: price / wears within the active range
    const cpwR = item => { const n = wearCountInRange(item.id); return n ? parseFloat(item.price) / n : null; };
    const cpwSub = item => { const c = cpwR(item); return c != null ? money(c) : ""; };
    const withWears = av.filter(i => i.price && wearCountInRange(i.id) > 0);
    const sorted = key === "best-cpw"
      ? withWears.sort((a, b) => (cpwR(a) || Infinity) - (cpwR(b) || Infinity))
      : withWears.sort((a, b) => (cpwR(b) || 0) - (cpwR(a) || 0));
    return { list: sorted.slice(0, 100), title: "Cost per Wear", subtitleFn: cpwSub };
  }
  if (key === "most-expensive" || key === "least-expensive") {
    const priceSub = item => { const p = parseFloat(item.price); return isNaN(p) ? "" : money(p); };
    // Least Expensive excludes $0/free items (gifts, unpriced) so the list is useful.
    const withPrice = av.filter(i => {
      const p = parseFloat(i.price);
      if (i.price == null || isNaN(p)) return false;
      return key === "least-expensive" ? p > 0 : true;
    });
    const sorted = key === "most-expensive"
      ? withPrice.sort((a, b) => parseFloat(b.price) - parseFloat(a.price))
      : withPrice.sort((a, b) => parseFloat(a.price) - parseFloat(b.price));
    return { list: sorted.slice(0, 100), title: "Purchase Price", subtitleFn: priceSub };
  }
  if (key === "best-potential") {
    const cpwFmt = n => n >= 10 ? "$" + Math.round(n) : money(n);
    return {
      list: av.filter(i => i.price && wearCount(i.id) > 0)
        .sort((a, b) => {
          const na = wearCount(a.id), nb = wearCount(b.id);
          return (b.price / (nb * (nb + 1))) - (a.price / (na * (na + 1)));
        }).slice(0, 100),
      title: "Best Potential Improvement",
      subtitleFn: item => {
        const n = wearCount(item.id);
        if (!item.price || !n) return "";
        return cpwFmt(item.price / n) + " → " + cpwFmt(item.price / (n + 1)) + "/wear";
      },
    };
  }
  if (key === "recent") {
    const acqSub = item => {
      if (!item.purchase_date) return "";
      const d = new Date(item.purchase_date + "T00:00:00");
      return d.toLocaleDateString(undefined, { month: "short", year: "numeric" });
    };
    // most recently acquired by purchase_date (no hard window — always shows items)
    return { list: av.filter(i => i.purchase_date)
      .sort((a, b) => b.purchase_date.localeCompare(a.purchase_date)).slice(0, 100),
      title: "Recently Acquired", subtitleFn: acqSub };
  }
  if (key === "workhorses") {
    // Highest wear index vs similar items, among pieces with a real track record.
    const per = buildItemPerf(reportPool());
    const list = av.filter(i => { const p = per.get(i.id); return p && p.count >= 3 && p.idx != null; })
      .sort((a, b) => per.get(b.id).idx - per.get(a.id).idx).slice(0, 100);
    return { list, title: "Workhorses",
      subtitleFn: i => { const p = per.get(i.id); return `${p.count} wear${p.count === 1 ? "" : "s"} · ${fmtReportIdx(p.idx)}`; } };
  }
  if (key === "declutter") {
    // Removal candidates: owned 6+ months, not in any liked look, and either
    // never worn or badly under-worn for their type and not touched in 90+ days.
    // Never-worn lead (longest owned first), then lowest index. Transparent
    // sort, no composite score — she can see exactly why each item is here.
    const per = buildItemPerf(reportPool());
    const liked = likedLookItemIds();
    const pool = reportPool().filter(i => {
      if (itemStatus(i) === "Archive") return false;
      const p = per.get(i.id);
      if (!p || p.months < 6 || liked.has(i.id)) return false;
      if (p.count === 0) return true;
      const lw = lastWorn(i.id);
      return p.idx != null && p.idx < 0.5 && (!lw || daysSince(lw) >= 90);
    });
    pool.sort((a, b) => {
      const pa = per.get(a.id), pb = per.get(b.id);
      if ((pa.count === 0) !== (pb.count === 0)) return pa.count === 0 ? -1 : 1;
      if (pa.count === 0) return pb.months - pa.months;
      return (pa.idx ?? 0) - (pb.idx ?? 0);
    });
    return { list: pool.slice(0, 100), title: "Declutter Candidates",
      subtitleFn: i => {
        const p = per.get(i.id);
        if (p.count === 0) return `never worn · owned ${Math.round(p.months)} mo`;
        const st = itemStatus(i) === "Storage" ? " · storage" : "";
        return `${p.count} wear${p.count === 1 ? "" : "s"} · ${fmtReportIdx(p.idx)} · last ${relDate(lastWorn(i.id))}${st}`;
      } };
  }
  return null;
}

  const s = new Set();
  for (const o of outfits) if (o.rating === 1) for (const id of (outfitItemMap.get(o.id) || [])) s.add(id);

function getFieldGroups(field) {
  const avail = statsPool();
  const noValue = [];
  const groups = {};
  const add = (label, item) => { if (!groups[label]) groups[label] = []; groups[label].push(item); };
  for (const item of avail) {
    if (field === "color_family") {
      if (!item.color_family) { noValue.push(item); continue; }
      add(item.color_family, item);
    } else if (field === "category") {
      if (!item.category) { noValue.push(item); continue; }
      add(item.category, item);
    } else if (field === "brand") {
      if (!item.brand || !item.brand.trim()) { noValue.push(item); continue; }
      add(item.brand.trim(), item);
    } else if (field === "price") {
      const p = parseFloat(item.price);
      if (!item.price || isNaN(p)) { noValue.push(item); continue; }
      const b = PRICE_BRACKETS.find(b => p >= b.min && p < b.max);
      if (b) add(b.label, item);
    } else if (field === "size") {
      if (!item.size) { noValue.push(item); continue; }
      add(item.size, item);
    } else if (field === "season") {
      if (!item.season || !item.season.length) { noValue.push(item); continue; }
      for (const s of item.season) add(s, item);
    } else if (field === "fabric") {
      if (!item.fabric || !item.fabric.length) { noValue.push(item); continue; }
      for (const f of item.fabric) add(f, item);
    } else if (field === "retailer") {
      if (!item.retailer || !item.retailer.trim()) { noValue.push(item); continue; }
      add(item.retailer.trim(), item);
    } else if (field === "acquisition") {
      if (!item.acquisition) { noValue.push(item); continue; }
      add(item.acquisition, item);
    }
  }
  let sorted;
  if (field === "price") sorted = PRICE_BRACKETS.map(b => ({ label: b.label, items: groups[b.label] || [] }));
  else if (field === "season") sorted = SEASONS.map(s => ({ label: s, items: groups[s] || [] })).filter(g => g.items.length);
  else if (field === "category") sorted = CATEGORIES.map(c => ({ label: c, items: groups[c] || [] })).filter(g => g.items.length);
  else sorted = Object.entries(groups).map(([label, items]) => ({ label, items })).sort((a, b) => b.items.length - a.items.length);
  return { noValue, groups: sorted };
}

function segmentColor(field, label, idx) {

function donutSvgHighlight(segments, activeIdx) {
  const total = segments.reduce((s, x) => s + x.count, 0);
  if (!total) return "";
  const cx = 80, cy = 80, R = 72, r = 46, gap = total > 1 ? 0.012 : 0;
  let paths = "", angle = -Math.PI / 2;
  for (let i = 0; i < segments.length; i++) {
    const seg = segments[i];
    if (!seg.count) continue;
    const sweep = (seg.count / total) * Math.PI * 2 - gap;
    if (sweep <= 0) continue;
    const a2 = angle + sweep;
    const x1 = cx + R * Math.cos(angle), y1 = cy + R * Math.sin(angle);
    const x2 = cx + R * Math.cos(a2),    y2 = cy + R * Math.sin(a2);
    const x3 = cx + r * Math.cos(a2),    y3 = cy + r * Math.sin(a2);
    const x4 = cx + r * Math.cos(angle), y4 = cy + r * Math.sin(angle);
    const lg = sweep > Math.PI ? 1 : 0;
    const op = segments.length <= 1 ? 1 : (i === activeIdx ? 1 : 0.22);
    paths += `<path class="dseg" d="M${x1.toFixed(1)} ${y1.toFixed(1)} A${R} ${R} 0 ${lg} 1 ${x2.toFixed(1)} ${y2.toFixed(1)} L${x3.toFixed(1)} ${y3.toFixed(1)} A${r} ${r} 0 ${lg} 0 ${x4.toFixed(1)} ${y4.toFixed(1)}Z" fill="${seg.color}" style="opacity:${op};transition:opacity .15s"/>`;
    angle = a2 + gap;
  }
  return `<svg width="160" height="160" viewBox="0 0 160 160" style="display:block;flex-shrink:0">${paths}</svg>`;
}

function wireDonutArrows(segments, total) {

}

function closetVsLifeHtml() {
  const avail = items.filter(i => itemStatus(i) === "Available");
  if (!avail.length || !wears.length) return "";

  // Supply: count items across all levels in their set
  const supply = new Array(8).fill(0);
  for (const i of avail) { for (const l of (itemFormalitySet(i) || [])) supply[l - 1]++; }
  const supplyTotal = supply.reduce((a, b) => a + b, 0) || 1;

  // Demand: count wears by the formality set of each worn item
  const demand = new Array(8).fill(0);
  for (const w of wears) {
    const it = itemById.get(w.item_id);
    if (!it) continue;
    for (const l of (itemFormalitySet(it) || [])) demand[l - 1]++;
  }
  const demandTotal = demand.reduce((a, b) => a + b, 0) || 1;

  // Find biggest gap: supply heavy vs demand
  let biggestGap = 0, gapLevel = -1;
  for (let i = 0; i < 8; i++) {
    const gap = supply[i] / supplyTotal - demand[i] / demandTotal;
    if (gap > biggestGap) { biggestGap = gap; gapLevel = i; }
  }

  const LEVEL_COLORS = ["#7c8cf8","#60b8d4","#6abf8a","#a8d96a","#f0b429","#e07d42","#c05c7e","#8b5cf6"];
  const rows = OCCASION_LADDER.map((lbl, i) => {
    const sp = supply[i] / supplyTotal;
    const dm = demand[i] / demandTotal;
    const color = LEVEL_COLORS[i];
    return `<div style="margin-bottom:11px">
      <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:3px">
        <span>${i + 1}. ${esc(lbl)}</span>

// L7: liked looks not worn in 60+ days (or never). Never-worn floats to the top,
// then oldest-last-worn first — the most "neglected" favorites lead the list.
function likedNeglectedOutfits() {
  return activeOutfits().filter(o => {
    if (o.rating !== 1) return false;
    const lw = outfitLastWorn(o);
    return !lw || daysSince(lw) >= 60;
  }).sort((a, b) => {
    const la = outfitLastWorn(a), lb = outfitLastWorn(b);
    if (!la && !lb) return 0;
    if (!la) return -1;
    if (!lb) return 1;
    return la.localeCompare(lb);
  });
}

/* ---- C2: Contexts stats page ---- */
// Wear count per context, respecting the stats date range.
function contextWearCounts() {
  const cutoff = rangeStart();
  const counts = new Map();
  for (const w of wears) {
    if (cutoff && w.worn_on < cutoff) continue;
    for (const c of ctxArr(w)) counts.set(c, (counts.get(c) || 0) + 1);
  }
  return counts;
}
// Effective formality of a wear for stats. The look's MANUAL override wins,
// then the level captured at log time (formality_for), then a derive-now
// fallback — pre-v3 wears (incl. the whole Airtable import) have neither.
// _soloFmlMemo: solo-wear derive is O(wears) for items with no explicit
// formality, so memoize per item; rebuilt on every Contexts page render.
let _soloFmlMemo = new Map();
function wearFormality(w) {
  const o = w.outfit_id ? outfitById.get(w.outfit_id) : null;
  if (o && o.formality_override) return BUCKET_RANGES[o.formality_override] || null;
  if (w.formality_for) return w.formality_for;
  if (o) return BUCKET_RANGES[outfitBucket(o)] || null;
  if (!w.item_id) return null;
  if (!_soloFmlMemo.has(w.item_id)) _soloFmlMemo.set(w.item_id, deriveWearFormality([w.item_id]));
  return _soloFmlMemo.get(w.item_id);
}
// Formality demand for a context: avg + spread of effective wear formality, range-scoped.
function contextFormalityStats(context) {
  const cutoff = rangeStart();
  const levels = wears
    .filter(w => (!cutoff || w.worn_on >= cutoff) && ctxArr(w).includes(context))
    .map(wearFormality).filter(Boolean);
  if (!levels.length) return null;
  return { avg: levels.reduce((a, b) => a + b, 0) / levels.length, min: Math.min(...levels), max: Math.max(...levels), n: levels.length };
}
function contextTopItems(context, limit = 12) {
  const cutoff = rangeStart();
  const counts = new Map();
  for (const w of wears) {
    if (cutoff && w.worn_on < cutoff) continue;
    if (!ctxArr(w).includes(context)) continue;
    counts.set(w.item_id, (counts.get(w.item_id) || 0) + 1);
  }
  return [...counts.entries()].sort((a, b) => b[1] - a[1]).slice(0, limit)
    .map(([id, n]) => ({ item: itemById.get(id), n })).filter(x => x.item);
}
function contextTopLooks(context, limit = 12) {
  const cutoff = rangeStart();
  const counts = new Map();
  for (const w of wears) {
    if (cutoff && w.worn_on < cutoff) continue;
    if (!w.outfit_id || !ctxArr(w).includes(context)) continue;
    counts.set(w.outfit_id, (counts.get(w.outfit_id) || 0) + 1);
  }
  return [...counts.entries()].sort((a, b) => b[1] - a[1])
    .map(([id, n]) => ({ outfit: outfitById.get(id), n }))
    .filter(x => x.outfit && !effectiveArchived(x.outfit))  // archived looks live only in Archive + calendar
    .slice(0, limit);
}

function renderStatsContextsPage() {
  _soloFmlMemo = new Map();  // formality edits since last visit must be picked up
  const counts = contextWearCounts();
  const ctxs = [...counts.keys()].sort((a, b) => counts.get(b) - counts.get(a));
  const rows = ctxs.map(c => {
    const n = counts.get(c);
    const fs = contextFormalityStats(c);
    const sub = fs
      ? `avg ${fs.avg.toFixed(1)}${fs.min !== fs.max ? ` · levels ${fs.min}–${fs.max}` : ""}`
      : "no formality data yet";
    return `<button class="frow" data-sctxrow="${esc(c)}">
      <div class="fmeta"><div class="fname">${esc(c)}</div><div class="fcount">${n} wear${n === 1 ? "" : "s"} · ${esc(sub)}</div></div>
      <svg class="chev" viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg>
    </button>`;
  }).join("");
  $("#statsBody").innerHTML = statsToolbar("Contexts", true, true)
    + (rows ? `<div class="frows" style="padding-top:4px">${rows}</div>`
             : `<div class="placeholder"><b>No context data yet</b><div>Add context when you log a wear and it'll show up here.</div></div>`);
  wireStatsToolbar();
  $("#statsBody").querySelectorAll("[data-sctxrow]").forEach(el => {
    el.addEventListener("click", () => { statsContextSel = el.dataset.sctxrow; statsView = "context-detail"; renderStats(); });
  });
}

/* ---- Brand / Retailer report cards ---- */
// Like statsPool, but archived items stay in unless the user explicitly
// filters status — the dud rate needs to see what got archived.
function reportPool() {
  const acqCutoff = acqRangeStart();
  return items.filter(i => {
    if (!itemMatchesFilter(i, statsFilter, { noStatusDefault: true })) return false;
    if (acqCutoff) {
      const pd = i.purchase_date;
      if (acqCutoff.older) { if (!pd || pd >= acqCutoff.cutoff) return false; }
      else                 { if (!pd || pd < acqCutoff.cutoff)  return false; }
    }
    return true;
  });
}

const REPORT_MIN_ITEMS = 3;  // fewer items than this → unranked "fewer than…" section
const REPORT_DUD_WEARS = 3;  // archived under this many wears counts as a dud

// Report-card dimensions. "ranked" dims sort by the wear index with a Best/Worst
// toggle and a min-items split; "canonical" dims keep a fixed browse order (no
// cross-group ranking implied). showIdx:false hides the vs-similar index — for
// subcategory it would be ×1.0 by construction (items are standardized against
// their own subcategory peers); the payoff there is best/worst WITHIN the group.
const REPORT_DIMS = {
  brand:        { title: "Brands",         mode: "ranked",    keyFn: i => (i.brand || "").trim(),    noValueLabel: "brand" },
  retailer:     { title: "Retailers",      mode: "ranked",    keyFn: i => (i.retailer || "").trim(), noValueLabel: "retailer" },
  color_family: { title: "Colors",         mode: "ranked",    keyFn: i => i.color_family || "",      noValueLabel: "color" },
  acquisition:  { title: "Acquisition",    mode: "ranked",    keyFn: i => i.acquisition || "",       noValueLabel: "acquisition" },
  subcategory:  { title: "Subcategories",  mode: "canonical", keyFn: i => i.subcategory || "",       noValueLabel: "subcategory", showIdx: false },
  price:        { title: "Price Brackets", mode: "canonical", keyFn: i => priceBracketLabel(i),      noValueLabel: "price" },
  year:         { title: "Purchase Years", mode: "canonical", keyFn: i => (i.purchase_date || "").slice(0, 4), noValueLabel: "purchase date" },
};

function priceBracketLabel(i) {
  const p = parseFloat(i.price);
  if (i.price == null || isNaN(p)) return "";
  const b = PRICE_BRACKETS.find(b => p >= b.min && p < b.max);
  return b ? b.label : "";
}

// One pass over wears → per-item { days: Set(worn_on), first: earliest date }.
function itemWearIndex() {
  const m = new Map();
  for (const w of wears) {
    if (!w.item_id) continue;
    let e = m.get(w.item_id);
    if (!e) { e = { days: new Set(), first: w.worn_on }; m.set(w.item_id, e); }
    e.days.add(w.worn_on);
    if (w.worn_on < e.first) e.first = w.worn_on;
  }
  return m;
}

// Per-item performance: wears, months observed, expected wears, and the
// "vs similar items" index. Tenure per item starts at purchase_date (falling
// back to its first wear, then created_at) but never before the earliest logged
// wear anywhere — months before logging began can't be observed and would
// deflate the rate. "vs expected" = actual wears / (peer wear-rate × months
// observed), where the peer rate comes from the item's subcategory (category
// fallback when the subcategory slice is under 5 items) — so basics aren't
// rewarded over formal pieces just for being basics. A peer rate of 0
// contributes nothing either way. Shared by the report cards, the
// Workhorses/Declutter smart lists, the capsule picker strip, and the item badge.
function buildItemPerf(pool) {
  const wearIdx = itemWearIndex();
  let epoch = null;
  for (const e of wearIdx.values()) if (!epoch || e.first < epoch) epoch = e.first;
  const today = todayStr();
  const MS_MONTH = 86400000 * 30.44;
  const per = new Map();
  for (const i of pool) {
    const e = wearIdx.get(i.id);
    const count = e ? e.days.size : 0;
    let since = i.purchase_date || (e ? e.first : null) || (i.created_at || today).slice(0, 10);
    if (epoch && since < epoch) since = epoch;
    const months = Math.max(1, (new Date(today) - new Date(since)) / MS_MONTH);
    per.set(i.id, { count, months, exp: 0, idx: null });
  }

  const bump = (map, key, p) => {
    const e = map.get(key) || { w: 0, m: 0, n: 0 };
    e.w += p.count; e.m += p.months; e.n++; map.set(key, e);
  };
  const subRate = new Map(), catRate = new Map();
  let totW = 0, totM = 0;
  for (const i of pool) {
    const p = per.get(i.id);
    bump(catRate, i.category || "?", p);
    bump(subRate, (i.category || "?") + "/" + (i.subcategory || "?"), p);
    totW += p.count; totM += p.months;
  }
  const overallRate = totM ? totW / totM : 0;
  for (const i of pool) {
    const p = per.get(i.id);
    const s = subRate.get((i.category || "?") + "/" + (i.subcategory || "?"));
    const c = catRate.get(i.category || "?");
    const rate = (s && s.n >= 5 && s.m) ? s.w / s.m
               : (c && c.m) ? c.w / c.m
               : overallRate;
    p.exp = rate * p.months;
    p.idx = p.exp > 0 ? p.count / p.exp : null;
  }
  return per;
}

// Group per-item performance by a report dimension (see REPORT_DIMS).
function buildReportStats(field) {
  const pool = reportPool();
  const per = buildItemPerf(pool);
  const keyFn = REPORT_DIMS[field].keyFn;

  const groups = new Map();
  let noValue = 0;
  for (const i of pool) {
    const label = keyFn(i);
    if (!label) { noValue++; continue; }
    let g = groups.get(label);
    if (!g) { g = []; groups.set(label, g); }
    g.push(i);
  }
  const rows = [...groups.entries()].map(([label, list]) => {
    let wearsN = 0, months = 0, exp = 0, duds = 0, spend = 0, gifts = 0, priced = 0;
    const cpws = [];
    for (const i of list) {
      const p = per.get(i.id);
      wearsN += p.count; months += p.months; exp += p.exp;
      if (p.count === 0 || (itemStatus(i) === "Archive" && p.count < REPORT_DUD_WEARS)) duds++;
      if (i.acquisition === "Gift") { gifts++; continue; }
      const price = parseFloat(i.price);
      if (isNaN(price)) continue;
      spend += price; priced++;
      if (p.count > 0) cpws.push(price / p.count);
    }
    cpws.sort((a, b) => a - b);
    const mid = cpws.length >> 1;
    const medCPW = !cpws.length ? null : (cpws.length % 2 ? cpws[mid] : (cpws[mid - 1] + cpws[mid]) / 2);
    return {
      label, items: list, n: list.length, wears: wearsN,
      rate: months ? wearsN / months : 0,
      idx: exp > 0 ? wearsN / exp : null,
      duds, spend, medCPW, gifts, priced,
    };
  });
  return { rows, per, noValue };
}

const fmtReportIdx = (v) => v == null ? "—" : "×" + v.toFixed(1);
const reportIdxColor = (v) => v == null ? "var(--muted)" : v >= 1.15 ? "#3a7d44" : v <= 0.85 ? "#c0392b" : "var(--text)";

function renderStatsReportPage() {
  const field = statsReportField;
  const dim = REPORT_DIMS[field];
  const { rows, noValue } = buildReportStats(field);
  const showIdx = dim.showIdx !== false;
  const thisYear = String(new Date().getFullYear());

  const rowHtml = (r, detailed) => {
    // Current-year cohort: too little tenure to call anything a dud yet.
    const dudTxt = (field === "year" && r.label === thisYear)
      ? " · still proving out"
      : (r.duds ? ` · ${r.duds} dud${r.duds === 1 ? "" : "s"}` : "");
    const sub = detailed
      ? `${r.n} item${r.n === 1 ? "" : "s"} · ${r.rate.toFixed(1)} wears/mo · ${r.medCPW != null ? money(r.medCPW) + "/wear" : "no cost data"}${dudTxt}`
      : `${r.n} item${r.n === 1 ? "" : "s"} · ${r.wears} wear${r.wears === 1 ? "" : "s"}`;
    return `<button class="frow" data-srb="${esc(r.label)}">
      <div class="fmeta"><div class="fname">${esc(r.label)}</div><div class="fcount">${esc(sub)}</div></div>
      ${detailed && showIdx ? `<span style="font-size:16px;font-weight:700;margin-right:6px;flex-shrink:0;color:${reportIdxColor(r.idx)}">${fmtReportIdx(r.idx)}</span>` : ""}
      <svg class="chev" viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg>
    </button>`;
  };

  let listHtml, sortBar = "";
  if (dim.mode === "ranked") {
    const ranked = rows.filter(r => r.n >= REPORT_MIN_ITEMS);
    const withIdx = ranked.filter(r => r.idx != null).sort((a, b) => b.idx - a.idx);
    if (statsReportSort === "worst") withIdx.reverse();
    const display = [...withIdx, ...ranked.filter(r => r.idx == null)];
    const small = rows.filter(r => r.n < REPORT_MIN_ITEMS).sort((a, b) => b.n - a.n || b.wears - a.wears);
    sortBar = `<div class="stats-sort-bar" style="padding-bottom:6px">
        <button class="stats-sort-btn${statsReportSort === "best" ? " on" : ""}" data-srs="best">Best first</button>
        <button class="stats-sort-btn${statsReportSort === "worst" ? " on" : ""}" data-srs="worst">Worst first</button>
      </div>`;
    listHtml = (display.length
        ? `<div class="frows">${display.map(r => rowHtml(r, true)).join("")}</div>`
        : `<div class="placeholder"><b>Not enough data</b><div>${esc(dim.title)} with ${REPORT_MIN_ITEMS}+ items get ranked here.</div></div>`)
      + (small.length ? `<div class="sf-label">Fewer than ${REPORT_MIN_ITEMS} items</div><div class="frows">${small.map(r => rowHtml(r, false)).join("")}</div>` : "");
  } else if (field === "subcategory") {
    // Taxonomy order with category headers; unrecognized subcats go under Other.
    const byLabel = new Map(rows.map(r => [r.label, r]));
    const used = new Set();
    const sections = [];
    for (const cat of CATEGORIES) {
      const secRows = (TAXONOMY[cat] || []).map(s => byLabel.get(s)).filter(Boolean);
      if (secRows.length) { sections.push({ hdr: cat, rows: secRows }); secRows.forEach(r => used.add(r.label)); }
    }
    const other = rows.filter(r => !used.has(r.label)).sort((a, b) => b.n - a.n);
    if (other.length) sections.push({ hdr: "Other", rows: other });
    listHtml = sections.map(s =>
      `<div class="sf-label">${esc(s.hdr)}</div><div class="frows">${s.rows.map(r => rowHtml(r, true)).join("")}</div>`
    ).join("") || `<div class="placeholder"><b>No data yet</b></div>`;
  } else {
    // price: bracket order · year: newest first
    const ordered = field === "price"
      ? PRICE_BRACKETS.map(b => rows.find(r => r.label === b.label)).filter(Boolean)
      : rows.sort((a, b) => b.label.localeCompare(a.label));
    listHtml = ordered.length
      ? `<div class="frows">${ordered.map(r => rowHtml(r, true)).join("")}</div>`
      : `<div class="placeholder"><b>No data yet</b></div>`;
  }

  const note = showIdx
    ? "×1.0 = worn about as much as similar items, for how long you've had each piece. Higher over-performs, lower under-performs. Cost stats skip gifts."
    : "Tap a type to see its best and worst pieces. Cost stats skip gifts.";

  $("#statsBody").innerHTML = statsToolbar(dim.title, true)
    + `<div class="stats-note" style="padding:12px 18px 2px">${esc(note)}</div>`
    + sortBar
    + (sortBar ? "" : `<div style="height:8px"></div>`)
    + listHtml
    + (noValue ? `<div class="stats-note" style="padding:12px 18px 24px">${noValue} item${noValue === 1 ? " has" : "s have"} no ${esc(dim.noValueLabel)} set.</div>` : `<div style="height:24px"></div>`);

  wireStatsToolbar();
  $("#statsBody").querySelectorAll("[data-srs]").forEach(btn => {
    btn.addEventListener("click", () => { statsReportSort = btn.dataset.srs; renderStatsReportPage(); });
  });
  $("#statsBody").querySelectorAll("[data-srb]").forEach(el => {
    el.addEventListener("click", () => {
      statsReportSel = el.dataset.srb; statsView = "report-detail"; renderStats();
    });
  });
}

function renderStatsReportDetailPage() {
  const field = statsReportField;
  const { rows, per } = buildReportStats(field);
  const r = rows.find(x => x.label === statsReportSel);
  if (!r) { statsView = "report"; renderStats(); return; }  // filter change can empty the group

  const scored = r.items.map(i => ({ i, p: per.get(i.id) }));
  const worn = scored.filter(x => x.p.count > 0 && x.p.idx != null).sort((a, b) => b.p.idx - a.p.idx);
  const best = worn.slice(0, 6);
  const bestIds = new Set(best.map(x => x.i.id));
  // Worst: never-worn first (priciest shelf-sitters lead), then lowest index.
  const never = scored.filter(x => x.p.count === 0)
    .sort((a, b) => (parseFloat(b.i.price) || 0) - (parseFloat(a.i.price) || 0));
  const worst = [...never, ...worn.slice().reverse().filter(x => !bestIds.has(x.i.id))].slice(0, 6);

  const subFor = new Map();
  for (const x of best) subFor.set(x.i.id, `${x.p.count} wear${x.p.count === 1 ? "" : "s"} · ${fmtReportIdx(x.p.idx)}`);
  for (const x of worst) if (!subFor.has(x.i.id)) subFor.set(x.i.id,
    x.p.count === 0 ? "never worn" : `${x.p.count} wear${x.p.count === 1 ? "" : "s"} · ${fmtReportIdx(x.p.idx)}`);
  const subFn = (i) => subFor.get(i.id) || "";

  const kpi = (val, lbl) => `<div class="kpi-cell"><div class="kpi-val">${val}</div><div class="kpi-lbl">${esc(lbl)}</div></div>`;
  const isThisYear = field === "year" && r.label === String(new Date().getFullYear());
  const dudNote = isThisYear
    ? "Bought this year — too soon to call anything a dud."
    : r.duds
      ? `${r.duds} of ${r.n} item${r.n === 1 ? "" : "s"} never worn or archived early.`
      : "No duds — everything got worn.";
  const giftNote = r.gifts ? ` Cost stats exclude ${r.gifts} gift${r.gifts === 1 ? "" : "s"}.` : "";
  // For subcategory the vs-similar index is ×1.0 by construction (items are
  // standardized against these same peers) — show the dud count instead.
  const secondKpi = REPORT_DIMS[field].showIdx === false
    ? kpi(r.duds, r.duds === 1 ? "Dud" : "Duds")
    : kpi(`<span style="color:${reportIdxColor(r.idx)}">${fmtReportIdx(r.idx)}</span>`, "vs Similar Items");

  $("#statsBody").innerHTML = statsToolbar(r.label, true)
    + `<div class="stats-sec" style="margin-top:12px">
      <div class="stats-sec-body">
        <div class="kpi-row" style="border-bottom:1px solid var(--line)">
          ${kpi(r.n, "Items")}${kpi(r.wears, "Total Wears")}
        </div>
        <div class="kpi-row" style="border-bottom:1px solid var(--line)">
          ${kpi(r.rate.toFixed(1), "Wears / Month")}
          ${secondKpi}
        </div>
        <div class="kpi-row">
          ${kpi(r.medCPW != null ? money(r.medCPW) : "—", "Median $ / Wear")}${kpi(r.priced ? money(r.spend) : "—", "Total Spent")}
        </div>
      </div>
      <div class="stats-note">${esc(dudNote)}${esc(giftNote)}</div>
    </div>`
    + (best.length ? `<div class="sf-label">Best performers</div>${itemGridView(best.map(x => x.i), { subtitleFn: subFn })}` : "")
    + (worst.length ? `<div class="sf-label">Underperformers</div>${itemGridView(worst.map(x => x.i), { subtitleFn: subFn })}` : "")
    + `<div class="frows" style="padding-top:8px"><button class="frow" id="srAllItems">
        <div class="fmeta"><div class="fname">All ${r.n} item${r.n === 1 ? "" : "s"}</div></div>
        <svg class="chev" viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg>
      </button></div><div style="height:24px"></div>`;

  wireStatsToolbar();
  hydratePhotos($("#statsBody"));
  $("#statsBody").querySelectorAll(".gtile").forEach(btn => {
    btn.addEventListener("click", () => { if (btn.dataset.item) openItemFromStats(btn.dataset.item); });
  });
  $("#srAllItems").addEventListener("click", () => {
    const counts = new Map(scored.map(x => [x.i.id, x.p.count]));
    statsView = "grid";
    statsGridItems = scored.slice().sort((a, b) => b.p.count - a.p.count).map(x => x.i);
    statsGridTitle = r.label;
    statsFromReport = true; statsFromField = false; statsListKey = null;
    statsSubtitleFn = (i) => { const n = counts.get(i.id) || 0; return `${n} wear${n === 1 ? "" : "s"}`; };
    renderStats();
  });
}

function renderReviewLanding() {
  const body = $("#statsBody");
  const rows = REVIEW_FIELDS.map(f => ({ f, n: reviewCount(f) })).filter(r => r.n > 0);
  const total = reviewTotalItems();

    ? `<div class="stats-note" style="padding:14px 18px 6px">Pick a detail to fill in. We'll deal you the ${total} item${total === 1 ? "" : "s"} missing or guessing it, one at a time.</div>`

        <b>All caught up</b><div>Every item has its details filled in.</div></div>`;

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startReview(key) {
  const f = REVIEW_FIELDS.find(x => x.key === key);
  if (!f) return;
  reviewField = key;
  reviewQueue = shuffle(reviewPool().filter(f.missing).map(i => i.id));
  reviewIdx = 0;
  statsView = "review-deal";
  renderStats();
}

function reviewAfterEdit() {
  reviewIdx++; _rvPending = null;
  if (statsView === "review-deal") renderStats();
}

function reviewSkip() { reviewIdx++; _rvPending = null; renderStats(); }

// Returns HTML for the inline field editor on a review card, or "" for complex fields.
function renderReviewInline(fieldKey) {
  const pending = _rvPending;
  const singleChips = (opts) => opts.map(o => {
    const on = pending === o;
    return `<button class="sheet-chip${on ? " on" : ""}" data-rvchip="${esc(o)}">${esc(o)}</button>`;
  }).join("");
  const multiChips = (opts) => opts.map(o => {
    const on = Array.isArray(pending) && pending.includes(o);
    return `<button class="sheet-chip${on ? " on" : ""}" data-rvchip="${esc(o)}" data-rvmulti="1">${esc(o)}</button>`;
  }).join("");

  switch (fieldKey) {
    case "formality": {
      const sel = Array.isArray(pending) ? pending : (pending ? [+pending] : []);
      const chips = OCCASION_LADDER.map((lbl, i) => {
        const lvl = i + 1, on = sel.includes(lvl);
        return `<button class="sheet-chip rv-fmlchip${on ? " on" : ""}" data-rvchip="${lvl}" data-rvfml="1">
          <span class="rv-fmllbl">${lvl}. ${esc(lbl)}</span>
          <span class="rv-fmlhint">${esc(OCCASION_HINTS[i])}</span>
        </button>`;
      }).join("");
      return `<div class="rv-inline rv-inline-col"><div class="sheet-chips" style="gap:6px">${chips}</div></div>`;
    }
    case "season":
      return `<div class="rv-inline"><div class="sheet-chips">${multiChips(SEASONS)}</div></div>`;
    case "fabric":
      return `<div class="rv-inline"><div class="sheet-chips">${multiChips(["Cotton","Linen","Wool","Cashmere","Silk","Denim","Polyester","Spandex","Nylon","Fleece","Leather","Velvet"])}</div></div>`;
    case "color_family":
      return `<div class="rv-inline"><div class="sheet-chips">${singleChips(COLOR_FAMILIES.map(c => c[0]))}</div></div>`;
    case "size":
      return `<div class="rv-inline"><div class="sheet-chips">${singleChips(["XXS","XS","S","M","L","XL","XXL","0","2","4","6","8","10","12","14","One size"])}</div></div>`;
    case "acquisition":
      return `<div class="rv-inline"><div class="sheet-chips">${singleChips(["New","Secondhand","Gift"])}</div></div>`;
    case "brand": case "retailer":
      return `<div class="rv-inline"><input class="rv-inp" id="rvInpText" type="text" value="${esc(pending || "")}" placeholder="${fieldKey === "brand" ? "Brand name" : "Retailer name"}"></div>`;
    case "price":
      return `<div class="rv-inline"><input class="rv-inp" id="rvInpText" type="number" min="0" step="0.01" value="${esc(pending != null ? pending : "")}" placeholder="0.00" style="width:120px"></div>`;
    case "purchase_date":
      return `<div class="rv-inline"><input class="rv-inp" id="rvInpText" type="date" value="${esc(pending || "")}"></div>`;
    default:
      return ""; // category/subcategory: use Edit Item
  }
}

function renderReviewDeal() {
  const body = $("#statsBody");
  const f = REVIEW_FIELDS.find(x => x.key === reviewField);
  if (!f) { statsView = "review"; renderStats(); return; }
  const total = reviewQueue.length;
  const toolbar = `<div class="cltoolbar">
      <button class="clback" id="stBack"><svg viewBox="0 0 24 24"><path d="M15 6l-6 6 6 6"/></svg></button>
      <div class="cltitle">${esc(f.label)}</div><span style="width:34px"></span>
    </div>`;

  if (reviewIdx >= total) {
    body.innerHTML = toolbar + `<div class="rv-done">
      <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      <b>${esc(f.label)} — done</b><div>You reviewed all ${total} item${total === 1 ? "" : "s"}.</div>
      <button class="rv-set" id="rvBackList" style="margin-top:20px;max-width:240px">Back to review</button>
    </div>`;
    $("#stBack").addEventListener("click", statsNavBack);
    $("#rvBackList").addEventListener("click", statsNavBack);
    return;
  }

  const item = items.find(i => i.id === reviewQueue[reviewIdx]);
  if (!item) { reviewSkip(); return; }

  // Pre-populate pending with guess on first render of this card
  const guess = f.guess ? f.guess(item) : null;
  if (_rvPending === null && guess) _rvPending = guess;

  const cur = f.value(item);
  const path = item.category ? (item.subcategory ? `${item.category} › ${item.subcategory}` : item.category) : "Uncategorized";
  const inlineHtml = renderReviewInline(reviewField);
  const hasInline = !!inlineHtml;
  const hasPending = _rvPending !== null && _rvPending !== "" && !(Array.isArray(_rvPending) && !_rvPending.length);
  // Show the "this is a guess" banner only while the pending value still equals the
  // derived guess (and the item has no stored value) — it clears once the user edits.
  const showGuessHint = cur == null && guess != null && f.guessLabel
    && JSON.stringify(_rvPending) === JSON.stringify(guess);
  const guessHintHtml = showGuessHint
    ? `<div class="rv-guess-hint"><svg viewBox="0 0 24 24"><path d="M12 2l2.4 7.4H22l-6 4.6 2.3 7.4L12 16.7 5.3 21.4l2.3-7.4-6-4.6h7.6z"/></svg>${esc(f.guessLabel)} — confirm or change</div>`
    : "";

  body.innerHTML = toolbar
    + `<div class="rv-prog">${reviewIdx + 1} of ${total}</div>
    <div class="rv-card">
      <div class="rv-photo${item.image_path ? "" : " empty"}" data-photo="${esc(item.image_path || "")}"></div>
      <div class="rv-info">
        <div class="rv-name">${esc(item.name || "Untitled")}</div>
        <div class="rv-path">${esc(path)}</div>
        ${cur ? `<div class="rv-cur">Current: <b>${esc(cur)}</b></div>` : ""}
      </div>
    </div>
    ${guessHintHtml}
    ${inlineHtml}
    <div class="rv-actions">
      ${hasInline
        ? `<button class="rv-confirm${hasPending ? "" : " rv-set"}" id="rvNext" style="${hasPending ? "" : "background:var(--surface);color:var(--text)"}">
             ${hasPending ? "Save &amp; Next →" : "Next →"}</button>
           <button class="rv-skip" id="rvSkip" style="flex:none;padding:14px 16px">Skip</button>`
        : `<button class="rv-set" id="rvSet">Set ${esc(f.label)}</button>
           <button class="rv-skip" id="rvSkip">Skip</button>`}
      <button class="rv-edit" id="rvEdit" style="flex:none;padding:14px 16px">Edit</button>
    </div>`;

  $("#stBack").addEventListener("click", statsNavBack);
  $("#rvSkip").addEventListener("click", reviewSkip);
  $("#rvEdit").addEventListener("click", () => openItemFromReview(item.id));

  if (hasInline) {
    const rvNext = $("#rvNext");
    rvNext.addEventListener("click", () => {
      if (hasPending) saveField(item.id, reviewField, _rvPending);
      reviewAfterEdit();
    });

    // chip toggles
    body.querySelectorAll("[data-rvchip]").forEach(btn => {
      btn.addEventListener("click", () => {
        const v = btn.dataset.rvchip;
        const isFml = btn.dataset.rvfml === "1";
        const isMulti = btn.dataset.rvmulti === "1";
        if (isFml) {
          const n = +v;
          const cur2 = Array.isArray(_rvPending) ? [..._rvPending] : (_rvPending ? [+_rvPending] : []);
          _rvPending = cur2.includes(n) ? cur2.filter(x => x !== n) : [...cur2, n].sort((a, b) => a - b);
        } else if (isMulti) {
          const cur2 = Array.isArray(_rvPending) ? [..._rvPending] : [];
          _rvPending = cur2.includes(v) ? cur2.filter(x => x !== v) : [...cur2, v];
        } else {
          _rvPending = _rvPending === v ? null : v;
        }
        renderReviewDeal();
      });
    });

    // text / date / number input
    const inp = $("#rvInpText");
    if (inp) {
      inp.addEventListener("input", () => {
        _rvPending = reviewField === "price" ? (inp.value ? +inp.value : null) : inp.value;
      });
      inp.focus();
    }
  } else {
    const rvSet = $("#rvSet");
    if (rvSet) rvSet.addEventListener("click", () => f.edit(item));
  }

  hydratePhotos(body);
}

// canonical category order for grouping (packing-friendly)
const CAP_CAT_ORDER = ["Outerwear", "Tops", "Dresses", "Bottoms", "Shoes", "Workout"];
const catRank = (c) => { const i = CAP_CAT_ORDER.indexOf(c); return i < 0 ? 99 : i; };
// → [{key, items}] grouped by category in canonical order, items sorted by color (closet default)
function groupByCategory(list) {
  const map = new Map();
  for (const i of list) { const c = i.category || "Other"; if (!map.has(c)) map.set(c, []); map.get(c).push(i); }
  const keys = [...map.keys()].sort((a, b) => { const r = catRank(a) - catRank(b); return r !== 0 ? r : a.localeCompare(b); });
  return keys.map(k => ({ key: k, items: sortItems(map.get(k), "color") }));
}
// → [{key, items}] grouped by formality levels (only non-empty). Items with multi-level sets
// appear in the group for their minimum (most casual) level.
function groupByFormality(list) {
  const buckets = OCCASION_LADDER.map(lbl => ({ key: lbl, items: [] }));
  for (const i of list) { const lv = Math.max(1, Math.min(8, itemFormality(i))); buckets[lv - 1].items.push(i); }
  return buckets.filter(b => b.items.length)
    .map(b => ({ key: b.key, items: sortItems(b.items, "color") }));
}

const isTrip = (c) => c && c.kind !== "capsule";
const capModeLabel = (c) => isTrip(c) ? "Trip" : "Capsule";

function capValue(cid) {
  return capsuleItems(cid).reduce((s, i) => s + (Number(i.price) || 0), 0);
}
function fmtDate(d) {
  if (!d) return "";
  const dt = new Date(d + "T00:00:00");
  return dt.toLocaleDateString(undefined, { month: "short", day: "numeric" });
}
function capDateLabel(c) {
  if (!c.start_date && !c.end_date) return "";
  if (c.start_date && c.end_date) return `${fmtDate(c.start_date)} – ${fmtDate(c.end_date)}`;
  return fmtDate(c.start_date || c.end_date);
}

// small 2×2 collage thumbnail for a capsule card
function capCollageHtml(cid) {
  const paths = capsuleItems(cid).filter(i => i.image_path).slice(0, 4).map(i => i.image_path);
  if (!paths.length) return `<div class="cap-collage empty"><svg viewBox="0 0 24 24"><rect x="3" y="8" width="18" height="12" rx="2"/><path d="M9 8V5h6v3"/></svg></div>`;
  const cls = paths.length === 1 ? "cap-collage solo" : "cap-collage";
  return `<div class="${cls}">${paths.map(p => `<div class="cc-cell" data-photo="${esc(p)}"></div>`).join("")}</div>`;
}

function renderCapsules() {
  const body = $("#capsulesBody");
  clearInterval(_wxAutoTimer); _wxAutoTimer = null;  // any prior trip-detail auto-refresh
  if (capsuleView === "form")      body.innerHTML = renderCapsuleForm();
  else if (capsuleView === "pick") body.innerHTML = renderCapsulePicker();
  else if (capsuleView === "plan" && capsuleById.get(capsuleId)) body.innerHTML = renderCapsulePlan();
  else if (capsuleView === "detail" && capsuleById.get(capsuleId)) body.innerHTML = renderCapsuleDetail();
  else { capsuleView = "list"; body.innerHTML = renderCapsuleList(); }
  hydratePhotos(body);
  wireCapsules();
  if (capsuleView === "plan") {
    const c = capsuleById.get(capsuleId);
    if (c && (c.locations || []).length && _planWxLoadedFor !== c.id) loadPlanWeather(c);
  }
  if (capsuleView === "detail") {
    const c = capsuleById.get(capsuleId);
    if (c && isTrip(c) && c.start_date && c.end_date && (c.locations || []).length) {
      loadTripWeather(c);
      // Auto-refresh the live strip while this trip detail stays open (cleared on any re-render / tab switch)
      _wxAutoTimer = setInterval(() => {
        delete _wxCache[c.id];
        loadTripWeather(c);
      }, WX_TTL);
    }
  }
}

async function saveNewCapsule() {
  syncCapForm();
  const f = _capForm;
  if (!f.name.trim()) { toast("Give it a name"); return; }
  const payload = { name: f.name.trim(), kind: f.kind, notes: f.notes || null };
  if (isTripKind(f.kind)) { payload.start_date = f.start_date || null; payload.end_date = f.end_date || null; }
  try {
    const rows = await rest("/capsules?select=*", {
      method: "POST", headers: { "Content-Type": "application/json", Prefer: "return=representation" }, body: JSON.stringify(payload),
    });
    const c = rows[0];
    capsules.unshift(c);
    buildCapsuleIndexes();
    // fold in any items queued from a closet bulk "add to capsule"
    if (_pendingAddIds && _pendingAddIds.length) {
      await addItemsToCapsule(c.id, _pendingAddIds);
      _pendingAddIds = null;
    }
    _capForm = null;
    capsuleId = c.id;
    capsuleView = "detail";
    renderCapsules();
    toast("Capsule created");
  } catch (e) { toast(e.message); }
}
const isTripKind = (k) => k !== "capsule";

  if (!_capForm) return;

  const trip = isTrip(c);

  const sub = [capModeLabel(c)];

  const covered = new Set();
  for (const i of list) { for (const l of (itemFormalitySet(i) || [])) covered.add(l); }

    `<span class="cap-cov-chip${covered.has(idx + 1) ? " on" : ""}" title="${esc(OCCASION_HINTS[idx])}">${idx + 1}. ${esc(lbl)}</span>`).join("");

  return capToolbar(c.name, true) + `
    <div class="cap-hdr">

      <div class="ch-sub">${esc(sub.join(" · "))}</div>
    </div>
    <div class="cap-insight">
      <div class="kpi-row">

      </div>

/* ===================================================================
   TRIP PER-DAY PLANNER
   capsules.plan = { "<date>": ["<outfitId>", ...] }. Plans are intentions kept
   separate from wears (past-only). "Wore it" converts a planned day to a real
   wear. Needs migration/capsule_plan.sql.
   =================================================================== */
let _planWx = {};  // date → {maxT,minT,code,hist,locName} for the open trip
let _planWxLoadedFor = null;  // capsuleId whose weather is already in _planWx (avoids reload loop)

function tripPlan(c) { return (c && c.plan && typeof c.plan === "object") ? c.plan : {}; }
// Reserved plan key: the trip/capsule "outfit bucket" — planned looks not tied
// to a day yet. Rides the same plan JSONB + add/remove pipeline as real dates.
const PLAN_BUCKET = "bucket";
function planLooksForDate(c, date) {
  const v = tripPlan(c)[date];
  return Array.isArray(v) ? v : (v ? [v] : []);
}
// Same, but drops deleted/archived looks (archived lives only in Archive + calendar).
function planActiveLooks(c, date) {
  return planLooksForDate(c, date).filter(oid => {
    const o = outfitById.get(oid);
    return o && !effectiveArchived(o);
  });
}
// Season/weather anchor for a plan context — the bucket has no date of its own,
// so fall back to the trip start (or today for undated capsules).
function planCtxSeasonDate(planCtx) {
  if (planCtx.date !== PLAN_BUCKET) return planCtx.date;
  const c = capsuleById.get(planCtx.capsuleId);
  return (c && c.start_date) || todayStr();
}
function tripDates(c) {
  const out = [];
  if (!c.start_date || !c.end_date) return out;
  let d = new Date(c.start_date + "T00:00:00"), e = new Date(c.end_date + "T00:00:00");
  while (d <= e) { out.push(localISO(d)); d.setDate(d.getDate() + 1); }
  return out;
}
function planDayLabel(date) {
  if (date === PLAN_BUCKET) return "Outfit bucket";
  const o = new Date(date + "T00:00:00");
  return o.toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" });
}
// A wear already logged for this look on this date → the day was actually worn.
function planWorn(date, outfitId) {
  return wears.some(w => w.worn_on === date && w.outfit_id === outfitId);
}

async function setCapsulePlan(c, plan) {
  c.plan = plan;  // optimistic
  try {
    await rest(`/capsules?id=eq.${c.id}`, {
      method: "PATCH", headers: { "Content-Type": "application/json", Prefer: "return=minimal" },
      body: JSON.stringify({ plan }),
    });
  } catch (e) { toast(e.message); }
}
async function addPlanLook(cid, date, outfitId) {
  const c = capsuleById.get(cid); if (!c) return;
  const plan = JSON.parse(JSON.stringify(tripPlan(c)));
  const arr = Array.isArray(plan[date]) ? plan[date] : (plan[date] ? [plan[date]] : []);
  if (!arr.includes(outfitId)) arr.push(outfitId);
  plan[date] = arr;
  await setCapsulePlan(c, plan);
  if (capsuleView === "plan") renderCapsules();
}
async function removePlanLook(cid, date, outfitId) {
  const c = capsuleById.get(cid); if (!c) return;
  const plan = JSON.parse(JSON.stringify(tripPlan(c)));
  let arr = Array.isArray(plan[date]) ? plan[date] : (plan[date] ? [plan[date]] : []);
  arr = arr.filter(x => x !== outfitId);
  if (arr.length) plan[date] = arr; else delete plan[date];
  await setCapsulePlan(c, plan);
  if (capsuleView === "plan") renderCapsules();
}

// Record that a planned look was actually worn that day → a real wear row.
async function planWoreIt(date, outfitId) {
  const o = outfitById.get(outfitId);
  if (!o) return;
  const its = outfitItems(o);
  if (!its.length) { toast("This look has no pieces"); return; }
  try {
    const fml = deriveWearFormality(its.map(it => it.id));
    const payload = its.map(it => ({ item_id: it.id, worn_on: date, outfit_id: outfitId, formality_for: fml }));
    const rows = await rest("/wears", {
      method: "POST", headers: { "Content-Type": "application/json", Prefer: "return=representation" },
      body: JSON.stringify(payload),
    });
    if (Array.isArray(rows)) wears.push(...rows); else payload.forEach(p => wears.push(p));
    buildOutfitWearMap();
    toast("Logged as worn");
    if (capsuleView === "plan") renderCapsules();
  } catch (e) { toast(e.message); }
}

async function loadPlanWeather(c) {
  const cached = _wxCache[c.id];
  let days;
  if (cached && Date.now() - cached.ts < WX_TTL) days = cached.days;
  else { try { days = await buildTripWeather(c); _wxCache[c.id] = { days, ts: Date.now() }; } catch (e) { days = []; } }
  _planWx = {};
  (days || []).forEach(d => { _planWx[d.date] = d; });
  _planWxLoadedFor = c.id;
  if (capsuleView === "plan") renderCapsules();
}

function openTripPlan(id) {
  capsuleId = id;
  capsuleView = "plan";
  _planWx = {};
  _planWxLoadedFor = null;
  renderCapsules();
}

function planDayWxHtml(date) {
  const w = _planWx[date];
  if (!w || w.maxT == null) return "";
  return `<span class="plan-wx"><span class="e">${wmoEmoji(w.code)}</span>${w.maxT}° / ${w.minT}°${w.hist ? " <span style='opacity:.7'>avg</span>" : ""}</span>`;
}

  const c = capsuleById.get(capsuleId);
  const dates = tripDates(c);
  const memberCount = capsuleItems(capsuleId).length;
  const bucketIds = planActiveLooks(c, PLAN_BUCKET);

  // Bucket looks already assigned to some day get a "✓ planned" mark (they stay
  // in the bucket — one outfit can cover several days).
  const plannedSomewhere = new Set(dates.flatMap(d => planLooksForDate(c, d)));
  const bucketTiles = bucketIds.map(oid => {
    const o = outfitById.get(oid);
    return `<div class="plan-look">
      <div data-plan-open="${esc(oid)}">${outfitCollageHtml(o, 4)}</div>

  const bucketCard = `<div class="plan-day">
    <div class="plan-day-hd">
      <div class="plan-day-date">Outfit bucket<small>${bucketIds.length ? `${bucketIds.length} outfit${bucketIds.length === 1 ? "" : "s"} ready to assign` : "plan outfits here, then pull them onto days"}</small></div>
    </div>

    </div>
  </div>`;

  const dayCards = dates.map(date => {

    const looksHtml = looks.map(oid => {
      const o = outfitById.get(oid);
      const worn = planWorn(date, oid);
      return `<div class="plan-look">
        <div data-plan-open="${esc(oid)}">${outfitCollageHtml(o, 4)}</div>
        <button class="plan-look-x" data-plan-remove="${esc(oid)}" data-plan-date="${esc(date)}" aria-label="Remove">×</button>
        <div class="plan-look-name">${worn ? `<span class="plan-worn">✓ worn</span>` : esc(outfitName(o))}</div>
        ${worn ? "" : `<button class="plan-act" style="margin-top:4px;padding:5px 9px;font-size:11px" data-plan-wore="${esc(oid)}" data-plan-date="${esc(date)}">Wore it</button>`}
      </div>`;
    }).join("");
    return `<div class="plan-day">
      <div class="plan-day-hd">
        <div class="plan-day-date">${esc(planDayLabel(date))}<small>${esc(date)}</small></div>
        ${planDayWxHtml(date)}
      </div>
      ${looks.length ? `<div class="plan-looks">${looksHtml}</div>` : ""}
      <div class="plan-add-row">
        ${bucketIds.length ? `<button class="plan-act" data-plan-frombucket="${esc(date)}">🧺 From bucket</button>` : ""}

        <button class="plan-act" data-plan-build="${esc(date)}">✎ Build</button>
      </div>
    </div>`;
  }).join("");

  const kind = capModeLabel(c).toLowerCase();
  return capToolbar(c.name + (dates.length ? " · By day" : " · Planned outfits"), true) + `
    <div class="cap-hdr">
      <div class="ch-name">${dates.length ? "Plan by day" : "Planned outfits"}</div>
      <div class="ch-sub">${dates.length ? `${dates.length} day${dates.length === 1 ? "" : "s"} · ` : ""}${memberCount} piece${memberCount === 1 ? "" : "s"} in this ${esc(kind)}</div>
    </div>
    ${memberCount ? "" : `<div class="placeholder" style="padding:24px 32px"><b>No pieces yet</b><div>Add items to the ${esc(kind)} first — planning is scoped to its pieces.</div></div>`}
    ${bucketCard}
    ${dayCards}
    <div style="height:30px"></div>`;
}

// Persist a suggester/builder combo as a real look so it can be referenced by a plan.
async function saveComboAsOutfit(pieces) {
  const itemIds = pieces.map(p => p.id);
  const dup = findDuplicateOutfit(itemIds, null);
  if (dup) return dup.id;
  const layout = suggestionLayout(pieces);
  const rows = await rest("/outfits?select=*", {
    method: "POST", headers: { "Content-Type": "application/json", Prefer: "return=representation" },
    body: JSON.stringify({ name: null, layout }),
  });
  const o = Array.isArray(rows) ? rows[0] : rows;
  if (!o || !o.id) throw new Error("Could not save look");
  o.layout = layout; outfits.push(o);
  const links = itemIds.map(item_id => ({ outfit_id: o.id, item_id }));
  await rest("/outfit_items", {
    method: "POST", headers: { "Content-Type": "application/json", Prefer: "return=minimal" },
    body: JSON.stringify(links),
  });
  outfitLinks = outfitLinks.concat(links);
  buildOutfitIndexes();
  return o.id;
}

// ---- build a plain-text checklist of a capsule (grouped by category) ----
function capsuleListText(id) {
  const c = capsuleById.get(id);
  if (!c) return "";
  const trip = isTrip(c);
  const packedSet = new Set((capsuleLinkMap.get(id) || []).filter(l => l.packed).map(l => l.item_id));
  const lines = [c.name];
  const dates = capDateLabel(c);
  if (dates) lines.push(dates);
  lines.push("");
  const groups = groupByCategory(capsuleItems(id));
  if (!groups.length) lines.push("(no items yet)");
  for (const g of groups) {
    lines.push(`${g.key.toUpperCase()} (${g.items.length})`);
    for (const i of g.items) {
      const box = trip ? (packedSet.has(i.id) ? "[x] " : "[ ] ") : "• ";
      lines.push(`${box}${i.name || "Untitled"}`);
    }
    lines.push("");
  }
  return lines.join("\n").trim();
}

async function shareCapsuleList(id) {
  const c = capsuleById.get(id);
  if (!c) return;
  const text = capsuleListText(id);
  try {
    if (navigator.share) { await navigator.share({ title: c.name, text }); return; }
  } catch (e) { if (e && e.name === "AbortError") return; }  // user dismissed the share sheet
  try {
    await navigator.clipboard.writeText(text);
    toast("List copied to clipboard");
  } catch (_) {
    // last-resort fallback for browsers without the async clipboard API
    const ta = document.createElement("textarea");
    ta.value = text; document.body.appendChild(ta); ta.select();
    try { document.execCommand("copy"); toast("List copied to clipboard"); }
    catch { toast("Couldn't copy the list"); }
    ta.remove();
  }
}

// ---- duplicate a capsule (shell + its items; packing resets) ----
async function duplicateCapsule(id) {
  const c = capsuleById.get(id);
  if (!c) return;
  const itemIds = (capsuleLinkMap.get(id) || []).map(l => l.item_id);
  try {
    const payload = { name: `${c.name} (copy)`, kind: c.kind, notes: c.notes || null };
    if (c.start_date) payload.start_date = c.start_date;
    if (c.end_date)   payload.end_date   = c.end_date;
    if (c.locations)  payload.locations  = c.locations;  // column exists since r9
    const rows = await rest("/capsules?select=*", {
      method: "POST", headers: { "Content-Type": "application/json", Prefer: "return=representation" },
      body: JSON.stringify(payload),
    });
    const nc = Array.isArray(rows) ? rows[0] : rows;
    if (!nc || !nc.id) throw new Error("Could not duplicate");
    capsules.unshift(nc);
    buildCapsuleIndexes();
    if (itemIds.length) await addItemsToCapsule(nc.id, itemIds);
    capsuleId = nc.id;
    capsuleView = "detail";
    renderCapsules();
    toast("Capsule duplicated");
  } catch (e) { toast(e.message); }
}

async function deleteCapsule(id) {
  const c = capsuleById.get(id);
  if (!confirm(`Delete "${c ? c.name : "this capsule"}"? Your items are not affected.`)) return;
  try {
    await rest(`/capsules?id=eq.${id}`, { method: "DELETE" });
    capsules = capsules.filter(x => x.id !== id);
    capsuleLinks = capsuleLinks.filter(l => l.capsule_id !== id);
    if (activeCapsuleId === id) activeCapsuleId = null;
    buildCapsuleIndexes();
    capsuleView = "list"; capsuleId = null;
    renderCapsules();
    toast("Capsule deleted");
  } catch (e) { toast(e.message); }
}

// ---- packing tick ----
async function togglePack(itemId) {
  const links = capsuleLinkMap.get(capsuleId) || [];
  const link = links.find(l => l.item_id === itemId);
  if (!link) return;
  const next = !link.packed;
  link.packed = next; // optimistic
  // surgical tile update + progress refresh
  const tile = $(`[data-cap-item="${itemId}"]`);
  if (tile) tile.classList.toggle("packed", next);
  refreshPackProgress();
  if (_capUnpackedOnly && next && tile) {
    tile.remove();
    $$(".cap-grp").forEach(g => { if (!g.querySelector(".gtile")) g.remove(); });
    if (!$(".cap-grp")) renderCapsules();
  }
  refreshPackGroupCounts();
  try {
    await rest(`/capsule_items?capsule_id=eq.${capsuleId}&item_id=eq.${itemId}`,
      { method: "PATCH", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ packed: next }) });
  } catch (e) { link.packed = !next; toast(e.message); renderCapsules(); }
}
function refreshPackProgress() {
  const fill = $(".cap-pack-fill"), lbl = $(".cap-pack-lbl");
  if (!fill) return;
  const links = capsuleLinkMap.get(capsuleId) || [];
  const total = capsuleItems(capsuleId).length;
  const packed = links.filter(l => l.packed && itemById.has(l.item_id)).length;
  fill.style.width = (total ? Math.round((packed / total) * 100) : 0) + "%";
  if (lbl) lbl.textContent = `${packed} of ${total} packed · tap the circle on a piece to check it off`;
}
// recompute each category/formality group's "N/M packed" header from the DOM tiles
function refreshPackGroupCounts() {
  $$(".cap-grp").forEach(grp => {
    const cnt = grp.querySelector("[data-grp-cnt]");
    if (!cnt) return;
    const total = grp.querySelectorAll(".gtile").length;
    const packed = grp.querySelectorAll(".gtile.packed").length;
    cnt.textContent = `${packed}/${total} packed`;
    cnt.classList.toggle("done", packed === total);
  });
}

// status + keyword filtered (before category chip filter)
function pickerPoolBase() {
  let pool = _capPickStatus === "All"
    ? items.filter(i => itemStatus(i) !== "Archive")
    : items.filter(i => itemStatus(i) === _capPickStatus);
  const q = _capPickFilter.trim().toLowerCase();

    (i.name || "").toLowerCase().includes(q) ||
    (i.brand || "").toLowerCase().includes(q) ||
    (i.category || "").toLowerCase().includes(q) ||
    (i.subcategory || "").toLowerCase().includes(q));
  if (hasActiveFilter(pickerFilter)) pool = pool.filter(i => itemMatchesFilter(i, pickerFilter, { noStatusDefault: true }));
  return pool;
}
function pickerPool() {
  let pool = pickerPoolBase();
  if (_capPickCat) pool = pool.filter(i => (i.category || "Other") === _capPickCat);
  if (_capPickSub) pool = pool.filter(i => (i.subcategory || "") === _capPickSub);

}

// subcategory chips (shown when a category is selected)
function pickerSubBar() {
  if (!_capPickCat) return "";
  const subs = TAXONOMY[_capPickCat] || [];
  if (!subs.length) return "";
  const catPool = pickerPoolBase().filter(i => (i.category || "Other") === _capPickCat);
  const counts = new Map();
  for (const i of catPool) { const s = i.subcategory || ""; if (s) counts.set(s, (counts.get(s) || 0) + 1); }
  const chip = (key, lbl, on) => `<button class="cap-chip${on ? " on" : ""}" data-picksub="${esc(key)}">${esc(lbl)}${counts.has(key) ? " " + counts.get(key) : ""}</button>`;
  const visibleSubs = subs.filter(s => counts.has(s));
  if (!visibleSubs.length) return "";
  return `<div class="cap-catbar" style="padding-top:0">${chip("", "All", !_capPickSub)}${visibleSubs.map(s => chip(s, s, _capPickSub === s)).join("")}</div>`;
}

// horizontal category jump-chips with counts (built from the keyword-filtered pool)
function pickerCatBar() {
  const base = pickerPoolBase();
  const counts = new Map();
  for (const i of base) { const c = i.category || "Other"; counts.set(c, (counts.get(c) || 0) + 1); }
  const cats = [...counts.keys()].sort((a, b) => { const r = catRank(a) - catRank(b); return r !== 0 ? r : a.localeCompare(b); });
  const chip = (key, lbl, n, on) => `<button class="cap-chip${on ? " on" : ""}" data-pickcat="${esc(key)}">${esc(lbl)} ${n}</button>`;
  return `<div class="cap-catbar">${chip("__all__", "All", base.length, !_capPickCat)}${cats.map(c => chip(c, c, counts.get(c), _capPickCat === c)).join("")}</div>`;
}

async function saveCapsulePicker() {

    if (toRemove.length) {
      const inList = `(${toRemove.map(id => `"${id}"`).join(",")})`;

    renderCapsules();

// Insert membership rows; `skipBuild` avoids a double rebuild when caller rebuilds.
async function addItemsToCapsule(cid, itemIds, alreadyHandledRebuild) {
  const fresh = itemIds.filter(id => !(capsuleLinkMap.get(cid) || []).some(l => l.item_id === id));
  if (!fresh.length) return;
  // `packed` is omitted so this works before the column migration; DB default fills it after.
  const payload = fresh.map(id => ({ capsule_id: cid, item_id: id }));
  const rows = await rest("/capsule_items?select=*", {
    method: "POST", headers: { "Content-Type": "application/json", Prefer: "return=representation" }, body: JSON.stringify(payload),
  });
  capsuleLinks = capsuleLinks.concat(rows && rows.length ? rows : payload);
  buildCapsuleIndexes();
}

// Diff an item's capsule membership against a chosen set, writing capsule_items rows.
async function saveItemCapsules(itemId, newIds) {
  const current = new Set(capsulesForItem(itemId));

  const toAdd = [...next].filter(id => !current.has(id));
  const toRemove = [...current].filter(id => !next.has(id));
  try {
    for (const cid of toAdd) await addItemsToCapsule(cid, [itemId]);

      await rest(`/capsule_items?capsule_id=eq.${cid}&item_id=eq.${itemId}`, { method: "DELETE" });
      capsuleLinks = capsuleLinks.filter(l => !(l.capsule_id === cid && l.item_id === itemId));
    }
    if (toRemove.length) buildCapsuleIndexes();
    if (toAdd.length || toRemove.length) toast("Capsules updated");
  } catch (e) { toast(e.message); }
}

/* ===================================================================
   BUILD A LOOK — free-form canvas (Stylebook-style)
   builder = { outfitId, name, pieces:[{item_id,x,y,s}], selIdx,
               picking, pickCat, pickQ }.  x/y = piece CENTER as a fraction
   (0..1) of the canvas; s = piece width as a fraction of canvas width;
   array order = z-order (later = on top).
   =================================================================== */
let builder = null;
const clamp01 = (v) => Math.max(0, Math.min(1, v));

// staggered default spot for the k-th piece dropped on the canvas
function defaultPlacement(k) {
  const cols = [0.34, 0.5, 0.66];
  return { x: cols[k % 3], y: clamp01(0.3 + Math.floor(k / 3) * 0.2 + (k % 3) * 0.05), s: 0.4 };
}

function openBuilder(outfitId = null, seedItemId = null, planCtx = null) {
  let pieces = [], name = "";
  if (outfitId) {
    const o = outfitById.get(outfitId);
    if (o) {
      name = o.name || "";
      const lay = Array.isArray(o.layout) ? o.layout : [];
      const ids = (outfitItemMap.get(outfitId) || []).filter(id => itemById.has(id));
      if (lay.length) {
        pieces = lay.filter(p => itemById.has(p.item_id)).map(p => ({
          item_id: p.item_id, x: clamp01(p.x), y: clamp01(p.y),
          s: Math.max(0.12, Math.min(0.92, p.s || 0.4)),
        }));
        const have = new Set(pieces.map(p => p.item_id));
        ids.filter(id => !have.has(id)).forEach(id => pieces.push({ item_id: id, ...defaultPlacement(pieces.length) }));
      } else {
        pieces = ids.map((id, k) => ({ item_id: id, ...defaultPlacement(k) }));
      }
    }
  } else if (seedItemId && itemById.has(seedItemId)) {
    pieces = [{ item_id: seedItemId, ...defaultPlacement(0) }];
  }
  builder = { outfitId, name, pieces, selIdx: pieces.length ? pieces.length - 1 : -1, picking: false, pickCat: null, pickSub: null, pickQ: "",
              planCtx: planCtx || null, scopeCapsuleId: planCtx ? planCtx.capsuleId : null };
  $("#app").classList.add("builder-mode");
  switchTab("builder");
}

function renderBuilder() {
  if (!builder) return;
  if (builder.picking && builderInItemMode()) {
    renderBuilderCanvas();    // canvas stays visible behind the rail
    renderBuilderRail();
  } else if (builder.picking) {
    renderBuilderPicker();    // full-screen category / subfolder list
  } else {
    renderBuilderCanvas();
  }
}

// True once we're down to an item list (a subfolder, or a flat category with no
// subcategories) — that's when we show the bottom rail over the canvas.
function builderInItemMode() {
  if (!builder.pickCat || builder.pickQ.trim()) return false;  // category list / search stay full-screen
  if (builder.pickSub) return true;
  const catPool = builderPool().filter(i => (i.category || "Other") === builder.pickCat);
  return ![...new Set(catPool.map(i => i.subcategory).filter(Boolean))].length;  // flat category
}

function builderRailPool() {
  // builderPool() honors builder.scopeCapsuleId (trip-day planning), so the rail
  // stays scoped to the trip's pieces — same as the folder/subfolder lists.
  const pool = builderPool().filter(i => (i.category || "Other") === builder.pickCat);
  const list = builder.pickSub ? pool.filter(i => (i.subcategory || "") === builder.pickSub) : pool;
  return sortItems(list, "color");  // rail always browses by color, every section
}

// Bottom item slider over the visible canvas; tap an item to drop it in (rail stays open).
function renderBuilderRail() {
  const body = $("#builderBody");
  const list = builderRailPool();
  const have = new Set(builder.pieces.map(p => p.item_id));
  const cells = list.length
    ? list.map(i => `<div class="bld-rail-item${have.has(i.id) ? " in" : ""}" data-railadd="${esc(i.id)}" data-photo="${esc(i.image_path || "")}"></div>`).join("")
    : `<div class="muted" style="padding:20px 12px;font-size:13px">No items</div>`;
  const ov = document.createElement("div");
  ov.className = "bld-pick-overlay";
  ov.innerHTML = `
    <div class="bld-rail">
      <div class="bld-rail-hdr">
        <button class="lnk" data-railback>‹ ${esc(builder.pickCat || "Folders")}</button>
        <div class="bld-rail-title">${esc(builder.pickSub || builder.pickCat || "Items")} · ${list.length}</div>
        <button class="lnk" data-railclose style="font-weight:700">Done</button>
      </div>
      <div class="bld-rail-scroll">${cells}</div>
    </div>`;
  body.appendChild(ov);
  hydratePhotos(ov);
}

function renderBuilderCanvas() {
  const body = $("#builderBody");
  const p = builder.pieces, sel = builder.selIdx;
  const pieceEls = p.map((pc, i) => {
    const it = itemById.get(pc.item_id);
    if (!it) return "";
    return `<div class="bpiece${i === sel ? " sel" : ""}" data-bidx="${i}" data-photo="${esc(it.image_path || "")}"
      style="left:${pc.x * 100}%;top:${pc.y * 100}%;width:${pc.s * 100}%;z-index:${i + 1}">
      <div class="bp-handle" data-bresize="1"><svg viewBox="0 0 24 24"><path d="M8 3H3v5M16 21h5v-5M21 3l-7 7M3 21l7-7"/></svg></div>

  }).join("");
  const empty = p.length ? "" : `<div class="bld-empty">
    <svg viewBox="0 0 24 24"><path d="M5 9l7-5 7 5"/><path d="M5 9v9a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V9"/></svg>
