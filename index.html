// ---- add a formality level to a look's pieces (manual; opened from look detail) ----
function showNudgePiecesSheet(outfitId, bucketKey) {
  const o = outfitById.get(outfitId);
  if (!o) { $("#logSheet").hidden = true; return; }
  const its = outfitItems(o);
  const targetDefault = BUCKET_RANGES[bucketKey];
  if (!targetDefault || !its.length) { toast("Formality saved"); $("#logSheet").hidden = true; openLook(outfitId); return; }

  let target = targetDefault; // single level 1-8 to ADD to each piece's set

  const renderSheet = () => {
    const chips = OCCASION_LADDER.map((lbl, idx) => {
      const lvl = idx + 1, on = lvl === target;
      return `<button class="sheet-chip${on ? " on" : ""}" data-nudgelvl="${lvl}" style="text-align:left">${lvl}. ${esc(lbl)}</button>`;
    }).join("");

    const pieceRows = its.map(it => {
      const s = itemFormalitySet(it) || [];
      const alreadyHas = s.includes(target);
      return `<label style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)">
        <input type="checkbox" data-nudge="${esc(it.id)}" ${!alreadyHas ? "checked" : ""} style="width:18px;height:18px;flex-shrink:0;accent-color:var(--accent)">
        <span style="flex:1;min-width:0">
          <span style="display:block;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(it.name || "Untitled")}</span>
          <span style="display:block;font-size:12px;color:var(--muted)">${esc(pieceFormalityLabel(it))}</span>
        </span>
      </label>`;
    }).join("");

    $("#logInner").innerHTML = `
      <div class="sheet-hdr">
        <button class="lnk" id="nudgeSkip">Cancel</button>
        <h2>Add formality</h2>
        <button class="lnk" id="nudgeApply" style="font-weight:700">Add</button>
      </div>
      <div style="padding:14px 18px 30px">
        <div class="muted" style="font-size:13px;margin-bottom:10px">Adds the chosen level to each checked piece's formality set (it won't remove any levels they already have).</div>
        <div class="sheet-chips" style="flex-direction:column;align-items:stretch;gap:6px;margin-bottom:14px">${chips}</div>
        <div style="font-size:13px;margin-bottom:12px">Adding: <b>${esc(occLabel(target))}</b></div>
        <div>${pieceRows}</div>
      </div>`;

    $("#nudgeSkip").onclick = () => { $("#logSheet").hidden = true; openLook(outfitId); };

    $("#logInner").querySelectorAll("[data-nudgelvl]").forEach(btn => {
      btn.addEventListener("click", () => { target = +btn.dataset.nudgelvl; renderSheet(); });
    });

    $("#nudgeApply").onclick = async () => {
      const toNudge = [...$("#logInner").querySelectorAll("[data-nudge]:checked")].map(x => x.dataset.nudge);
      if (!toNudge.length) { toast("Formality saved"); $("#logSheet").hidden = true; openLook(outfitId); return; }
      try {
        // patch each item individually — each has a different existing set
        await Promise.all(toNudge.map(async iid => {
          const it = itemById.get(iid) || items.find(x => x.id === iid);
          if (!it) return;
          const cur = it.formality ? (Array.isArray(it.formality) ? it.formality : [+it.formality]) : [];
          const newSet = [...new Set([...cur, target])].sort((a, b) => a - b);
          await rest(`/items?id=eq.${iid}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json", Prefer: "return=minimal" },
            body: JSON.stringify({ formality: newSet }),
          });
          it.formality = newSet;
        }));
        outfits.forEach(o => { o._bucket = null; });
        toast(`Formality saved · ${toNudge.length} piece${toNudge.length === 1 ? "" : "s"} updated`);
      } catch (e) { toast(e.message); }
      $("#logSheet").hidden = true;
      openLook(outfitId);
    };
  };

  $("#logSheet").hidden = false;
  renderSheet();
}

// ---- correct a piece's formality (edits items.formality — now a set/array) ----
function openOccasionEdit(itemId, onSaved) {
  const it = itemById.get(itemId) || items.find(x => x.id === itemId);
  if (!it) return;
  let sel = it.formality ? (Array.isArray(it.formality) ? [...it.formality] : [+it.formality]) : [];

  const render = () => {
    const chips = OCCASION_LADDER.map((lbl, idx) => {
      const n = idx + 1, on = sel.includes(n);
      return `<button class="sheet-chip${on ? " on" : ""}" data-occ="${n}" style="text-align:left">
        <span style="font-weight:500">${n}. ${esc(lbl)}</span>
        <span style="font-size:11px;color:var(--muted);display:block;margin-top:1px">${esc(OCCASION_HINTS[idx])}</span>
      </button>`;
    }).join("");
    const selLabel = sel.length ? sel.map(n => `${n}. ${occLabel(n)}`).join(", ") : "Not set";
    $("#logInner").innerHTML = `
      <div class="sheet-hdr">
        <button class="lnk" id="occCancel">Cancel</button>
        <h2>When can you wear this?</h2>
        <button class="lnk" id="occSave" style="font-weight:700">Save</button>
      </div>
      <div style="padding:14px 18px 24px">
        <div class="muted" style="font-size:13px;margin-bottom:12px">${esc(it.name || "Item")} — tap all contexts that apply.</div>
        <div class="sheet-chips" style="flex-direction:column;align-items:stretch;gap:6px">${chips}</div>
        <div style="margin-top:14px;font-size:13px;color:var(--muted)">Selected: <b style="color:var(--text)">${esc(selLabel)}</b></div>
        ${sel.length ? `<button class="lnk" id="occClear" style="color:var(--danger);font-size:14px;margin-top:10px">Clear</button>` : ""}
      </div>`;
    $("#occCancel").onclick = () => { $("#logSheet").hidden = true; };
    $("#occSave").onclick = async () => {
      const prev = it.formality;
      const val = sel.length ? sel : null;
      it.formality = val;
      outfits.forEach(o => { o._bucket = null; });
      $("#logSheet").hidden = true;
      try {
        await rest(`/items?id=eq.${it.id}`, {
          method: "PATCH",
          headers: { "Content-Type": "application/json", Prefer: "return=minimal" },
          body: JSON.stringify({ formality: val }),
        });
        toast("Formality updated");
        if (onSaved) onSaved();
      } catch (e) {
        it.formality = prev;
        outfits.forEach(o => { o._bucket = null; });
        toast(e.message);
      }
    };
    const oc = $("#occClear");
    if (oc) oc.onclick = () => { sel = []; render(); };
    $("#logInner").querySelectorAll("[data-occ]").forEach(b => {
      b.onclick = () => {
        const n = +b.dataset.occ;
        sel = sel.includes(n) ? sel.filter(x => x !== n) : [...sel, n].sort((a, b) => a - b);
        render();
      };
    });
  };
  render();
  $("#logSheet").hidden = false;
}

function updateGridBar() {

  $("#gridBar").classList.toggle("selecting", selectMode);
  ["#gbMove", "#gbEdit", "#gbDelete", "#gbCapsule"].forEach(id => $(id).classList.toggle("active", has));
  $("#gbCount").textContent = n ? `${n} selected` : "";

}

function toggleSelectMode() {
  selectMode = !selectMode;
  if (!selectMode) { selectedIds.clear(); }
  renderCloset();
}

function exitSelectMode() {
  if (!selectMode) return;
  selectMode = false;
  selectedIds.clear();
}

function toggleSelect(id) {
  if (selectedIds.has(id)) selectedIds.delete(id); else selectedIds.add(id);
  // update just the affected tile + bar without full re-render
  const tile = $(`[data-item="${id}"]`);
  if (tile) {
    const sel = selectedIds.has(id);
    tile.classList.toggle("selected", sel);
    const dot = tile.querySelector(".sel-dot");
    if (dot) dot.classList.toggle("on", sel);
  }
  updateGridBar();
}

// ---- delete selected ----
async function deleteSelected() {
  if (!selectedIds.size) return;
  const n = selectedIds.size;
  if (!confirm(`Delete ${n} item${n === 1 ? "" : "s"}? This cannot be undone.`)) return;
  const ids = [...selectedIds];

// ---- bulk edit sheet ----
const BULK_FIELDS = [
  { key: "color_family", label: "Color",     type: "single",    opts: COLOR_FAMILIES.map(c => c[0]) },
  { key: "fabric",       label: "Fabric",    type: "multi",     opts: ["Cotton","Linen","Wool","Cashmere","Silk","Denim","Polyester","Spandex","Nylon","Fleece","Leather","Velvet"] },
  { key: "size",         label: "Size",      type: "single",    opts: ["XXS","XS","S","M","L","XL","XXL","0","2","4","6","8","10","12","14","One size"] },
  { key: "season",       label: "Season",    type: "multi",     opts: SEASONS },
  { key: "formality",    label: "Formality", type: "formality" },
  { key: "brand",        label: "Brand",     type: "text" },
  { key: "status",       label: "Status",    type: "single",    opts: ["Available","Storage","Archive"] },
];

function openBulkEdit() {
  if (!selectedIds.size) return;
  bulkPending = {};
  bulkOpenField = null;
  renderBulkSheet();
  $("#bulkSheet").hidden = false;
}

function closeBulkEdit() {
  $("#bulkSheet").hidden = true;
  bulkPending = {};
  bulkOpenField = null;
}

function renderBulkSheet() {
  const rows = BULK_FIELDS.map(f => {
    const isOpen = bulkOpenField === f.key;
    const val = bulkPending[f.key];
    const hasVal = val !== undefined && (Array.isArray(val) ? val.length > 0 : val !== "");
    const displayVal = f.type === "formality" && Array.isArray(val) && val.length
      ? val.map(v => `${v}. ${occLabel(v)}`).join(", ")
      : Array.isArray(val) ? val.join(", ") : val;
    const valHtml = hasVal
      ? `<span style="color:var(--accent);max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(displayVal)}</span>`
      : "";
    let expansion = "";
    if (isOpen) {
      if (f.type === "formality") {
        const sel = Array.isArray(val) ? val : (val ? [+val] : []);
        const chips = OCCASION_LADDER.map((lbl, idx) => {
          const lvl = idx + 1, on = sel.includes(lvl);
          return `<button class="sheet-chip${on ? " on" : ""}" data-bc-field="formality" data-bc-val="${lvl}" data-bc-fml="1" style="text-align:left">
            <span style="font-weight:500">${lvl}. ${esc(lbl)}</span>
            <span style="font-size:11px;color:var(--muted);display:block;margin-top:1px">${esc(OCCASION_HINTS[idx])}</span>
          </button>`;
        }).join("");
        expansion = `<div class="sheet-expand" style="border:none"><div class="sheet-chips" style="flex-direction:column;align-items:stretch;gap:6px">${chips}</div></div>`;
      } else if (f.type === "single" || f.type === "multi") {
        const chips = f.opts.map(o => {
          const on = Array.isArray(val) ? val.includes(o) : val === o;
          return `<button class="sheet-chip${on ? " on" : ""}" data-bc-field="${f.key}" data-bc-val="${esc(o)}" data-bc-multi="${f.type === "multi"}">${esc(o)}</button>`;
        }).join("");
        expansion = `<div class="sheet-expand"><div class="sheet-chips">${chips}</div></div>`;
      } else {
        expansion = `<div class="sheet-expand"><input class="inp" id="bulkTextInp" value="${esc(val || "")}" placeholder="${esc(f.label)}…" style="width:100%"></div>`;
      }
    }
    return `<button class="sheet-row" data-bf="${f.key}">
      <span>${esc(f.label)}</span>
      <span class="rt">${valHtml}<svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:currentColor;stroke-width:2;fill:none;flex-shrink:0"><path d="M${isOpen ? "6 15l6-6 6 6" : "6 9l6 6 6-6"}"/></svg></span>
    </button>${expansion}`;
  }).join("");
  const n = selectedIds.size;
  $("#bulkInner").innerHTML = `
    <div class="sheet-hdr">
      <button class="lnk" id="bulkCancel">Cancel</button>
      <h2>Bulk Edit</h2>
      <button class="lnk" id="bulkSave" style="font-weight:700">Save</button>
    </div>
    ${rows}
    <div class="sheet-note">Changes apply to ${n} selected item${n === 1 ? "" : "s"}.</div>`;
  $("#bulkCancel").onclick = closeBulkEdit;
  $("#bulkSave").onclick = saveBulkEdit;
  // field row toggle
  $("#bulkInner").querySelectorAll("[data-bf]").forEach(btn => {
    btn.onclick = () => {
      saveBulkTextField();
      bulkOpenField = bulkOpenField === btn.dataset.bf ? null : btn.dataset.bf;
      renderBulkSheet();
    };
  });
  // chip toggles
  $("#bulkInner").querySelectorAll("[data-bc-field]").forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      const field = btn.dataset.bcField, isMulti = btn.dataset.bcMulti === "true";
      const isFml = btn.dataset.bcFml === "1";
      const val = isFml ? +btn.dataset.bcVal : btn.dataset.bcVal;
      if (isFml) {
        // formality is a multi-toggle array
        const cur = Array.isArray(bulkPending[field]) ? bulkPending[field] : (bulkPending[field] ? [+bulkPending[field]] : []);
        const next = cur.includes(val) ? cur.filter(x => x !== val) : [...cur, val].sort((a, b) => a - b);
        bulkPending[field] = next.length ? next : undefined;
        if (!next.length) delete bulkPending[field];
      } else if (isMulti) {
        const cur = bulkPending[field] || [];
        bulkPending[field] = cur.includes(val) ? cur.filter(x => x !== val) : [...cur, val];
      } else {
        bulkPending[field] = bulkPending[field] === val ? undefined : val;
        if (bulkPending[field] === undefined) delete bulkPending[field];
      }
      renderBulkSheet();
    };
  });
  // text input live save
  const ti = $("#bulkTextInp");
  if (ti) { ti.oninput = () => { bulkPending[bulkOpenField] = ti.value; }; ti.focus(); }
}

function saveBulkTextField() {
  const ti = $("#bulkTextInp");
  if (ti && bulkOpenField) bulkPending[bulkOpenField] = ti.value;
}

async function saveBulkEdit() {
  saveBulkTextField();
  const patch = {};
  for (const [k, v] of Object.entries(bulkPending)) {
    if (v !== undefined && v !== "") patch[k] = v;
  }
  if (!Object.keys(patch).length) { closeBulkEdit(); return; }
  const ids = [...selectedIds];
  const inList = `(${ids.map(id => `"${id}"`).join(",")})`;
  try {
    await rest(`/items?id=in.${inList}`, { method: "PATCH", headers: { "Content-Type": "application/json" }, body: JSON.stringify(patch) });
    // update local state
    items.forEach(i => { if (ids.includes(i.id)) Object.assign(i, patch); });
    closeBulkEdit();
    exitSelectMode();
    renderCloset();
    toast(`Updated ${ids.length} item${ids.length === 1 ? "" : "s"}`);
  } catch (e) { toast(e.message); }
}

    b.onclick = () => { moveCatOpen = moveCatOpen === b.dataset.mvToggle ? null : b.dataset.mvToggle; renderMoveSheet(); };
  });
  $("#moveInner").querySelectorAll("[data-mv-cat]").forEach(b => {
    b.onclick = () => applyMove(b.dataset.mvCat, b.dataset.mvSub);
  });
}

async function applyMove(cat, sub) {
  const ids = [...selectedIds];
  const inList = `(${ids.map(id => `"${id}"`).join(",")})`;
  const patch = { category: cat, subcategory: sub };
  const isSingleItem = _moveItemId != null;
  try {
    await rest(`/items?id=in.${inList}`, { method: "PATCH", headers: { "Content-Type": "application/json" }, body: JSON.stringify(patch) });
    items.forEach(i => { if (ids.includes(i.id)) Object.assign(i, patch); });
    const reviewMode = _reviewMoveMode;
    closeMoveSheet();
    if (reviewMode) {
      exitSelectMode();
      reviewAfterEdit();
    } else if (isSingleItem) {
      const sid = _moveItemId;
      _moveItemId = null;
      exitSelectMode();
      openItem(sid);
    } else {
      exitSelectMode();
      renderCloset();
    }
    toast(`Moved ${ids.length} item${ids.length === 1 ? "" : "s"} to ${cat} › ${sub}`);
  } catch (e) { toast(e.message); }
}

/* ===================================================================
   CALENDAR
   =================================================================== */
let calendarYear  = new Date().getFullYear();
let calendarMonth = new Date().getMonth(); // 0-based
let calendarDay   = null; // null = month view | "YYYY-MM-DD" = day view

const CAL_MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const CAL_DOW    = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

// Build: date-string → [wear]
function wearDayMap() {
  const m = new Map();
  for (const w of wears) {
    if (!w.worn_on) continue;
    let a = m.get(w.worn_on); if (!a) { a = []; m.set(w.worn_on, a); }
    a.push(w);
  }
  return m;
}

// For one date: [{outfitId, itemIds, wearIds}] grouped by outfit_id (null = solo per item)
function dayGroups(dateStr) {
  const byKey = new Map();
  for (const w of wears) {
    if (w.worn_on !== dateStr) continue;
    const key = w.outfit_id || `__${w.item_id}`;
    if (!byKey.has(key)) byKey.set(key, { outfitId: w.outfit_id, itemIds: [], wearIds: [], context: [] });
    const g = byKey.get(key);
    if (!g.itemIds.includes(w.item_id)) g.itemIds.push(w.item_id);
    g.wearIds.push(w.id);
    for (const c of ctxArr(w)) if (!g.context.includes(c)) g.context.push(c);
  }
  return [...byKey.values()];
}

// Mini calendar-cell collage (aspect-ratio 3/4, 2-col grid)
function calCellCollageHtml(itemIds, outfit) {
  const canvas = outfit && layoutCanvasHtml(outfit, "cal-ccanvas");
  if (canvas) return canvas;
  const pieces = itemIds.map(id => itemById.get(id)).filter(Boolean).slice(0, 4);
  if (!pieces.length) return '';
  const cells = pieces.map((p, i) => {
    const span = pieces.length === 3 && i === 2 ? ' span2' : '';
    return `<div class="cal-cp${span}" data-photo="${esc(p.image_path || '')}"></div>`;
  }).join('');
  return `<div class="cal-ccoll${pieces.length === 1 ? ' solo' : ''}">${cells}</div>`;
}

// Day-view outfit collage (88×88 square, 2-col grid)
function calOutfitCollageHtml(itemIds, outfit) {
  const canvas = outfit && layoutCanvasHtml(outfit, "cal-outfit-canvas");
  if (canvas) return canvas;
  const pieces = itemIds.map(id => itemById.get(id)).filter(Boolean).slice(0, 4);
  if (!pieces.length) return '<div class="cal-outfit-collage" style="background:#f4f4f7"></div>';
  const cells = pieces.map(p =>
    `<div class="cal-outfit-piece" data-photo="${esc(p.image_path || '')}"></div>`).join('');
  return `<div class="cal-outfit-collage${pieces.length === 1 ? ' solo' : ''}">${cells}</div>`;
}

// Most-worn item in current calendar month
function calMostWorn() {
  const prefix = `${calendarYear}-${String(calendarMonth + 1).padStart(2, '0')}`;
  const counts = new Map();
  for (const w of wears) {
    if (!w.worn_on || !w.worn_on.startsWith(prefix)) continue;
    counts.set(w.item_id, (counts.get(w.item_id) || 0) + 1);
  }
  if (!counts.size) return null;
  const [topId, topCount] = [...counts.entries()].sort((a, b) => b[1] - a[1])[0];
  return { item: itemById.get(topId), count: topCount };
}

// Consecutive-day wear streak ending today
function calStreak() {
  const worn = new Set(wears.map(w => w.worn_on));
  const d = new Date(); let streak = 0;
  while (worn.has(d.toISOString().slice(0, 10))) { streak++; d.setDate(d.getDate() - 1); }
  return streak;
}

function renderCalendar() {
  const body = $('#calendarBody');
  if (calendarDay) renderCalendarDay(body);
  else renderCalendarMonth(body);
}

function renderCalendarMonth(body) {
  const todayStr    = new Date().toISOString().slice(0, 10);
  const year        = calendarYear, month = calendarMonth;
  const firstDoW    = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const dayMap      = wearDayMap();

  // Build grid cells
  let cells = '';
  for (let i = 0; i < firstDoW; i++) cells += `<div class="cal-cell other-month"></div>`;
  for (let d = 1; d <= daysInMonth; d++) {
    const ds       = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayWears = dayMap.get(ds) || [];
    const isToday  = ds === todayStr;
    let collage = '';
    if (dayWears.length) {
      const firstOutfitId = dayWears.find(w => w.outfit_id)?.outfit_id;
      const itemIds = firstOutfitId
        ? (outfitItemMap.get(firstOutfitId) || [])
        : [...new Set(dayWears.map(w => w.item_id))];
      collage = calCellCollageHtml(itemIds.slice(0, 4), firstOutfitId ? outfitById.get(firstOutfitId) : null);
    }
    cells += `<div class="cal-cell${isToday ? ' today-cell' : ''}">
      <button class="cal-cell-btn" data-calday="${esc(ds)}">
        <div class="cal-daynum${isToday ? ' is-today' : ''}">${d}</div>
        ${collage}
      </button>
    </div>`;
  }
  const trailing = (7 - ((firstDoW + daysInMonth) % 7)) % 7;
  for (let i = 0; i < trailing; i++) cells += `<div class="cal-cell other-month"></div>`;

  // Stats
  const mw     = calMostWorn();
  const streak = calStreak();
  const mwHtml = mw?.item ? `
    <div class="cal-stat">
      <div class="cal-stat-img"${mw.item.image_path ? ` data-photo="${esc(mw.item.image_path)}"` : ''}></div>
      <div>
        <div class="cal-stat-lbl">Most Worn This Month</div>
        <div class="cal-stat-sub">${mw.count} day${mw.count !== 1 ? 's' : ''}</div>
      </div>
    </div>` : '';
  const streakHtml = `
    <div class="cal-stat">
      <div class="cal-stat-ico"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div>
      <div>
        <div class="cal-stat-lbl">${streak} Day Streak</div>
        <div class="cal-stat-sub">Continuous calendar recording</div>
      </div>
      ${streak ? `<div class="cal-stat-chev"><svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg></div>` : ''}
    </div>`;

  body.innerHTML = `<div class="tabbody">
    <div class="cal-nav">
      <button class="cal-nav-btn" id="calPrev"><svg viewBox="0 0 24 24"><path d="M15 6l-6 6 6 6"/></svg></button>
      <div class="cal-month-lbl"><strong>${CAL_MONTHS[month]}</strong> <em>${year}</em></div>
      <button class="cal-nav-btn" id="calNext"><svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg></button>
    </div>
    <div class="cal-dow">${CAL_DOW.map(h => `<div class="cal-dow-h">${h}</div>`).join('')}</div>
    <div class="cal-grid">${cells}</div>
    <div class="cal-stats">${mwHtml}${streakHtml}</div>
  </div>`;

  body.onclick = e => {
    if (e.target.closest('#calPrev')) {
      calendarMonth--; if (calendarMonth < 0) { calendarMonth = 11; calendarYear--; }
      renderCalendarMonth(body); return;
    }
    if (e.target.closest('#calNext')) {
      calendarMonth++; if (calendarMonth > 11) { calendarMonth = 0; calendarYear++; }
      renderCalendarMonth(body); return;
    }
    const btn = e.target.closest('[data-calday]');
    if (btn) { openCalDaySheet(btn.dataset.calday, body); }
  };

  hydratePhotos(body);
}

function openCalDaySheet(dateStr, body) {
  const [y, m, d] = dateStr.split('-').map(Number);
  const title = `${CAL_MONTHS[m - 1]} ${d}`;
  const hasEntries = dayGroups(dateStr).length > 0;
  const isFuture = new Date(y, m - 1, d + 1) > new Date();
  $("#logInner").innerHTML = `
    <div class="sheet-hdr">
      <button class="lnk" id="calDaySheetClose">Cancel</button>
      <h2>${esc(title)}</h2>
      <div></div>
    </div>
    <div style="padding:8px 18px 30px;display:flex;flex-direction:column;gap:10px">
      ${hasEntries ? `<button class="sheet-action-btn" id="calDaySheetView">View day</button>` : ""}
      ${!isFuture ? `<button class="sheet-action-btn" id="calDaySheetClothing">+ Add clothing</button>` : ""}
      ${!isFuture ? `<button class="sheet-action-btn" id="calDaySheetLook">+ Add look</button>` : ""}
      ${!hasEntries && isFuture ? `<div class="muted" style="text-align:center;font-size:14px;padding:20px 0">Nothing logged yet.</div>` : ""}
    </div>`;
  $("#logSheet").hidden = false;
  $("#calDaySheetClose").onclick = () => { $("#logSheet").hidden = true; };
  const viewBtn = $("#calDaySheetView");
  if (viewBtn) viewBtn.onclick = () => { $("#logSheet").hidden = true; calendarDay = dateStr; renderCalendarDay(body); };
  const clothBtn = $("#calDaySheetClothing");
  if (clothBtn) clothBtn.onclick = () => { $("#logSheet").hidden = true; calendarDay = dateStr; renderCalendarDay(body); openCalAddClothing(); };
  const lookBtn = $("#calDaySheetLook");
  if (lookBtn) lookBtn.onclick = () => { $("#logSheet").hidden = true; calendarDay = dateStr; renderCalendarDay(body); openCalAddLook(); };
}

function renderCalendarDay(body) {
  const dateStr = calendarDay;
  const [y, m, d] = dateStr.split('-').map(Number);
  const title   = `${CAL_MONTHS[m - 1]} ${d}, ${y}`;
  const groups  = dayGroups(dateStr);

  const cardsHtml = groups.length ? groups.map(g => {
    const outfit  = g.outfitId ? outfitById.get(g.outfitId) : null;
    const collage = calOutfitCollageHtml(g.itemIds, outfit);
    const notes   = outfit?.notes || '';
    const wearIdsStr = g.wearIds.join(',');
    return `<div class="cal-outfit-card">
      <div class="cal-outfit-inner">
        ${collage}
        <div style="flex:1;min-width:0;display:flex;flex-direction:column;gap:9px">
          <button class="cal-outfit-notes-btn${notes ? ' has-notes' : ''}" data-cal-notes="${esc(g.outfitId || '')}" style="flex:none">
            <span>${esc(notes || 'Tap to add notes')}</span>
            <svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg>
          </button>
          ${(() => {
            const has = g.context.length > 0;

            style="display:flex;align-items:center;gap:6px;background:none;border:none;text-align:left;padding:0;cursor:pointer">
            <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:${has ? 'var(--accent)' : 'var(--muted)'};stroke-width:2;fill:none;flex:none"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
            <span style="font-size:13px;color:${has ? 'var(--accent)' : 'var(--muted)'};font-weight:${has ? '600' : '400'};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${has ? esc(g.context.join(', ')) : 'Add context'}</span>
          </button>`;
          })()}
        </div>
      </div>
      <div class="cal-swipe-acts">
        <button class="cal-act cal-act-copy" data-calact="copy" data-wear-ids="${esc(wearIdsStr)}" data-outfit-id="${esc(g.outfitId || '')}">
          <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          Copy
        </button>
        <button class="cal-act cal-act-move" data-calact="move" data-wear-ids="${esc(wearIdsStr)}" data-outfit-id="${esc(g.outfitId || '')}">
          <svg viewBox="0 0 24 24"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>
          Move
        </button>
        <button class="cal-act cal-act-del" data-wear-ids="${esc(wearIdsStr)}">
          <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
          Delete
        </button>
      </div>
    </div>`;
  }).join('')
  : `<div class="cal-day-empty">Nothing logged for this day.</div>`;

  const prevD    = new Date(y, m - 1, d - 1).toISOString().slice(0, 10);
  const nextD    = new Date(y, m - 1, d + 1).toISOString().slice(0, 10);
  const isFuture = new Date(y, m - 1, d + 1) > new Date();

  body.innerHTML = `<div class="tabbody">
    <div class="cal-day-header">
      <button id="calDayBack" style="color:var(--accent);font-size:15px;font-weight:500">Back</button>
      <div style="font-size:16px;font-weight:600">Day View</div>
      <button id="calDayEdit" style="color:var(--accent);font-size:15px;font-weight:500;opacity:.4">Edit</button>
    </div>
    <div class="cal-day-nav">
      <button class="cal-day-nav-btn" id="calDayPrev"><svg viewBox="0 0 24 24"><path d="M15 6l-6 6 6 6"/></svg></button>
      <div class="cal-day-title">${esc(title)}</div>
      <button class="cal-day-nav-btn" id="calDayNext"${isFuture ? ' disabled style="opacity:.4"' : ''}><svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg></button>
    </div>
    ${cardsHtml}
    ${(() => {
      const soloGroups = groups.filter(g => !g.outfitId);
      const soloCount  = [...new Set(soloGroups.flatMap(g => g.itemIds))].length;
      return soloCount >= 2
        ? `<button class="cal-make-look-btn" id="calMakeLook">
            <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
            Create look from these ${soloCount} items
           </button>`
        : '';
    })()}
    <div class="cal-day-foot">
      <div class="cal-day-foot-ico"><svg viewBox="0 0 24 24"><path d="M16 4l-4 9-4-9"/><path d="M12 13l-9 7h18l-9-7z"/></svg></div>
      <div class="cal-day-foot-add">
        <span>add more items:</span>
        <button id="calAddClothing">+ Clothing</button>
        <button id="calAddLook">+ Look</button>
      </div>
    </div>
  </div>`;

  body.onclick = null;  // clear any stale picker/month delegation
  $('#calDayBack').onclick = () => { calendarDay = null; renderCalendarMonth(body); };
  $('#calDayPrev').onclick = () => { calendarDay = prevD; renderCalendarDay(body); };
  if (!isFuture) $('#calDayNext').onclick = () => { calendarDay = nextD; renderCalendarDay(body); };
  $('#calAddClothing').onclick = () => openCalAddClothing();
  $('#calAddLook').onclick     = () => openCalAddLook();
  const makeLookBtn = $('#calMakeLook');
  if (makeLookBtn) makeLookBtn.onclick = () => makeLookFromDay(dateStr, body);

  // Horizontal swipe to navigate days; skip if touch starts on a swipeable card
  const _dayTb = body.querySelector('.tabbody');
  let _dswX = 0, _dswOk = false;
  _dayTb.addEventListener('touchstart', e => {
    if (e.target.closest('.cal-outfit-card')) { _dswOk = false; return; }
    _dswX = e.touches[0].clientX; _dswOk = true;
  }, { passive: true });
  _dayTb.addEventListener('touchend', e => {
    if (!_dswOk) return; _dswOk = false;
    const dx = e.changedTouches[0].clientX - _dswX;
    if (dx > 60) { calendarDay = prevD; renderCalendarDay(body); }
    else if (dx < -60 && !isFuture) { calendarDay = nextD; renderCalendarDay(body); }
  }, { passive: true });

  body.querySelectorAll('.cal-outfit-card').forEach(wireCalSwipe);

  body.querySelectorAll('.cal-act-del').forEach(btn => {
    btn.onclick = async () => {
      const ids = btn.dataset.wearIds.split(',').filter(Boolean);
      if (!ids.length) return;
      if (!confirm(`Remove ${ids.length} wear record${ids.length !== 1 ? 's' : ''}?`)) return;
      try {
        await rest(`wears?id=in.(${ids.map(id => `"${id}"`).join(',')})`, { method: 'DELETE' });
        wears = wears.filter(w => !ids.includes(w.id));
        buildOutfitWearMap();
        renderCalendarDay(body);
        toast('Removed');
      } catch (e) { toast(e.message); }
    };
  });

  body.querySelectorAll('[data-calact]').forEach(btn => {
    btn.onclick = () => {
      const action   = btn.dataset.calact;
      const wearIds  = (btn.dataset.wearIds || '').split(',').filter(Boolean);
      if (!wearIds.length) return;
      const today = todayStr();
      $("#logInner").innerHTML = `
        <div class="sheet-hdr">
          <button class="lnk" id="calCpCancel">Cancel</button>
          <h2>${action === 'copy' ? 'Copy to…' : 'Move to…'}</h2>
          <button class="lnk" id="calCpSave" style="font-weight:700">${action === 'copy' ? 'Copy' : 'Move'}</button>
        </div>
        <div style="padding:20px 18px 30px">
          <label style="display:block;font-size:13px;color:var(--muted);margin-bottom:8px">New date</label>
          <input class="inp" id="calCpDate" type="date" value="${today}" max="${today}" style="width:100%;font-size:16px">
          ${action === 'move' ? `<div class="muted" style="font-size:13px;margin-top:10px">Original wear entries will be removed from ${esc(calendarDay)}.</div>` : ''}
        </div>`;
      $("#logSheet").hidden = false;
      $("#calCpCancel").onclick = () => { $("#logSheet").hidden = true; };
      $("#calCpSave").onclick = async () => {
        const newDate = $("#calCpDate").value;
        if (!newDate || newDate === calendarDay) { toast("Pick a different date"); return; }
        const origWears = wears.filter(w => wearIds.includes(w.id));
        if (!origWears.length) { $("#logSheet").hidden = true; return; }
        try {
          const payload = origWears.map(w => ({
            item_id: w.item_id, worn_on: newDate,
            ...(w.outfit_id ? { outfit_id: w.outfit_id } : {}),
          }));
          const rows = await rest("/wears", {
            method: "POST",
            headers: { "Content-Type": "application/json", Prefer: "return=representation" },
            body: JSON.stringify(payload),
          });
          if (Array.isArray(rows)) wears.push(...rows);
          if (action === 'move') {
            const idList = wearIds.map(id => `"${id}"`).join(',');
            await rest(`/wears?id=in.(${idList})`, { method: 'DELETE' });
            wears = wears.filter(w => !wearIds.includes(w.id));
          }
          buildOutfitWearMap();
          $("#logSheet").hidden = true;
          toast(`${action === 'copy' ? 'Copied' : 'Moved'} to ${newDate}`);
          renderCalendarDay(body);
        } catch (e) { toast(e.message); }
      };
    };
  });

  body.querySelectorAll('[data-cal-notes]').forEach(el => {
    el.onclick = () => {
      const outfitId = el.dataset.calNotes;
      if (!outfitId) { toast('Notes are only available for saved looks'); return; }
      openCalNotes(outfitId, () => renderCalendarDay(body));
    };
  });

  body.querySelectorAll('[data-cal-ctx]').forEach(el => {
    el.onclick = () => {
      const wearIds = (el.dataset.calCtx || '').split(',').filter(Boolean);
      if (!wearIds.length) return;
      const cur = [];
      for (const id of wearIds) {
        const w = wears.find(x => x.id === id);
        for (const c of ctxArr(w)) if (!cur.includes(c)) cur.push(c);
      }
      openContextSheet(wearIds, cur, () => renderCalendarDay(body));
    };
  });

  hydratePhotos(body);
}

// Set/change the contexts on a group of wear rows (calendar day card "after" flow).
function openContextSheet(wearIds, current, onSaved) {
  _ctxSel = Array.isArray(current) ? [...current] : []; _ctxAddOpen = false;
  $("#logInner").innerHTML = `
    <div class="sheet-hdr">
      <button class="lnk" id="ctxCancel">Cancel</button>
      <h2>Context</h2>
      <button class="lnk" id="ctxSave" style="font-weight:700">Save</button>
    </div>
    <div style="padding:18px 18px 30px">
      <div class="muted" style="font-size:13px;margin-bottom:4px">Where did you wear this?</div>
      ${contextPickerHtml()}
    </div>`;
  $("#logSheet").hidden = false;
  renderContextPicker();
  $("#ctxCancel").onclick = () => { $("#logSheet").hidden = true; };
  $("#ctxSave").onclick = async () => {
    const val = ctxSelOrNull();

      await rest(`/wears?id=in.(${wearIds.map(id => `"${id}"`).join(",")})`, {

}

function wireCalSwipe(card) {
  const inner = card.querySelector('.cal-outfit-inner');
  const acts  = card.querySelector('.cal-swipe-acts');
  const W = 210;
  let startX = 0, opened = false, tracking = false;

  card.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    tracking = true;
    inner.style.transition = 'none';
    acts.style.transition   = 'none';
  }, { passive: true });

  card.addEventListener('touchmove', e => {
    if (!tracking) return;
    const dx  = e.touches[0].clientX - startX;
    const off = Math.max(-W, Math.min(0, (opened ? -W : 0) + dx));
    inner.style.transform = `translateX(${off}px)`;
    acts.style.transform  = `translateX(${100 + (off / W * 100)}%)`;
  }, { passive: true });

  card.addEventListener('touchend', e => {
    if (!tracking) return;
    tracking = false;
    const dx = e.changedTouches[0].clientX - startX;
    inner.style.transition = 'transform .25s ease';
    acts.style.transition   = 'transform .25s ease';
    opened = opened ? dx < 30 : dx < -50;
    inner.style.transform = opened ? `translateX(-${W}px)` : 'translateX(0)';
    acts.style.transform  = opened ? 'translateX(0)' : 'translateX(100%)';

}

/* ---- make-a-look from solo items on a day ---- */
async function makeLookFromDay(dateStr, body) {
  const soloGroups = dayGroups(dateStr).filter(g => !g.outfitId);
  const itemIds = [...new Set(soloGroups.flatMap(g => g.itemIds))];
  const wearIds = soloGroups.flatMap(g => g.wearIds);
  if (itemIds.length < 2) return;

  const [y, m, d] = dateStr.split('-').map(Number);
  const name = new Date(y, m - 1, d).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });

  try {
    // Create the outfit record
    const oRows = await rest("/outfits?select=*", {
      method: "POST",
      headers: { "Content-Type": "application/json", Prefer: "return=representation" },
      body: JSON.stringify({ name }),
    });
    const newOutfit = Array.isArray(oRows) ? oRows[0] : oRows;
    if (!newOutfit?.id) throw new Error("Could not create look");

    // Link items
    const links = itemIds.map(item_id => ({ outfit_id: newOutfit.id, item_id }));
    await rest("/outfit_items", {
      method: "POST",
      headers: { "Content-Type": "application/json", Prefer: "return=minimal" },
      body: JSON.stringify(links),
    });

    // Stamp wears with the new outfit_id
    const inList = `(${wearIds.map(id => `"${id}"`).join(',')})`;
    await rest(`/wears?id=in.${inList}`, {
      method: "PATCH",
      headers: { "Content-Type": "application/json", Prefer: "return=minimal" },
      body: JSON.stringify({ outfit_id: newOutfit.id }),
    });

    // Update local state
    outfits.push(newOutfit);
    outfitLinks = outfitLinks.concat(links);
    for (const w of wears) { if (wearIds.includes(w.id)) w.outfit_id = newOutfit.id; }
    buildOutfitIndexes();

    renderCalendarDay(body);
    toast("Look created", { label: "View →", fn: () => { switchTab("looks"); openLook(newOutfit.id); } });
  } catch (e) { toast(e.message); }
}

function statsPool() {
  const { status, category, season, formality } = statsFilters;
  const acqCutoff = acqRangeStart();
  return items.filter(i => {
    if (status.length) {
      if (!status.includes(i.status)) return false;
    } else {
      if (i.status === "Archive") return false;
    }
    if (category.length && !category.includes(i.category)) return false;
    if (season.length && !(i.season || []).some(s => season.includes(s))) return false;
    if (formality.length) {
      const iSet = itemFormalitySet(i) || [];
      if (!formality.some(f => iSet.includes(OCCASION_LADDER.indexOf(f) + 1))) return false;
    }
    if (acqCutoff) {
      const pd = i.purchase_date;
      if (acqCutoff.older) { if (!pd || pd >= acqCutoff.cutoff) return false; }
      else                 { if (!pd || pd < acqCutoff.cutoff)  return false; }
    }
    return true;
  });
}

function rangeStart() {
  if (statsDateRange === "all") return null;
  const d = new Date();
  if (statsDateRange === "7d")  d.setDate(d.getDate() - 7);
  else if (statsDateRange === "14d") d.setDate(d.getDate() - 14);
  else if (statsDateRange === "30d") d.setDate(d.getDate() - 30);
  else if (statsDateRange === "90d") d.setDate(d.getDate() - 90);
  else if (statsDateRange === "6mo") d.setMonth(d.getMonth() - 6);
  else if (statsDateRange === "1yr") d.setFullYear(d.getFullYear() - 1);
  return d.toISOString().slice(0, 10);
}

function wearCountInRange(itemId) {
  const cutoff = rangeStart();
  if (!cutoff) return wearCount(itemId);
  return wears.filter(w => w.item_id === itemId && w.worn_on >= cutoff).length;
}

function acqRangeStart() {
  if (statsAcqRange === "all") return null;
  const older = statsAcqRange.startsWith("o");
  const period = statsAcqRange.slice(1); // "1yr","2yr","3yr","5yr"
  const d = new Date();
  if (period === "1yr") d.setFullYear(d.getFullYear() - 1);
  else if (period === "2yr") d.setFullYear(d.getFullYear() - 2);
  else if (period === "3yr") d.setFullYear(d.getFullYear() - 3);
  else if (period === "5yr") d.setFullYear(d.getFullYear() - 5);
  return { cutoff: d.toISOString().slice(0, 10), older };
}

function statsActiveFilterCount() {
  const { status, category, season, formality } = statsFilters;
  let n = (status.length ? 1 : 0) + (category.length ? 1 : 0) +

  if (statsAcqRange !== "all") n++;
  return n;
}

// lists shown as number-only metric tiles (no item name)

  ["all", "All time"], ["7d", "Last 7 Days"], ["14d", "Last 14 Days"], ["30d", "Last 30 Days"],

// Closet Review: fields dealt one item at a time. `missing` = empty (or, for the
// date, a guessed value that wants confirming). `value` renders the current value.
// Derive a likely season from purchase_date month or wear history.
// Returns an array (e.g. ["Summer"]) or null if no data to guess from.
function guessSeason(item) {
  const monthToSeason = m => m <= 2 || m === 12 ? "Winter" : m <= 5 ? "Spring" : m <= 8 ? "Summer" : "Fall";
  if (item.purchase_date) {
    const m = +String(item.purchase_date).slice(5, 7);
    return [monthToSeason(m)];
  }
  const itemWears = wears.filter(w => w.item_id === item.id && w.worn_on);
  if (itemWears.length) {
    const counts = new Map();
    for (const w of itemWears) { const s = monthToSeason(+String(w.worn_on).slice(5, 7)); counts.set(s, (counts.get(s) || 0) + 1); }
    const max = Math.max(...counts.values());
    return [...counts.entries()].filter(([, n]) => n >= max * 0.5).map(([s]) => s);
  }
  return null;
}

function dateRangeHuman() {

function buildSmartList(key) {
  const av = statsPool();
  const wornSub = item => { const n = wearCountInRange(item.id); return n === 0 ? "0 wears" : `${n} wear${n === 1 ? "" : "s"}`; };
  if (key === "never-worn") {
    const title = statsDateRange === "all" ? "Never Worn" : `Not Worn · past ${dateRangeHuman()}`;
    return { list: av.filter(i => wearCountInRange(i.id) === 0), title };
  }
  if (key === "most-worn")
    return { list: [...av].sort((a, b) => wearCountInRange(b.id) - wearCountInRange(a.id)).slice(0, 100),
      title: "Worn History", subtitleFn: wornSub };
  if (key === "least-worn")
    return { list: [...av].sort((a, b) => wearCountInRange(a.id) - wearCountInRange(b.id)).slice(0, 100),
      title: "Worn History", subtitleFn: wornSub };
  if (key === "best-cpw" || key === "worst-cpw") {
    // range-aware CPW: price / wears within the active range
    const cpwR = item => { const n = wearCountInRange(item.id); return n ? parseFloat(item.price) / n : null; };
    const cpwSub = item => { const c = cpwR(item); return c != null ? money(c) : ""; };
    const withWears = av.filter(i => i.price && wearCountInRange(i.id) > 0);
    const sorted = key === "best-cpw"
      ? withWears.sort((a, b) => (cpwR(a) || Infinity) - (cpwR(b) || Infinity))
      : withWears.sort((a, b) => (cpwR(b) || 0) - (cpwR(a) || 0));
    return { list: sorted.slice(0, 100), title: "Cost per Wear", subtitleFn: cpwSub };
  }
  if (key === "most-expensive" || key === "least-expensive") {
    const priceSub = item => { const p = parseFloat(item.price); return isNaN(p) ? "" : money(p); };
    // Least Expensive excludes $0/free items (gifts, unpriced) so the list is useful.
    const withPrice = av.filter(i => {
      const p = parseFloat(i.price);
      if (i.price == null || isNaN(p)) return false;
      return key === "least-expensive" ? p > 0 : true;
    });
    const sorted = key === "most-expensive"
      ? withPrice.sort((a, b) => parseFloat(b.price) - parseFloat(a.price))
      : withPrice.sort((a, b) => parseFloat(a.price) - parseFloat(b.price));
    return { list: sorted.slice(0, 100), title: "Purchase Price", subtitleFn: priceSub };
  }
  if (key === "best-potential") {
    const cpwFmt = n => n >= 10 ? "$" + Math.round(n) : money(n);
    return {
      list: av.filter(i => i.price && wearCount(i.id) > 0)
        .sort((a, b) => {
          const na = wearCount(a.id), nb = wearCount(b.id);
          return (b.price / (nb * (nb + 1))) - (a.price / (na * (na + 1)));
        }).slice(0, 100),
      title: "Best Potential Improvement",
      subtitleFn: item => {
        const n = wearCount(item.id);
        if (!item.price || !n) return "";
        return cpwFmt(item.price / n) + " → " + cpwFmt(item.price / (n + 1)) + "/wear";
      },
    };
  }
  if (key === "recent") {
    const acqSub = item => {
      if (!item.purchase_date) return "";
      const d = new Date(item.purchase_date + "T00:00:00");
      return d.toLocaleDateString(undefined, { month: "short", year: "numeric" });
    };
    // most recently acquired by purchase_date (no hard window — always shows items)
    return { list: av.filter(i => i.purchase_date)
      .sort((a, b) => b.purchase_date.localeCompare(a.purchase_date)).slice(0, 100),
      title: "Recently Acquired", subtitleFn: acqSub };
  }
  return null;
}

function getFieldGroups(field) {
  const avail = statsPool();
  const noValue = [];
  const groups = {};
  const add = (label, item) => { if (!groups[label]) groups[label] = []; groups[label].push(item); };
  for (const item of avail) {
    if (field === "color_family") {
      if (!item.color_family) { noValue.push(item); continue; }
      add(item.color_family, item);
    } else if (field === "category") {
      if (!item.category) { noValue.push(item); continue; }
      add(item.category, item);
    } else if (field === "brand") {
      if (!item.brand || !item.brand.trim()) { noValue.push(item); continue; }
      add(item.brand.trim(), item);
    } else if (field === "price") {
      const p = parseFloat(item.price);
      if (!item.price || isNaN(p)) { noValue.push(item); continue; }
      const b = PRICE_BRACKETS.find(b => p >= b.min && p < b.max);
      if (b) add(b.label, item);
    } else if (field === "size") {
      if (!item.size) { noValue.push(item); continue; }
      add(item.size, item);
    } else if (field === "season") {
      if (!item.season || !item.season.length) { noValue.push(item); continue; }
      for (const s of item.season) add(s, item);
    } else if (field === "fabric") {
      if (!item.fabric || !item.fabric.length) { noValue.push(item); continue; }
      for (const f of item.fabric) add(f, item);
    } else if (field === "retailer") {
      if (!item.retailer || !item.retailer.trim()) { noValue.push(item); continue; }
      add(item.retailer.trim(), item);
    } else if (field === "acquisition") {
      if (!item.acquisition) { noValue.push(item); continue; }
      add(item.acquisition, item);
    }
  }
  let sorted;
  if (field === "price") sorted = PRICE_BRACKETS.map(b => ({ label: b.label, items: groups[b.label] || [] }));
  else if (field === "season") sorted = SEASONS.map(s => ({ label: s, items: groups[s] || [] })).filter(g => g.items.length);
  else if (field === "category") sorted = CATEGORIES.map(c => ({ label: c, items: groups[c] || [] })).filter(g => g.items.length);
  else sorted = Object.entries(groups).map(([label, items]) => ({ label, items })).sort((a, b) => b.items.length - a.items.length);
  return { noValue, groups: sorted };
}

function segmentColor(field, label, idx) {

function donutSvgHighlight(segments, activeIdx) {
  const total = segments.reduce((s, x) => s + x.count, 0);
  if (!total) return "";
  const cx = 80, cy = 80, R = 72, r = 46, gap = total > 1 ? 0.012 : 0;
  let paths = "", angle = -Math.PI / 2;
  for (let i = 0; i < segments.length; i++) {
    const seg = segments[i];
    if (!seg.count) continue;
    const sweep = (seg.count / total) * Math.PI * 2 - gap;
    if (sweep <= 0) continue;
    const a2 = angle + sweep;
    const x1 = cx + R * Math.cos(angle), y1 = cy + R * Math.sin(angle);
    const x2 = cx + R * Math.cos(a2),    y2 = cy + R * Math.sin(a2);
    const x3 = cx + r * Math.cos(a2),    y3 = cy + r * Math.sin(a2);
    const x4 = cx + r * Math.cos(angle), y4 = cy + r * Math.sin(angle);
    const lg = sweep > Math.PI ? 1 : 0;
    const op = segments.length <= 1 ? 1 : (i === activeIdx ? 1 : 0.22);
    paths += `<path class="dseg" d="M${x1.toFixed(1)} ${y1.toFixed(1)} A${R} ${R} 0 ${lg} 1 ${x2.toFixed(1)} ${y2.toFixed(1)} L${x3.toFixed(1)} ${y3.toFixed(1)} A${r} ${r} 0 ${lg} 0 ${x4.toFixed(1)} ${y4.toFixed(1)}Z" fill="${seg.color}" style="opacity:${op};transition:opacity .15s"/>`;
    angle = a2 + gap;
  }
  return `<svg width="160" height="160" viewBox="0 0 160 160" style="display:block;flex-shrink:0">${paths}</svg>`;
}

function wireDonutArrows(segments, total) {
  const upBtn = document.getElementById("donutUp");
  const dnBtn = document.getElementById("donutDn");
  if (!upBtn || !segments.length) return;
  const update = () => {
    document.querySelectorAll(".dseg").forEach((p, i) => {
      p.style.opacity = segments.length <= 1 ? 1 : (i === statsDonutIdx ? 1 : 0.22);
    });
    const seg = segments[statsDonutIdx];
    const lbl = document.getElementById("donutLbl");
    if (lbl && seg) lbl.innerHTML = `<div style="font-size:20px;font-weight:700;line-height:1.2">${esc(seg.label)}</div>
      <div class="muted" style="font-size:15px;margin-top:4px">${total ? ((seg.count/total)*100).toFixed(1) : 0}%</div>`;
    // highlight matching list row
    document.querySelectorAll("#statsBody [data-sv]:not([data-sf])").forEach(btn => {
      const active = seg && btn.dataset.sv === seg.label;
      btn.classList.toggle("donut-hi", active);
      if (active) btn.scrollIntoView({ behavior: "smooth", block: "nearest" });
    });
  };
  upBtn.addEventListener("click", () => { statsDonutIdx = (statsDonutIdx - 1 + segments.length) % segments.length; update(); });
  dnBtn.addEventListener("click", () => { statsDonutIdx = (statsDonutIdx + 1) % segments.length; update(); });
}

function closetVsLifeHtml() {
  const avail = items.filter(i => itemStatus(i) === "Available");
  if (!avail.length || !wears.length) return "";

  // Supply: count items across all levels in their set
  const supply = new Array(8).fill(0);
  for (const i of avail) { for (const l of (itemFormalitySet(i) || [])) supply[l - 1]++; }
  const supplyTotal = supply.reduce((a, b) => a + b, 0) || 1;

  // Demand: count wears by the formality set of each worn item
  const demand = new Array(8).fill(0);
  for (const w of wears) {
    const it = itemById.get(w.item_id);
    if (!it) continue;
    for (const l of (itemFormalitySet(it) || [])) demand[l - 1]++;
  }
  const demandTotal = demand.reduce((a, b) => a + b, 0) || 1;

  // Find biggest gap: supply heavy vs demand
  let biggestGap = 0, gapLevel = -1;
  for (let i = 0; i < 8; i++) {
    const gap = supply[i] / supplyTotal - demand[i] / demandTotal;
    if (gap > biggestGap) { biggestGap = gap; gapLevel = i; }
  }

  const LEVEL_COLORS = ["#7c8cf8","#60b8d4","#6abf8a","#a8d96a","#f0b429","#e07d42","#c05c7e","#8b5cf6"];
  const rows = OCCASION_LADDER.map((lbl, i) => {
    const sp = supply[i] / supplyTotal;
    const dm = demand[i] / demandTotal;
    const color = LEVEL_COLORS[i];
    return `<div style="margin-bottom:11px">
      <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:3px">
        <span>${i + 1}. ${esc(lbl)}</span>
        <span>${Math.round(sp * 100)}% owned · ${Math.round(dm * 100)}% worn</span>
      </div>
      <div style="position:relative;height:8px;background:var(--line);border-radius:4px;overflow:hidden">
        <div style="position:absolute;top:0;left:0;height:100%;width:${sp * 100}%;background:${color};opacity:.35;border-radius:4px"></div>
        <div style="position:absolute;top:0;left:0;height:100%;width:${dm * 100}%;background:${color};border-radius:4px"></div>
      </div>
    </div>`;
  }).join("");

  const insight = gapLevel >= 0
    ? `Your closet skews <b>${OCCASION_LADDER[gapLevel]}</b> but your wears don't — consider wearing those pieces more.`
    : "Your closet and wear habits look well-balanced.";

  return `<div class="stats-sec">
    <div class="stats-sec-hdr">
      <div class="t">Closet vs. Your Life</div>
      <div class="s">Supply (light) vs. wear demand (solid)</div>
    </div>
    <div class="stats-sec-body" style="padding:14px 16px 10px">
      ${rows}
      <div style="font-size:13px;color:var(--muted);margin-top:4px">${insight}</div>
    </div>
  </div>`;
}

function renderStatsFieldPage() {
  const label = STATS_FIELD_LABELS[statsField] || statsField;
  const { noValue, groups: rawGroups } = getFieldGroups(statsField);

  // Assign stable colors based on count-sorted order, then optionally sort list by name
  const groupsWithColor = rawGroups.map((g, i) => ({ ...g, color: segmentColor(statsField, g.label, i) }));
  const CANONICAL_FIELDS = ["price", "season", "category"];
  const canSort = !CANONICAL_FIELDS.includes(statsField);
  const displayGroups = (canSort && statsFieldSort === "name")
    ? [...groupsWithColor].sort((a, b) => a.label.localeCompare(b.label))
    : groupsWithColor;

  // Donut always uses count order
  const segments = groupsWithColor.filter(g => g.items.length > 0)
    .map(g => ({ label: g.label, count: g.items.length, color: g.color }));
  if (statsDonutIdx >= segments.length) statsDonutIdx = 0;
  const total = segments.reduce((s, x) => s + x.count, 0);
  const active = segments[statsDonutIdx];
  const donut = donutSvgHighlight(segments, statsDonutIdx);

  const arrowBtn = (id, up) =>
    `<button id="${id}" style="width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:var(--surface);border:1px solid var(--line);flex-shrink:0">
      <svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        ${up ? '<path d="M1.5 7.5l4-4 4 4"/>' : '<path d="M1.5 3.5l4 4 4-4"/>'}
      </svg>
    </button>`;

  const noValRow = noValue.length
    ? `<div class="card" style="margin:0 14px 2px">
        <button class="frow" style="padding:10px 0;border-bottom:none" data-sv="__novalue__">
          <div class="fmeta"><div class="fname">No value</div></div>
          <span class="muted" style="font-size:15px;margin-right:6px">${noValue.length}</span>
          <svg class="chev" viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg>
        </button>
      </div>` : "";

  const rows = displayGroups.map(g => {
    const swatch = statsField === "color_family"
      ? `<span style="width:26px;height:26px;border-radius:50%;background:${g.color};flex-shrink:0;border:1px solid rgba(0,0,0,.1)"></span>` : "";
    const isActive = active && g.label === active.label;
    return `<button class="frow${isActive ? " donut-hi" : ""}" data-sv="${esc(g.label)}">
      ${swatch}<div class="fmeta"><div class="fname">${esc(g.label)}</div></div>
      <span class="muted" style="font-size:15px;margin-right:6px">${g.items.length}</span>
      <svg class="chev" viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg>
    </button>`;
  }).join("");

  const sortBar = canSort ? `
    <div class="stats-sort-bar">
      <button class="stats-sort-btn${statsFieldSort === "count" ? " on" : ""}" data-ss="count">Sort by Count</button>
      <button class="stats-sort-btn${statsFieldSort === "name" ? " on" : ""}" data-ss="name">Sort by Name</button>
    </div>` : `<div style="height:20px"></div>`;

  $("#statsBody").innerHTML = `
    ${statsToolbar(label, true)}
    ${donut ? `<div class="stats-donut-row">
      ${donut}
      <div style="display:flex;flex-direction:column;align-items:center;gap:10px">
        ${arrowBtn("donutUp", true)}
        <div id="donutLbl" style="text-align:center;min-width:80px">
          <div style="font-size:20px;font-weight:700;line-height:1.2">${esc(active?.label || "")}</div>
          <div class="muted" style="font-size:15px;margin-top:4px">${active && total ? ((active.count/total)*100).toFixed(1) : 0}%</div>
        </div>
        ${arrowBtn("donutDn", false)}
      </div>
    </div>` : ""}
    ${noValRow}
    <div class="frows" style="padding-top:4px">${rows}</div>
    ${sortBar}`;

  wireStatsToolbar();
  wireDonutArrows(segments, total);

  $("#statsBody").querySelectorAll("[data-ss]").forEach(btn => {
    btn.addEventListener("click", () => { statsFieldSort = btn.dataset.ss; renderStatsFieldPage(); });
  });

  $("#statsBody").querySelectorAll("[data-sv]:not([data-sf])").forEach(el => {
    el.addEventListener("click", () => {
      const val = el.dataset.sv;
      const { noValue, groups } = getFieldGroups(statsField);
      let list, title;
      if (val === "__novalue__") { list = noValue; title = `No ${STATS_FIELD_LABELS[statsField] || statsField}`; }
      else { const g = groups.find(g => g.label === val); list = g ? g.items : []; title = val; }
      statsView = "grid"; statsGridItems = list; statsGridTitle = title;
      statsFromField = true; statsListKey = null;
      renderStats();
    });
  });
}

/* ---- Closet Review ---- */
function renderReviewLanding() {
  const body = $("#statsBody");
  const rows = REVIEW_FIELDS.map(f => ({ f, n: reviewCount(f) })).filter(r => r.n > 0);
  const total = reviewTotalItems();
  // Pin the two highest-value fields (Formality, Color) to the top under a
  // "Suggested" label; the rest stay below in alphabetical order.
  const SUGGESTED = ["formality", "color_family"];
  const suggested = SUGGESTED.map(k => rows.find(r => r.f.key === k)).filter(Boolean);
  const others = rows.filter(r => !SUGGESTED.includes(r.f.key))
    .sort((a, b) => a.f.label.localeCompare(b.f.label));
  const intro = total
    ? `<div class="stats-note" style="padding:14px 18px 6px">Pick a detail to fill in. We'll deal you the ${total} item${total === 1 ? "" : "s"} missing or guessing it, one at a time.</div>`
    : "";
  const fieldRow = r =>
    `<button class="frow rv-fieldrow" data-rv="${r.f.key}">
      <div class="fmeta"><div class="fname">${esc(r.f.label)}</div>
        <div class="fcount rv-cnt">${r.n} item${r.n === 1 ? "" : "s"} to review</div></div>
      <svg class="chev" viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg>
    </button>`;
  const section = (label, list) => list.length
    ? `<div class="sf-label">${esc(label)}</div><div class="stats-sec" style="margin-top:2px"><div class="stats-sec-body">${list.map(fieldRow).join("")}</div></div>`
    : "";
  const list = rows.length
    ? `${section("Suggested", suggested)}${section("More fields", others)}`
    : `<div class="rv-done"><svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        <b>All caught up</b><div>Every item has its details filled in.</div></div>`;
  body.innerHTML = `<div class="cltoolbar">
      <button class="clback" id="stBack"><svg viewBox="0 0 24 24"><path d="M15 6l-6 6 6 6"/></svg></button>
      <div class="cltitle">Closet Review</div><span style="width:34px"></span>
    </div>${intro}${list}<div style="height:24px"></div>`;
  $("#stBack").addEventListener("click", statsNavBack);
  body.querySelectorAll("[data-rv]").forEach(btn => {
    btn.addEventListener("click", () => startReview(btn.dataset.rv));
  });
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startReview(key) {
  const f = REVIEW_FIELDS.find(x => x.key === key);
  if (!f) return;
  reviewField = key;
  reviewQueue = shuffle(reviewPool().filter(f.missing).map(i => i.id));
  reviewIdx = 0;
  statsView = "review-deal";
  renderStats();
}

function reviewAfterEdit() {
  reviewIdx++; _rvPending = null;
  if (statsView === "review-deal") renderStats();
}

function reviewSkip() { reviewIdx++; _rvPending = null; renderStats(); }

// Returns HTML for the inline field editor on a review card, or "" for complex fields.
function renderReviewInline(fieldKey) {
  const pending = _rvPending;
  const singleChips = (opts) => opts.map(o => {
    const on = pending === o;
    return `<button class="sheet-chip${on ? " on" : ""}" data-rvchip="${esc(o)}">${esc(o)}</button>`;
  }).join("");
  const multiChips = (opts) => opts.map(o => {
    const on = Array.isArray(pending) && pending.includes(o);
    return `<button class="sheet-chip${on ? " on" : ""}" data-rvchip="${esc(o)}" data-rvmulti="1">${esc(o)}</button>`;
  }).join("");

  switch (fieldKey) {
    case "formality": {
      const sel = Array.isArray(pending) ? pending : (pending ? [+pending] : []);
      const chips = OCCASION_LADDER.map((lbl, i) => {
        const lvl = i + 1, on = sel.includes(lvl);
        return `<button class="sheet-chip rv-fmlchip${on ? " on" : ""}" data-rvchip="${lvl}" data-rvfml="1">
          <span class="rv-fmllbl">${lvl}. ${esc(lbl)}</span>
          <span class="rv-fmlhint">${esc(OCCASION_HINTS[i])}</span>
        </button>`;
      }).join("");
      return `<div class="rv-inline rv-inline-col"><div class="sheet-chips" style="gap:6px">${chips}</div></div>`;
    }
    case "season":
      return `<div class="rv-inline"><div class="sheet-chips">${multiChips(SEASONS)}</div></div>`;
    case "fabric":
      return `<div class="rv-inline"><div class="sheet-chips">${multiChips(["Cotton","Linen","Wool","Cashmere","Silk","Denim","Polyester","Spandex","Nylon","Fleece","Leather","Velvet"])}</div></div>`;
    case "color_family":
      return `<div class="rv-inline"><div class="sheet-chips">${singleChips(COLOR_FAMILIES.map(c => c[0]))}</div></div>`;
    case "size":
      return `<div class="rv-inline"><div class="sheet-chips">${singleChips(["XXS","XS","S","M","L","XL","XXL","0","2","4","6","8","10","12","14","One size"])}</div></div>`;
    case "acquisition":
      return `<div class="rv-inline"><div class="sheet-chips">${singleChips(["New","Secondhand","Gift"])}</div></div>`;
    case "brand": case "retailer":
      return `<div class="rv-inline"><input class="rv-inp" id="rvInpText" type="text" value="${esc(pending || "")}" placeholder="${fieldKey === "brand" ? "Brand name" : "Retailer name"}"></div>`;
    case "price":
      return `<div class="rv-inline"><input class="rv-inp" id="rvInpText" type="number" min="0" step="0.01" value="${esc(pending != null ? pending : "")}" placeholder="0.00" style="width:120px"></div>`;
    case "purchase_date":
      return `<div class="rv-inline"><input class="rv-inp" id="rvInpText" type="date" value="${esc(pending || "")}"></div>`;
    default:
      return ""; // category/subcategory: use Edit Item
  }
}

function renderReviewDeal() {
  const body = $("#statsBody");
  const f = REVIEW_FIELDS.find(x => x.key === reviewField);
  if (!f) { statsView = "review"; renderStats(); return; }
  const total = reviewQueue.length;
  const toolbar = `<div class="cltoolbar">
      <button class="clback" id="stBack"><svg viewBox="0 0 24 24"><path d="M15 6l-6 6 6 6"/></svg></button>
      <div class="cltitle">${esc(f.label)}</div><span style="width:34px"></span>
    </div>`;

  if (reviewIdx >= total) {
    body.innerHTML = toolbar + `<div class="rv-done">
      <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      <b>${esc(f.label)} — done</b><div>You reviewed all ${total} item${total === 1 ? "" : "s"}.</div>
      <button class="rv-set" id="rvBackList" style="margin-top:20px;max-width:240px">Back to review</button>
    </div>`;
    $("#stBack").addEventListener("click", statsNavBack);
    $("#rvBackList").addEventListener("click", statsNavBack);
    return;
  }

  const item = items.find(i => i.id === reviewQueue[reviewIdx]);
  if (!item) { reviewSkip(); return; }

  // Pre-populate pending with guess on first render of this card
  const guess = f.guess ? f.guess(item) : null;
  if (_rvPending === null && guess) _rvPending = guess;

  const cur = f.value(item);
  const path = item.category ? (item.subcategory ? `${item.category} › ${item.subcategory}` : item.category) : "Uncategorized";
  const inlineHtml = renderReviewInline(reviewField);
  const hasInline = !!inlineHtml;
  const hasPending = _rvPending !== null && _rvPending !== "" && !(Array.isArray(_rvPending) && !_rvPending.length);
  // Show the "this is a guess" banner only while the pending value still equals the
  // derived guess (and the item has no stored value) — it clears once the user edits.
  const showGuessHint = cur == null && guess != null && f.guessLabel
    && JSON.stringify(_rvPending) === JSON.stringify(guess);
  const guessHintHtml = showGuessHint
    ? `<div class="rv-guess-hint"><svg viewBox="0 0 24 24"><path d="M12 2l2.4 7.4H22l-6 4.6 2.3 7.4L12 16.7 5.3 21.4l2.3-7.4-6-4.6h7.6z"/></svg>${esc(f.guessLabel)} — confirm or change</div>`
    : "";

  body.innerHTML = toolbar
    + `<div class="rv-prog">${reviewIdx + 1} of ${total}</div>
    <div class="rv-card">
      ${item.image_path
        ? `<div class="rv-photo" data-photo="${esc(item.image_path)}"></div>`
        : `<div class="rv-photo empty"><svg viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="14" rx="2"/><circle cx="12" cy="13" r="3"/></svg></div>`}
      <div class="rv-info">
        <div class="rv-name">${esc(item.name || "Untitled")}</div>
        <div class="rv-path">${esc(path)}</div>
        ${cur ? `<div class="rv-cur">Current: <b>${esc(cur)}</b></div>` : ""}
      </div>
    </div>
    ${guessHintHtml}
    ${inlineHtml}
    <div class="rv-actions">
      ${hasInline
        ? `<button class="rv-confirm${hasPending ? "" : " rv-set"}" id="rvNext" style="${hasPending ? "" : "background:var(--surface);color:var(--text)"}">
             ${hasPending ? "Save &amp; Next →" : "Next →"}</button>
           <button class="rv-skip" id="rvSkip" style="flex:none;padding:14px 16px">Skip</button>`
        : `<button class="rv-set" id="rvSet">Set ${esc(f.label)}</button>
           <button class="rv-skip" id="rvSkip">Skip</button>`}
      <button class="rv-edit" id="rvEdit" style="flex:none;padding:14px 16px">Edit</button>
    </div>`;

  $("#stBack").addEventListener("click", statsNavBack);
  $("#rvSkip").addEventListener("click", reviewSkip);
  $("#rvEdit").addEventListener("click", () => openItemFromReview(item.id));

  if (hasInline) {
    const rvNext = $("#rvNext");
    rvNext.addEventListener("click", () => {
      if (hasPending) saveField(item.id, reviewField, _rvPending);
      reviewAfterEdit();
    });

    // chip toggles
    body.querySelectorAll("[data-rvchip]").forEach(btn => {
      btn.addEventListener("click", () => {
        const v = btn.dataset.rvchip;
        const isFml = btn.dataset.rvfml === "1";
        const isMulti = btn.dataset.rvmulti === "1";
        if (isFml) {
          const n = +v;
          const cur2 = Array.isArray(_rvPending) ? [..._rvPending] : (_rvPending ? [+_rvPending] : []);
          _rvPending = cur2.includes(n) ? cur2.filter(x => x !== n) : [...cur2, n].sort((a, b) => a - b);
        } else if (isMulti) {
          const cur2 = Array.isArray(_rvPending) ? [..._rvPending] : [];
          _rvPending = cur2.includes(v) ? cur2.filter(x => x !== v) : [...cur2, v];
        } else {
          _rvPending = _rvPending === v ? null : v;
        }
        renderReviewDeal();
      });
    });

    // text / date / number input
    const inp = $("#rvInpText");
    if (inp) {
      inp.addEventListener("input", () => {
        _rvPending = reviewField === "price" ? (inp.value ? +inp.value : null) : inp.value;
      });
      inp.focus();
    }
  } else {
    const rvSet = $("#rvSet");
    if (rvSet) rvSet.addEventListener("click", () => f.edit(item));
  }

  hydratePhotos(body);
}

  $("#fieldSheet").hidden = false;
}

/* ===================================================================
   CAPSULES + TRIPS  (named item sets; trips add dates + packing checklist)
   =================================================================== */
let capsuleId = null;            // detail / picker target
let capsuleView = "list";        // "list" | "detail" | "form" | "pick"
let _capForm = null;             // {name, kind, start_date, end_date, notes} during create
let _capPick = new Set();        // selected item ids in the add-items picker
let _capPickFilter = "";         // keyword filter in the picker
let _capSheetMode = false;       // bulk "add to capsule" sheet open (reuses #moveSheet)
let _fromCapsule = null;         // item opened from a capsule (closetBack returns here)
let _pendingAddIds = null;       // items to fold into a capsule right after creation
let _capNotesTimer = null;
let _capSort = "category";       // detail grid grouping: "category" | "formality"
let _capUnpackedOnly = false;    // trip detail: show only not-yet-packed items
let _capPickCat = null;          // picker category filter (null = all)
let _capPickSub = null;          // picker subcategory filter (null = all within cat)
let _capPickStatus = "Available"; // picker status lens: "Available" | "Storage" | "All"

// canonical category order for grouping (packing-friendly)
const CAP_CAT_ORDER = ["Outerwear", "Tops", "Dresses", "Bottoms", "Shoes", "Workout"];
const catRank = (c) => { const i = CAP_CAT_ORDER.indexOf(c); return i < 0 ? 99 : i; };
const sortFmlName = (a, b) => {
  const fa = itemFormality(a), fb = itemFormality(b);
  if (fa !== fb) return fa - fb;
  return (a.name || "").localeCompare(b.name || "");
};
// → [{key, items}] grouped by category in canonical order, items sorted by formality then name
function groupByCategory(list) {
  const map = new Map();
  for (const i of list) { const c = i.category || "Other"; if (!map.has(c)) map.set(c, []); map.get(c).push(i); }
  const keys = [...map.keys()].sort((a, b) => { const r = catRank(a) - catRank(b); return r !== 0 ? r : a.localeCompare(b); });
  return keys.map(k => ({ key: k, items: map.get(k).sort(sortFmlName) }));
}
// → [{key, items}] grouped by formality levels (only non-empty). Items with multi-level sets
// appear in the group for their minimum (most casual) level.
function groupByFormality(list) {
  const buckets = OCCASION_LADDER.map(lbl => ({ key: lbl, items: [] }));
  for (const i of list) { const lv = Math.max(1, Math.min(8, itemFormality(i))); buckets[lv - 1].items.push(i); }
  return buckets.filter(b => b.items.length)
    .map(b => ({ key: b.key, items: b.items.sort((a, b) => (a.name || "").localeCompare(b.name || "")) }));
}

const isTrip = (c) => c && c.kind !== "capsule";
const capModeLabel = (c) => isTrip(c) ? "Trip" : "Capsule";

function capValue(cid) {
  return capsuleItems(cid).reduce((s, i) => s + (Number(i.price) || 0), 0);
}
function fmtDate(d) {
  if (!d) return "";
  const dt = new Date(d + "T00:00:00");
  return dt.toLocaleDateString(undefined, { month: "short", day: "numeric" });
}
function capDateLabel(c) {
  if (!c.start_date && !c.end_date) return "";
  if (c.start_date && c.end_date) return `${fmtDate(c.start_date)} – ${fmtDate(c.end_date)}`;
  return fmtDate(c.start_date || c.end_date);
}

// ---- build a plain-text checklist of a capsule (grouped by category) ----
function capsuleListText(id) {
  const c = capsuleById.get(id);
  if (!c) return "";
  const trip = isTrip(c);
  const packedSet = new Set((capsuleLinkMap.get(id) || []).filter(l => l.packed).map(l => l.item_id));
  const lines = [c.name];
  const dates = capDateLabel(c);
  if (dates) lines.push(dates);
  lines.push("");
  const groups = groupByCategory(capsuleItems(id));
  if (!groups.length) lines.push("(no items yet)");
  for (const g of groups) {
    lines.push(`${g.key.toUpperCase()} (${g.items.length})`);
    for (const i of g.items) {
      const box = trip ? (packedSet.has(i.id) ? "[x] " : "[ ] ") : "• ";
      lines.push(`${box}${i.name || "Untitled"}`);
    }
    lines.push("");
  }
  return lines.join("\n").trim();
}

async function shareCapsuleList(id) {
  const c = capsuleById.get(id);
  if (!c) return;
  const text = capsuleListText(id);
  try {
    if (navigator.share) { await navigator.share({ title: c.name, text }); return; }
  } catch (e) { if (e && e.name === "AbortError") return; }  // user dismissed the share sheet
  try {
    await navigator.clipboard.writeText(text);
    toast("List copied to clipboard");
  } catch (_) {
    // last-resort fallback for browsers without the async clipboard API
    const ta = document.createElement("textarea");
    ta.value = text; document.body.appendChild(ta); ta.select();
    try { document.execCommand("copy"); toast("List copied to clipboard"); }
    catch { toast("Couldn't copy the list"); }
    ta.remove();
  }
}

async function duplicateCapsule(id) {
  const c = capsuleById.get(id);
  if (!c) return;
  const itemIds = (capsuleLinkMap.get(id) || []).map(l => l.item_id);
  try {
    const payload = { name: `${c.name} (copy)`, kind: c.kind, notes: c.notes || null };
    if (c.start_date) payload.start_date = c.start_date;
    if (c.end_date)   payload.end_date   = c.end_date;
    if (c.locations)  payload.locations  = c.locations;  // column exists since r9
    const rows = await rest("/capsules?select=*", {
      method: "POST", headers: { "Content-Type": "application/json", Prefer: "return=representation" },
      body: JSON.stringify(payload),
    });
    const nc = Array.isArray(rows) ? rows[0] : rows;
    if (!nc || !nc.id) throw new Error("Could not duplicate");
    capsules.unshift(nc);
    buildCapsuleIndexes();
    if (itemIds.length) await addItemsToCapsule(nc.id, itemIds);
    capsuleId = nc.id;
    capsuleView = "detail";
    renderCapsules();
    toast("Capsule duplicated");
  } catch (e) { toast(e.message); }
}

// ---- packing tick ----
async function togglePack(itemId) {
  const links = capsuleLinkMap.get(capsuleId) || [];
  const link = links.find(l => l.item_id === itemId);
  if (!link) return;
  const next = !link.packed;
  link.packed = next; // optimistic
  // surgical tile update + progress refresh
  const tile = $(`[data-cap-item="${itemId}"]`);
  if (tile) tile.classList.toggle("packed", next);
  refreshPackProgress();
  if (_capUnpackedOnly && next && tile) {
    tile.remove();
    $$(".cap-grp").forEach(g => { if (!g.querySelector(".gtile")) g.remove(); });
    if (!$(".cap-grp")) renderCapsules();
  }
  refreshPackGroupCounts();
  try {
    await rest(`/capsule_items?capsule_id=eq.${capsuleId}&item_id=eq.${itemId}`,
      { method: "PATCH", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ packed: next }) });
  } catch (e) { link.packed = !next; toast(e.message); renderCapsules(); }
}
function refreshPackProgress() {
  const fill = $(".cap-pack-fill"), lbl = $(".cap-pack-lbl");
  if (!fill) return;
  const links = capsuleLinkMap.get(capsuleId) || [];
  const total = capsuleItems(capsuleId).length;
  const packed = links.filter(l => l.packed && itemById.has(l.item_id)).length;
  fill.style.width = (total ? Math.round((packed / total) * 100) : 0) + "%";
  if (lbl) lbl.textContent = `${packed} of ${total} packed · tap the circle on a piece to check it off`;
}
// recompute each category/formality group's "N/M packed" header from the DOM tiles
function refreshPackGroupCounts() {
  $$(".cap-grp").forEach(grp => {
    const cnt = grp.querySelector("[data-grp-cnt]");
    if (!cnt) return;
    const total = grp.querySelectorAll(".gtile").length;
    const packed = grp.querySelectorAll(".gtile.packed").length;
    cnt.textContent = `${packed}/${total} packed`;
    cnt.classList.toggle("done", packed === total);
  });
}

// status + keyword filtered (before category chip filter)
function pickerPoolBase() {
  let pool = _capPickStatus === "All"
    ? items.filter(i => itemStatus(i) !== "Archive")
    : items.filter(i => itemStatus(i) === _capPickStatus);
  const q = _capPickFilter.trim().toLowerCase();
  if (q) pool = pool.filter(i =>
    (i.name || "").toLowerCase().includes(q) ||
    (i.brand || "").toLowerCase().includes(q) ||
    (i.category || "").toLowerCase().includes(q) ||
    (i.subcategory || "").toLowerCase().includes(q));
  return pool;
}
function pickerPool() {
  let pool = pickerPoolBase();
  if (_capPickCat) pool = pool.filter(i => (i.category || "Other") === _capPickCat);
  if (_capPickSub) pool = pool.filter(i => (i.subcategory || "") === _capPickSub);
  return sortItems(pool);
}

// subcategory chips (shown when a category is selected)
function pickerSubBar() {
  if (!_capPickCat) return "";
  const subs = TAXONOMY[_capPickCat] || [];
  if (!subs.length) return "";
  const catPool = pickerPoolBase().filter(i => (i.category || "Other") === _capPickCat);
  const counts = new Map();
  for (const i of catPool) { const s = i.subcategory || ""; if (s) counts.set(s, (counts.get(s) || 0) + 1); }

}

// Insert membership rows; `skipBuild` avoids a double rebuild when caller rebuilds.
async function addItemsToCapsule(cid, itemIds, alreadyHandledRebuild) {
  const fresh = itemIds.filter(id => !(capsuleLinkMap.get(cid) || []).some(l => l.item_id === id));
  if (!fresh.length) return;
  // `packed` is omitted so this works before the column migration; DB default fills it after.
  const payload = fresh.map(id => ({ capsule_id: cid, item_id: id }));

    method: "POST", headers: { "Content-Type": "application/json", Prefer: "return=representation" }, body: JSON.stringify(payload),

  capsuleLinks = capsuleLinks.concat(rows && rows.length ? rows : payload);
  buildCapsuleIndexes();
}

}

/* ===================================================================
   BUILD A LOOK — free-form canvas (Stylebook-style)
   builder = { outfitId, name, pieces:[{item_id,x,y,s}], selIdx,
               picking, pickCat, pickQ }.  x/y = piece CENTER as a fraction
   (0..1) of the canvas; s = piece width as a fraction of canvas width;
   array order = z-order (later = on top).
   =================================================================== */
let builder = null;
const clamp01 = (v) => Math.max(0, Math.min(1, v));

// staggered default spot for the k-th piece dropped on the canvas
function defaultPlacement(k) {
  const cols = [0.34, 0.5, 0.66];
  return { x: cols[k % 3], y: clamp01(0.3 + Math.floor(k / 3) * 0.2 + (k % 3) * 0.05), s: 0.4 };
}

function openBuilder(outfitId = null, seedItemId = null) {
  let pieces = [], name = "";
  if (outfitId) {
    const o = outfitById.get(outfitId);
    if (o) {
      name = o.name || "";
      const lay = Array.isArray(o.layout) ? o.layout : [];
      const ids = (outfitItemMap.get(outfitId) || []).filter(id => itemById.has(id));
      if (lay.length) {
        pieces = lay.filter(p => itemById.has(p.item_id)).map(p => ({
          item_id: p.item_id, x: clamp01(p.x), y: clamp01(p.y),
          s: Math.max(0.12, Math.min(0.92, p.s || 0.4)),
        }));
        const have = new Set(pieces.map(p => p.item_id));
        ids.filter(id => !have.has(id)).forEach(id => pieces.push({ item_id: id, ...defaultPlacement(pieces.length) }));
      } else {
        pieces = ids.map((id, k) => ({ item_id: id, ...defaultPlacement(k) }));
      }
    }
  } else if (seedItemId && itemById.has(seedItemId)) {
    pieces = [{ item_id: seedItemId, ...defaultPlacement(0) }];
  }
  builder = { outfitId, name, pieces, selIdx: pieces.length ? pieces.length - 1 : -1, picking: false, pickCat: null, pickSub: null, pickQ: "" };
  $("#app").classList.add("builder-mode");
  switchTab("builder");
}

function renderBuilder() {
  if (!builder) return;
  if (builder.picking) renderBuilderPicker();
  else renderBuilderCanvas();
}

function renderBuilderCanvas() {

  if (nameInp) nameInp.oninput = () => { builder.name = nameInp.value; };
